<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Agendar Avaliação Física — Estúdio Se7e</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--purple:#6D28D9;--purple-l:#EDE9FE;--green:#16A34A;--green-l:#DCFCE7;--ink:#1C1916;--ink2:#4A453F;--ink3:#8A8278;--bg:#F5F0E8;--bg3:#E0DAD0;--wh:#FFFEF9;--r:12px;--gold:#C9A84C}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
  .header{background:var(--ink);color:#fff;padding:28px 20px 24px;text-align:center}
  .header-logo{font-size:13px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
  .header h1{font-size:20px;font-weight:800;margin-bottom:4px}
  .header .sub{font-size:13px;opacity:.6}
  .container{max-width:500px;margin:0 auto;padding:20px 16px}
  .card{background:var(--wh);border-radius:var(--r);padding:16px;margin-bottom:12px;border:1px solid #E8E3DC}
  .step-title{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--ink)}
  .week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .week-btn{width:36px;height:36px;border:1.5px solid var(--bg3);background:var(--wh);border-radius:8px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s}
  .week-btn:hover{border-color:var(--purple);color:var(--purple)}
  .week-label{font-size:13px;font-weight:600}
  .day-section{margin-bottom:14px}
  .day-label{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
  .slot-btn{width:100%;padding:12px 14px;background:var(--wh);border:2px solid var(--bg3);border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;color:var(--ink);text-align:left;margin-bottom:6px;display:flex;align-items:center;gap:10px;transition:all .15s}
  .slot-btn:hover{border-color:var(--purple);background:var(--purple-l)}
  .slot-btn.selected{background:var(--purple-l);border-color:var(--purple);color:var(--purple)}
  .slot-btn.ocupado{background:#F9F7F4;border-color:var(--bg3);color:var(--ink3);cursor:not-allowed;opacity:.6}
  .btn-confirmar{width:100%;padding:16px;background:var(--purple);color:#fff;border:none;border-radius:var(--r);font-size:16px;font-weight:700;cursor:pointer;margin-top:8px;transition:opacity .15s}
  .btn-confirmar:disabled{background:var(--bg3);color:var(--ink3);cursor:not-allowed}
  .btn-confirmar:not(:disabled):hover{opacity:.9}
  .success-screen{text-align:center;padding:40px 20px}
  .success-ico{font-size:60px;margin-bottom:16px}
  .success-title{font-size:22px;font-weight:800;margin-bottom:8px}
  .success-sub{font-size:14px;color:var(--ink2);line-height:1.6}
  .regra{background:#FFFBEB;border:1px solid #FCD34D;border-radius:10px;padding:10px 14px;font-size:12px;color:#92400E;margin-bottom:14px}
  .empty{text-align:center;padding:30px;color:var(--ink3);font-size:13px;line-height:1.6}
  .spinner{text-align:center;padding:40px;color:var(--ink3)}
  .error-box{background:#FEF2F2;border:1px solid #FECACA;border-radius:10px;padding:16px;text-align:center;color:#991B1B;font-size:14px;margin:20px 0}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">Estúdio Se7e</div>
  <h1>Avaliação Física</h1>
  <div class="sub" id="sub-nome">Vanessa Ramos</div>
</div>

<div class="container" id="app">
  <div class="spinner">⏳ Carregando…</div>
</div>

<script>
const SUPA_URL = 'https://kfmkcbhalwupgknysukj.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmbWtjYmhhbHd1cGdrbnlzdWtqIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MzQzMjE2NCwiZXhwIjoyMDg5MDA4MTY0fQ.xvRFjKk7GnXqrykjEr9Cp1yGGV-wGmcsZ-9SHZ1u9UU';
const SB = h => ({apikey:SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=representation',...h});

async function sbGet(t,p=''){const r=await fetch(`${SUPA_URL}/rest/v1/${t}?${p}`,{headers:SB()});return r.json();}
async function sbPost(t,d){const r=await fetch(`${SUPA_URL}/rest/v1/${t}`,{method:'POST',headers:SB(),body:JSON.stringify(d)});return r.json();}
async function sbPatch(t,p,d){const r=await fetch(`${SUPA_URL}/rest/v1/${t}?${p}`,{method:'PATCH',headers:SB({'Prefer':'return=representation'}),body:JSON.stringify(d)});return r.json();}

const params = new URLSearchParams(window.location.search);
const TOKEN = params.get('t')||'';

let tokenData  = null;
let slotsFixos = [];
let excecoes   = [];
let tokens     = [];   // agendamentos existentes
let state = { weekOffset:0, selectedSlot:null, step:'loading' };

async function init(){
  if(!TOKEN){
    showError('Link inválido. Solicite um novo link à recepção do Estúdio Se7e.');
    return;
  }
  // Validar token
  const rows = await sbGet('aval_tokens',`token=eq.${TOKEN}&select=*`);
  if(!rows.length){
    showError('Este link é inválido ou expirou. Solicite um novo link à recepção.');
    return;
  }
  tokenData = rows[0];
  if(tokenData.status === 'realizado'){
    showError('Sua avaliação já foi realizada. Aguarde o próximo ciclo de 3 meses para um novo agendamento.');
    return;
  }

  // Personalizar header
  const nome = tokenData.student_nm||'';
  if(nome) document.getElementById('sub-nome').textContent = `Olá, ${nome.split(' ')[0]}! · Vanessa Ramos`;

  // Se já tem horário agendado mas ainda não realizado → mostrar confirmação
  if(tokenData.status === 'agendado' && tokenData.scheduled_date){
    state.step = 'ja_agendado';
    render();
    return;
  }

  // Carregar slots e agendamentos
  const [sf, exc, tks] = await Promise.all([
    sbGet('aval_slots_fixos','ativo=eq.true&order=weekday,hora'),
    sbGet('aval_excecoes','order=created_at'),
    sbGet('aval_tokens','status=eq.agendado&select=scheduled_date,scheduled_time'),
  ]);
  slotsFixos = sf;
  excecoes   = exc;
  tokens     = tks;
  state.step = 'escolher';
  render();
}

function getSlotsParaSemana(weekOffset){
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const minDate = new Date(hoje.getTime() + 48*3600*1000);
  const seg = new Date(hoje);
  seg.setDate(seg.getDate() - seg.getDay() + 1 + weekOffset*7);

  const dias = [];
  for(let d=0;d<7;d++){
    const dia = new Date(seg);
    dia.setDate(seg.getDate()+d);
    const isoDate = dia.toISOString().slice(0,10);
    const wd = dia.getDay();

    const fixos = slotsFixos.filter(s=>s.weekday===wd);
    const removidos = excecoes.filter(e=>{
      if(e.tipo==='remove') return e.data===isoDate;
      if(e.tipo==='remove_from') return e.weekday===wd && e.data_inicio<=isoDate;
      return false;
    }).map(e=>e.hora);
    const adicionados = excecoes.filter(e=>{
      if(e.tipo==='add') return e.data===isoDate;
      if(e.tipo==='add_from') return e.weekday===wd && e.data_inicio<=isoDate;
      return false;
    }).map(e=>({hora:e.hora}));

    let slots = [
      ...fixos.filter(s=>!removidos.includes(s.hora)),
      ...adicionados,
    ].sort((a,b)=>a.hora.localeCompare(b.hora));

    // Dedup
    const vistas=new Set();
    slots=slots.filter(s=>{ if(vistas.has(s.hora)) return false; vistas.add(s.hora); return true; });

    slots = slots.map(slot=>{
      const slotDT  = new Date(isoDate+'T'+slot.hora);
      const ocupado = tokens.some(t=>t.scheduled_date===isoDate&&t.scheduled_time===slot.hora+':00');
      const passado = slotDT < minDate;
      return {...slot, ocupado, passado};
    }).filter(s=>!s.passado);

    if(slots.length) dias.push({data:isoDate,weekday:wd,
      label:dia.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'}),slots});
  }
  return {dias,seg};
}

function render(){
  const app = document.getElementById('app');
  if(state.step==='loading')    { app.innerHTML='<div class="spinner">⏳ Carregando…</div>'; return; }
  if(state.step==='sucesso')    { app.innerHTML=renderSucesso(); return; }
  if(state.step==='ja_agendado'){ app.innerHTML=renderJaAgendado(); return; }
  if(state.step==='confirmar')  { app.innerHTML=renderConfirmar(); return; }
  app.innerHTML = renderEscolher();
}

function renderEscolher(){
  const {dias,seg} = getSlotsParaSemana(state.weekOffset);
  const fimSem = new Date(seg); fimSem.setDate(seg.getDate()+6);
  const semLabel = seg.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})+' – '+fimSem.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});

  const diasHtml = dias.map(dia=>{
    const slotsHtml = dia.slots.map(slot=>{
      if(slot.ocupado) return `<button class="slot-btn ocupado" disabled>🔴 ${slot.hora} — Ocupado</button>`;
      const sel = state.selectedSlot?.data===dia.data && state.selectedSlot?.hora===slot.hora;
      return `<button class="slot-btn ${sel?'selected':''}" onclick="selecionarSlot('${dia.data}','${slot.hora}')">
        ${sel?'✅':'🟢'} ${slot.hora}
        <span style="margin-left:auto;font-size:12px;${sel?'color:var(--purple);font-weight:600':'color:var(--ink3)'}">
          ${sel?'Selecionado':'Disponível'}
        </span>
      </button>`;
    }).join('');
    return `<div class="day-section">
      <div class="day-label">${dia.label}</div>
      ${slotsHtml}
    </div>`;
  }).join('');

  return `
    <div class="regra">⏰ Agendamento com <strong>48h de antecedência</strong>. Só horários disponíveis são exibidos.</div>
    <div class="card">
      <div class="week-nav">
        <button class="week-btn" onclick="state.weekOffset=Math.max(0,state.weekOffset-1);render()">‹</button>
        <span class="week-label">${semLabel}</span>
        <button class="week-btn" onclick="state.weekOffset++;render()">›</button>
      </div>
      ${diasHtml||'<div class="empty">Sem horários disponíveis nesta semana.<br>Avance para a próxima. 👉</div>'}
    </div>
    <button class="btn-confirmar" ${state.selectedSlot?'':'disabled'} onclick="state.step='confirmar';render()">
      ${state.selectedSlot
        ? `Confirmar: ${new Date(state.selectedSlot.data+'T12:00').toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'})} às ${state.selectedSlot.hora}`
        : 'Selecione um horário acima'}
    </button>`;
}

function renderConfirmar(){
  const {data,hora} = state.selectedSlot;
  const dataFmt = new Date(data+'T12:00').toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  return `<div class="card">
    <div class="step-title">Confirmar agendamento</div>
    <div style="background:var(--purple-l);border-radius:10px;padding:16px;margin-bottom:14px">
      <div style="font-size:28px;font-weight:900;color:var(--purple)">${hora}</div>
      <div style="font-size:14px;color:var(--purple);margin-top:4px">${dataFmt}</div>
      <div style="font-size:12px;color:var(--ink3);margin-top:6px">Avaliação física · Vanessa Ramos · Estúdio Se7e</div>
    </div>
    <div style="font-size:13px;color:var(--ink2);line-height:1.6;margin-bottom:16px">
      Ao confirmar, seu horário fica reservado. Se precisar cancelar, o horário é liberado e você pode remarcar pelo mesmo link.
    </div>
    <div style="display:flex;gap:8px">
      <button onclick="state.step='escolher';render()" style="flex:1;padding:12px;background:var(--bg);border:1.5px solid var(--bg3);border-radius:10px;font-size:14px;cursor:pointer">← Voltar</button>
      <button onclick="confirmarAgendamento()" style="flex:2;padding:12px;background:var(--purple);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer">✓ Confirmar</button>
    </div>
  </div>`;
}

function renderJaAgendado(){
  const data = tokenData.scheduled_date;
  const hora = (tokenData.scheduled_time||'').slice(0,5);
  const dataFmt = new Date(data+'T12:00').toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  return `<div class="card" style="text-align:center;padding:24px">
    <div style="font-size:48px;margin-bottom:12px">📅</div>
    <div style="font-size:16px;font-weight:700;margin-bottom:8px">Avaliação já agendada</div>
    <div style="background:var(--purple-l);border-radius:10px;padding:14px;margin-bottom:16px">
      <div style="font-size:26px;font-weight:900;color:var(--purple)">${hora}</div>
      <div style="font-size:13px;color:var(--purple);margin-top:2px">${dataFmt}</div>
    </div>
    <div style="font-size:13px;color:var(--ink2);line-height:1.6;margin-bottom:16px">
      Você já tem um horário reservado. Se precisar cancelar, o horário é liberado e você pode remarcar aqui mesmo.
    </div>
    <button onclick="cancelarEReagendar()" style="width:100%;padding:12px;background:var(--bg);border:1.5px solid var(--bg3);border-radius:10px;font-size:14px;cursor:pointer;color:var(--ink2)">
      🔄 Cancelar e remarcar
    </button>
  </div>`;
}

function renderSucesso(){
  const {data,hora} = state.selectedSlot;
  const dataFmt = new Date(data+'T12:00').toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
  return `<div class="success-screen">
    <div class="success-ico">🎉</div>
    <div class="success-title">Agendado!</div>
    <div class="success-sub">
      Sua avaliação física está confirmada para<br>
      <strong>${dataFmt} às ${hora}</strong><br><br>
      Qualquer dúvida, fale com a recepção do Estúdio Se7e pelo WhatsApp.
    </div>
    <div style="margin-top:24px;padding:14px;background:var(--green-l);border-radius:var(--r);border:1px solid #86EFAC;font-size:13px;color:#166534">
      📍 Estúdio Se7e · Vanessa Ramos · Vila Mariana, São Paulo
    </div>
  </div>`;
}

function showError(msg){
  document.getElementById('app').innerHTML = `<div class="error-box">⚠️ ${msg}</div>`;
}

function selecionarSlot(data, hora){
  state.selectedSlot = {data, hora};
  render();
}

async function confirmarAgendamento(){
  const {data, hora} = state.selectedSlot;

  // Verificar se slot ainda disponível
  const check = await sbGet('aval_tokens',`status=eq.agendado&scheduled_date=eq.${data}&scheduled_time=eq.${hora}:00&select=id`);
  if(check.length){
    alert('Este horário acabou de ser reservado por outra pessoa. Por favor, escolha outro.');
    state.step='escolher'; state.selectedSlot=null;
    // Reload tokens
    tokens = await sbGet('aval_tokens','status=eq.agendado&select=scheduled_date,scheduled_time');
    render(); return;
  }

  // Salvar agendamento
  await sbPatch('aval_tokens',`token=eq.${TOKEN}`,{
    status: 'agendado',
    scheduled_date: data,
    scheduled_time: hora+':00',
  });

  tokenData.status = 'agendado';
  tokenData.scheduled_date = data;
  tokenData.scheduled_time = hora+':00';
  state.step = 'sucesso';
  render();
}

async function cancelarEReagendar(){
  if(!confirm('Cancelar este horário? Você poderá remarcar pelo mesmo link.')) return;
  await sbPatch('aval_tokens',`token=eq.${TOKEN}`,{
    status: 'ativo',
    scheduled_date: null,
    scheduled_time: null,
  });
  tokenData.status = 'ativo';
  tokenData.scheduled_date = null;
  // Reload
  tokens = await sbGet('aval_tokens','status=eq.agendado&select=scheduled_date,scheduled_time');
  state.step = 'escolher';
  render();
}

init();
</script>
</body>
</html>
