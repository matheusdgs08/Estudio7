<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estúdio Se7e — Coordenação</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#B8975A;--gold-l:#F5EFE4;--gold-d:#8B6B35;
  --ink:#1C1916;--ink2:#4A453F;--ink3:#8A8278;
  --bg:#FAF8F4;--bg2:#F0EDE8;--bg3:#E2DDD6;--wh:#FFFFFF;
  --r:8px;--rs:6px;
  --green:#059669;--green-l:#ECFDF5;--green-b:#6EE7B7;
  --red:#DC2626;--red-l:#FEF2F2;--red-b:#FECACA;
  --blue:#1E40AF;--blue-l:#EFF6FF;--blue-b:#BFDBFE;
  --purple:#6D28D9;--purple-l:#F5F3FF;--purple-b:#C4B5FD;
  --amber:#D97706;--amber-l:#FFFBEB;--amber-b:#FCD34D;
  --sidebar:230px;--col-alunos:240px;
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);font-size:13px;overflow:hidden}
input,select,button,textarea{font-family:'DM Sans',sans-serif;font-size:13px}
button{cursor:pointer}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--ink3)}

/* ── APP SHELL ── */
.app{display:flex;height:100vh;background:var(--bg)}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar);background:var(--ink);display:flex;flex-direction:column;flex-shrink:0}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-brand{font-family:'Playfair Display',serif;font-size:15px;font-weight:400;color:var(--wh);letter-spacing:.3px}
.sb-role{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
.sb-user{padding:10px 16px 10px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:9px}
.sb-av{width:28px;height:28px;border-radius:50%;background:var(--gold-l);color:var(--gold-d);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.sb-uname{font-size:12px;font-weight:500;color:var(--wh);line-height:1.3}
.sb-uemail{font-size:10px;color:rgba(255,255,255,.3)}
.sb-nav{flex:1;padding:8px 0;overflow-y:auto}
.sb-section{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.2);padding:10px 16px 4px;font-weight:600}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 16px;cursor:pointer;color:rgba(255,255,255,.45);font-size:12px;font-weight:400;position:relative;border:none;background:transparent;width:100%;text-align:left;transition:all .12s}
.sb-item:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.8)}
.sb-item.on{background:rgba(255,255,255,.09);color:var(--wh);font-weight:500}
.sb-item.on::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--gold)}
.sb-ico{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.sb-badge{margin-left:auto;font-size:9px;padding:1px 6px;border-radius:10px;background:var(--red);color:var(--wh);font-weight:600}
.sb-bottom{padding:10px 16px;border-top:1px solid rgba(255,255,255,.07)}
.btn-logout-sb{font-size:11px;color:rgba(255,255,255,.35);background:transparent;border:none;cursor:pointer;padding:0;display:flex;align-items:center;gap:5px}
.btn-logout-sb:hover{color:#f87171}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:var(--wh);border-bottom:1px solid var(--bg3);padding:0 20px;display:flex;align-items:center;height:48px;gap:12px;flex-shrink:0}
.tb-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:400;color:var(--ink)}
.tb-sep{width:1px;height:18px;background:var(--bg3);flex-shrink:0}
.tb-sub{font-size:12px;color:var(--ink3);flex:1}
.tb-actions{display:flex;gap:7px;align-items:center}
.btn-prim{padding:6px 14px;background:var(--gold);color:var(--wh);border:none;border-radius:20px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px;white-space:nowrap}
.btn-prim:hover{background:var(--gold-d)}
.btn-sec{padding:6px 12px;border:1px solid var(--bg3);background:var(--wh);border-radius:20px;font-size:12px;color:var(--ink2)}
.btn-sec:hover{border-color:var(--gold);color:var(--gold-d)}
.btn-cmp{padding:6px 12px;border:1px solid var(--blue-b);background:var(--blue-l);border-radius:20px;font-size:12px;color:var(--blue);font-weight:500;display:flex;align-items:center;gap:5px}
.btn-cmp:hover{background:#DBEAFE}
.btn-cmp.on{background:var(--blue);color:var(--wh);border-color:var(--blue)}
.content{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* ── TREINOS ── */
.treinos-wrap{display:flex;flex:1;overflow:hidden}

/* COLUNA ALUNOS */
.col-alunos{width:var(--col-alunos);flex-shrink:0;border-right:1px solid var(--bg3);display:flex;flex-direction:column;background:var(--wh)}
.ca-hdr{padding:10px 12px;border-bottom:1px solid var(--bg3);flex-shrink:0}
.ca-search{width:100%;padding:6px 10px;border:1px solid var(--bg3);border-radius:var(--rs);font-size:12px;outline:none;background:var(--bg)}
.ca-search:focus{border-color:var(--gold);background:var(--wh)}
.alunos-list{flex:1;overflow-y:auto}
.aluno-row{display:flex;align-items:center;gap:9px;padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--bg3);transition:background .12s}
.aluno-row:hover{background:var(--bg)}
.aluno-row.sel{background:var(--gold-l)}
.aluno-row.sel{border-left:2px solid var(--gold)}
.a-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.a-info{flex:1;min-width:0}
.a-nome{font-size:12px;font-weight:500;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.a-prog{font-size:10px;color:var(--ink3);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.a-chip{font-size:10px;padding:1px 6px;border-radius:10px;border:1px solid;flex-shrink:0}
.ac-ok{background:var(--green-l);color:var(--green);border-color:var(--green-b)}
.ac-no{background:var(--bg2);color:var(--ink3);border-color:var(--bg3)}

/* COLUNA PROGRAMA */
.col-prog{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}

/* TABS DAS FICHAS */
.fichas-bar{background:var(--wh);border-bottom:1px solid var(--bg3);display:flex;align-items:stretch;flex-shrink:0;overflow-x:auto;min-height:40px}
.fichas-bar::-webkit-scrollbar{height:0}
.ftab-wrap{display:flex;align-items:stretch;border-right:1px solid var(--bg3)}
.ftab{padding:0 14px;font-size:12px;color:var(--ink3);cursor:pointer;white-space:nowrap;border:none;background:transparent;display:flex;align-items:center;gap:6px;border-bottom:2px solid transparent;transition:all .12s;position:relative}
.ftab:hover{color:var(--ink2);background:var(--bg)}
.ftab.on{color:var(--ink);border-bottom:2px solid var(--gold);font-weight:600;background:var(--wh)}
.ftab.cmp{color:var(--blue);border-bottom:2px solid var(--blue)}
.ftab-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ftab-del{width:16px;height:16px;border-radius:50%;border:1px solid transparent;background:transparent;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--ink3);opacity:.4;transition:all .12s;flex-shrink:0;cursor:pointer;line-height:1;padding:0}
.ftab:hover .ftab-del,.ftab.on .ftab-del{opacity:.7}
.ftab-del:hover{background:var(--red-l);color:var(--red);border-color:var(--red-b);opacity:1}
.btn-add-tab{padding:0 12px;font-size:18px;color:var(--ink3);background:none;border:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;line-height:1}
.btn-add-tab:hover{color:var(--gold);background:var(--gold-l)}

/* ÁREA EXERCÍCIOS */
.exs-area{flex:1;overflow:hidden;display:flex}

/* MODO NORMAL */
.exs-body{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:7px}

/* MODO COMPARAÇÃO */
.cmp-cols{flex:1;display:flex;overflow:hidden}
.cmp-col{flex:1;min-width:220px;display:flex;flex-direction:column;border-right:1px solid var(--bg3)}
.cmp-col:last-child{border-right:none}
.cmp-col-hdr{padding:8px 14px;border-bottom:1px solid var(--bg3);display:flex;align-items:center;gap:7px;background:var(--wh);flex-shrink:0}
.cmp-col-title{font-size:12px;font-weight:600;color:var(--ink)}
.cmp-col-body{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:6px}

/* ── EXERCÍCIO CARD ── */
.ex-card{background:var(--wh);border:1px solid var(--bg3);border-radius:var(--r);overflow:hidden;transition:border-color .12s;user-select:none}
.ex-card:hover{border-color:var(--bg3)}
.ex-card.dragging{opacity:.4;border-style:dashed;border-color:var(--gold)}
.ex-card.drag-over{border-color:var(--gold);box-shadow:0 0 0 2px rgba(184,151,90,.2)}
.ex-row{display:flex;align-items:center;gap:7px;padding:8px 10px}
.ex-drag{color:var(--bg3);font-size:13px;cursor:grab;flex-shrink:0;padding:0 1px;line-height:1}
.ex-drag:hover{color:var(--ink3)}
.ex-drag:active{cursor:grabbing}
.ex-num{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;background:var(--bg2);color:var(--ink3)}
.ex-info{flex:1;min-width:0}
.ex-nome{font-size:12px;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ex-grupo{font-size:10px;color:var(--ink3);margin-top:1px}
.ex-tags{display:flex;gap:4px;align-items:center;flex-shrink:0}
.etag{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--bg2);color:var(--ink2);font-weight:500;white-space:nowrap}
.etag.carga{background:var(--gold-l);color:var(--gold-d)}
.ex-acts{display:flex;gap:2px;flex-shrink:0}
.btn-ei,.btn-ed{width:24px;height:24px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px;border:none;background:transparent;color:var(--ink3);transition:all .1s}
.btn-ei:hover{background:var(--gold-l);color:var(--gold-d)}
.btn-ed:hover{background:var(--red-l);color:var(--red)}
.ex-obs{font-size:11px;color:var(--ink3);padding:0 10px 7px 38px;font-style:italic}

/* GRUPO SUPERSET */
.grupo-card{border:1px solid;border-radius:var(--r);overflow:hidden;user-select:none}
.grupo-card.dragging{opacity:.4;border-style:dashed}
.grupo-card.drag-over{box-shadow:0 0 0 2px rgba(184,151,90,.2)}
.gc-d{border-color:var(--blue-b)}.gc-t{border-color:var(--purple-b)}
.g-hdr{padding:5px 10px;display:flex;align-items:center;gap:7px;font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;cursor:grab}
.gc-d .g-hdr{background:var(--blue-l);color:var(--blue)}
.gc-t .g-hdr{background:var(--purple-l);color:var(--purple)}
.g-hdr:active{cursor:grabbing}
.g-exs{display:flex;flex-direction:column}
.g-row{display:flex;align-items:center;gap:7px;padding:7px 10px;border-top:1px solid}
.gc-d .g-row{border-color:#DBEAFE}.gc-t .g-row{border-color:#EDE9FE}
.gn-d{background:#DBEAFE;color:var(--blue)}.gn-t{background:#EDE9FE;color:var(--purple)}

/* BOTÕES ADD */
.btn-add-ex{display:flex;align-items:center;gap:7px;padding:8px 10px;border:1px dashed var(--bg3);border-radius:var(--r);background:transparent;color:var(--ink3);font-size:12px;cursor:pointer;width:100%;transition:all .12s}
.btn-add-ex:hover{border-color:var(--gold);color:var(--gold-d);background:var(--gold-l)}
.btns-grupo{display:flex;gap:6px;flex-wrap:wrap}
.btn-add-g{font-size:11px;padding:5px 10px;border:1px dashed;border-radius:var(--r);background:transparent;cursor:pointer;transition:all .12s}
.btn-add-g.d{color:var(--blue);border-color:var(--blue-b)}.btn-add-g.d:hover{background:var(--blue-l)}
.btn-add-g.t{color:var(--purple);border-color:var(--purple-b)}.btn-add-g.t:hover{background:var(--purple-l)}

/* ESTADO VAZIO */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:10px;padding:40px;text-align:center;color:var(--ink3)}
.empty-ico{font-size:32px;opacity:.25}
.empty-title{font-size:14px;font-weight:500;color:var(--ink2)}
.empty-sub{font-size:12px;color:var(--ink3);line-height:1.6;max-width:260px}

/* ── FILA ── */
.fila-wrap{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:10px;max-width:860px}
.sol-card{background:var(--wh);border:1px solid var(--bg3);border-radius:var(--r);overflow:hidden}
.sol-card.nova{border-color:var(--blue-b)}
.sol-hdr{padding:10px 14px;border-bottom:1px solid var(--bg3);display:flex;align-items:center;gap:9px}
.sol-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.sol-meta{flex:1;min-width:0}
.sol-nome{font-size:12px;font-weight:600;color:var(--ink)}
.sol-sub{font-size:10px;color:var(--ink3);margin-top:1px}
.sbdg{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;flex-shrink:0}
.sbd-n{background:var(--blue-l);color:var(--blue);border:1px solid var(--blue-b)}
.sbd-ok{background:var(--green-l);color:var(--green);border:1px solid var(--green-b)}
.sbd-rej{background:var(--red-l);color:var(--red);border:1px solid var(--red-b)}
.sol-body{padding:10px 14px;display:flex;gap:14px;align-items:flex-start}
.sol-cols{display:flex;gap:16px;flex:1;min-width:0}
.sol-col{min-width:0}
.slbl{font-size:9px;color:var(--ink3);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px}
.sval{font-size:12px;color:var(--ink);font-weight:500}
.smot{font-size:12px;color:var(--ink2);background:var(--bg);border-radius:var(--rs);padding:7px 10px;line-height:1.5;font-style:italic;flex:1}
.sol-actions{padding:8px 14px;border-top:1px solid var(--bg3);display:flex;gap:7px}
.btn-apr{padding:7px 16px;background:var(--green);color:var(--wh);border:none;border-radius:var(--rs);font-size:12px;font-weight:600}
.btn-apr:hover{background:#047857}
.btn-rej{padding:7px 16px;background:var(--red-l);color:var(--red);border:1px solid var(--red-b);border-radius:var(--rs);font-size:12px;font-weight:600}
.btn-rej:hover{background:#FEE2E2}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(28,25,22,.45);display:flex;align-items:center;justify-content:center;z-index:200}
.modal-box{background:var(--wh);border-radius:var(--r);width:100%;max-width:480px;max-height:88vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.18);animation:popin .16s ease}
@keyframes popin{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.mhdr{padding:14px 16px;border-bottom:1px solid var(--bg3);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--wh);z-index:2}
.mtitle{font-family:'Playfair Display',serif;font-size:15px;font-weight:400;color:var(--ink)}
.mclose{width:26px;height:26px;border-radius:4px;border:1px solid var(--bg3);background:transparent;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--ink3)}
.mclose:hover{background:var(--bg)}
.mbody{padding:16px;display:flex;flex-direction:column;gap:12px}
.mf{display:flex;flex-direction:column;gap:4px}
.ml{font-size:10px;color:var(--ink3);font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.mi{padding:8px 10px;border:1px solid var(--bg3);border-radius:var(--rs);font-size:13px;outline:none;width:100%;background:var(--bg);color:var(--ink)}
.mi:focus{border-color:var(--gold);background:var(--wh)}
.mi-sel{padding:8px 10px;border:1px solid var(--bg3);border-radius:var(--rs);font-size:13px;outline:none;width:100%;background:var(--bg);color:var(--ink);appearance:none;cursor:pointer}
.mi-sel:focus{border-color:var(--gold);background:var(--wh)}
.params-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.mfoot{padding:10px 16px;border-top:1px solid var(--bg3);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:var(--wh)}
.btn-mok{padding:7px 20px;background:var(--gold);color:var(--wh);border:none;border-radius:var(--rs);font-size:13px;font-weight:600}
.btn-mok:hover{background:var(--gold-d)}
.btn-mcan{padding:7px 12px;border:1px solid var(--bg3);background:transparent;color:var(--ink3);border-radius:var(--rs);font-size:12px}

/* CONFIRM MODAL */
.cbox{background:var(--wh);border-radius:var(--r);width:100%;max-width:380px;padding:24px;display:flex;flex-direction:column;gap:14px;animation:popin .16s ease}
.cico{font-size:28px;text-align:center}
.ctit{font-size:15px;font-weight:600;color:var(--ink);text-align:center}
.cwarn{background:var(--red-l);border:1px solid var(--red-b);border-radius:var(--rs);padding:10px 12px;font-size:12px;color:#991B1B;line-height:1.6}
.csub{font-size:12px;color:var(--ink3);text-align:center;line-height:1.5}
.cbtns{display:flex;gap:8px}
.btn-cok{flex:1;padding:10px;background:var(--red);color:var(--wh);border:none;border-radius:var(--rs);font-size:13px;font-weight:600}
.btn-cok:hover{background:#B91C1C}
.btn-ccan{flex:1;padding:10px;border:1px solid var(--bg3);background:transparent;color:var(--ink3);border-radius:var(--rs);font-size:13px}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sb-logo">
      <div class="sb-brand">Estúdio Se7e</div>
      <div class="sb-role">Coordenação</div>
    </div>
    <div class="sb-user">
      <div class="sb-av">VR</div>
      <div>
        <div class="sb-uname">Vanessa Ramos</div>
        <div class="sb-uemail">vanessa@estudio7.com.br</div>
      </div>
    </div>
    <nav class="sb-nav">
      <div class="sb-section">Treinos</div>
      <button class="sb-item on" onclick="setMod('treinos',this)"><span class="sb-ico">💪</span>Fichas de treino</button>
      <button class="sb-item" onclick="setMod('fila',this)"><span class="sb-ico">📥</span>Solicitações<span class="sb-badge" id="badge-fila">3</span></button>
      <div class="sb-section">Alunos</div>
      <button class="sb-item" onclick="setMod('avaliacao',this)"><span class="sb-ico">📊</span>Avaliação física</button>
      <button class="sb-item" onclick="setMod('evolucao',this)"><span class="sb-ico">📈</span>Evolução</button>
    </nav>
    <div class="sb-bottom"><button class="btn-logout-sb">✕ &nbsp;Sair</button></div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="tb-title" id="tb-title">Fichas de treino</div>
      <div class="tb-sep"></div>
      <div class="tb-sub" id="tb-sub">Programas e sequências dos alunos</div>
      <div class="tb-actions" id="tb-actions"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>
<div id="modal-root"></div>

<script>
const AVCV=['#E1F5EE:#0F6E56','#E6F1FB:#185FA5','#FAEEDA:#854F0B','#EEEDFE:#534AB7','#FAECE7:#993C1D','#EAF3DE:#3B6D11'];
const ini=n=>n.split(' ').slice(0,2).map(x=>x[0]||'').join('').toUpperCase();
function avs(n){const[bg,c]=AVCV[n.charCodeAt(0)%6].split(':');return`background:${bg};color:${c}`}
const uid=()=>'x'+Date.now()+Math.random().toString(36).slice(2,5);

let mod='treinos',alunoSel=null,fichaAtiva=0,cmpMode=false,cmpFichas=[],modal=null,q='',drag=null;

function setMod(m,el){
  mod=m;cmpMode=false;cmpFichas=[];
  document.querySelectorAll('.sb-item').forEach(x=>x.classList.remove('on'));
  el.classList.add('on');
  fichaAtiva=0;render();
}

  const titles={treinos:['Fichas de treino','Programas e sequências dos alunos'],fila:['Solicitações dos professores','Trocas e remoções pendentes'],avaliacao:['Avaliação física','Medidas e evolução'],evolucao:['Evolução','Frequência e desempenho']};

  document.getElementById('tb-title').textContent=tt;

  const novas=D.sols.filter(s=>s.status==='nova').length;
  const b=document.getElementById('badge-fila');b.textContent=novas;b.style.display=novas?'':'none';

  const acts=document.getElementById('tb-actions');
  if(mod==='treinos'&&alunoSel&&gfs(alunoSel).length>1){
    acts.innerHTML=`<button class="btn-cmp ${cmpMode?'on':''}" onclick="toggleCmp()">⧉ Comparar fichas</button><button class="btn-sec" onclick="novoProg()">+ Novo programa</button>`;

// ── DRAG & DROP ──
function setupDrag(){
  document.querySelectorAll('[draggable="true"][data-eid]').forEach(el=>{
    el.addEventListener('dragstart',e=>{
      drag={fid:el.dataset.fid,eid:el.dataset.eid,idx:+el.dataset.idx};
      el.classList.add('dragging');e.dataTransfer.effectAllowed='move';
    });
    el.addEventListener('dragend',()=>{
      el.classList.remove('dragging');
      document.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over'));
      drag=null;
    });
    el.addEventListener('dragover',e=>{
      e.preventDefault();
      if(!drag||el.dataset.eid===drag.eid)return;
      document.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over'));
      el.classList.add('drag-over');
    });
    el.addEventListener('dragleave',()=>el.classList.remove('drag-over'));
    el.addEventListener('drop',e=>{
      e.preventDefault();
      if(!drag||el.dataset.eid===drag.eid)return;
      const f=gfs(alunoSel).find(f=>f.id===drag.fid);
      if(!f)return;
      const[m]=f.exs.splice(drag.idx,1);
      f.exs.splice(+el.dataset.idx,0,m);
      render();
    });
  });
}

function selAluno(id){alunoSel=D.alunos.find(a=>a.id===id);fichaAtiva=0;cmpMode=false;cmpFichas=[];render();}
function toggleCmp(){cmpMode=!cmpMode;if(cmpMode)cmpFichas=[0,Math.min(1,gfs(alunoSel).length-1)];render();}
function toggleCmpF(i){cmpFichas=cmpFichas.includes(i)?cmpFichas.filter(x=>x!==i):[...cmpFichas,i];render();}
function novoProg(){if(!alunoSel)return;alunoSel.programas.unshift({id:uid(),nm:'Novo Programa',fichas:[{id:uid(),cor:'#1E40AF',nm:'Treino A',exs:[]}]});fichaAtiva=0;render();}
function addFicha(){
  if(!alunoSel)return;const fs=gfs(alunoSel);
  const letras='ABCDE',cores=['#1E40AF','#6D28D9','#059669','#D97706','#DC2626'];const i=fs.length;
  fs.push({id:uid(),cor:cores[i%5],nm:`Treino ${letras[i%5]}`,exs:[]});
  fichaAtiva=i;cmpMode=false;render();
}
function pedirDelF(fid){modal={type:'del-f',fid};renderModal();}
function confirmarDelF(){
  const fs=gfs(alunoSel);const i=fs.findIndex(f=>f.id===modal.fid);
  if(i>=0){fs.splice(i,1);fichaAtiva=Math.max(0,Math.min(fichaAtiva,fs.length-1));}
  fecharModal();render();
}
function addGrupo(fid,tipo){
  const f=gfs(alunoSel).find(f=>f.id===fid);if(!f)return;
  const n=tipo==='trio'?3:2;
  f.exs.push({id:uid(),tp:'g',grupo:tipo,exs:Array.from({length:n},(_,i)=>({id:uid(),n:`EXERCÍCIO ${i+1}`,g:'Quadríceps',s:3,r:'12',d:i===n-1?60:0,ca:null,obs:''}))});
  render();
}
function delEx(fid,eid){const f=gfs(alunoSel).find(f=>f.id===fid);if(f)f.exs=f.exs.filter(e=>e.id!==eid);render();}
function delExG(fid,gid,eid){
  const f=gfs(alunoSel).find(f=>f.id===fid);if(!f)return;
  const g=f.exs.find(e=>e.id===gid);if(!g)return;
  g.exs=g.exs.filter(e=>e.id!==eid);
  if(!g.exs.length)f.exs=f.exs.filter(e=>e.id!==gid);
  render();
}

// ── MODAL ──
function openEx(eid,fid){
  const f=gfs(alunoSel).find(f=>f.id===fid);
  const ex=eid?f.exs.find(e=>e.id===eid):null;
  modal={type:'ex',fid,eid,f,ex:ex?{...ex}:{id:uid(),tp:'s',n:'',g:'Quadríceps',s:4,r:'12',d:60,ca:null,obs:''}};
  renderModal();
}
function openExG(gid,eid,fid){
  const f=gfs(alunoSel).find(f=>f.id===fid);
  const g=f.exs.find(e=>e.id===gid);
  const ex=g.exs.find(e=>e.id===eid);
  modal={type:'ex-g',fid,gid,eid,f,g,ex:{...ex}};
  renderModal();
}
function fecharModal(){modal=null;document.getElementById('modal-root').innerHTML='';}

function renderModal(){
  const r=document.getElementById('modal-root');
  if(!modal){r.innerHTML='';return;}

  if(modal.type==='del-f'){
    const f=gfs(alunoSel).find(f=>f.id===modal.fid);
    const n=f?cntEx(f):0;
    r.innerHTML=`<div class="modal-bg" onclick="if(event.target===this)fecharModal()">
      <div class="cbox" onclick="event.stopPropagation()">
        <div class="cico">🗑</div>
        <div class="ctit">Remover ${f?f.nm:'ficha'}?</div>
        <div class="cwarn"><strong>⚠ Esta ação é permanente e não pode ser desfeita.</strong><br>
          ${n>0?`Serão removidos <strong>${n} exercício${n!==1?'s':''}</strong> permanentemente.`:'Ficha vazia — será removida.'}
        </div>
        <div class="csub">Após confirmar não há como recuperar os dados.</div>
        <div class="cbtns">
          <button class="btn-ccan" onclick="fecharModal()">Cancelar</button>
          <button class="btn-cok" onclick="confirmarDelF()">Remover definitivamente</button>
        </div>
      </div>
    </div>`;
    return;
  }

  const ex=modal.ex;
  const gOpts=GRUPOS.map(g=>`<option value="${g}" ${ex.g===g?'selected':''}>${g}</option>`).join('');
  const exsDoG=EX_BASE.filter(e=>e.g===ex.g);
  const eOpts=exsDoG.map(e=>`<option value="${e.n}" ${ex.n===e.n?'selected':''}>${e.n}</option>`).join('');
  const isCustom=ex.n&&!EX_BASE.find(e=>e.n===ex.n);

  r.innerHTML=`<div class="modal-bg" onclick="if(event.target===this)fecharModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="mhdr">
        <div class="mtitle">${modal.eid?'Editar exercício':'Novo exercício'}</div>
        <button class="mclose" onclick="fecharModal()">✕</button>
      </div>
      <div class="mbody">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div class="mf"><label class="ml">Grupo muscular</label>
            <select class="mi-sel" onchange="modal.ex.g=this.value;modal.ex.n='';renderModal()">${gOpts}</select>
          </div>
          <div class="mf"><label class="ml">Exercício</label>
            <select class="mi-sel" id="sel-ex" onchange="if(this.value==='__outro'){modal.ex.n='';}else{modal.ex.n=this.value;}renderModal()">
              ${eOpts}<option value="__outro" ${isCustom?'selected':''}>Outro…</option>
            </select>
          </div>
        </div>
        ${isCustom||!exsDoG.find(e=>e.n===ex.n)?`<div class="mf"><label class="ml">Nome personalizado</label>
          <input class="mi" placeholder="Nome do exercício" value="${isCustom?ex.n:''}" oninput="modal.ex.n=this.value">
        </div>`:''}
        <div class="params-grid">
          <div class="mf"><label class="ml">Séries</label><input class="mi" type="number" min="1" max="10" value="${ex.s}" oninput="modal.ex.s=+this.value||4"></div>
          <div class="mf"><label class="ml">Repetições</label><input class="mi" value="${ex.r}" oninput="modal.ex.r=this.value" placeholder="12 ou 10-12"></div>
          <div class="mf"><label class="ml">Descanso (s)</label><input class="mi" type="number" min="0" step="15" value="${ex.d||0}" oninput="modal.ex.d=+this.value||0"></div>
          <div class="mf"><label class="ml">Carga (kg)</label><input class="mi" type="number" step="0.5" placeholder="—" value="${ex.ca!=null?ex.ca:''}" oninput="modal.ex.ca=this.value?+this.value:null"></div>
        </div>
        <div class="mf"><label class="ml">Observação</label>
          <input class="mi" placeholder="Ex: prefere amplitude parcial…" value="${ex.obs||''}" oninput="modal.ex.obs=this.value">
        </div>
      </div>
      <div class="mfoot">
        <button class="btn-mcan" onclick="fecharModal()">Cancelar</button>
        <button class="btn-mok" onclick="salvarEx()">Salvar</button>
      </div>
    </div>
  </div>`;
}

function salvarEx(){
  const ex=modal.ex;if(!ex.n)return;
  if(modal.type==='ex'){
    const i=modal.f.exs.findIndex(e=>e.id===ex.id);
    if(i>=0)modal.f.exs[i]={...modal.f.exs[i],...ex};
    else modal.f.exs.push({...ex,tp:'s'});
  } else if(modal.type==='ex-g'){
    const i=modal.g.exs.findIndex(e=>e.id===ex.id);
    if(i>=0)modal.g.exs[i]={...modal.g.exs[i],...ex};
  }
  fecharModal();render();
}

alunoSel=D.alunos[0];render();
</script>
</body>
</html>
