        const msg = link ? `Olá, ${sel.nm.split(' ')[0]}! 😊\n\nA Vanessa vai ${tipo==='entrada'?'montar o seu treino':'atualizar o seu treino'} em breve e precisa de algumas informações suas. Leva menos de 2 minutinhos!\n\n👉 ${link}\n\n_Estúdio Se7e_` : '';
        return `<div style="display:flex;flex-direction:column;gap:10px">
          ${link?`
          <div>
            <label style="font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:5px">Link gerado</label>
            <div style="display:flex;gap:6px">
              <input class="mi" readonly value="${link}" style="font-size:12px;flex:1;background:#F9F7F4">
              <button onclick="navigator.clipboard.writeText('${link}').then(()=>alert('Copiado!'))" style="padding:8px 12px;background:var(--bg);border:1px solid var(--bg3);border-radius:8px;cursor:pointer;font-size:12px">📋</button>
              <button onclick="window.open('${link}','_blank')" style="padding:8px 12px;background:var(--bg);border:1px solid var(--bg3);border-radius:8px;cursor:pointer;font-size:12px">👁</button>
            </div>
          </div>
          <div style="background:var(--bg);border:1px solid var(--bg3);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--ink2);white-space:pre-wrap;line-height:1.6">${msg}</div>
          <div style="display:flex;gap:8px">
            <button onclick="enviarQuestWpp()" style="flex:1;padding:14px;background:#25D366;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer">
              📲 Enviar via WhatsApp
            </button>
            <button onclick="questState['${tokenKey}']=null;render()" style="padding:14px 16px;background:var(--bg);border:1.5px solid var(--bg3);border-radius:10px;cursor:pointer;font-size:13px;color:var(--ink3)">
              🔄 Novo link
            </button>
          </div>`:`
          <button onclick="gerarEMostrarLink()" style="width:100%;padding:14px;background:var(--purple);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer">
            🔑 Gerar link de questionário
          </button>`}
        </div>`;
      })()}
      `:'<div style="text-align:center;padding:24px;color:var(--ink3);font-size:13px">Busque e selecione um aluno acima.</div>'}
    </div>
  </div>`;
}

// ── Ver resposta ──
function renderQuestResposta(){
  const tk = questState.respostaVer;
  if(!tk) return renderQuestLista();
  const resp = getQuestionarios().find(r=>r.token===tk.token);
  if(!resp) return `<div style="display:flex;flex-direction:column;flex:1;overflow:hidden">
    <div style="background:var(--wh);border-bottom:1px solid var(--bg3);padding:12px 16px;display:flex;align-items:center;gap:10px">
      <button onclick="questState.view='lista';render()" style="border:none;background:none;font-size:18px;cursor:pointer;color:var(--ink3)">←</button>
      <div style="font-size:14px;font-weight:600">Aguardando resposta</div>
    </div>
    <div style="padding:24px;text-align:center;color:var(--ink3)">
      <div style="font-size:36px;margin-bottom:12px">⏳</div>
      <div style="font-size:14px;font-weight:600">${tk.aluno_nm} ainda não respondeu</div>
      <div style="font-size:12px;margin-top:6px">Link enviado em ${new Date(tk.criado_em).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'2-digit'})}</div>
      <div style="margin-top:16px;display:flex;gap:8px;justify-content:center">
        <button onclick="reenviarLink('${tk.token}')" style="padding:10px 18px;background:var(--bg);border:1px solid var(--bg3);border-radius:8px;cursor:pointer;font-size:13px">📲 Reenviar link</button>
      </div>
    </div>
  </div>`;

  const tipoBadge = tk.tipo==='mudanca'?'🔄 Mudança de Treino':'✨ Entrada';
  const dataResp = new Date(resp.respondido_em).toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const objMap = {'perda_peso':'Perda de peso','hipertrofia':'Hipertrofia','definicao':'Definição','saude':'Saúde e qualidade de vida','forca':'Força e performance','reabilitacao':'Reabilitação','postura':'Postura e mobilidade','condicionamento':'Condicionamento'};
  const treinoAtualMap = {'gosto_muito':'Gosto muito, quer continuar','gosto_ajustes':'Gosto com ajustes','nao_gosto':'Não está gostando','muito_facil':'Está muito fácil','muito_dificil':'Está muito difícil'};
  const novoMap = {'mais_intenso':'Mais intenso','igual':'Igual ao atual','mais_leve':'Mais leve','diferente':'Completamente diferente'};

  const row=(label,val,ico='')=>val?`<div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--bg3)">
    <div style="font-size:12px;color:var(--ink3);min-width:130px;flex-shrink:0">${label}</div>
    <div style="font-size:13px;font-weight:500;color:var(--ink)">${ico?ico+' ':''} ${val}</div>
  </div>`:'';

  const patRows = Object.entries(resp.patologias||{}).filter(([,v])=>v).map(([reg,cond])=>
    `<span style="font-size:12px;background:#FEF2F2;color:#991B1B;border:1px solid #FECACA;border-radius:20px;padding:3px 10px;margin:2px">${reg}: ${cond}</span>`).join('');

  return `<div style="display:flex;flex-direction:column;flex:1;overflow:hidden">
    <div style="background:var(--wh);border-bottom:1px solid var(--bg3);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0">
      <button onclick="questState.view='lista';render()" style="border:none;background:none;font-size:18px;cursor:pointer;color:var(--ink3)">←</button>
      <div style="flex:1">
        <div style="font-size:14px;font-weight:600">${tk.aluno_nm}</div>
        <div style="font-size:11px;color:var(--ink3)">${tipoBadge} · respondido ${dataResp}</div>
      </div>
    </div>
    <div style="padding:14px 16px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:14px">

      <!-- Treino -->
      <div style="background:var(--wh);border:1px solid var(--bg3);border-radius:12px;overflow:hidden">
        <div style="padding:10px 14px;background:#EDE9FE;border-bottom:1px solid var(--bg3)">
          <div style="font-size:12px;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:.5px">💪 Perfil de Treino</div>
        </div>
        <div style="padding:10px 14px">
          ${row('Objetivo',objMap[resp.objetivo]||resp.objetivo,'🎯')}
          ${row('Frequência semanal',resp.freq?resp.freq+'x/semana':null,'📅')}
          ${row('Treino atual',treinoAtualMap[resp.treino_atual]||resp.treino_atual)}
          ${row('Novo treino deve ser',novoMap[resp.novo_treino]||resp.novo_treino)}
          ${row('Prioridade',resp.prioridade)}
          ${resp.regioes?.length?`<div style="padding:8px 0;border-bottom:1px solid var(--bg3)">
            <div style="font-size:12px;color:var(--ink3);margin-bottom:6px">Regiões para focar</div>
            <div style="display:flex;flex-wrap:wrap;gap:4px">
              ${resp.regioes.map(r=>`<span style="font-size:12px;background:#EDE9FE;color:var(--purple);border-radius:20px;padding:3px 10px">${r}</span>`).join('')}
            </div>
          </div>`:''}
        </div>
      </div>

      <!-- Saúde -->
      ${(patRows||resp.prob_saude?.length||resp.dor||resp.med)?`
      <div style="background:var(--wh);border:1px solid var(--bg3);border-radius:12px;overflow:hidden">
        <div style="padding:10px 14px;background:#FEF3C7;border-bottom:1px solid var(--bg3)">
          <div style="font-size:12px;font-weight:700;color:#92400E;text-transform:uppercase;letter-spacing:.5px">🩺 Histórico de Saúde</div>
        </div>
        <div style="padding:10px 14px">
          ${patRows?`<div style="padding:8px 0;border-bottom:1px solid var(--bg3)">
            <div style="font-size:12px;color:var(--ink3);margin-bottom:6px">Patologias</div>
            <div style="display:flex;flex-wrap:wrap;gap:4px">${patRows}</div>
          </div>`:''}
          ${resp.prob_saude?.length?row('Outras condições',resp.prob_saude.join(', ')):''}
          ${row('Dor/desconforto',resp.dor==='sim'?resp.dor_local||'Sim (sem detalhe)':resp.dor==='nao'?'Não':'')+''}
          ${row('Medicação',resp.med==='sim'?resp.med_nome||'Sim (sem detalhe)':resp.med==='nao'?'Não':'')}
        </div>
      </div>`:''}

      <!-- Obs -->
      ${resp.obs?`
      <div style="background:var(--wh);border:1px solid var(--bg3);border-radius:12px;padding:14px">
        <div style="font-size:12px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">💬 Informações adicionais</div>
        <div style="font-size:14px;color:var(--ink);line-height:1.65;font-style:italic">"${resp.obs}"</div>
      </div>`:''}

    </div>
  </div>`;
}

// ── Actions ──
async function gerarEMostrarLink(){
  const sel  = questState.alunoEnvio;
  const tipo = questState.tipoEnvio||'entrada';
  const tokenKey = tipo==='entrada'?'_token_ent':'_token_mud';
  if(!questState[tokenKey]){
    const tk = await gerarToken(sel.id, sel.nm, sel.phone||'', tipo);
    questState[tokenKey] = tk.token;
  }
  render();
}

function enviarQuestWpp(){
  const sel  = questState.alunoEnvio;
  const tipo = questState.tipoEnvio||'entrada';
  const tokenKey = tipo==='entrada'?'_token_ent':'_token_mud';
  const link = getLinkQ(questState[tokenKey], tipo);
  const msg  = `Olá, ${sel.nm.split(' ')[0]}! 😊\n\nA Vanessa vai ${tipo==='entrada'?'montar o seu treino':'atualizar o seu treino'} em breve e precisa de algumas informações suas. Leva menos de 2 minutinhos!\n\n👉 ${link}\n\n_Estúdio Se7e_`;
  const phone = (sel.phone||'').replace(/\D/g,'');
  if(!phone){ alert('Este aluno não tem telefone cadastrado.'); return; }
  window.open(`https://wa.me/55${phone}?text=${encodeURIComponent(msg)}`,'_blank');

  // Mark as sent
  const tokens = getTokens();
  const tk = tokens.find(t=>t.token===questState[tokenKey]);
  if(tk){ tk.enviado_em = new Date().toISOString(); saveTokens(tokens); }
}

function verResposta(token){
  const tokens = getTokens();
  const tk = tokens.find(t=>t.token===token);
  if(!tk) return;
  // Mark as seen via API
  fetch(API_BASE+'/quest/tokens/'+tk.token, {
    method:'PATCH', headers:{'Content-Type':'application/json','x-api-key':API_KEY},
    body:JSON.stringify({visto:true})
  }).catch(()=>{});
  tk.visto = true;
  questState.respostaVer = tk;
  questState.view = 'resposta';
  render();
}

function reenviarLink(token){
  const tk = getTokens().find(t=>t.token===token);
  if(!tk) return;
  const aluno = D.alunos.find(a=>a.id===tk.alunoId);
  const phone = (aluno?.phone||'').replace(/\D/g,'');
  const link  = getLinkQ(token, tk.tipo);
  const msg   = `Olá! 😊 Ainda preciso das suas respostas para ${tk.tipo==='entrada'?'montar':'atualizar'} o seu treino:\n\n👉 ${link}\n\n_Estúdio Se7e_`;
  if(!phone){ navigator.clipboard.writeText(link).then(()=>alert('Link copiado!')); return; }
  window.open(`https://wa.me/55${phone}?text=${encodeURIComponent(msg)}`,'_blank');
}


function renderFila(){
  const novas=D.solicitacoes.filter(s=>s.status==='nova');
  const hist=D.solicitacoes.filter(s=>s.status!=='nova');
  const rSol=s=>`<div class="sol-card ${s.status==='nova'?'nova':''}">
    <div class="sol-hdr">
      <div class="sol-av" style="${avStyle(s.aluno)}">${ini(s.aluno)}</div>
      <div class="sol-meta"><div class="sol-nome">${s.aluno} <span style="font-size:11px;color:var(--ink3);font-weight:400">· mat. ${s.mat}</span></div><div class="sol-sub">por ${s.prof} · ${s.dt}</div></div>
      <span class="sol-badge ${s.status==='nova'?'sb-nova':s.status==='aprovada'?'sb-ok':'sb-rej'}">${s.status==='nova'?'Pendente':s.status==='aprovada'?'Aprovada':'Rejeitada'}</span>
    </div>
    <div class="sol-body">
      <div class="sol-row">
        <div class="sol-col"><div class="sol-lbl">Tipo</div><div class="sol-val">${s.tipo==='troca'?'↔ Troca':'✕ Remoção'}</div></div>
        <div class="sol-col"><div class="sol-lbl">Exercício atual</div><div class="sol-val">${exNomeExibir(s.exAtual)}</div></div>
        ${s.exSugere?`<div class="sol-col"><div class="sol-lbl">Sugestão</div><div class="sol-val" style="color:var(--green)">${exNomeExibir(s.exSugere)}</div></div>`:''}
      </div>
      <div><div class="sol-lbl">Motivo</div><div class="sol-motivo" style="margin-top:4px">"${s.motivo}"</div></div>
    </div>
    ${s.status==='nova'?`<div class="sol-actions">
      <button class="btn-apr" onclick="aprovarSol('${s.id}')">✓ Aprovar</button>
      <button class="btn-rej-s" onclick="rejeitarSol('${s.id}')">✕ Rejeitar</button>
    </div>`:`<div style="padding:10px 16px;font-size:12px;color:${s.status==='aprovada'?'var(--green)':'var(--red)'}">
      ${s.status==='aprovada'?'✓ Aprovada — alteração aplicada':'✕ Rejeitada'}
    </div>`}
  </div>`;
  return`<div class="fila-body">
    ${novas.length?`<div style="font-size:13px;font-weight:600;color:var(--ink);margin-bottom:4px">Aguardando revisão (${novas.length})</div>${novas.map(rSol).join('')}`:`<div style="font-size:13px;color:var(--ink3);padding:8px 0">Sem solicitações pendentes.</div>`}
    ${hist.length?`<div style="font-size:13px;font-weight:600;color:var(--ink3);margin:12px 0 4px">Histórico</div>${hist.map(rSol).join('')}`:''}
  </div>`;
}

carregarDados().then(()=>{
  if(D.alunos[0]){
    alunoSel=D.alunos[0];
    if(D.alunos[0]?.programas?.[0]?.fichas?.[0]?.id)
      sketchOpen[D.alunos[0].programas[0].fichas[0].id]=true;
    render();
  }
});
render();
</script>
