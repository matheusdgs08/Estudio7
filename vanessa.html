<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FAF8F4">
<title>Estúdio Se7e — Coordenação</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#B8975A;--gold-l:#F5EFE4;--gold-d:#8B6B35;
  --ink:#1C1916;--ink2:#4A453F;--ink3:#8A8278;
  --bg:#FAF8F4;--bg2:#F0EDE8;--bg3:#E2DDD6;--wh:#FFFFFF;
  --r:12px;--rs:8px;
  --green:#059669;--green-l:#ECFDF5;--green-b:#6EE7B7;
  --red:#DC2626;--red-l:#FEF2F2;--red-b:#FECACA;
  --blue:#1E40AF;--blue-l:#EFF6FF;--blue-b:#BFDBFE;
  --purple:#6D28D9;--purple-l:#F5F3FF;--purple-b:#C4B5FD;
  --amber:#D97706;--amber-l:#FFFBEB;--amber-b:#FCD34D;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --sidebar:260px;
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;overflow:hidden}
input,select,button,textarea{font-family:'DM Sans',sans-serif}
button{cursor:pointer}

.app{display:flex;height:100vh;height:-webkit-fill-available;padding-top:var(--safe-top)}

/* SIDEBAR */
.sidebar{width:var(--sidebar);background:var(--ink);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:transform .25s ease}
.sb-logo{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-brand{font-family:'Playfair Display',serif;font-size:17px;font-weight:400;color:var(--wh)}
.sb-role{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:1.5px;text-transform:uppercase;margin-top:3px}
.sb-user{padding:14px 20px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.sb-av{width:32px;height:32px;border-radius:50%;background:var(--gold-l);color:var(--gold-d);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.sb-uname{font-size:13px;font-weight:500;color:var(--wh)}
.sb-uemail{font-size:11px;color:rgba(255,255,255,.35);margin-top:1px}
.sb-nav{flex:1;padding:10px 0;overflow-y:auto}
.sb-section{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.25);padding:12px 20px 5px;font-weight:600}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;transition:all .15s;color:rgba(255,255,255,.5);font-size:13px;font-weight:400;position:relative;border:none;background:transparent;width:100%;text-align:left}
.sb-item:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.8)}
.sb-item.on{background:rgba(255,255,255,.1);color:var(--wh);font-weight:500}
.sb-item.on::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);border-radius:0 2px 2px 0}
.sb-ico{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.sb-badge{margin-left:auto;font-size:10px;padding:2px 7px;border-radius:10px;background:var(--red);color:var(--wh);font-weight:600}
.sb-bottom{padding:14px 20px;border-top:1px solid rgba(255,255,255,.08)}
.btn-logout-sb{font-size:12px;color:rgba(255,255,255,.4);background:transparent;border:none;cursor:pointer;padding:0;display:flex;align-items:center;gap:6px}
.btn-logout-sb:hover{color:var(--red)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:var(--wh);border-bottom:1px solid var(--bg3);padding:0 24px;display:flex;align-items:center;height:56px;gap:14px;flex-shrink:0}
.tb-menu{display:none;background:none;border:none;color:var(--ink3);font-size:20px;cursor:pointer;padding:4px;border-radius:var(--rs)}
.tb-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:400;color:var(--ink);flex:1}
.tb-sub{font-size:12px;color:var(--ink3);margin-top:1px}
.tb-actions{display:flex;gap:8px;align-items:center}
.btn-primary{padding:8px 18px;background:var(--gold);color:var(--wh);border:none;border-radius:20px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;white-space:nowrap}
.btn-primary:hover{background:var(--gold-d)}
.btn-secondary{padding:8px 16px;border:1.5px solid var(--bg3);background:transparent;border-radius:20px;font-size:13px;color:var(--ink2)}
.btn-secondary:hover{border-color:var(--gold);color:var(--gold-d)}
.btn-compare{padding:8px 16px;border:1.5px solid var(--blue-b);background:var(--blue-l);border-radius:20px;font-size:13px;color:var(--blue);font-weight:500;display:flex;align-items:center;gap:6px}
.btn-compare:hover{background:#DBEAFE}
.btn-compare.on{background:var(--blue);color:var(--wh);border-color:var(--blue)}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(28,25,22,.5);z-index:50}

/* TREINOS LAYOUT */
.treinos-layout{display:flex;height:100%;overflow:hidden}
.col-alunos{width:260px;flex-shrink:0;border-right:1px solid var(--bg3);display:flex;flex-direction:column;background:var(--wh);overflow:hidden}
.ca-header{padding:14px 16px;border-bottom:1px solid var(--bg3);flex-shrink:0}
.ca-search{width:100%;padding:8px 12px;border:1.5px solid var(--bg3);border-radius:var(--rs);font-size:13px;outline:none;background:var(--bg)}
.ca-search:focus{border-color:var(--gold)}
.alunos-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.aluno-item{display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:pointer;border-bottom:1px solid var(--bg3);transition:all .15s}
.aluno-item:hover{background:var(--bg)}
.aluno-item.sel{background:var(--gold-l);border-right:3px solid var(--gold)}
.aluno-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.aluno-info{flex:1;min-width:0}
.aluno-nome{font-size:13px;font-weight:500;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.aluno-prog{font-size:11px;color:var(--ink3);margin-top:1px}

/* COL PROGRAMA */
.col-prog{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* FICHAS TABS */
.fichas-tabs{background:var(--wh);border-bottom:1px solid var(--bg3);padding:0 16px;display:flex;align-items:center;gap:0;flex-shrink:0;overflow-x:auto;min-height:48px}
.ficha-tab{padding:13px 16px;font-size:13px;color:var(--ink3);cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;border-top:none;border-left:none;border-right:none;background:transparent;display:flex;align-items:center;gap:7px;transition:all .15s;position:relative}
.ficha-tab:hover{color:var(--ink2)}
.ficha-tab.on{color:var(--ink);border-bottom:2.5px solid var(--gold);font-weight:600}
.ficha-tab.comparing{color:var(--blue);border-bottom:2.5px solid var(--blue)}

/* botão de remover ficha — aparece no hover da tab */
.tab-del{display:none;position:absolute;top:6px;right:2px;width:16px;height:16px;border-radius:50%;background:var(--bg3);border:none;font-size:10px;color:var(--ink3);align-items:center;justify-content:center;line-height:1;z-index:2}
.ficha-tab:hover .tab-del{display:flex}
.tab-del:hover{background:var(--red-l);color:var(--red)}

.btn-add-ficha{margin-left:auto;padding:0 10px;font-size:22px;color:var(--ink3);background:none;border:none;cursor:pointer;flex-shrink:0;line-height:1}
.btn-add-ficha:hover{color:var(--gold)}

/* ÁREA EXERCÍCIOS */
.exercicios-area{flex:1;overflow:hidden;display:flex}

/* MODO NORMAL — coluna única */
.exercicios-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 20px;display:flex;flex-direction:column;gap:8px}

/* MODO COMPARAÇÃO — colunas lado a lado */
.compare-cols{flex:1;display:flex;overflow:hidden}
.compare-col{flex:1;min-width:0;display:flex;flex-direction:column;border-right:1px solid var(--bg3)}
.compare-col:last-child{border-right:none}
.compare-col-hdr{padding:10px 16px;border-bottom:1px solid var(--bg3);display:flex;align-items:center;gap:8px;background:var(--wh);flex-shrink:0}
.compare-col-title{font-size:13px;font-weight:600;color:var(--ink)}
.compare-col-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 14px;display:flex;flex-direction:column;gap:7px}

/* EXERCÍCIO CARD */
.ex-card{background:var(--wh);border:1.5px solid var(--bg3);border-radius:var(--r);overflow:hidden;transition:all .2s;user-select:none}
.ex-card.dragging{opacity:.45;border-style:dashed;border-color:var(--gold)}
.ex-card.drag-over{border-color:var(--gold);border-style:solid;box-shadow:0 0 0 3px rgba(184,151,90,.15)}
.ex-main{display:flex;align-items:center;gap:8px;padding:11px 12px}
.ex-drag{color:var(--bg3);font-size:16px;cursor:grab;flex-shrink:0;padding:0 2px;touch-action:none}
.ex-drag:active{cursor:grabbing;color:var(--ink3)}
.ex-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;background:var(--bg2);color:var(--ink3)}
.ex-info{flex:1;min-width:0}
.ex-nome{font-size:13px;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ex-grupo{font-size:11px;color:var(--ink3);margin-top:1px}
.ex-params{display:flex;gap:5px;align-items:center;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.ex-param{font-size:11px;padding:2px 7px;border-radius:6px;background:var(--bg2);color:var(--ink2);font-weight:500;white-space:nowrap}
.ex-param.carga{background:var(--gold-l);color:var(--gold-d)}
.ex-btns{display:flex;gap:4px;flex-shrink:0}
.btn-ex-edit,.btn-ex-del{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--bg3);background:transparent;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--ink3)}
.btn-ex-edit:hover{border-color:var(--gold);background:var(--gold-l);color:var(--gold-d)}
.btn-ex-del{border:none}
.btn-ex-del:hover{background:var(--red-l);color:var(--red)}

/* GRUPO SUPERSET */
.grupo-card{border:1.5px solid;border-radius:var(--r);overflow:hidden;transition:all .2s;user-select:none}
.grupo-card.dragging{opacity:.45;border-style:dashed}
.grupo-card.drag-over{box-shadow:0 0 0 3px rgba(184,151,90,.15)}
.gc-dupla{border-color:var(--blue-b)}
.gc-trio{border-color:var(--purple-b)}
.grupo-header{padding:6px 12px;display:flex;align-items:center;gap:8px;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.gc-dupla .grupo-header{background:var(--blue-l);color:var(--blue)}
.gc-trio .grupo-header{background:var(--purple-l);color:var(--purple)}
.grupo-exs{display:flex;flex-direction:column}
.grupo-ex-row{display:flex;align-items:center;gap:8px;padding:9px 12px;border-top:1px solid}
.gc-dupla .grupo-ex-row{border-color:#DBEAFE}
.gc-trio .grupo-ex-row{border-color:#EDE9FE}
.gnum-d{background:#DBEAFE;color:var(--blue)}
.gnum-t{background:#EDE9FE;color:var(--purple)}

/* BOTÕES ADICIONAR */
.btn-add-ex{display:flex;align-items:center;gap:8px;padding:11px 14px;border:1.5px dashed var(--bg3);border-radius:var(--r);background:transparent;color:var(--ink3);font-size:13px;cursor:pointer;width:100%;transition:all .15s}
.btn-add-ex:hover{border-color:var(--gold);color:var(--gold-d);background:var(--gold-l)}
.btn-add-grupo{display:flex;align-items:center;gap:6px;padding:9px 14px;border:1.5px dashed;border-radius:var(--r);background:transparent;font-size:12px;cursor:pointer;transition:all .15s}

/* DROP ZONE */
.drop-zone{height:36px;border:2px dashed var(--gold);border-radius:var(--r);background:var(--gold-l);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--gold-d);opacity:0;transition:opacity .15s;pointer-events:none}
.drop-zone.active{opacity:1;pointer-events:auto}

/* ESTADOS VAZIOS */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:14px;padding:40px;text-align:center}
.empty-ico{font-size:40px;opacity:.3}
.empty-title{font-size:16px;font-weight:500;color:var(--ink2)}
.empty-sub{font-size:13px;color:var(--ink3);line-height:1.6;max-width:280px}

/* FILA */
.fila-body{padding:20px 24px;display:flex;flex-direction:column;gap:12px}
.sol-card{background:var(--wh);border:1.5px solid var(--bg3);border-radius:var(--r);overflow:hidden}
.sol-card.nova{border-color:var(--blue-b)}
.sol-hdr{padding:12px 16px;border-bottom:1px solid var(--bg3);display:flex;align-items:center;gap:10px}
.sol-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.sol-meta{flex:1;min-width:0}
.sol-nome{font-size:13px;font-weight:600;color:var(--ink)}
.sol-sub{font-size:11px;color:var(--ink3);margin-top:1px}
.sol-badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;flex-shrink:0}
.sb-nova{background:var(--blue-l);color:var(--blue);border:1px solid var(--blue-b)}
.sb-ok{background:var(--green-l);color:var(--green);border:1px solid var(--green-b)}
.sb-rej{background:var(--red-l);color:var(--red);border:1px solid var(--red-b)}
.sol-body{padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.sol-row{display:flex;gap:16px}
.sol-col{flex:1;min-width:0}
.sol-lbl{font-size:10px;color:var(--ink3);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
.sol-val{font-size:13px;color:var(--ink);font-weight:500}
.sol-motivo{font-size:13px;color:var(--ink2);background:var(--bg);border-radius:var(--rs);padding:8px 12px;line-height:1.5;font-style:italic}
.sol-actions{padding:10px 16px;border-top:1px solid var(--bg3);display:flex;gap:8px}
.btn-apr{flex:1;padding:10px;background:var(--green);color:var(--wh);border:none;border-radius:var(--rs);font-size:13px;font-weight:600}
.btn-apr:hover{background:#047857}
.btn-rej-s{flex:1;padding:10px;background:var(--red-l);color:var(--red);border:1.5px solid var(--red-b);border-radius:var(--rs);font-size:13px;font-weight:600}
.btn-rej-s:hover{background:#FEE2E2}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(28,25,22,.55);display:flex;align-items:flex-end;justify-content:center;z-index:200;padding-bottom:var(--safe-bot)}
@media(min-width:640px){.modal-bg{align-items:center}}
.modal-box{background:var(--wh);border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;animation:slideup .22s ease}
@media(min-width:640px){.modal-box{border-radius:var(--r);animation:popin .18s ease;max-height:85vh}}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes popin{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--bg3);margin:10px auto 0}
@media(min-width:640px){.modal-handle{display:none}}
.modal-hdr{padding:16px 20px;border-bottom:1px solid var(--bg3);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--wh);z-index:2}
.modal-title{font-family:'Playfair Display',serif;font-size:17px;font-weight:400;color:var(--ink)}
.modal-close{width:30px;height:30px;border-radius:50%;border:1px solid var(--bg3);background:transparent;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--ink3)}
.modal-close:hover{background:var(--bg)}
.modal-body{padding:18px 20px;display:flex;flex-direction:column;gap:14px}
.mf{display:flex;flex-direction:column;gap:5px}
.ml{font-size:11px;color:var(--ink3);font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.mi{padding:11px 14px;border:1.5px solid var(--bg3);border-radius:var(--rs);font-size:15px;outline:none;width:100%;background:var(--bg);color:var(--ink)}
.mi:focus{border-color:var(--gold);background:var(--wh)}
.mi-sel{padding:11px 14px;border:1.5px solid var(--bg3);border-radius:var(--rs);font-size:15px;outline:none;width:100%;background:var(--bg);color:var(--ink);appearance:none}
.mi-sel:focus{border-color:var(--gold);background:var(--wh)}
.params-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
.modal-footer{padding:14px 20px;border-top:1px solid var(--bg3);display:flex;gap:10px;position:sticky;bottom:0;background:var(--wh)}
.btn-modal-ok{flex:1;padding:14px;background:var(--gold);color:var(--wh);border:none;border-radius:var(--rs);font-size:15px;font-weight:600}
.btn-modal-ok:hover{background:var(--gold-d)}
.btn-modal-can{padding:14px 18px;border:1.5px solid var(--bg3);background:transparent;color:var(--ink3);border-radius:var(--rs);font-size:14px}

/* MODAL CONFIRMAR DELETE FICHA */
.confirm-box{background:var(--wh);border-radius:var(--r);width:100%;max-width:360px;padding:24px;text-align:center;display:flex;flex-direction:column;gap:14px;animation:popin .18s ease}
.confirm-ico{font-size:32px}
.confirm-title{font-size:16px;font-weight:600;color:var(--ink)}
.confirm-sub{font-size:13px;color:var(--ink3);line-height:1.6}
.confirm-btns{display:flex;gap:10px;margin-top:4px}
.btn-confirm-del{flex:1;padding:12px;background:var(--red);color:var(--wh);border:none;border-radius:var(--rs);font-size:14px;font-weight:600}
.btn-confirm-del:hover{background:#B91C1C}
.btn-confirm-can{flex:1;padding:12px;border:1.5px solid var(--bg3);background:transparent;color:var(--ink3);border-radius:var(--rs);font-size:14px}

/* RESPONSIVO */
@media(max-width:900px){:root{--sidebar:240px}.col-alunos{width:220px}}
@media(max-width:700px){
  .sidebar{position:fixed;top:0;left:0;bottom:0;z-index:60;transform:translateX(-100%);padding-top:var(--safe-top)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .tb-menu{display:flex}
  .treinos-layout{flex-direction:column}
  .col-alunos{width:100%;max-height:180px;border-right:none;border-bottom:1px solid var(--bg3)}
  .params-row{grid-template-columns:1fr 1fr}
  .compare-cols{flex-direction:column}
  .compare-col{border-right:none;border-bottom:1px solid var(--bg3);max-height:50%}
}
@media(max-width:480px){
  .col-alunos{max-height:150px}
  .topbar{padding:0 14px}
  .tb-actions .btn-compare span{display:none}
}
</style>
</head>
<body>
<div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>
<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="sb-logo">
      <div class="sb-brand">Estúdio Se7e</div>
      <div class="sb-role">Painel da Coordenação</div>
    </div>
    <div class="sb-user">
      <div class="sb-av">VR</div>
      <div>
        <div class="sb-uname">Vanessa Ramos</div>
        <div class="sb-uemail">vanessa@estudio7.com.br</div>
      </div>
    </div>
    <nav class="sb-nav">
      <div class="sb-section">Treinos</div>
      <button class="sb-item on" onclick="setMod('treinos',this)"><span class="sb-ico">💪</span> Fichas de treino</button>
      <button class="sb-item" onclick="setMod('fila',this)"><span class="sb-ico">📥</span> Solicitações<span class="sb-badge" id="badge-fila">3</span></button>
      <div class="sb-section">Alunos</div>
      <button class="sb-item" onclick="setMod('avaliacao',this)"><span class="sb-ico">📊</span> Avaliação física</button>
      <button class="sb-item" onclick="setMod('evolucao',this)"><span class="sb-ico">📈</span> Evolução</button>
    </nav>
    <div class="sb-bottom"><button class="btn-logout-sb">✕ &nbsp;Sair</button></div>
  </div>

  <div class="main">
    <div class="topbar" id="topbar">
      <button class="tb-menu" onclick="toggleSidebar()">☰</button>
      <div style="flex:1;min-width:0">
        <div class="tb-title" id="tb-title">Fichas de treino</div>
        <div class="tb-sub" id="tb-sub">Programas e sequências dos alunos</div>
      </div>
      <div class="tb-actions" id="tb-actions"></div>
    </div>

// ── DRAG & DROP ──
function setupDragDrop(){
  const cards=document.querySelectorAll('[draggable="true"][data-ex]');
  cards.forEach(card=>{
    card.addEventListener('dragstart',e=>{
      dragState={fichaId:card.dataset.ficha,exId:card.dataset.ex,idx:parseInt(card.dataset.idx)};
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
    });
    card.addEventListener('dragend',()=>{
      card.classList.remove('dragging');
      document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
      dragState=null;
    });
    card.addEventListener('dragover',e=>{
      e.preventDefault();e.dataTransfer.dropEffect='move';
      if(!dragState||card.dataset.ex===dragState.exId)return;
      document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
      card.classList.add('drag-over');
    });
    card.addEventListener('dragleave',()=>card.classList.remove('drag-over'));
    card.addEventListener('drop',e=>{
      e.preventDefault();
      if(!dragState||card.dataset.ex===dragState.exId)return;
      const targetIdx=parseInt(card.dataset.idx);
      const ficha=getFichas(alunoSel).find(f=>f.id===dragState.fichaId);
      if(!ficha)return;
      const exs=ficha.exs;
      const [moved]=exs.splice(dragState.idx,1);
      exs.splice(targetIdx,0,moved);
      render();
    });
  });
}

// ── ACTIONS ──
function selecionarAluno(id){
  alunoSel=D.alunos.find(a=>a.id===id);
  fichaAtiva=0;compareMode=false;compareFichas=[];
  render();
}

function toggleCompare(){
  compareMode=!compareMode;
  compareFichas=compareMode?[0,1].slice(0,getFichas(alunoSel).length):[];
  render();
}

function toggleCompareFicha(idx){
  if(compareFichas.includes(idx)){
    compareFichas=compareFichas.filter(i=>i!==idx);
  } else {
    compareFichas=[...compareFichas,idx];
  }
  render();
}

function novoPrograma(){
  if(!alunoSel)return;
  alunoSel.programas.unshift({id:uid(),nm:'Novo Programa',fichas:[{id:uid(),cor:'#1E40AF',letra:'A',nm:'Treino A',exs:[]}]});
  fichaAtiva=0;render();
}

function addFicha(){
  if(!alunoSel)return;
  const f=getFichas(alunoSel);
  const letras='ABCDE',cores=['#1E40AF','#6D28D9','#059669','#D97706','#DC2626'];
  const i=f.length;
  f.push({id:uid(),cor:cores[i%5],letra:letras[i%5],nm:`Treino ${letras[i%5]}`,exs:[]});
  fichaAtiva=i;compareMode=false;render();
}

// REMOVER FICHA — pede confirmação
function pedirDelFicha(fichaId){
  modal={type:'del-ficha',fichaId};renderModal();
}
function confirmarDelFicha(){
  const fs=getFichas(alunoSel);
  const idx=fs.findIndex(f=>f.id===modal.fichaId);
  if(idx>=0){fs.splice(idx,1);fichaAtiva=Math.max(0,Math.min(fichaAtiva,fs.length-1));}
  fecharModal();render();
}

function addGrupo(fichaId,tipo){
  const ficha=getFichas(alunoSel).find(f=>f.id===fichaId);
  if(!ficha)return;
  const num=tipo==='trio'?3:2;
  ficha.exs.push({id:uid(),tp:'g',grupo:tipo,exs:Array.from({length:num},(_,i)=>({id:uid(),n:`EXERCÍCIO ${i+1}`,g:'Quadríceps',s:3,r:'12',d:i===num-1?60:0,ca:null,obs:''}))});
  render();
}

function delEx(fichaId,exId){
  const f=getFichas(alunoSel).find(f=>f.id===fichaId);
  if(f)f.exs=f.exs.filter(e=>e.id!==exId);
  render();
}

function delExGrupo(fichaId,grupoId,exId){
  const f=getFichas(alunoSel).find(f=>f.id===fichaId);
  if(!f)return;
  const g=f.exs.find(e=>e.id===grupoId);
  if(!g)return;
  g.exs=g.exs.filter(e=>e.id!==exId);
  if(g.exs.length===0)f.exs=f.exs.filter(e=>e.id!==grupoId);
  render();
}

function aprovarSol(id){D.solicitacoes.find(s=>s.id===id).status='aprovada';render();}
function rejeitarSol(id){D.solicitacoes.find(s=>s.id===id).status='rejeitada';render();}

// ── MODAL ──
function abrirModalEx(exId,fichaId){
  const ficha=getFichas(alunoSel).find(f=>f.id===fichaId);
  const ex=exId?ficha.exs.find(e=>e.id===exId):null;
  modal={type:'ex',fichaId,exId,ficha,ex:ex?{...ex}:{id:uid(),tp:'s',n:'',g:'Quadríceps',s:4,r:'12',d:60,ca:null,obs:''}};
  renderModal();
}

function abrirModalExGrupo(grupoId,exId,fichaId){
  const ficha=getFichas(alunoSel).find(f=>f.id===fichaId);
  const grupo=ficha.exs.find(e=>e.id===grupoId);
  const ex=grupo.exs.find(e=>e.id===exId);
  modal={type:'ex-grupo',fichaId,grupoId,exId,ficha,grupo,ex:{...ex}};
  renderModal();
}

function renderModal(){
  const r=document.getElementById('modal-root');
  if(!modal){r.innerHTML='';return;}

  // CONFIRMAR REMOÇÃO DE FICHA
  if(modal.type==='del-ficha'){
    const ficha=getFichas(alunoSel).find(f=>f.id===modal.fichaId);
    r.innerHTML=`<div class="modal-bg" onclick="if(event.target.classList.contains('modal-bg'))fecharModal()">
      <div class="confirm-box" onclick="event.stopPropagation()">
        <div class="confirm-ico">🗑</div>
        <div class="confirm-title">Remover ${ficha?ficha.nm:'esta ficha'}?</div>
        <div class="confirm-sub">Todos os exercícios desta ficha serão removidos permanentemente. Esta ação não pode ser desfeita.</div>
        <div class="confirm-btns">
          <button class="btn-confirm-can" onclick="fecharModal()">Cancelar</button>
          <button class="btn-confirm-del" onclick="confirmarDelFicha()">Remover ficha</button>
        </div>
      </div>
    </div>`;
    return;
  }

  // MODAL EXERCÍCIO
  const ex=modal.ex;
  const gruposOpts=GRUPOS_MUSC.map(g=>`<option value="${g}" ${ex.g===g?'selected':''}>${g}</option>`).join('');
  const exsDoGrupo=EXERCICIOS_BASE.filter(e=>e.g===ex.g);
  const exOpts=exsDoGrupo.map(e=>`<option value="${e.n}" ${ex.n===e.n?'selected':''}>${e.n}</option>`).join('');
  const isCustom=ex.n&&!EXERCICIOS_BASE.find(e=>e.n===ex.n);

  r.innerHTML=`<div class="modal-bg" onclick="if(event.target.classList.contains('modal-bg'))fecharModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div class="modal-hdr">
        <div class="modal-title">${modal.exId?'Editar exercício':'Novo exercício'}</div>
        <button class="modal-close" onclick="fecharModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="mf"><label class="ml">Grupo muscular</label>
          <select class="mi-sel" onchange="modal.ex.g=this.value;modal.ex.n='';renderModal()">
            ${gruposOpts}
          </select>
        </div>
        <div class="mf"><label class="ml">Exercício</label>
          <select class="mi-sel" id="m-nome" onchange="if(this.value==='__outro'){modal.ex.n='';}else{modal.ex.n=this.value;}renderModal()">
            ${exOpts}
            <option value="__outro" ${isCustom?'selected':''}>Outro (digitar abaixo)</option>
          </select>
        </div>
        <div class="mf" ${!isCustom&&exsDoGrupo.find(e=>e.n===ex.n)?'style="display:none"':''}>
          <label class="ml">Nome personalizado</label>
          <input class="mi" placeholder="Nome do exercício…" value="${isCustom?ex.n:''}" oninput="modal.ex.n=this.value">
        </div>
        <div class="params-row">
          <div class="mf"><label class="ml">Séries</label><input class="mi" type="number" min="1" max="10" value="${ex.s}" oninput="modal.ex.s=parseInt(this.value)||4"></div>
          <div class="mf"><label class="ml">Repetições</label><input class="mi" value="${ex.r}" oninput="modal.ex.r=this.value" placeholder="12 ou 10-12"></div>
          <div class="mf"><label class="ml">Descanso (s)</label><input class="mi" type="number" min="0" step="15" value="${ex.d||0}" oninput="modal.ex.d=parseInt(this.value)||0"></div>
          <div class="mf"><label class="ml">Carga (kg)</label><input class="mi" type="number" step="0.5" placeholder="—" value="${ex.ca!=null?ex.ca:''}" oninput="modal.ex.ca=this.value?parseFloat(this.value):null"></div>
        </div>
        <div class="mf"><label class="ml">Observação</label>
          <input class="mi" placeholder="Ex: prefere amplitude parcial…" value="${ex.obs||''}" oninput="modal.ex.obs=this.value">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-modal-can" onclick="fecharModal()">Cancelar</button>
        <button class="btn-modal-ok" onclick="salvarEx()">Salvar exercício</button>
      </div>
    </div>
  </div>`;
}

function fecharModal(){modal=null;document.getElementById('modal-root').innerHTML='';}

function salvarEx(){
  const ex=modal.ex;
  if(!ex.n)return;
  if(modal.type==='ex'){
    const ficha=modal.ficha;
    const idx=ficha.exs.findIndex(e=>e.id===ex.id);
    if(idx>=0)ficha.exs[idx]={...ficha.exs[idx],...ex};
    else ficha.exs.push({...ex,tp:'s'});
  } else if(modal.type==='ex-grupo'){
    const g=modal.grupo;
    const idx=g.exs.findIndex(e=>e.id===ex.id);
    if(idx>=0)g.exs[idx]={...g.exs[idx],...ex};
  }
  fecharModal();render();
}

// ── FILA ──
function renderFila(){
  const novas=D.solicitacoes.filter(s=>s.status==='nova');
  const hist=D.solicitacoes.filter(s=>s.status!=='nova');
  const rSol=s=>`<div class="sol-card ${s.status==='nova'?'nova':''}">
    <div class="sol-hdr">
      <div class="sol-av" style="${avStyle(s.aluno)}">${ini(s.aluno)}</div>
      <div class="sol-meta">
        <div class="sol-nome">${s.aluno} <span style="font-size:11px;color:var(--ink3);font-weight:400">· mat. ${s.mat}</span></div>
        <div class="sol-sub">por ${s.prof} · ${s.dt}</div>
      </div>
      <span class="sol-badge ${s.status==='nova'?'sb-nova':s.status==='aprovada'?'sb-ok':'sb-rej'}">${s.status==='nova'?'Pendente':s.status==='aprovada'?'Aprovada':'Rejeitada'}</span>
    </div>
    <div class="sol-body">
      <div class="sol-row">
        <div class="sol-col"><div class="sol-lbl">Tipo</div><div class="sol-val">${s.tipo==='troca'?'↔ Troca':'✕ Remoção'}</div></div>
        <div class="sol-col"><div class="sol-lbl">Exercício atual</div><div class="sol-val">${s.exAtual}</div></div>
        ${s.exSugere?`<div class="sol-col"><div class="sol-lbl">Sugestão</div><div class="sol-val" style="color:var(--green)">${s.exSugere}</div></div>`:''}
      </div>
      <div><div class="sol-lbl">Motivo</div><div class="sol-motivo" style="margin-top:4px">"${s.motivo}"</div></div>
    </div>
    ${s.status==='nova'?`<div class="sol-actions">
      <button class="btn-apr" onclick="aprovarSol('${s.id}')">✓ Aprovar</button>
      <button class="btn-rej-s" onclick="rejeitarSol('${s.id}')">✕ Rejeitar</button>
    </div>`:`<div style="padding:10px 16px;font-size:12px;color:${s.status==='aprovada'?'var(--green)':'var(--red)'}">
      ${s.status==='aprovada'?'✓ Aprovada — alteração aplicada':'✕ Rejeitada'}
    </div>`}
  </div>`;
  return`<div class="fila-body">
    ${novas.length?`<div style="font-size:13px;font-weight:600;color:var(--ink);margin-bottom:4px">Aguardando revisão (${novas.length})</div>${novas.map(rSol).join('')}`
      :`<div style="font-size:13px;color:var(--ink3);padding:8px 0">Sem solicitações pendentes.</div>`}
    ${hist.length?`<div style="font-size:13px;font-weight:600;color:var(--ink3);margin:12px 0 4px">Histórico</div>${hist.map(rSol).join('')}`:''}
  </div>`;
}

alunoSel=D.alunos[0];
render();
</script>
</body>
</html>
