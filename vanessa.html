<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FAF8F4">
<title>Estúdio Se7e — Coordenação</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#B8975A;--gold-l:#F5EFE4;--gold-d:#8B6B35;
  --ink:#1C1916;--ink2:#4A453F;--ink3:#8A8278;
  --bg:#FAF8F4;--bg2:#F0EDE8;--bg3:#E2DDD6;--wh:#FFFFFF;
  --r:12px;--rs:8px;
  --green:#059669;--green-l:#ECFDF5;--green-b:#6EE7B7;
  --red:#DC2626;--red-l:#FEF2F2;--red-b:#FECACA;
  --blue:#1E40AF;--blue-l:#EFF6FF;--blue-b:#BFDBFE;
  --purple:#6D28D9;--purple-l:#F5F3FF;--purple-b:#C4B5FD;
  --amber:#D97706;--amber-l:#FFFBEB;--amber-b:#FCD34D;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --sidebar:260px;
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;overflow:hidden}
input,select,button,textarea{font-family:'DM Sans',sans-serif}
button{cursor:pointer}
.app{display:flex;height:100vh;height:-webkit-fill-available;padding-top:var(--safe-top)}

/* SIDEBAR */
.sidebar{width:var(--sidebar);background:var(--ink);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:transform .25s ease}
.sb-logo{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-brand{font-family:'Playfair Display',serif;font-size:17px;font-weight:400;color:var(--wh)}
.sb-role{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:1.5px;text-transform:uppercase;margin-top:3px}
.sb-user{padding:14px 20px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.sb-av{width:32px;height:32px;border-radius:50%;background:var(--gold-l);color:var(--gold-d);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.sb-uname{font-size:13px;font-weight:500;color:var(--wh)}
.sb-uemail{font-size:11px;color:rgba(255,255,255,.35);margin-top:1px}
.sb-nav{flex:1;padding:10px 0;overflow-y:auto}
.sb-section{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.25);padding:12px 20px 5px;font-weight:600}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;transition:all .15s;color:rgba(255,255,255,.5);font-size:13px;font-weight:400;position:relative;border:none;background:transparent;width:100%;text-align:left}
.sb-item:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.8)}
.sb-item.on{background:rgba(255,255,255,.1);color:var(--wh);font-weight:500}
.sb-item.on::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);border-radius:0 2px 2px 0}
.sb-ico{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.sb-badge{margin-left:auto;font-size:10px;padding:2px 7px;border-radius:10px;background:var(--red);color:var(--wh);font-weight:600}
.sb-bottom{padding:14px 20px;border-top:1px solid rgba(255,255,255,.08)}
.btn-logout-sb{font-size:12px;color:rgba(255,255,255,.4);background:transparent;border:none;cursor:pointer;padding:0;display:flex;align-items:center;gap:6px}
.btn-logout-sb:hover{color:var(--red)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:var(--wh);border-bottom:1px solid var(--bg3);padding:0 24px;display:flex;align-items:center;height:56px;gap:12px;flex-shrink:0}
.tb-menu{display:none;background:none;border:none;color:var(--ink3);font-size:20px;cursor:pointer;padding:4px;border-radius:var(--rs)}
.tb-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:400;color:var(--ink);flex:1}
.tb-sub{font-size:12px;color:var(--ink3);margin-top:1px}
.tb-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}
.btn-primary{padding:8px 18px;background:var(--gold);color:var(--wh);border:none;border-radius:20px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;white-space:nowrap}
.btn-primary:hover{background:var(--gold-d)}
.btn-secondary{padding:8px 16px;border:1.5px solid var(--bg3);background:transparent;border-radius:20px;font-size:13px;color:var(--ink2);white-space:nowrap}
.btn-secondary:hover{border-color:var(--gold);color:var(--gold-d)}
.btn-compare{padding:8px 16px;border:1.5px solid var(--blue-b);background:var(--blue-l);border-radius:20px;font-size:13px;color:var(--blue);font-weight:500;display:flex;align-items:center;gap:6px;white-space:nowrap}
.btn-compare.on{background:var(--blue);color:var(--wh);border-color:var(--blue)}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(28,25,22,.5);z-index:50}

/* TREINOS LAYOUT */
.treinos-layout{display:flex;height:100%;overflow:hidden}
.col-alunos{width:255px;flex-shrink:0;border-right:1px solid var(--bg3);display:flex;flex-direction:column;background:var(--wh);overflow:hidden}
.ca-header{padding:12px 14px;border-bottom:1px solid var(--bg3);flex-shrink:0}
.ca-search{width:100%;padding:8px 12px;border:1.5px solid var(--bg3);border-radius:var(--rs);font-size:13px;outline:none;background:var(--bg)}
.ca-search:focus{border-color:var(--gold)}
.alunos-list{flex:1;overflow-y:auto}
.aluno-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--bg3);transition:all .15s}
.aluno-item:hover{background:var(--bg)}
.aluno-item.sel{background:var(--gold-l);border-right:3px solid var(--gold)}
.aluno-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.aluno-info{flex:1;min-width:0}
.aluno-nome{font-size:13px;font-weight:500;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.aluno-prog{font-size:11px;color:var(--ink3);margin-top:1px}

/* COL PROGRAMA */
.col-prog{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* FICHAS TABS */
.fichas-tabs{background:var(--wh);border-bottom:1px solid var(--bg3);padding:0 14px;display:flex;align-items:stretch;gap:0;flex-shrink:0;overflow-x:auto;min-height:46px}
.tab-wrapper{display:flex;align-items:center;border-bottom:2.5px solid transparent;flex-shrink:0}
.tab-wrapper.on{border-bottom-color:var(--gold)}
.tab-wrapper.comparing{border-bottom-color:var(--blue)}
.ficha-tab{padding:12px 12px 12px 14px;font-size:13px;color:var(--ink3);cursor:pointer;white-space:nowrap;border:none;background:transparent;display:flex;align-items:center;gap:7px;transition:color .15s}
.ficha-tab:hover{color:var(--ink2)}
.tab-wrapper.on .ficha-tab{color:var(--ink);font-weight:600}
.tab-wrapper.comparing .ficha-tab{color:var(--blue);font-weight:600}

/* ← BOTÃO DELETE FICHA — sempre visível, vermelho */
.btn-tab-del{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--red-b);background:var(--red-l);color:var(--red);font-size:13px;display:flex;align-items:center;justify-content:center;line-height:1;margin-right:6px;transition:all .15s;flex-shrink:0;font-weight:600}
.btn-tab-del:hover{background:var(--red);color:var(--wh);border-color:var(--red)}

.btn-add-ficha{margin-left:auto;padding:0 10px;font-size:22px;color:var(--ink3);background:none;border:none;cursor:pointer;flex-shrink:0;line-height:1;align-self:center}
.btn-add-ficha:hover{color:var(--gold)}

/* ÁREA EXERCÍCIOS */
.exercicios-area{flex:1;overflow:hidden;display:flex}
.exercicios-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 18px;display:flex;flex-direction:column;gap:8px}
.compare-cols{flex:1;display:flex;overflow:hidden}
.compare-col{flex:1;min-width:0;display:flex;flex-direction:column;border-right:1px solid var(--bg3)}
.compare-col:last-child{border-right:none}
.compare-col-hdr{padding:10px 14px;border-bottom:1px solid var(--bg3);display:flex;align-items:center;gap:8px;background:var(--wh);flex-shrink:0}
.compare-col-body{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:6px}

/* NOTA INTERNA */
.nota-interna{border:1.5px solid var(--amber-b);border-radius:var(--r);background:var(--amber-l);overflow:hidden;margin-bottom:4px}
.nota-hdr{padding:8px 14px;display:flex;align-items:center;gap:8px;cursor:pointer}
.nota-hdr-txt{font-size:12px;font-weight:600;color:var(--amber);flex:1}
.nota-badge{font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(217,119,6,.15);color:var(--amber);border:1px solid var(--amber-b)}
.nota-chev{font-size:12px;color:var(--amber);transition:transform .2s}
.nota-chev.open{transform:rotate(180deg)}
.nota-body{padding:0 14px 12px}
.nota-textarea{width:100%;font-size:13px;border:1.5px solid var(--amber-b);border-radius:var(--rs);padding:10px 12px;background:var(--wh);color:var(--ink);outline:none;resize:none;line-height:1.7;min-height:80px}
.nota-textarea:focus{border-color:var(--amber)}
.nota-textarea::placeholder{color:#D9B896}
.nota-hint{font-size:11px;color:var(--amber);margin-top:6px;opacity:.8}

/* MODO ESBOÇO */
.esboço-banner{background:var(--purple-l);border:1.5px solid var(--purple-b);border-radius:var(--r);padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:4px}
.esboço-txt{flex:1;font-size:12px;color:var(--purple);line-height:1.5}
.btn-esboço-toggle{font-size:12px;padding:6px 14px;border-radius:20px;font-weight:600;border:1.5px solid;cursor:pointer;white-space:nowrap;transition:all .15s}
.btn-esboço-on{background:var(--purple);color:var(--wh);border-color:var(--purple)}
.btn-esboço-off{background:transparent;color:var(--purple);border-color:var(--purple-b)}
.btn-esboço-off:hover{background:var(--purple);color:var(--wh);border-color:var(--purple)}
.btn-esboço-converter{font-size:12px;padding:6px 14px;border-radius:20px;font-weight:600;border:1.5px solid var(--green-b);background:var(--green-l);color:var(--green);cursor:pointer;white-space:nowrap}
.btn-esboço-converter:hover{background:var(--green);color:var(--wh)}

/* CARD ESBOÇO */
.esboço-body{display:flex;flex-direction:column;gap:0;background:var(--wh);border:1.5px solid var(--purple-b);border-radius:var(--r);overflow:hidden}
.esboço-hdr{padding:10px 16px;background:var(--purple-l);display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--purple-b)}
.esboço-hdr-txt{font-size:12px;font-weight:600;color:var(--purple);flex:1}
.btn-add-grupo-esboço{font-size:12px;padding:4px 12px;border-radius:20px;border:1.5px solid var(--purple-b);background:transparent;color:var(--purple);cursor:pointer}
.btn-add-grupo-esboço:hover{background:var(--purple);color:var(--wh)}
.esboço-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bg3);transition:background .15s}
.esboço-row:last-child{border-bottom:none}
.esboço-row:hover{background:var(--bg)}
.esboço-grupo-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.esboço-grupo-nm{font-size:13px;font-weight:500;color:var(--ink);min-width:110px;flex-shrink:0}
.esboço-params{display:flex;gap:6px;align-items:center;flex:1}
.esboço-inp{width:52px;padding:5px 8px;border:1.5px solid var(--bg3);border-radius:var(--rs);font-size:14px;font-weight:600;text-align:center;outline:none;color:var(--ink);background:var(--bg)}
.esboço-inp:focus{border-color:var(--purple);background:var(--wh)}
.esboço-sep{font-size:13px;color:var(--ink3);font-weight:500}
.esboço-obs-inp{flex:1;padding:5px 10px;border:1.5px solid var(--bg3);border-radius:var(--rs);font-size:12px;outline:none;color:var(--ink2);background:var(--bg)}
.esboço-obs-inp:focus{border-color:var(--purple-b)}
.esboço-param-blk{display:flex;align-items:center;gap:3px;background:var(--bg);border:1px solid var(--bg3);border-radius:6px;padding:3px 7px;font-size:10px;color:var(--ink3)}
.esboço-param-blk input{width:28px;border:none;background:transparent;font-size:12px;font-weight:600;color:var(--ink);outline:none;padding:0;text-align:center}
.esboço-param-blk.azul{background:#EFF6FF;border-color:#BFDBFE;color:#1E40AF}
.esboço-param-blk.azul input{color:#1E40AF}
.esboço-param-blk.roxo{background:#F5F3FF;border-color:#C4B5FD;color:#6D28D9}
.esboço-param-blk.roxo input{color:#6D28D9}
.esboço-eq-sel{border:1px solid var(--bg3);background:var(--bg);border-radius:6px;font-size:10px;color:var(--ink3);padding:3px 5px;outline:none;cursor:pointer;max-width:90px}
.swap-badge{font-size:9px;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:20px;padding:1px 7px;font-weight:600;flex-shrink:0}
.esboço-param-blk{display:flex;align-items:center;gap:3px;background:var(--bg);border:1px solid var(--bg3);border-radius:6px;padding:3px 7px;font-size:10px;color:var(--ink3)}
.esboço-param-blk input{width:28px;border:none;background:transparent;font-size:12px;font-weight:600;color:var(--ink);outline:none;padding:0;text-align:center}
.esboço-param-blk.azul{background:#EFF6FF;border-color:#BFDBFE;color:#1E40AF}
.esboço-param-blk.azul input{color:#1E40AF}
.esboço-param-blk.roxo{background:#F5F3FF;border-color:#C4B5FD;color:#6D28D9}
.esboço-param-blk.roxo input{color:#6D28D9}
.esboço-eq-sel{border:1px solid var(--bg3);background:var(--bg);border-radius:6px;font-size:10px;color:var(--ink3);padding:3px 5px;outline:none;cursor:pointer}
.swap-badge{font-size:9px;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:20px;padding:1px 7px;font-weight:600;flex-shrink:0}
.btn-esboço-del-row{width:24px;height:24px;border-radius:50%;border:none;background:transparent;color:var(--bg3);font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn-esboço-del-row:hover{background:var(--red-l);color:var(--red)}
.esboço-num-inp{width:44px;padding:5px 6px;border:1.5px solid var(--bg3);border-radius:var(--rs);font-size:13px;font-weight:600;text-align:center;outline:none;color:var(--ink);background:var(--bg)}
.esboço-num-inp:focus{border-color:var(--purple);background:var(--wh)}
.estimulo-sel{padding:5px 8px;border:1.5px solid var(--bg3);border-radius:var(--rs);font-size:12px;outline:none;color:var(--ink2);background:var(--bg);appearance:none;cursor:pointer;max-width:130px}
.estimulo-sel:focus{border-color:var(--purple)}
.esboço-empty{padding:24px;text-align:center;color:var(--ink3);font-size:13px}

/* EXERCÍCIO CARD */
.ex-card{background:var(--wh);border:1.5px solid var(--bg3);border-radius:var(--r);overflow:hidden;transition:all .2s;user-select:none}
.ex-card.dragging{opacity:.4;border-style:dashed;border-color:var(--gold)}
.ex-card.drag-over{border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,151,90,.15)}
.ex-main{display:flex;align-items:center;gap:8px;padding:10px 12px}
.ex-drag{color:var(--bg3);font-size:16px;cursor:grab;flex-shrink:0;padding:0 2px;touch-action:none}
.ex-drag:active{cursor:grabbing;color:var(--ink3)}
.ex-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;background:var(--bg2);color:var(--ink3)}
.ex-info{flex:1;min-width:0}
.ex-nome{font-size:13px;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ex-grupo-tag{font-size:10px;padding:1px 7px;border-radius:10px;display:inline-block;margin-top:2px;font-weight:500}
.ex-params{display:flex;gap:5px;align-items:center;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.ex-param{font-size:11px;padding:2px 7px;border-radius:6px;background:var(--bg2);color:var(--ink2);font-weight:500;white-space:nowrap}
.ex-param.carga{background:var(--gold-l);color:var(--gold-d)}
.ex-btns{display:flex;gap:4px;flex-shrink:0}
.btn-ex-edit,.btn-ex-del{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--bg3);background:transparent;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--ink3)}
.btn-ex-edit:hover{border-color:var(--gold);background:var(--gold-l);color:var(--gold-d)}
.btn-ex-del{border:none}
.btn-ex-del:hover{background:var(--red-l);color:var(--red)}

/* GRUPO MUSCULAR SECTION no modo completo */
.grupo-section{margin-bottom:4px}
.grupo-section-hdr{display:flex;align-items:center;gap:8px;padding:6px 4px;margin-bottom:4px}
.grupo-section-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.grupo-section-nm{font-size:11px;font-weight:600;color:var(--ink3);letter-spacing:.6px;text-transform:uppercase}
.grupo-section-line{flex:1;height:1px;background:var(--bg3)}

/* SUPERSET */
.grupo-card{border:1.5px solid;border-radius:var(--r);overflow:hidden;transition:all .2s;user-select:none}
.grupo-card.dragging{opacity:.4;border-style:dashed}
.grupo-card.drag-over{box-shadow:0 0 0 3px rgba(184,151,90,.15)}
.gc-dupla{border-color:var(--blue-b)}
.gc-trio{border-color:var(--purple-b)}
.grupo-header{padding:6px 12px;display:flex;align-items:center;gap:8px;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.gc-dupla .grupo-header{background:var(--blue-l);color:var(--blue)}
.gc-trio .grupo-header{background:var(--purple-l);color:var(--purple)}
.grupo-exs{display:flex;flex-direction:column}
.grupo-ex-row{display:flex;align-items:center;gap:8px;padding:9px 12px;border-top:1px solid}
.gc-dupla .grupo-ex-row{border-color:#DBEAFE}
.gc-trio .grupo-ex-row{border-color:#EDE9FE}
.gnum-d{background:#DBEAFE;color:var(--blue)}
.gnum-t{background:#EDE9FE;color:var(--purple)}

.btn-add-ex{display:flex;align-items:center;gap:8px;padding:10px 14px;border:1.5px dashed var(--bg3);border-radius:var(--r);background:transparent;color:var(--ink3);font-size:13px;cursor:pointer;width:100%;transition:all .15s}
.btn-add-ex:hover{border-color:var(--gold);color:var(--gold-d);background:var(--gold-l)}
.btn-add-grupo{display:flex;align-items:center;gap:6px;padding:9px 14px;border:1.5px dashed;border-radius:var(--r);background:transparent;font-size:12px;cursor:pointer;transition:all .15s}

/* EMPTY */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:14px;padding:40px;text-align:center}
.empty-ico{font-size:40px;opacity:.3}
.empty-title{font-size:16px;font-weight:500;color:var(--ink2)}
.empty-sub{font-size:13px;color:var(--ink3);line-height:1.6;max-width:280px}

/* FILA */
.fila-body{padding:20px 24px;display:flex;flex-direction:column;gap:12px}
.sol-card{background:var(--wh);border:1.5px solid var(--bg3);border-radius:var(--r);overflow:hidden}
.sol-card.nova{border-color:var(--blue-b)}
.sol-hdr{padding:12px 16px;border-bottom:1px solid var(--bg3);display:flex;align-items:center;gap:10px}
.sol-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.sol-meta{flex:1;min-width:0}
.sol-nome{font-size:13px;font-weight:600;color:var(--ink)}
.sol-sub{font-size:11px;color:var(--ink3);margin-top:1px}
.sol-badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;flex-shrink:0}
.sb-nova{background:var(--blue-l);color:var(--blue);border:1px solid var(--blue-b)}
.sb-ok{background:var(--green-l);color:var(--green);border:1px solid var(--green-b)}

function parseRestricoesStr(s){
  const r={};
  if(!s) return r;
  s.split(' · ').forEach(part=>{
    const idx=part.indexOf(':');
    if(idx<0) return;
    let k=part.slice(0,idx).trim();
    const canonical=REGIOES.find(reg=>reg.toLowerCase()===k.toLowerCase());
    if(canonical) k=canonical;
    r[k]=part.slice(idx+1).trim();
  });
  return r;
}

// Recalcula esboço de uma ficha a partir dos exercícios reais (exs[])
function recalcEsboço(ficha){
  if(!ficha||!ficha.exs||!ficha.exs.length) return;
  const grupos={};
  ficha.exs.forEach(e=>{
    const addG=(g,tipo)=>{
      const gn=normGrupo(g||'?');
      if(!grupos[gn]) grupos[gn]={singles:0,duplas:0,s:3,r:'12',d:60};
      if(tipo==='s') grupos[gn].singles++;
      else grupos[gn].duplas++;
      grupos[gn].s=e.s||3;
      grupos[gn].r=e.r||'12';
      grupos[gn].d=e.d||60;
    };
    if(e.tp==='s'){
      addG(e.g||e.n.split(' - ')[0],'s');
    } else if(e.exs){
      e.exs.forEach(ie=>addG(ie.g||ie.n.split(' - ')[0],'d'));
    }
  });
  // Preserve manually edited esboço entries (estimulo, obs) by merging
  const oldEsb={};
  (ficha.esboço||[]).forEach(e=>{ oldEsb[normGrupo(e.g)]=e; });
  ficha.esboço=Object.entries(grupos).map(([g,info])=>({
    id:(oldEsb[g]||{}).id||('e'+Math.random().toString(36).slice(2,7)),
    g,s:info.s,r:info.r,
    num_singles:info.singles,num_duplas:info.duplas,num_trios:0,
    estimulo:(oldEsb[g]||{}).estimulo||'Padrão',
    obs:(oldEsb[g]||{}).obs||''
  }));
}

function mergeAluno(a){
  if(!window.FICHAS_DATA) return;
  const mat=String(a.mat);
  const fichasData=window.FICHAS_DATA[mat];
  if(!fichasData||!fichasData.length) return;
  if(!a.programas||!a.programas.length) return;
  // Injeta fichas em TODOS os programas (usamos os dados do programa atual para todos)
  a.programas.forEach((prog, pi) => {
    if(!prog) return;
    prog.nm = prog.nm || (pi===0 ? 'Programa Atual' : 'Programa');
    if(pi===0) {
      // Programa atual: respeita edições manuais
      if(!prog._editado){
        prog.fichas = fichasData.map(f=>({...f}));
      } else {
        (prog.fichas||[]).forEach((f,i)=>{
          if(!f.exs||!f.exs.length){ const src=fichasData[i]; if(src)f.exs=src.exs; }
        });
      }
    } else {
      // Programas históricos: NÃO injeta fichas (evita mostrar dados falsos)
      // Cada programa histórico tinha suas próprias fichas, não exportadas do Bubble
      if(!prog.fichas) prog.fichas = [];
    }
    (prog.fichas||[]).forEach(f=>{
      if(f.exs&&f.exs.length&&!f._editado) recalcEsboço(f);
    });
  });
}

let SWAP_LOG = JSON.parse(localStorage.getItem('se7e_swaps')||'[]');

function registrarTroca(original, substituto, motivo, aluno){
  const swap = {
    ts: Date.now(),
    original,
    substituto,
    motivo: motivo||'',
    mat: aluno?.mat||'',
    obj: aluno?.objetivo||'',
    nivel: aluno?.nivel||'',
    restricoes: aluno?.restricoes||''
  };
  SWAP_LOG.push(swap);
  // Manter últimos 500
  if(SWAP_LOG.length > 500) SWAP_LOG = SWAP_LOG.slice(-500);
  try { localStorage.setItem('se7e_swaps', JSON.stringify(SWAP_LOG)); } catch(e){}
  atualizarContextoTrocas();
  console.log('🔄 Troca registrada:', original, '→', substituto);
}

function registrarRemocao(exercicio, motivo, aluno){
  registrarTroca(exercicio, '__removido__', motivo||'removido', aluno);
}

function atualizarContextoTrocas(){
  // Constrói mapa de substituições: original → {sub, count}
  const subMap = {};
  const rmMap = {};
  SWAP_LOG.forEach(s => {
    if(s.substituto === '__removido__'){
      if(!rmMap[s.original]) rmMap[s.original] = 0;
      rmMap[s.original]++;
    } else {
      if(!subMap[s.original]) subMap[s.original] = {};
      if(!subMap[s.original][s.substituto]) subMap[s.original][s.substituto] = 0;
      subMap[s.original][s.substituto]++;
    }
  });
  window.SWAP_CONTEXT = { subMap, rmMap, total: SWAP_LOG.length };
}

function getSwapSugestoes(nomeEx){
  if(!window.SWAP_CONTEXT?.subMap) return [];
  const subs = window.SWAP_CONTEXT.subMap[nomeEx];
  if(!subs) return [];
  return Object.entries(subs).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([sub,n])=>({sub,n}));
}

// Inicializar contexto na carga
atualizarContextoTrocas();

function isPendente(a){
  const p=getProg(a);if(!p)return false;
  return p.fichas.some(f=>f.esboço&&f.esboço.length>0&&(!f.exs||f.exs.length===0));
}
function countPendentes(){return D.alunos.filter(isPendente).length;}
function autoSave(){
  try{
    // Only save esboço, metadata and manual edits — NOT the full exs[] (those come from fichas_X.js)
    const snap={ts:Date.now(),alunos:D.alunos.map(a=>({id:a.id,programas:a.programas.map(p=>({
      ...p,
      fichas:(p.fichas||[]).map(f=>({...f,exs:f._editado?f.exs:[]}))
    }))}))};
    localStorage.setItem('se7e_programas',JSON.stringify(snap));
    const el=document.getElementById('save-indicator');
    if(el){el.style.opacity='1';setTimeout(()=>el.style.opacity='0',1500);}
  }catch(e){}
}
function loadSaved(){
  try{
    const saved=localStorage.getItem('se7e_programas');
    if(!saved)return;
    const snap=JSON.parse(saved);
    // Versão: se snapshot não tem ts ou é muito antigo, ignora
    if(snap.ts && (Date.now()-snap.ts) > 7*24*60*60*1000){
      localStorage.removeItem('se7e_programas');
      return;
    }
    (snap.alunos||[]).forEach(sa=>{
      const a=D.alunos.find(x=>x.id===sa.id);
      if(!a||!sa.programas||!sa.programas.length) return;
      // Restaura APENAS esboço e metadados das fichas salvas manualmente
      // Os exercícios (exs[]) sempre vêm dos arquivos fichas_X.js — nunca do localStorage
      sa.programas.forEach((sp,i)=>{
        const ap=a.programas[i];
        if(!ap) return;
        // Restaura nome e notas do programa se foram editados
        if(sp.nm && sp.nm!==ap.nm) ap.nm=sp.nm;
        if(sp.nota!==undefined) ap.nota=sp.nota;
        // Restaura esboços editados nas fichas (sem tocar em exs[])
        (sp.fichas||[]).forEach((sf,fi)=>{
          const af=ap.fichas&&ap.fichas[fi];
          if(!af) return;
          if(sf.esboço&&sf.esboço.length) af.esboço=sf.esboço;
          if(sf.nota!==undefined) af.nota=sf.nota;
          if(sf._editado) af._editado=sf._editado;
          // NÃO restaura sf.exs — isso vem de fichas_X.js
        });
      });
    });
    console.log('✅ Esboços e metadados restaurados do localStorage');
  }catch(e){console.error('loadSaved:',e);}
}

function renderTreinos(){
  const alunos=searchQ?D.alunos.filter(a=>a.nm.toLowerCase().includes(searchQ.toLowerCase())):D.alunos;


  let main='';
  if(!alunoSel){
    main=`<div class="empty-state"><div class="empty-ico">👆</div><div class="empty-title">Selecione um aluno</div><div class="empty-sub">Escolha na lista para ver e editar o programa.</div></div>`;
  } else if(getFichas(alunoSel).length===0){
    main=`<div class="empty-state"><div class="empty-ico">📋</div><div class="empty-title">Sem programa</div><div class="empty-sub">${alunoSel.nm.split(' ')[0]} ainda não tem programa.</div><button class="btn-primary" onclick="novoPrograma()" style="margin-top:8px">+ Criar programa</button></div>`;
  } else {
    main=renderFichasArea();
  }
  // filtrar e ordenar alunos
  const hoje=new Date();hoje.setHours(0,0,0,0);
  function diasParaContrato(a){if(!a.contrato_vence)return 999;const d=new Date(a.contrato_vence+'T00:00:00');return Math.round((d-hoje)/864e5);}
  function diasSemTreino(a){if(!a.treino_atualizado)return 0;const d=new Date(a.treino_atualizado+'T00:00:00');return Math.round((hoje-d)/864e5);}
  // Excesso = treinos realizados ALÉM do previsto no programa (freq × 8 semanas)
  // Positivo = passou do limite e precisa trocar. Negativo = ainda dentro do programa.
  function excessoTreinos(a){return(a.treinos_realizados||0)-(a.treinos_previstos||0);}
  let alunosFiltrados=[...alunos];
  if(filtro==='excesso_desc') alunosFiltrados.sort((a,b)=>excessoTreinos(b)-excessoTreinos(a));
  else if(filtro==='excesso_asc') alunosFiltrados.sort((a,b)=>excessoTreinos(a)-excessoTreinos(b));
  else if(filtro==='vencido') alunosFiltrados=alunosFiltrados.filter(a=>excessoTreinos(a)>0).sort((a,b)=>excessoTreinos(b)-excessoTreinos(a));
  else if(filtro==='contrato') alunosFiltrados=alunosFiltrados.filter(a=>diasParaContrato(a)<=60).sort((a,b)=>diasParaContrato(a)-diasParaContrato(b));

  const listHtmlFiltrado=alunosFiltrados.map(a=>{
    const tp=a.programas.length>0;const sel=alunoSel&&alunoSel.id===a.id;
    const exc=excessoTreinos(a);
    const dct=diasParaContrato(a);
    const realiz=a.treinos_realizados||0;
    const prev=a.treinos_previstos||0;
    let alertas=[];
    // Precisa trocar treino
    if(exc>0){
      const cor=exc>=10?'#FEF2F2:#991B1B:#FECACA':exc>=5?'#FEF3C7:#92400E:#FCD34D':'#FFFBEB:#92400E:#FCD34D';
      const[bg,tc,bc]=cor.split(':');
      alertas.push(`<span style="font-size:10px;padding:1px 6px;border-radius:8px;background:${bg};color:${tc};border:1px solid ${bc};white-space:nowrap">⏰ ${realiz}/${prev} treinos</span>`);
    } else {
      alertas.push(`<span style="font-size:10px;padding:1px 6px;border-radius:8px;background:var(--green-l);color:var(--green);border:1px solid var(--green-b);white-space:nowrap">✓ ${realiz}/${prev} treinos</span>`);
    }
    if(dct<=30) alertas.push(`<span style="font-size:10px;padding:1px 6px;border-radius:8px;background:#FEF2F2;color:#991B1B;border:1px solid #FECACA;white-space:nowrap">📅 Contrato ${dct}d</span>`);
    else if(dct<=60) alertas.push(`<span style="font-size:10px;padding:1px 6px;border-radius:8px;background:#FFFBEB;color:#92400E;border:1px solid #FCD34D;white-space:nowrap">📅 Contrato ${dct}d</span>`);
    return`<div class="aluno-item ${sel?'sel':''}" data-id="${a.id}" onclick="selecionarAluno('${a.id}')">
      <div class="aluno-av" style="${avStyle(a.nm)}">${ini(a.nm)}</div>
      <div class="aluno-info">
        <div class="aluno-nome">${a.nm}</div>
        <div class="aluno-prog" style="display:flex;gap:4px;flex-wrap:wrap;margin-top:3px">
          ${alertas.join('')}
          ${!alertas.length?`<span style="font-size:11px;color:var(--ink3)">${tp?getProg(a).nm:'Sem programa'}</span>`:''}
        </div>
      </div>
    </div>`;
  }).join('');

  const filtros=[
    {k:'todos',lbl:'Todos'},
    {k:'excesso_desc',lbl:'⏰ Mais atrasados'},
    {k:'excesso_asc',lbl:'✓ Mais em dia'},
    {k:'vencido',lbl:'🔁 Precisa trocar'},
    {k:'contrato',lbl:'📅 Contrato vence'},
  ];
  const filtrosHtml=filtros.map(f=>`<button onclick="filtro='${f.k}';render()" style="font-size:11px;padding:4px 10px;border-radius:20px;white-space:nowrap;border:1.5px solid;cursor:pointer;transition:all .15s;background:${filtro===f.k?'var(--ink)':'transparent'};color:${filtro===f.k?'var(--wh)':'var(--ink3)'};border-color:${filtro===f.k?'var(--ink)':'var(--bg3)'}">${f.lbl}</button>`).join('');

  const totalFiltrado=alunosFiltrados.length;
  const totalAlunos=D.alunos.length;

  return`<div class="treinos-layout">
    <div class="col-alunos">
      <div class="ca-header" style="display:flex;flex-direction:column;gap:8px">
        <input class="ca-search" placeholder="Buscar aluno…" value="${searchQ}" oninput="searchQ=this.value;render()">
        <div style="display:flex;gap:5px;overflow-x:auto;padding-bottom:2px">${filtrosHtml}</div>
        ${filtro!=='todos'?`<div style="font-size:11px;color:var(--ink3)">${totalFiltrado} aluno${totalFiltrado!==1?'s':''} encontrado${totalFiltrado!==1?'s':''}</div>`:''}
      </div>

    </div>
    <div class="col-prog">${main}</div>
  </div>`;
}

// ── ESBOÇO ──
function calcMatch(f){
  if(!f.esboço||!f.esboço.length) return null;
  // Conta exercícios reais na ficha por grupo muscular (normaliza uppercase→canonical)
  const real={};
  f.exs.forEach(e=>{
    if(e.tp==='s'){
      const g=normGrupo(e.g||'?');
      real[g]=(real[g]||0)+1;
    } else if(e.tp==='g'||e.exs){
      (e.exs||[]).forEach(ex=>{
        const g=normGrupo(ex.g||'?');
        real[g]=(real[g]||0)+1;
      });
    }
  });
  // Compara com o planejado no esboço
  let totalPlanejado=0, totalOk=0;
  const detalhes=f.esboço.map(es=>{
    const planejado=(es.num_singles!=null||(es.num_duplas!=null)||(es.num_trios!=null))?((es.num_singles||0)+(es.num_duplas||0)+(es.num_trios||0))||1:(es.num_ex||1);
    totalPlanejado+=planejado;
    // match por grupo (case insensitive partial)
    const gKey=normGrupo(es.g).toLowerCase();
    let realCount=0;
    Object.entries(real).forEach(([rg,cnt])=>{
      if(rg.toLowerCase().includes(gKey)||gKey.includes(rg.toLowerCase())) realCount+=cnt;
    });
    const ok=Math.min(realCount,planejado);
    totalOk+=ok;
    return{g:es.g,planejado,real:realCount,ok};
  });
  const pct=totalPlanejado>0?Math.round(totalOk/totalPlanejado*100):0;
  return{pct,detalhes,totalPlanejado,totalOk};
}

function e_upd(fichaId,esId,campo,val){
  const f=getFichas(alunoSel).find(f=>f.id===fichaId);

function e_add(fichaId){
  const f=getFichas(alunoSel).find(f=>f.id===fichaId);
  if(!f)return;
  if(!f.esboço)f.esboço=[];
  const usado=f.esboço.map(e=>e.g);
  const prox=Object.keys(GRUPOS_INFO).find(g=>!usado.includes(g))||'Quadríceps';
  f.esboço.push({id:uid(),g:prox,s:3,r:'12',obs:''});

  render();
}

  render();
}

function renderExsGrupados(f){
  if(!f.exs.length)return'';
  // Agrupa por grupo muscular para exibição
  const gruposPresentes=[];
  const exsByGrupo={};
  f.exs.forEach((e,idx)=>{
    const g=e.tp==='s'?e.g:(e.exs[0]?.g||'Outro');
    if(!exsByGrupo[g]){exsByGrupo[g]=[];gruposPresentes.push(g);}
    exsByGrupo[g].push({...e,_idx:idx});
  });
  let globalNum=0;
  return gruposPresentes.map(g=>{
    const gi=getGrupoInfo(g);
    const exsHtml=exsByGrupo[g].map(e=>{
      if(e.tp==='s'){globalNum++;return renderExSingle(e,globalNum,f.id);}
      return renderExGrupo(e,f.id,g=>{globalNum+=g;return globalNum;},globalNum);
    }).join('');
    return`<div class="grupo-section">
      <div class="grupo-section-hdr">
        <span class="grupo-section-dot" style="background:${gi.cor};border:1.5px solid ${gi.tc}50"></span>

}

// ── DRAG & DROP ──
function setupDragDrop(){
  document.querySelectorAll('[draggable="true"][data-ex]').forEach(card=>{
    card.addEventListener('dragstart',e=>{
      dragState={fichaId:card.dataset.ficha,exId:card.dataset.ex,idx:parseInt(card.dataset.idx)};
      card.classList.add('dragging');e.dataTransfer.effectAllowed='move';
    });
    card.addEventListener('dragend',()=>{card.classList.remove('dragging');document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));dragState=null;});
    card.addEventListener('dragover',e=>{e.preventDefault();if(!dragState||card.dataset.ex===dragState.exId)return;document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));card.classList.add('drag-over');});
    card.addEventListener('dragleave',()=>card.classList.remove('drag-over'));
    card.addEventListener('drop',e=>{
      e.preventDefault();if(!dragState||card.dataset.ex===dragState.exId)return;
      const ti=parseInt(card.dataset.idx);
      const f=getFichas(alunoSel).find(f=>f.id===dragState.fichaId);
      if(!f)return;
      const[moved]=f.exs.splice(dragState.idx,1);f.exs.splice(ti,0,moved);render();
    });
  });
}

function modalBuscaEx(q){
  const dd=document.getElementById('m-ex-dd');
  if(!dd)return;
  modal.ex.n=q;
  if(!q||q.length<1){dd.style.display='none';return;}
  const ql=q.toLowerCase();
  const matches=EXERCICIOS.filter(e=>e.n.toLowerCase().includes(ql)&&!EXERCICIOS_INATIVOS.has(e.n)).slice(0,12);
  if(!matches.length){dd.style.display='none';return;}
  // Sugestões de troca (o que outros professores usaram no lugar deste exercício)
  const swapSugs=matches.flatMap(e=>{
    const sugs=getSwapSugestoes(e.n);
    return sugs.map(s=>({n:s.sub,g:EXERCICIOS.find(x=>x.n===s.sub)?.g||'',_swap:true,_from:e.n,_cnt:s.n}));
  }).filter(s=>s.n&&!matches.find(m=>m.n===s.n)).slice(0,3);
  const allResults=[...matches,...swapSugs].slice(0,14);

  dd.style.display='block';
  dd.innerHTML=allResults.map((e,i)=>{
    const gi=getGrupoInfo(normGrupo(e.g||''));
    const parts=e.n.split(' - ');
    const grupo_label=parts[0];
    const aparelho=parts.length>1?parts[1]:'';
    const nome_ex=parts.length>2?parts.slice(2).join(' - '):parts[parts.length-1];
    const cor=gi.cor||'#F1EFE8';
    const tc=gi.tc||'#4A453F';
    const displayG=normGrupo(e.g||e.n.split(' - ')[0]);
    return `<div
    style="padding:8px 14px;cursor:pointer;border-bottom:1px solid #F5F0E8"
    onmousedown="modalSelecionarEx('${e.n.replace(/'/g,"\'")}','${(normGrupo(e.g||e.n.split(' - ')[0])).replace(/'/g,"\'")}');document.getElementById('m-ex-dd').style.display='none'"

      ${e._swap?`<span style="font-size:9px;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;border-radius:20px;padding:1px 6px;flex-shrink:0">↔ ${e._cnt}x</span>`:''}
      <span style="font-size:10px;background:${cor};color:${tc};border-radius:20px;padding:1px 7px;flex-shrink:0;border:1px solid ${tc}44">${e._swap?'↔ subst.':displayG}</span>

function modalSelecionarEx(nome,grupo){
  // Show carga de referência if available
  const cargaRef=window.CARGA_REF&&window.CARGA_REF[nome];
  const cargaInp=document.querySelector('#modal-root input[type="number"][placeholder="—"]');
  if(cargaInp&&cargaRef&&!cargaInp.value){
    cargaInp.placeholder='ref: '+cargaRef+'kg';
  }
  modal.ex.n=nome;
  modal.ex.g=grupo;
  const inp=document.getElementById('m-ex-busca');
  const grp=document.getElementById('m-ex-grupo');
  if(inp)inp.value=nome;
  if(grp)grp.value=grupo;
  // Show restriction warning
  const restr=getExRestrictions(nome);
  const warn=document.getElementById('m-ex-warn');
  if(warn){
    if(restr){
      warn.style.display='block';
      warn.style.background=restr.tipo==='proibido'?'#FEF2F2':'#FFFBEB';
      warn.style.borderColor=restr.tipo==='proibido'?'#FECACA':'#FCD34D';
      warn.style.color=restr.tipo==='proibido'?'#991B1B':'#92400E';
      warn.textContent=restr.msg;
    } else {
      warn.style.display='none';
    }
  }
}
function fecharModal(){modal=null;document.getElementById('modal-root').innerHTML='';}
function getExRestrictions(nomeEx){
  if(!alunoSel)return null;
  const n=nomeEx.toUpperCase();
  const proib=(alunoSel.exerc_proibidos||[]).find(e=>e.toUpperCase()===n||n.includes(e.toUpperCase().split(' - ').slice(-1)[0]));
  const naoQuer=(alunoSel.exerc_nao_quer||[]).find(e=>e.toUpperCase()===n);
  if(proib)return{tipo:'proibido',msg:'⛔ Exercício proibido para este aluno (patologia/lesão)'};
  if(naoQuer)return{tipo:'nao_quer',msg:'⚠️ Aluno pediu para não fazer este exercício'};
  return null;
}
function salvarEx(){
  const ex=modal.ex;if(!ex.n)return;
  const restr=getExRestrictions(ex.n);
  if(restr&&restr.tipo==='proibido'){alert(restr.msg+'\n\nEste exercício não pode ser adicionado à ficha deste aluno.');return;}
  if(restr&&restr.tipo==='nao_quer'){if(!confirm(restr.msg+'\n\nDeseja adicionar mesmo assim?'))return;}
  if(modal.type==='ex'){
    const f=modal.ficha;const idx=f.exs.findIndex(e=>e.id===ex.id);
    if(idx>=0){
      const original=f.exs[idx].n;
      if(original&&original!==ex.n) registrarTroca(original,ex.n,'troca manual',alunoSel);
      f.exs[idx]={...f.exs[idx],...ex};
    } else f.exs.push({...ex,tp:'s'});
  } else if(modal.type==='ex-grupo'){
    const g=modal.grupo;const idx=g.exs.findIndex(e=>e.id===ex.id);
    if(idx>=0){
      const original=g.exs[idx].n;
      if(original&&original!==ex.n) registrarTroca(original,ex.n,'troca manual',alunoSel);
      g.exs[idx]={...g.exs[idx],...ex};
    }
  }
  fecharModal();render();
}

function salvarExCatalogo(){
  const ex=catalogoModalEx;
  if(!ex||!ex.n.trim()||!ex.g.trim()){alert('Preencha nome e grupo.');return;}
  const n=ex.n.trim().toUpperCase();
  const g=ex.g.trim().toUpperCase();
  if(ex.isNew){
    if(EXERCICIOS.find(e=>e.n===n)){alert('Exercício já existe no catálogo.');return;}
    EXERCICIOS.push({n,g});
    EXERCICIOS.sort((a,b)=>a.g.localeCompare(b.g)||a.n.localeCompare(b.n));
  } else {
    // Editar — atualiza nome e grupo
    const idx=EXERCICIOS.findIndex(e=>e.n===ex._orig||e.n===ex.n);
    if(idx>=0){EXERCICIOS[idx]={n,g};}
  }
  // Persist inativos
  localStorage.setItem('se7e_inativos',JSON.stringify([...EXERCICIOS_INATIVOS]));
  catalogoModalEx=null;
  document.getElementById('modal-root').innerHTML='';
  document.getElementById('content').innerHTML=renderCatalogo();
}

function toggleExCatalogo(nome){
  if(EXERCICIOS_INATIVOS.has(nome)) EXERCICIOS_INATIVOS.delete(nome);
  else EXERCICIOS_INATIVOS.add(nome);
  localStorage.setItem('se7e_inativos',JSON.stringify([...EXERCICIOS_INATIVOS]));
  document.getElementById('content').innerHTML=renderCatalogo();
}

function verFichaHistorico(alunoId,progId,fichaId){
  // Navega para o treino do aluno naquela ficha
  const a=D.alunos.find(x=>x.id===alunoId);
  if(!a)return;
  const progIdx=a.programas.findIndex(p=>p.id===progId);
  if(progIdx<0)return;
  // Move programa para frente temporariamente (read-only view seria ideal, por ora navega diretamente)
  selecionarAluno(alunoId);
  const fichaIdx=(a.programas[progIdx].fichas||[]).findIndex(f=>f.id===fichaId);
  fichaAtiva=Math.max(0,fichaIdx);
  // Se não é o programa atual, troca temporariamente
  if(progIdx!==0){
    const tmp=a.programas[0];a.programas[0]=a.programas[progIdx];a.programas[progIdx]=tmp;
  }
  setMod('treinos',document.querySelector('.sb-item'));
}

function initAvalForm(){

    id: uid(), data: new Date().toISOString().slice(0,10),

    // Dobras Pollock 7

    // Circunferências simples

    // Circunferências bilaterais

    antebraco_d:'', antebraco_e:'',

    // Objetivo

  };
}

function calcIMC(peso, altura){
  const p=parseFloat(peso), h=parseFloat(altura)/100;
  if(!p||!h) return '';
  return (p/(h*h)).toFixed(1);
}

function calcPollock7(dobras, idade, genero){
  const {peitoral=0,abdominal=0,coxa=0,triceps=0,subescapular=0,suprailiaca=0,axilar=0} = dobras;
  const vals = [peitoral,abdominal,coxa,triceps,subescapular,suprailiaca,axilar].map(Number);
  const soma = vals.reduce((a,b)=>a+b,0);
  if(!soma) return null;
  const id=parseInt(idade)||30;
  let dc;
  if(genero==='Feminino'){
    dc = 1.097 - (0.00046971*soma) + (0.00000056*soma*soma) - (0.00012828*id);
  } else {
    dc = 1.112 - (0.00043499*soma) + (0.00000055*soma*soma) - (0.00028826*id);
  }
  return Math.max(3, Math.min(50, ((4.95/dc)-4.5)*100)).toFixed(1);
}

function classGordura(pct, genero, idade){
  const g=parseFloat(pct), id=parseInt(idade)||30;
  const fem=id<30?[13,20,28,35]:id<40?[14,21,29,36]:id<50?[16,23,31,38]:[18,25,33,40];
  const mas=id<30?[8,13,20,25]:id<40?[10,15,21,27]:id<50?[12,17,23,29]:[14,19,25,31];
  const ref=genero==='Feminino'?fem:mas;
  if(g<=ref[0]) return {label:'Excelente',cor:'#059669',bg:'#D1FAE5'};
  if(g<=ref[1]) return {label:'Bom',cor:'#16A34A',bg:'#DCFCE7'};
  if(g<=ref[2]) return {label:'Regular',cor:'#D97706',bg:'#FEF3C7'};
  if(g<=ref[3]) return {label:'Ruim',cor:'#EA580C',bg:'#FFEDD5'};
  return {label:'Muito ruim',cor:'#DC2626',bg:'#FEE2E2'};
}

function classIMC(imc){
  const v=parseFloat(imc);
  if(v<18.5) return {label:'Abaixo do peso',cor:'#2563EB',bg:'#DBEAFE'};
  if(v<25)   return {label:'Peso normal',cor:'#059669',bg:'#D1FAE5'};
  if(v<30)   return {label:'Sobrepeso',cor:'#D97706',bg:'#FEF3C7'};
  if(v<35)   return {label:'Obesidade I',cor:'#EA580C',bg:'#FFEDD5'};
  if(v<40)   return {label:'Obesidade II',cor:'#DC2626',bg:'#FEE2E2'};
  return {label:'Obesidade III',cor:'#7C3AED',bg:'#EDE9FE'};
}

function calcRCQ(cintura, quadril, genero){
  const c=parseFloat(cintura), q=parseFloat(quadril);
  if(!c||!q) return null;
  const rcq=(c/q).toFixed(2);
  let cls;
  if(genero==='Feminino'){
    if(rcq<0.80) cls={label:'Baixo risco',cor:'#059669',bg:'#D1FAE5'};
    else if(rcq<0.85) cls={label:'Risco moderado',cor:'#D97706',bg:'#FEF3C7'};
    else cls={label:'Alto risco',cor:'#DC2626',bg:'#FEE2E2'};
  } else {
    if(rcq<0.90) cls={label:'Baixo risco',cor:'#059669',bg:'#D1FAE5'};
    else if(rcq<0.95) cls={label:'Risco moderado',cor:'#D97706',bg:'#FEF3C7'};
    else cls={label:'Alto risco',cor:'#DC2626',bg:'#FEE2E2'};
  }
  return {valor:rcq,...cls};
}

function calcICA(cintura, altura){
  const c=parseFloat(cintura), h=parseFloat(altura);
  if(!c||!h) return null;
  const ica=(c/h).toFixed(2);
  let cls;
  if(ica<0.50)      cls={label:'Ótimo',cor:'#059669',bg:'#D1FAE5'};
  else if(ica<0.55) cls={label:'Aceitável',cor:'#16A34A',bg:'#DCFCE7'};
  else if(ica<0.60) cls={label:'Elevado',cor:'#D97706',bg:'#FEF3C7'};
  else              cls={label:'Muito elevado',cor:'#DC2626',bg:'#FEE2E2'};
  return {valor:ica,...cls};
}

function calcTMB(peso, altura, idade, genero){
  const p=parseFloat(peso), h=parseFloat(altura), id=parseInt(idade)||30;
  if(!p||!h) return null;
  if(genero==='Feminino') return Math.round(10*p+6.25*h-5*id-161);
  return Math.round(10*p+6.25*h-5*id+5);
}

function calcPesoIdeal(altura){
  const h=parseFloat(altura)/100;
  if(!h) return null;
  return {min:(18.5*h*h).toFixed(1), max:(24.9*h*h).toFixed(1)};
}

function calcScoreEvolucao(av, genero, idade){
  let pts=0, total=0;
  if(av.gord_pct){const cls=classGordura(av.gord_pct,genero,idade);const m={'Excelente':40,'Bom':32,'Regular':20,'Ruim':10,'Muito ruim':4};pts+=m[cls.label]||0;total+=40;}
  if(av.imc){const cls=classIMC(av.imc);const m={'Peso normal':15,'Abaixo do peso':8,'Sobrepeso':8,'Obesidade I':4,'Obesidade II':2,'Obesidade III':0};pts+=m[cls.label]||0;total+=15;}
  if(av.cintura&&av.quadril){const r=calcRCQ(av.cintura,av.quadril,genero);if(r){const m={'Baixo risco':25,'Risco moderado':12,'Alto risco':4};pts+=m[r.label]||0;total+=25;}}
  if(av.cintura&&av.altura){const r=calcICA(av.cintura,av.altura);if(r){const m={'Ótimo':20,'Aceitável':14,'Elevado':7,'Muito elevado':2};pts+=m[r.label]||0;total+=20;}}
  if(!total) return null;
  return Math.round((pts/total)*100);
}

function renderAvalForm(){

  const idade=a.idade||30;
  const genero=f.genero||a.genero||'Feminino';

  f.imc=calcIMC(f.peso,f.altura);
  const gordPct=calcPollock7({peitoral:f.peitoral,abdominal:f.abdominal,coxa:f.coxa,
    triceps:f.triceps,subescapular:f.subescapular,suprailiaca:f.suprailiaca,axilar:f.axilar},idade,genero);

  const ica=calcICA(f.cintura,f.altura);

// ── Histórico de avaliações ──
function renderAvalHistorico(){
  const a=avalAluno;
  const avals=(a.avaliacoes||[]).slice().reverse();
  if(!avals.length) return `<div class="empty-state"><div class="empty-ico">📊</div><div class="empty-title">Sem avaliações</div></div>`;
  const genero=a.genero||'Feminino';
  const idade=a.idade||30;

  const cards=avals.map((av,i)=>{
    const prev=avals[i+1];
    const score=calcScoreEvolucao(av,genero,idade);
    const prevScore=prev?calcScoreEvolucao(prev,genero,idade):null;
    const deltaGord=prev&&av.gord_pct&&prev.gord_pct?(parseFloat(av.gord_pct)-parseFloat(prev.gord_pct)).toFixed(1):null;
    const deltaMag=prev&&av.massa_magra&&prev.massa_magra?(parseFloat(av.massa_magra)-parseFloat(prev.massa_magra)).toFixed(1):null;
    const deltaScore=score!==null&&prevScore!==null?score-prevScore:null;
    const rcq=calcRCQ(av.cintura,av.quadril,genero);
    const ica=calcICA(av.cintura,av.altura);
    const clsG=av.gord_pct?classGordura(av.gord_pct,genero,idade):null;
    return `<div style="background:var(--wh);border:1px solid var(--bg3);border-radius:12px;overflow:hidden">
      <div style="padding:12px 14px;display:flex;align-items:center;gap:10px">
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600">${new Date(av.data+'T12:00').toLocaleDateString('pt-BR',{day:'numeric',month:'short',year:'numeric'})}</div>
          ${av.objetivo_aval?`<div style="font-size:11px;color:var(--ink3);margin-top:2px">${av.objetivo_aval}</div>`:''}
        </div>
        ${score!==null?`<div style="text-align:center;background:linear-gradient(135deg,#1E40AF,#6D28D9);color:#fff;border-radius:10px;padding:6px 12px">
          <div style="font-size:22px;font-weight:800;line-height:1">${score}</div>
          <div style="font-size:9px;opacity:.8">Score</div>
        </div>`:''}
        ${deltaScore!==null?`<div style="font-size:13px;font-weight:700;color:${deltaScore>=0?'var(--green)':'#DC2626'}">${deltaScore>=0?'▲':'▼'}${Math.abs(deltaScore)}</div>`:''}
      </div>
      ${av.gord_pct||av.massa_magra||av.peso?`
      <div style="border-top:1px solid var(--bg3);padding:10px 14px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;background:var(--bg)">
        ${av.gord_pct?`<div style="text-align:center">
          <div style="font-size:18px;font-weight:700;color:${clsG?clsG.cor:'var(--ink)'}">${av.gord_pct}%</div>
          <div style="font-size:10px;color:var(--ink3)">Gordura</div>
          ${deltaGord?`<div style="font-size:10px;font-weight:600;color:${parseFloat(deltaGord)<0?'var(--green)':'#DC2626'}">${parseFloat(deltaGord)<0?'▼':'▲'}${Math.abs(deltaGord)}%</div>`:''}
        </div>`:''}
        ${av.massa_magra?`<div style="text-align:center">
          <div style="font-size:18px;font-weight:700">${av.massa_magra}kg</div>
          <div style="font-size:10px;color:var(--ink3)">Massa magra</div>
          ${deltaMag?`<div style="font-size:10px;font-weight:600;color:${parseFloat(deltaMag)>0?'var(--green)':'#DC2626'}">${parseFloat(deltaMag)>0?'▲':'▼'}${Math.abs(deltaMag)}kg</div>`:''}
        </div>`:''}
        ${av.peso?`<div style="text-align:center">
          <div style="font-size:18px;font-weight:700">${av.peso}kg</div>
          <div style="font-size:10px;color:var(--ink3)">Peso</div>
          ${av.imc?`<div style="font-size:10px;color:var(--ink3)">IMC ${av.imc}</div>`:''}
        </div>`:''}
      </div>`:''}
      ${rcq||ica?`<div style="border-top:1px solid var(--bg3);padding:8px 14px;display:flex;gap:8px;flex-wrap:wrap">
        ${rcq?`<span style="font-size:11px;background:${rcq.bg};color:${rcq.cor};border-radius:20px;padding:2px 9px">RCQ ${rcq.valor} · ${rcq.label}</span>`:''}
        ${ica?`<span style="font-size:11px;background:${ica.bg};color:${ica.cor};border-radius:20px;padding:2px 9px">ICA ${ica.valor} · ${ica.label}</span>`:''}
      </div>`:''}
      ${av.meta_obs?`<div style="padding:8px 14px;border-top:1px solid var(--bg3);font-size:12px;color:#92400E">🎯 ${av.meta_obs}</div>`:''}
    </div>`;
  }).join('');

  return `<div style="display:flex;flex-direction:column;flex:1;overflow:hidden">
    <div style="background:var(--wh);border-bottom:1px solid var(--bg3);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0">
      <button onclick="avalTab='form';render()" style="border:none;background:none;font-size:18px;cursor:pointer;color:var(--ink3)">←</button>
      <div style="flex:1">
        <div style="font-size:14px;font-weight:600">Histórico — ${a.nm.split(' ')[0]}</div>
        <div style="font-size:11px;color:var(--ink3)">${avals.length} avaliação${avals.length!==1?'ões':''}</div>
      </div>
      ${avals.length>1?`<button onclick="avalComparar=[];avalTab='comparar';render()" style="font-size:11px;padding:5px 12px;border:1px solid var(--bg3);border-radius:8px;background:var(--bg);color:var(--ink3);cursor:pointer">⧉ Comparar</button>`:''}
    </div>
    <div style="padding:12px 16px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:8px">${cards}</div>
  </div>`;
}

// ── Comparação de avaliações ──
function renderAvalComparar(){
  const a=avalAluno;
  const avals=(a.avaliacoes||[]);
  const genero=a.genero||'Feminino';

  // Step 1: select which to compare
  if(avalComparar.length<2){
    const checks=avals.map((av,i)=>{
      const sel=avalComparar.includes(i);
      return `<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:${sel?'#EFF6FF':'var(--wh)'};border:1.5px solid ${sel?'#BFDBFE':'var(--bg3)'};border-radius:10px;cursor:pointer"
        onclick="avalComparar=${sel?JSON.stringify(avalComparar.filter(x=>x!==i)):JSON.stringify([...avalComparar,i])};render()">
        <div style="width:18px;height:18px;border-radius:4px;border:2px solid ${sel?'#1E40AF':'#D4C9B8'};background:${sel?'#1E40AF':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
          ${sel?'<span style="color:#fff;font-size:12px;line-height:1">✓</span>':''}
        </div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600">${new Date(av.data+'T12:00').toLocaleDateString('pt-BR',{day:'numeric',month:'short',year:'numeric'})}</div>
          <div style="font-size:11px;color:var(--ink3)">${av.peso?av.peso+'kg':''} ${av.gord_pct?'· '+av.gord_pct+'% gord':''}</div>
        </div>
      </div>`;
    }).join('');
    return `<div style="display:flex;flex-direction:column;flex:1;overflow:hidden">
      <div style="background:var(--wh);border-bottom:1px solid var(--bg3);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0">
        <button onclick="avalTab='historico';render()" style="border:none;background:none;font-size:18px;cursor:pointer;color:var(--ink3)">←</button>
        <div style="flex:1"><div style="font-size:14px;font-weight:600">Comparar avaliações</div>
          <div style="font-size:11px;color:var(--ink3)">Selecione 2 avaliações para comparar</div></div>
        ${avalComparar.length===2?`<button onclick="render()" style="font-size:12px;padding:6px 14px;background:var(--blue);color:#fff;border:none;border-radius:8px;cursor:pointer">Ver comparação →</button>`:''}
      </div>
      <div style="padding:12px 16px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:8px">
        <div style="font-size:12px;color:var(--ink3);padding:4px 0">${avalComparar.length}/2 selecionadas</div>
        ${checks}
      </div>
    </div>`;
  }

  // Step 2: show comparison table
  const av1=avals[avalComparar[0]], av2=avals[avalComparar[1]];
  const d1=new Date(av1.data+'T12:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
  const d2=new Date(av2.data+'T12:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});

  const campos=[
    {k:'peso',l:'Peso',u:'kg'},
    {k:'gord_pct',l:'% Gordura',u:'%'},
    {k:'massa_magra',l:'Massa magra',u:'kg'},
    {k:'massa_gorda',l:'Massa gorda',u:'kg'},
    {k:'imc',l:'IMC',u:''},
    {k:'cintura',l:'Cintura',u:'cm'},
    {k:'abdominal_circ',l:'Abdominal',u:'cm'},
    {k:'quadril',l:'Quadril',u:'cm'},
    {k:'braco_rel_d',l:'Braço rel. Dir',u:'cm'},
    {k:'braco_rel_e',l:'Braço rel. Esq',u:'cm'},
    {k:'braco_con_d',l:'Braço con. Dir',u:'cm'},
    {k:'braco_con_e',l:'Braço con. Esq',u:'cm'},
    {k:'coxa_rel_d',l:'Coxa rel. Dir',u:'cm'},
    {k:'coxa_rel_e',l:'Coxa rel. Esq',u:'cm'},
    {k:'panturrilha_d',l:'Panturrilha Dir',u:'cm'},
    {k:'panturrilha_e',l:'Panturrilha Esq',u:'cm'},
    {k:'peitoral',l:'Dobra Peitoral',u:'mm'},
    {k:'abdominal',l:'Dobra Abdominal',u:'mm'},
    {k:'triceps',l:'Dobra Tríceps',u:'mm'},
    {k:'coxa',l:'Dobra Coxa',u:'mm'},
    {k:'subescapular',l:'Dobra Subescap.',u:'mm'},
    {k:'suprailiaca',l:'Dobra Supra-ilíaca',u:'mm'},
    {k:'axilar',l:'Dobra Axilar',u:'mm'},
  ];

  // For gordura, cintura, peso: lower is better. For massa_magra: higher is better
  const lowerBetter=new Set(['peso','gord_pct','massa_gorda','imc','cintura','abdominal_circ','quadril','braco_rel_d','braco_rel_e','coxa_rel_d','coxa_rel_e','panturrilha_d','panturrilha_e','peitoral','abdominal','triceps','coxa','subescapular','suprailiaca','axilar']);

  const rows=campos.filter(c=>av1[c.k]||av2[c.k]).map(c=>{
    const v1=parseFloat(av1[c.k])||0, v2=parseFloat(av2[c.k])||0;
    const diff=(v2-v1).toFixed(1);
    const improved=lowerBetter.has(c.k)?parseFloat(diff)<0:parseFloat(diff)>0;
    const diffColor=parseFloat(diff)===0?'var(--ink3)':improved?'#059669':'#DC2626';
    const diffArrow=parseFloat(diff)===0?'—':improved?'▼':'▲';
    return `<tr style="border-bottom:1px solid var(--bg3)">
      <td style="padding:8px 12px;font-size:12px;color:var(--ink2)">${c.l}</td>
      <td style="padding:8px 12px;font-size:12px;text-align:right">${av1[c.k]?av1[c.k]+' '+c.u:'-'}</td>
      <td style="padding:8px 12px;font-size:12px;text-align:right">${av2[c.k]?av2[c.k]+' '+c.u:'-'}</td>
      <td style="padding:8px 12px;font-size:12px;text-align:right;font-weight:600;color:${diffColor}">${diffArrow} ${Math.abs(parseFloat(diff))||''}</td>
    </tr>`;
  }).join('');

  return `<div style="display:flex;flex-direction:column;flex:1;overflow:hidden">
    <div style="background:var(--wh);border-bottom:1px solid var(--bg3);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0">
      <button onclick="avalComparar=[];render()" style="border:none;background:none;font-size:18px;cursor:pointer;color:var(--ink3)">←</button>
      <div style="flex:1"><div style="font-size:14px;font-weight:600">Comparação — ${a.nm.split(' ')[0]}</div>
        <div style="font-size:11px;color:var(--ink3)">${d1} vs ${d2}</div></div>
    </div>
    <div style="padding:12px 16px;overflow-y:auto;flex:1">
      <table style="width:100%;border-collapse:collapse">
        <thead>
          <tr style="background:var(--bg)">
            <th style="padding:8px 12px;font-size:11px;font-weight:700;color:var(--ink3);text-align:left;text-transform:uppercase;letter-spacing:.5px">Medida</th>
            <th style="padding:8px 12px;font-size:11px;font-weight:700;color:var(--ink3);text-align:right">${d1}</th>
            <th style="padding:8px 12px;font-size:11px;font-weight:700;color:var(--ink3);text-align:right">${d2}</th>
            <th style="padding:8px 12px;font-size:11px;font-weight:700;color:var(--ink3);text-align:right">Δ</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

// ── Salvar avaliação ──
function salvarAvaliacao(){
  if(!avalAluno) return;
  const f=avalForm;
  if(!f.peso&&!f.gord_pct){alert('Preencha pelo menos peso ou dobras.');return;}
  if(!avalAluno.avaliacoes) avalAluno.avaliacoes=[];
  avalAluno.avaliacoes.push({...f,id:uid()});
  autoSave();
  avalTab='historico';
  render();
}

// Estado da agenda
let agendaState = {
  view: 'calendario',  // 'calendario' | 'slots' | 'agendamentos' | 'enviar'
  weekOffset: 0,
  slotEditando: null,
  alunoEnvio: null,
};

// Dados da agenda (persistidos em localStorage)
function getAgendaData(){
  try {
    const raw = localStorage.getItem('se7e_agenda_aval');
    if(raw) return JSON.parse(raw);
  } catch(e){}
  return {
    // Slots recorrentes: [{id, weekday(0=dom..6=sab), hora:'08:00', ativo:true}]
    slots_fixos: [
      {id:'sf1', weekday:1, hora:'08:00', ativo:true},
      {id:'sf2', weekday:1, hora:'09:00', ativo:true},
      {id:'sf3', weekday:3, hora:'08:00', ativo:true},
      {id:'sf4', weekday:3, hora:'09:00', ativo:true},
      {id:'sf5', weekday:5, hora:'08:00', ativo:true},
    ],
    // Exceções: [{id, data:'2026-03-25', hora:'08:00', tipo:'add'|'remove', motivo:''}]
    excecoes: [],
    // Agendamentos: [{id, data, hora, aluno_id, aluno_nm, aluno_phone, status:'agendado'|'realizado'|'cancelado', criado_em}]
    agendamentos: [],
    // Config Z-API
    zapi_instance: '',
    zapi_token: '',
  };
}

function saveAgendaData(data){
  localStorage.setItem('se7e_agenda_aval', JSON.stringify(data));
}

// Gera os slots disponíveis de uma semana (weekOffset relativo a hoje)
function getSlotsParaSemana(weekOffset){
  const data = getAgendaData();
  const hoje = new Date();
  hoje.setHours(0,0,0,0);
  const minDate = new Date(hoje.getTime() + 48*3600*1000); // 48h mínimo

  // Segunda da semana alvo
  const seg = new Date(hoje);
  seg.setDate(seg.getDate() - seg.getDay() + 1 + weekOffset*7);

  const dias = [];
  for(let d=0; d<7; d++){
    const dia = new Date(seg);
    dia.setDate(seg.getDate() + d);
    const isoDate = dia.toISOString().slice(0,10);
    const wd = dia.getDay();

    // Slots fixos para este dia da semana
    const fixos = data.slots_fixos.filter(s=>s.ativo && s.weekday===wd);

    // Exceções do tipo 'remove' para este dia (pontual ou a partir de)
    const removidos = data.excecoes
      .filter(e=>{
        if(e.tipo==='remove') return e.data===isoDate;
        if(e.tipo==='remove_from') return e.weekday===wd && e.data_inicio<=isoDate && e.hora;
        return false;
      }).map(e=>e.hora);

    // Exceções do tipo 'add' para este dia (pontual ou a partir de)
    const adicionados = data.excecoes
      .filter(e=>{
        if(e.tipo==='add') return e.data===isoDate;
        if(e.tipo==='add_from') return e.weekday===wd && e.data_inicio<=isoDate;
        return false;
      }).map(e=>({id:'ex_'+e.id, hora:e.hora}));

    // Monta slots do dia
    let slots = [
      ...fixos.filter(s=>!removidos.includes(s.hora)).map(s=>({id:s.id, hora:s.hora, tipo:'fixo'})),
      ...adicionados.map(s=>({...s, tipo:'extra'})),
    ].sort((a,b)=>a.hora.localeCompare(b.hora));

    // Remove duplicatas de hora
    const horasVistas = new Set();
    slots = slots.filter(s=>{ if(horasVistas.has(s.hora)) return false; horasVistas.add(s.hora); return true; });

    // Marca cada slot como disponível, agendado ou passado
    slots = slots.map(slot=>{
      const slotDT = new Date(isoDate+'T'+slot.hora);
      const agend = data.agendamentos.find(a=>a.data===isoDate && a.hora===slot.hora && a.status==='agendado');
      const status = slotDT < minDate ? 'passado' : agend ? 'ocupado' : 'disponivel';
      return {...slot, status, agendamento: agend||null};
    });

    dias.push({data:isoDate, weekday:wd, label:dia.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'}), slots});
  }
  return {dias, seg};
}

// ── Render principal ──
function renderAgendaAval(){
  const s = agendaState;
  if(s.view==='slots') return renderGerenciarSlots();
  if(s.view==='agendamentos') return renderListaAgendamentos();
  if(s.view==='enviar') return renderEnviarLink();
  return renderCalendarioAval();
}

// ── Calendário semanal ──
function renderCalendarioAval(){
  const s = agendaState;
  const {dias, seg} = getSlotsParaSemana(s.weekOffset);
  const semLabel = seg.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
  const fimSem = new Date(seg); fimSem.setDate(seg.getDate()+6);
  const fimLabel = fimSem.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});

  const diasHtml = dias.map(dia=>{
    if(!dia.slots.length && dia.weekday===0) return ''; // domingo sem slots
    const slotsHtml = dia.slots.length ? dia.slots.map(slot=>{
      const cores = {
        disponivel: {bg:'#F0FDF4',bc:'#86EFAC',tc:'#166534',dot:'#22C55E'},
        ocupado:    {bg:'#EFF6FF',bc:'#BFDBFE',tc:'#1E40AF',dot:'#3B82F6'},
        passado:    {bg:'#F9F7F4',bc:'#E8E3DC',tc:'#8A8278',dot:'#D4C9B8'},
      };
      const c = cores[slot.status]||cores.passado;
      const agend = slot.agendamento;
      return `<div style="background:${c.bg};border:1.5px solid ${c.bc};border-radius:8px;padding:7px 10px;margin-bottom:6px">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:8px;height:8px;border-radius:50%;background:${c.dot};flex-shrink:0"></div>
          <span style="font-size:13px;font-weight:700;color:${c.tc}">${slot.hora}</span>
          <span style="font-size:11px;color:${c.tc};flex:1">${slot.status==='disponivel'?'Disponível':slot.status==='ocupado'?'Ocupado':'Passado'}</span>
          ${slot.status==='disponivel'?`<button onclick="agendarManual('${dia.data}','${slot.hora}')" style="font-size:10px;padding:2px 8px;background:#fff;border:1px solid ${c.bc};border-radius:6px;cursor:pointer;color:${c.tc}">+ Agendar</button>`:''}
          ${slot.status!=='passado'?`<button onclick="removerSlotData('${dia.data}','${slot.hora}')" style="font-size:10px;padding:2px 6px;background:transparent;border:none;cursor:pointer;color:#DC2626">✕</button>`:''}
        </div>
        ${agend?`<div style="font-size:11px;color:#1E40AF;margin-top:4px;padding-left:16px">👤 ${agend.aluno_nm}</div>`:''}
      </div>`;

// ── Configurar slots fixos ──
function renderGerenciarSlots(){
  const data = getAgendaData();
  const dias_nome = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const diasOpts = dias_nome.map((d,i)=>`<option value="${i}">${d}</option>`).join('');

  // Agrupar slots fixos por dia da semana
  const porDia = {};
  data.slots_fixos.forEach(s=>{
    if(!porDia[s.weekday]) porDia[s.weekday] = [];
    porDia[s.weekday].push(s);
  });

  const fixosHtml = Object.keys(porDia).sort((a,b)=>a-b).map(wd=>{
    const diaNm = dias_nome[wd];
    const slots = porDia[wd].map(s=>`
      <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:${s.ativo?'var(--wh)':'#F9F7F4'};border:1.5px solid ${s.ativo?'var(--bg3)':'#E8E3DC'};border-radius:10px;margin-bottom:6px">
        <span style="font-size:15px;font-weight:700;color:${s.ativo?'var(--ink)':'var(--ink3)'}">${s.hora}</span>
        <span style="font-size:11px;padding:2px 10px;border-radius:20px;background:${s.ativo?'#ECFDF5':'#F3F4F6'};color:${s.ativo?'#065F46':'#6B7280'};border:1px solid ${s.ativo?'#A7F3D0':'#E5E7EB'}">${s.ativo?'Ativo':'Inativo'}</span>
        <div style="flex:1"></div>
        <button onclick="toggleSlotFixo('${s.id}')" style="font-size:11px;padding:5px 12px;border:1px solid ${s.ativo?'#FECACA':'#86EFAC'};border-radius:8px;background:${s.ativo?'#FEF2F2':'#F0FDF4'};cursor:pointer;color:${s.ativo?'#DC2626':'#059669'};font-weight:600">${s.ativo?'Desativar':'Ativar'}</button>
        <button onclick="removerSlotFixo('${s.id}')" style="width:30px;height:30px;border:1px solid var(--bg3);border-radius:8px;background:var(--bg);cursor:pointer;color:#DC2626;font-size:14px;display:flex;align-items:center;justify-content:center">🗑</button>
      </div>`).join('');
    return `<div style="background:var(--wh);border:1px solid var(--bg3);border-radius:12px;overflow:hidden;margin-bottom:8px">
      <div style="padding:10px 14px;background:var(--bg);border-bottom:1px solid var(--bg3);display:flex;align-items:center;gap:8px">

        <span style="font-size:13px;font-weight:600;color:var(--ink)">${['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'][wd]}</span>
        <span style="font-size:11px;color:var(--ink3);margin-left:4px">${porDia[wd].filter(s=>s.ativo).length} ativo${porDia[wd].filter(s=>s.ativo).length!==1?'s':''}</span>
      </div>
      <div style="padding:10px 14px">${slots}</div>
    </div>`;
  }).join('') || '<div style="text-align:center;padding:24px;color:var(--ink3);font-size:13px;background:var(--wh);border:1px solid var(--bg3);border-radius:12px">Nenhum slot fixo. Adicione abaixo.</div>';

  const zapiData = getAgendaData();

  return `<div style="display:flex;flex-direction:column;flex:1;overflow:hidden">
    <div style="background:var(--wh);border-bottom:1px solid var(--bg3);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0">
      <button onclick="agendaState.view='calendario';render()" style="border:none;background:none;font-size:18px;cursor:pointer;color:var(--ink3);padding:0 4px">←</button>

// ── Actions ──
function adicionarSlotFixo(){
  const dia = parseInt(document.getElementById('novo-slot-dia').value);
  const hora = document.getElementById('novo-slot-hora').value;
  if(!hora) return;
  const data = getAgendaData();
  data.slots_fixos.push({id:'sf'+Date.now(), weekday:dia, hora, ativo:true});
  saveAgendaData(data);
  render();
}

function toggleSlotFixo(id){
  const data = getAgendaData();
  const s = data.slots_fixos.find(x=>x.id===id);
  if(s) s.ativo = !s.ativo;
  saveAgendaData(data);
  render();
}

function removerSlotFixo(id){
  if(!confirm('Remover este horário fixo?')) return;
  const data = getAgendaData();
  data.slots_fixos = data.slots_fixos.filter(x=>x.id!==id);
  saveAgendaData(data);
  render();
}

function adicionarSlotData(dataStr){
  const hora = prompt('Horário extra (ex: 10:00):','10:00');
  if(!hora||!/^\d{2}:\d{2}$/.test(hora)) return;
  modalEscopoAdicionar(dataStr, hora);
}

function modalEscopoAdicionar(dataStr, hora){
  const wd = new Date(dataStr+'T12:00').getDay();
  const dias_nome = ['domingo','segunda','terça','quarta','quinta','sexta','sábado'];
  const diaNm = dias_nome[wd];
  const root = document.getElementById('modal-root');
  if(!root) return;
  root.innerHTML = `<div class="modal-bg" onclick="if(event.target.classList.contains('modal-bg')){document.getElementById('modal-root').innerHTML=''}">
    <div class="modal-box" onclick="event.stopPropagation()" style="max-width:380px">
      <div class="modal-hdr">
        <div class="modal-title">Adicionar ${hora} — Qual escopo?</div>
        <button class="modal-close" onclick="document.getElementById('modal-root').innerHTML=''">✕</button>
      </div>
      <div class="modal-body" style="display:flex;flex-direction:column;gap:10px">
        <button onclick="confirmarAdicionar('${dataStr}','${hora}','pontual')" style="padding:14px 16px;background:#F5F0E8;border:1.5px solid #D4C9B8;border-radius:10px;cursor:pointer;text-align:left;font-size:14px">

function confirmarAdicionar(dataStr, hora, escopo){
  document.getElementById('modal-root').innerHTML='';
  const d = getAgendaData();
  const wd = new Date(dataStr+'T12:00').getDay();

  if(escopo==='pontual'){
    d.excecoes.push({id:'ex'+Date.now(), data:dataStr, hora, tipo:'add', motivo:'Pontual'});
  } else if(escopo==='frente'){
    // Adiciona exceção 'add_from' que vale a partir daquela data
    d.excecoes.push({id:'exf'+Date.now(), data_inicio:dataStr, weekday:wd, hora, tipo:'add_from', motivo:'A partir de'});
  } else if(escopo==='fixo'){
    // Verifica se já existe
    const jaExiste = d.slots_fixos.find(s=>s.weekday===wd&&s.hora===hora&&s.ativo);
    if(!jaExiste){
      d.slots_fixos.push({id:'sf'+Date.now(), weekday:wd, hora, ativo:true});
    } else {
      alert('Este horário já existe como slot fixo.');
      saveAgendaData(d); render(); return;
    }
  }
  saveAgendaData(d);
  render();
}

function confirmarRemover(dataStr, hora, escopo){
  document.getElementById('modal-root').innerHTML='';
  const d = getAgendaData();
  const wd = new Date(dataStr+'T12:00').getDay();

  if(escopo==='pontual'){
    // Remove exceção 'add' se existir, senão cria exceção 'remove'
    const eraExtra = d.excecoes.find(e=>e.data===dataStr&&e.hora===hora&&e.tipo==='add');
    if(eraExtra){
      d.excecoes = d.excecoes.filter(e=>!(e.data===dataStr&&e.hora===hora&&e.tipo==='add'));
    } else {
      d.excecoes.push({id:'rm'+Date.now(), data:dataStr, hora, tipo:'remove', motivo:'Pontual'});
    }
  } else if(escopo==='frente'){
    // Bloqueia esse dia da semana a partir desta data
    d.excecoes.push({id:'rmf'+Date.now(), data_inicio:dataStr, weekday:wd, hora, tipo:'remove_from', motivo:'A partir de'});
  } else if(escopo==='permanente'){
    // Desativa o slot fixo
    const fixo = d.slots_fixos.find(s=>s.ativo&&s.weekday===wd&&s.hora===hora);
    if(fixo) fixo.ativo = false;
  }
  saveAgendaData(d);
  render();
}

function agendarManual(dataStr, hora){
  const busca = prompt('Nome do aluno (ou deixe vazio para selecionar depois):');
  if(busca===null) return;
  const aluno = D.alunos.find(a=>a.nm.toLowerCase().includes(busca.toLowerCase()));
  const d = getAgendaData();
  d.agendamentos.push({

    aluno_nm: aluno?.nm||busca||'Aluno manual',
    aluno_phone: aluno?.phone||'',

    criado_em: new Date().toISOString()
  });
  saveAgendaData(d);
  render();
}

function cancelarAgendamento(id){

  const d = getAgendaData();
  const a = d.agendamentos.find(x=>x.id===id);
  if(a) a.status='cancelado';
  saveAgendaData(d);

  d.zapi_instance = inst;

async function enviarLinkWhatsApp(){
  const sel = agendaState.alunoEnvio;
  if(!sel?.phone){ alert('Este aluno não tem telefone cadastrado.'); return; }
  const d = getAgendaData();
  if(!d.zapi_instance||!d.zapi_token){
    // Fallback: abre WhatsApp Web
    const link = `${window.location.origin}/agendar?aluno=${sel.mat}&nm=${encodeURIComponent(sel.nm)}&phone=${encodeURIComponent(sel.phone||'')}&ts=${Date.now()}`;
    const msg = `Olá, ${sel.nm.split(' ')[0]}! 😊\n\nA Vanessa está com agenda aberta para avaliação física. Clique no link abaixo para escolher o melhor horário:\n\n${link}\n\n_Estúdio Se7e_`;
    const phone = sel.phone.replace(/\D/g,'');
    window.open(`https://wa.me/55${phone}?text=${encodeURIComponent(msg)}`, '_blank');
    return;
  }
  // Envio via Z-API
  const link = `${window.location.origin}/agendar?aluno=${sel.mat}&nm=${encodeURIComponent(sel.nm)}&phone=${encodeURIComponent(sel.phone||'')}&ts=${Date.now()}`;
  const msg = `Olá, ${sel.nm.split(' ')[0]}! 😊\n\nA Vanessa está com agenda aberta para avaliação física. Clique no link abaixo para escolher o melhor horário:\n\n${link}\n\n_Estúdio Se7e_`;
  const phone = sel.phone.replace(/\D/g,'');
  try {
    const resp = await fetch(`https://api.z-api.io/instances/${d.zapi_instance}/token/${d.zapi_token}/send-text`,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({phone:`55${phone}`, message:msg})
    });
    const json = await resp.json();
    if(resp.ok){ alert('✅ Mensagem enviada com sucesso!'); }
    else { alert('Erro Z-API: '+JSON.stringify(json)); }
  } catch(e){
    alert('Erro ao enviar: '+e.message);
  }
}

function getQuestionarios(){ return _questCache.respostas||[]; }
function getTokens(){ return _questCache.tokens||[]; }
function saveTokens(t){ _questCache.tokens = t; } // local only (otimismo)

const API_BASE = '';  // mesmo domínio
const API_KEY  = 'se7e2025'; // mesmo API_SECRET do FastAPI

async function carregarQuestCache(){
  try {
    const [tRes, rRes] = await Promise.all([
      fetch(API_BASE+'/quest/tokens', {headers:{'x-api-key':API_KEY}}),
      fetch(API_BASE+'/quest/respostas', {headers:{'x-api-key':API_KEY}}),
    ]);
    _questCache.tokens    = tRes.ok ? await tRes.json() : [];
    _questCache.respostas = rRes.ok ? await rRes.json() : [];
  } catch(e){
    _questCache.tokens    = [];
    _questCache.respostas = [];
  } finally {
    _questCache.carregado = true; // sempre marca como carregado
  }
}

async function gerarToken(alunoId, aluno_nm, aluno_phone, tipo){
  const token = 'q'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  const body = {token, aluno_id:alunoId, aluno_nm, aluno_phone, tipo};
  try {
    await fetch(API_BASE+'/quest/tokens', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':API_KEY},
      body:JSON.stringify(body)
    });
    // Update local cache
    if(!_questCache.tokens) _questCache.tokens=[];
    _questCache.tokens.unshift({...body, criado_em:new Date().toISOString(), status:'pendente', visto:false});
  } catch(e){ console.error('gerarToken error',e); }
  return {token, ...body};
}

function getLinkQ(token, tipo){

function updateQuestBadges(){
  const tokens = getTokens();

  ['entrada','mudanca'].forEach(tipo=>{
    const novos = resps.filter(r=>{
      const tk = tokens.find(t=>t.token===r.token && t.tipo===tipo);
      return tk && !tk.visto;
    }).length;
    const badge = document.getElementById('badge-quest-'+tipo);
    if(badge){ badge.textContent=novos; badge.style.display=novos?'':'none'; }
  });
}
