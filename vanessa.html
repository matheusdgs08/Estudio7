<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FAF8F4">
<title>Estúdio Se7e — Coordenação</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#B8975A;--gold-l:#F5EFE4;--gold-d:#8B6B35;
  --ink:#1C1916;--ink2:#4A453F;--ink3:#8A8278;
  --bg:#FAF8F4;--bg2:#F0EDE8;--bg3:#E2DDD6;--wh:#FFFFFF;
  --r:12px;--rs:8px;
  --green:#059669;--green-l:#ECFDF5;--green-b:#6EE7B7;
  --red:#DC2626;--red-l:#FEF2F2;--red-b:#FECACA;
  --blue:#1E40AF;--blue-l:#EFF6FF;--blue-b:#BFDBFE;
  --purple:#6D28D9;--purple-l:#F5F3FF;--purple-b:#C4B5FD;
  --amber:#D97706;--amber-l:#FFFBEB;--amber-b:#FCD34D;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --sidebar:260px;
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;overflow:hidden}
input,select,button,textarea{font-family:'DM Sans',sans-serif}
button{cursor:pointer}
.app{display:flex;height:100vh;height:-webkit-fill-available;padding-top:var(--safe-top)}

/* SIDEBAR */
.sidebar{width:var(--sidebar);background:var(--ink);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:transform .25s ease}
.sb-logo{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-brand{font-family:'Playfair Display',serif;font-size:17px;font-weight:400;color:var(--wh)}
.sb-role{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:1.5px;text-transform:uppercase;margin-top:3px}
.sb-user{padding:14px 20px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.sb-av{width:32px;height:32px;border-radius:50%;background:var(--gold-l);color:var(--gold-d);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.sb-uname{font-size:13px;font-weight:500;color:var(--wh)}
.sb-uemail{font-size:11px;color:rgba(255,255,255,.35);margin-top:1px}
.sb-nav{flex:1;padding:10px 0;overflow-y:auto}
.sb-section{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.25);padding:12px 20px 5px;font-weight:600}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;transition:all .15s;color:rgba(255,255,255,.5);font-size:13px;font-weight:400;position:relative;border:none;background:transparent;width:100%;text-align:left}
.sb-item:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.8)}
.sb-item.on{background:rgba(255,255,255,.1);color:var(--wh);font-weight:500}
.sb-item.on::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);border-radius:0 2px 2px 0}
.sb-ico{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.sb-badge{margin-left:auto;font-size:10px;padding:2px 7px;border-radius:10px;background:var(--red);color:var(--wh);font-weight:600}
.sb-bottom{padding:14px 20px;border-top:1px solid rgba(255,255,255,.08)}
.btn-logout-sb{font-size:12px;color:rgba(255,255,255,.4);background:transparent;border:none;cursor:pointer;padding:0;display:flex;align-items:center;gap:6px}
.btn-logout-sb:hover{color:var(--red)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:var(--wh);border-bottom:1px solid var(--bg3);padding:0 24px;display:flex;align-items:center;height:56px;gap:12px;flex-shrink:0}
.tb-menu{display:none;background:none;border:none;color:var(--ink3);font-size:20px;cursor:pointer;padding:4px;border-radius:var(--rs)}
.tb-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:400;color:var(--ink);flex:1}
.tb-sub{font-size:12px;color:var(--ink3);margin-top:1px}
.tb-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}
.btn-primary{padding:8px 18px;background:var(--gold);color:var(--wh);border:none;border-radius:20px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;white-space:nowrap}
.btn-primary:hover{background:var(--gold-d)}
.btn-secondary{padding:8px 16px;border:1.5px solid var(--bg3);background:transparent;border-radius:20px;font-size:13px;color:var(--ink2);white-space:nowrap}
.btn-secondary:hover{border-color:var(--gold);color:var(--gold-d)}
.btn-compare{padding:8px 16px;border:1.5px solid var(--blue-b);background:var(--blue-l);border-radius:20px;font-size:13px;color:var(--blue);font-weight:500;display:flex;align-items:center;gap:6px;white-space:nowrap}
.btn-compare.on{background:var(--blue);color:var(--wh);border-color:var(--blue)}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(28,25,22,.5);z-index:50}

/* TREINOS LAYOUT */
.treinos-layout{display:flex;height:100%;overflow:hidden}
.col-alunos{width:255px;flex-shrink:0;border-right:1px solid var(--bg3);display:flex;flex-direction:column;background:var(--wh);overflow:hidden}
.ca-header{padding:12px 14px;border-bottom:1px solid var(--bg3);flex-shrink:0}
.ca-search{width:100%;padding:8px 12px;border:1.5px solid var(--bg3);border-radius:var(--rs);font-size:13px;outline:none;background:var(--bg)}
.ca-search:focus{border-color:var(--gold)}
.alunos-list{flex:1;overflow-y:auto}
.aluno-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--bg3);transition:all .15s}
.aluno-item:hover{background:var(--bg)}
.aluno-item.sel{background:var(--gold-l);border-right:3px solid var(--gold)}
.aluno-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.aluno-info{flex:1;min-width:0}
.aluno-nome{font-size:13px;font-weight:500;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.aluno-prog{font-size:11px;color:var(--ink3);margin-top:1px}

/* COL PROGRAMA */
.col-prog{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* FICHAS TABS */
.fichas-tabs{background:var(--wh);border-bottom:1px solid var(--bg3);padding:0 14px;display:flex;align-items:stretch;gap:0;flex-shrink:0;overflow-x:auto;min-height:46px}
.tab-wrapper{display:flex;align-items:center;border-bottom:2.5px solid transparent;flex-shrink:0}
.tab-wrapper.on{border-bottom-color:var(--gold)}
.tab-wrapper.comparing{border-bottom-color:var(--blue)}
.ficha-tab{padding:12px 12px 12px 14px;font-size:13px;color:var(--ink3);cursor:pointer;white-space:nowrap;border:none;background:transparent;display:flex;align-items:center;gap:7px;transition:color .15s}
.ficha-tab:hover{color:var(--ink2)}
.tab-wrapper.on .ficha-tab{color:var(--ink);font-weight:600}
.tab-wrapper.comparing .ficha-tab{color:var(--blue);font-weight:600}

/* ← BOTÃO DELETE FICHA — sempre visível, vermelho */
.btn-tab-del{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--red-b);background:var(--red-l);color:var(--red);font-size:13px;display:flex;align-items:center;justify-content:center;line-height:1;margin-right:6px;transition:all .15s;flex-shrink:0;font-weight:600}
.btn-tab-del:hover{background:var(--red);color:var(--wh);border-color:var(--red)}

.btn-add-ficha{margin-left:auto;padding:0 10px;font-size:22px;color:var(--ink3);background:none;border:none;cursor:pointer;flex-shrink:0;line-height:1;align-self:center}
.btn-add-ficha:hover{color:var(--gold)}

/* ÁREA EXERCÍCIOS */
.exercicios-area{flex:1;overflow:hidden;display:flex}
.exercicios-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 18px;display:flex;flex-direction:column;gap:8px}
.compare-cols{flex:1;display:flex;overflow:hidden}
.compare-col{flex:1;min-width:0;display:flex;flex-direction:column;border-right:1px solid var(--bg3)}
.compare-col:last-child{border-right:none}
.compare-col-hdr{padding:10px 14px;border-bottom:1px solid var(--bg3);display:flex;align-items:center;gap:8px;background:var(--wh);flex-shrink:0}
.compare-col-body{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:6px}

/* NOTA INTERNA */
.nota-interna{border:1.5px solid var(--amber-b);border-radius:var(--r);background:var(--amber-l);overflow:hidden;margin-bottom:4px}
.nota-hdr{padding:8px 14px;display:flex;align-items:center;gap:8px;cursor:pointer}
.nota-hdr-txt{font-size:12px;font-weight:600;color:var(--amber);flex:1}
.nota-badge{font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(217,119,6,.15);color:var(--amber);border:1px solid var(--amber-b)}
.nota-chev{font-size:12px;color:var(--amber);transition:transform .2s}
.nota-chev.open{transform:rotate(180deg)}
.nota-body{padding:0 14px 12px}
.nota-textarea{width:100%;font-size:13px;border:1.5px solid var(--amber-b);border-radius:var(--rs);padding:10px 12px;background:var(--wh);color:var(--ink);outline:none;resize:none;line-height:1.7;min-height:80px}
.nota-textarea:focus{border-color:var(--amber)}
.nota-textarea::placeholder{color:#D9B896}
.nota-hint{font-size:11px;color:var(--amber);margin-top:6px;opacity:.8}

/* MODO ESBOÇO */
.esboço-banner{background:var(--purple-l);border:1.5px solid var(--purple-b);border-radius:var(--r);padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:4px}
.esboço-txt{flex:1;font-size:12px;color:var(--purple);line-height:1.5}
.btn-esboço-toggle{font-size:12px;padding:6px 14px;border-radius:20px;font-weight:600;border:1.5px solid;cursor:pointer;white-space:nowrap;transition:all .15s}
.btn-esboço-on{background:var(--purple);color:var(--wh);border-color:var(--purple)}
.btn-esboço-off{background:transparent;color:var(--purple);border-color:var(--purple-b)}
.btn-esboço-off:hover{background:var(--purple);color:var(--wh);border-color:var(--purple)}
.btn-esboço-converter{font-size:12px;padding:6px 14px;border-radius:20px;font-weight:600;border:1.5px solid var(--green-b);background:var(--green-l);color:var(--green);cursor:pointer;white-space:nowrap}
.btn-esboço-converter:hover{background:var(--green);color:var(--wh)}

/* CARD ESBOÇO */
.esboço-body{display:flex;flex-direction:column;gap:0;background:var(--wh);border:1.5px solid var(--purple-b);border-radius:var(--r);overflow:hidden}
.esboço-hdr{padding:10px 16px;background:var(--purple-l);display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--purple-b)}
.esboço-hdr-txt{font-size:12px;font-weight:600;color:var(--purple);flex:1}
.btn-add-grupo-esboço{font-size:12px;padding:4px 12px;border-radius:20px;border:1.5px solid var(--purple-b);background:transparent;color:var(--purple);cursor:pointer}
.btn-add-grupo-esboço:hover{background:var(--purple);color:var(--wh)}
.esboço-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bg3);transition:background .15s}
.esboço-row:last-child{border-bottom:none}
.esboço-row:hover{background:var(--bg)}
.esboço-grupo-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.esboço-grupo-nm{font-size:13px;font-weight:500;color:var(--ink);min-width:110px;flex-shrink:0}
.esboço-params{display:flex;gap:6px;align-items:center;flex:1}
.esboço-inp{width:52px;padding:5px 8px;border:1.5px solid var(--bg3);border-radius:var(--rs);font-size:14px;font-weight:600;text-align:center;outline:none;color:var(--ink);background:var(--bg)}
.esboço-inp:focus{border-color:var(--purple);background:var(--wh)}
.esboço-sep{font-size:13px;color:var(--ink3);font-weight:500}
.esboço-obs-inp{flex:1;padding:5px 10px;border:1.5px solid var(--bg3);border-radius:var(--rs);font-size:12px;outline:none;color:var(--ink2);background:var(--bg)}
.esboço-obs-inp:focus{border-color:var(--purple-b)}
.btn-esboço-del-row{width:24px;height:24px;border-radius:50%;border:none;background:transparent;color:var(--bg3);font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn-esboço-del-row:hover{background:var(--red-l);color:var(--red)}
.esboço-num-inp{width:44px;padding:5px 6px;border:1.5px solid var(--bg3);border-radius:var(--rs);font-size:13px;font-weight:600;text-align:center;outline:none;color:var(--ink);background:var(--bg)}
.esboço-num-inp:focus{border-color:var(--purple);background:var(--wh)}
.estimulo-sel{padding:5px 8px;border:1.5px solid var(--bg3);border-radius:var(--rs);font-size:12px;outline:none;color:var(--ink2);background:var(--bg);appearance:none;cursor:pointer;max-width:130px}
.estimulo-sel:focus{border-color:var(--purple)}
.esboço-empty{padding:24px;text-align:center;color:var(--ink3);font-size:13px}

/* EXERCÍCIO CARD */
.ex-card{background:var(--wh);border:1.5px solid var(--bg3);border-radius:var(--r);overflow:hidden;transition:all .2s;user-select:none}
.ex-card.dragging{opacity:.4;border-style:dashed;border-color:var(--gold)}
.ex-card.drag-over{border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,151,90,.15)}
.ex-main{display:flex;align-items:center;gap:8px;padding:10px 12px}
.ex-drag{color:var(--bg3);font-size:16px;cursor:grab;flex-shrink:0;padding:0 2px;touch-action:none}
.ex-drag:active{cursor:grabbing;color:var(--ink3)}
.ex-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;background:var(--bg2);color:var(--ink3)}
.ex-info{flex:1;min-width:0}
.ex-nome{font-size:13px;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ex-grupo-tag{font-size:10px;padding:1px 7px;border-radius:10px;display:inline-block;margin-top:2px;font-weight:500}
.ex-params{display:flex;gap:5px;align-items:center;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.ex-param{font-size:11px;padding:2px 7px;border-radius:6px;background:var(--bg2);color:var(--ink2);font-weight:500;white-space:nowrap}
.ex-param.carga{background:var(--gold-l);color:var(--gold-d)}
.ex-btns{display:flex;gap:4px;flex-shrink:0}
.btn-ex-edit,.btn-ex-del{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--bg3);background:transparent;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--ink3)}
.btn-ex-edit:hover{border-color:var(--gold);background:var(--gold-l);color:var(--gold-d)}
.btn-ex-del{border:none}
.btn-ex-del:hover{background:var(--red-l);color:var(--red)}

/* GRUPO MUSCULAR SECTION no modo completo */
.grupo-section{margin-bottom:4px}
.grupo-section-hdr{display:flex;align-items:center;gap:8px;padding:6px 4px;margin-bottom:4px}
.grupo-section-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.grupo-section-nm{font-size:11px;font-weight:600;color:var(--ink3);letter-spacing:.6px;text-transform:uppercase}
.grupo-section-line{flex:1;height:1px;background:var(--bg3)}

/* SUPERSET */
.grupo-card{border:1.5px solid;border-radius:var(--r);overflow:hidden;transition:all .2s;user-select:none}
.grupo-card.dragging{opacity:.4;border-style:dashed}
.grupo-card.drag-over{box-shadow:0 0 0 3px rgba(184,151,90,.15)}
.gc-dupla{border-color:var(--blue-b)}
.gc-trio{border-color:var(--purple-b)}
.grupo-header{padding:6px 12px;display:flex;align-items:center;gap:8px;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.gc-dupla .grupo-header{background:var(--blue-l);color:var(--blue)}
.gc-trio .grupo-header{background:var(--purple-l);color:var(--purple)}
.grupo-exs{display:flex;flex-direction:column}
.grupo-ex-row{display:flex;align-items:center;gap:8px;padding:9px 12px;border-top:1px solid}
.gc-dupla .grupo-ex-row{border-color:#DBEAFE}
.gc-trio .grupo-ex-row{border-color:#EDE9FE}
.gnum-d{background:#DBEAFE;color:var(--blue)}
.gnum-t{background:#EDE9FE;color:var(--purple)}

.btn-add-ex{display:flex;align-items:center;gap:8px;padding:10px 14px;border:1.5px dashed var(--bg3);border-radius:var(--r);background:transparent;color:var(--ink3);font-size:13px;cursor:pointer;width:100%;transition:all .15s}
.btn-add-ex:hover{border-color:var(--gold);color:var(--gold-d);background:var(--gold-l)}
.btn-add-grupo{display:flex;align-items:center;gap:6px;padding:9px 14px;border:1.5px dashed;border-radius:var(--r);background:transparent;font-size:12px;cursor:pointer;transition:all .15s}

/* EMPTY */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:14px;padding:40px;text-align:center}
.empty-ico{font-size:40px;opacity:.3}
.empty-title{font-size:16px;font-weight:500;color:var(--ink2)}
.empty-sub{font-size:13px;color:var(--ink3);line-height:1.6;max-width:280px}

/* FILA */
.fila-body{padding:20px 24px;display:flex;flex-direction:column;gap:12px}
.sol-card{background:var(--wh);border:1.5px solid var(--bg3);border-radius:var(--r);overflow:hidden}
.sol-card.nova{border-color:var(--blue-b)}
.sol-hdr{padding:12px 16px;border-bottom:1px solid var(--bg3);display:flex;align-items:center;gap:10px}
.sol-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.sol-meta{flex:1;min-width:0}
.sol-nome{font-size:13px;font-weight:600;color:var(--ink)}
.sol-sub{font-size:11px;color:var(--ink3);margin-top:1px}
.sol-badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;flex-shrink:0}
.sb-nova{background:var(--blue-l);color:var(--blue);border:1px solid var(--blue-b)}
.sb-ok{background:var(--green-l);color:var(--green);border:1px solid var(--green-b)}
.sb-rej{background:var(--red-l);color:var(--red);border:1px solid var(--red-b)}
.sol-body{padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.sol-row{display:flex;gap:16px;flex-wrap:wrap}
.sol-col{flex:1;min-width:100px}
.sol-lbl{font-size:10px;color:var(--ink3);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
.sol-val{font-size:13px;color:var(--ink);font-weight:500}
.sol-motivo{font-size:13px;color:var(--ink2);background:var(--bg);border-radius:var(--rs);padding:8px 12px;line-height:1.5;font-style:italic}
.sol-actions{padding:10px 16px;border-top:1px solid var(--bg3);display:flex;gap:8px}
.btn-apr{flex:1;padding:10px;background:var(--green);color:var(--wh);border:none;border-radius:var(--rs);font-size:13px;font-weight:600}
.btn-apr:hover{background:#047857}
.btn-rej-s{flex:1;padding:10px;background:var(--red-l);color:var(--red);border:1.5px solid var(--red-b);border-radius:var(--rs);font-size:13px;font-weight:600}
.btn-rej-s:hover{background:#FEE2E2}

/* MODAIS */
.modal-bg{position:fixed;inset:0;background:rgba(28,25,22,.55);display:flex;align-items:flex-end;justify-content:center;z-index:200;padding-bottom:var(--safe-bot)}
@media(min-width:640px){.modal-bg{align-items:center}}
.modal-box{background:var(--wh);border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;animation:slideup .22s ease}
@media(min-width:640px){.modal-box{border-radius:var(--r);animation:popin .18s ease}}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes popin{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--bg3);margin:10px auto 0}
@media(min-width:640px){.modal-handle{display:none}}
.modal-hdr{padding:16px 20px;border-bottom:1px solid var(--bg3);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--wh);z-index:2}

function renderTreinos(){
  const alunos=searchQ?D.alunos.filter(a=>a.nm.toLowerCase().includes(searchQ.toLowerCase())):D.alunos;


  let main='';
  if(!alunoSel){
    main=`<div class="empty-state"><div class="empty-ico">👆</div><div class="empty-title">Selecione um aluno</div><div class="empty-sub">Escolha na lista para ver e editar o programa.</div></div>`;
  } else if(getFichas(alunoSel).length===0){
    main=`<div class="empty-state"><div class="empty-ico">📋</div><div class="empty-title">Sem programa</div><div class="empty-sub">${alunoSel.nm.split(' ')[0]} ainda não tem programa.</div><button class="btn-primary" onclick="novoPrograma()" style="margin-top:8px">+ Criar programa</button></div>`;
  } else {
    main=renderFichasArea();
  }
  // filtrar e ordenar alunos
  const hoje=new Date();hoje.setHours(0,0,0,0);
  function diasParaContrato(a){if(!a.contrato_vence)return 999;const d=new Date(a.contrato_vence+'T00:00:00');return Math.round((d-hoje)/864e5);}
  function diasSemTreino(a){if(!a.treino_atualizado)return 0;const d=new Date(a.treino_atualizado+'T00:00:00');return Math.round((hoje-d)/864e5);}
  // Excesso = treinos realizados ALÉM do previsto no programa (freq × 8 semanas)
  // Positivo = passou do limite e precisa trocar. Negativo = ainda dentro do programa.
  function excessoTreinos(a){return(a.treinos_realizados||0)-(a.treinos_previstos||0);}
  let alunosFiltrados=[...alunos];
  if(filtro==='excesso_desc') alunosFiltrados.sort((a,b)=>excessoTreinos(b)-excessoTreinos(a));
  else if(filtro==='excesso_asc') alunosFiltrados.sort((a,b)=>excessoTreinos(a)-excessoTreinos(b));
  else if(filtro==='vencido') alunosFiltrados=alunosFiltrados.filter(a=>excessoTreinos(a)>0).sort((a,b)=>excessoTreinos(b)-excessoTreinos(a));
  else if(filtro==='contrato') alunosFiltrados=alunosFiltrados.filter(a=>diasParaContrato(a)<=60).sort((a,b)=>diasParaContrato(a)-diasParaContrato(b));

  const listHtmlFiltrado=alunosFiltrados.map(a=>{
    const tp=a.programas.length>0;const sel=alunoSel&&alunoSel.id===a.id;
    const exc=excessoTreinos(a);
    const dct=diasParaContrato(a);
    const realiz=a.treinos_realizados||0;
    const prev=a.treinos_previstos||0;
    let alertas=[];
    // Precisa trocar treino
    if(exc>0){
      const cor=exc>=10?'#FEF2F2:#991B1B:#FECACA':exc>=5?'#FEF3C7:#92400E:#FCD34D':'#FFFBEB:#92400E:#FCD34D';
      const[bg,tc,bc]=cor.split(':');
      alertas.push(`<span style="font-size:10px;padding:1px 6px;border-radius:8px;background:${bg};color:${tc};border:1px solid ${bc};white-space:nowrap">⏰ ${realiz}/${prev} treinos</span>`);
    } else {
      alertas.push(`<span style="font-size:10px;padding:1px 6px;border-radius:8px;background:var(--green-l);color:var(--green);border:1px solid var(--green-b);white-space:nowrap">✓ ${realiz}/${prev} treinos</span>`);
    }
    if(dct<=30) alertas.push(`<span style="font-size:10px;padding:1px 6px;border-radius:8px;background:#FEF2F2;color:#991B1B;border:1px solid #FECACA;white-space:nowrap">📅 Contrato ${dct}d</span>`);
    else if(dct<=60) alertas.push(`<span style="font-size:10px;padding:1px 6px;border-radius:8px;background:#FFFBEB;color:#92400E;border:1px solid #FCD34D;white-space:nowrap">📅 Contrato ${dct}d</span>`);
    return`<div class="aluno-item ${sel?'sel':''}" onclick="selecionarAluno(${a.id})">
      <div class="aluno-av" style="${avStyle(a.nm)}">${ini(a.nm)}</div>
      <div class="aluno-info">
        <div class="aluno-nome">${a.nm}</div>
        <div class="aluno-prog" style="display:flex;gap:4px;flex-wrap:wrap;margin-top:3px">
          ${alertas.join('')}
          ${!alertas.length?`<span style="font-size:11px;color:var(--ink3)">${tp?getProg(a).nm:'Sem programa'}</span>`:''}
        </div>
      </div>
    </div>`;
  }).join('');

  const filtros=[
    {k:'todos',lbl:'Todos'},
    {k:'excesso_desc',lbl:'⏰ Mais atrasados'},
    {k:'excesso_asc',lbl:'✓ Mais em dia'},
    {k:'vencido',lbl:'🔁 Precisa trocar'},
    {k:'contrato',lbl:'📅 Contrato vence'},
  ];
  const filtrosHtml=filtros.map(f=>`<button onclick="filtro='${f.k}';render()" style="font-size:11px;padding:4px 10px;border-radius:20px;white-space:nowrap;border:1.5px solid;cursor:pointer;transition:all .15s;background:${filtro===f.k?'var(--ink)':'transparent'};color:${filtro===f.k?'var(--wh)':'var(--ink3)'};border-color:${filtro===f.k?'var(--ink)':'var(--bg3)'}">${f.lbl}</button>`).join('');

  const totalFiltrado=alunosFiltrados.length;
  const totalAlunos=D.alunos.length;

  return`<div class="treinos-layout">
    <div class="col-alunos">
      <div class="ca-header" style="display:flex;flex-direction:column;gap:8px">
        <input class="ca-search" placeholder="Buscar aluno…" value="${searchQ}" oninput="searchQ=this.value;render()">
        <div style="display:flex;gap:5px;overflow-x:auto;padding-bottom:2px">${filtrosHtml}</div>
        ${filtro!=='todos'?`<div style="font-size:11px;color:var(--ink3)">${totalFiltrado} aluno${totalFiltrado!==1?'s':''} encontrado${totalFiltrado!==1?'s':''}</div>`:''}
      </div>
      <div class="alunos-list">${listHtmlFiltrado||'<div style="padding:14px;font-size:12px;color:var(--ink3);text-align:center">Nenhum aluno neste filtro</div>'}</div>
    </div>
    <div class="col-prog">${main}</div>
  </div>`;
}

// ── ESBOÇO ──
function calcMatch(f){
  if(!f.esboço||!f.esboço.length) return null;
  // Conta exercícios reais na ficha por grupo muscular
  const real={};
  f.exs.forEach(e=>{
    if(e.tp==='s'){
      const g=e.g||'?';
      real[g]=(real[g]||0)+1;
    } else if(e.tp==='g'||e.exs){
      (e.exs||[]).forEach(ex=>{
        const g=ex.g||'?';
        real[g]=(real[g]||0)+1;
      });
    }
  });
  // Compara com o planejado no esboço
  let totalPlanejado=0, totalOk=0;
  const detalhes=f.esboço.map(es=>{
    const planejado=es.num_ex||1;
    totalPlanejado+=planejado;
    // match por grupo (case insensitive partial)
    const gKey=es.g.toLowerCase();
    let realCount=0;
    Object.entries(real).forEach(([rg,cnt])=>{
      if(rg.toLowerCase().includes(gKey)||gKey.includes(rg.toLowerCase())) realCount+=cnt;
    });
    const ok=Math.min(realCount,planejado);
    totalOk+=ok;
    return{g:es.g,planejado,real:realCount,ok};
  });
  const pct=totalPlanejado>0?Math.round(totalOk/totalPlanejado*100):0;
  return{pct,detalhes,totalPlanejado,totalOk};
}

function renderExsGrupados(f){
  if(!f.exs.length)return'';
  // Agrupa por grupo muscular para exibição
  const gruposPresentes=[];
  const exsByGrupo={};
  f.exs.forEach((e,idx)=>{
    const g=e.tp==='s'?e.g:(e.exs[0]?.g||'Outro');
    if(!exsByGrupo[g]){exsByGrupo[g]=[];gruposPresentes.push(g);}
    exsByGrupo[g].push({...e,_idx:idx});
  });
  let globalNum=0;
  return gruposPresentes.map(g=>{
    const gi=getGrupoInfo(g);
    const exsHtml=exsByGrupo[g].map(e=>{
      if(e.tp==='s'){globalNum++;return renderExSingle(e,globalNum,f.id);}
      return renderExGrupo(e,f.id,g=>{globalNum+=g;return globalNum;},globalNum);
    }).join('');
    return`<div class="grupo-section">
      <div class="grupo-section-hdr">
        <span class="grupo-section-dot" style="background:${gi.cor};border:1.5px solid ${gi.tc}50"></span>

  }).join('');
}

// ── DRAG & DROP ──
function setupDragDrop(){
  document.querySelectorAll('[draggable="true"][data-ex]').forEach(card=>{
    card.addEventListener('dragstart',e=>{
      dragState={fichaId:card.dataset.ficha,exId:card.dataset.ex,idx:parseInt(card.dataset.idx)};
      card.classList.add('dragging');e.dataTransfer.effectAllowed='move';
    });
    card.addEventListener('dragend',()=>{card.classList.remove('dragging');document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));dragState=null;});
    card.addEventListener('dragover',e=>{e.preventDefault();if(!dragState||card.dataset.ex===dragState.exId)return;document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));card.classList.add('drag-over');});
    card.addEventListener('dragleave',()=>card.classList.remove('drag-over'));
    card.addEventListener('drop',e=>{
      e.preventDefault();if(!dragState||card.dataset.ex===dragState.exId)return;
      const ti=parseInt(card.dataset.idx);
      const f=getFichas(alunoSel).find(f=>f.id===dragState.fichaId);
      if(!f)return;
      const[moved]=f.exs.splice(dragState.idx,1);f.exs.splice(ti,0,moved);render();
    });
  });
}

function modalBuscaEx(q){
  const dd=document.getElementById('m-ex-dd');
  if(!dd)return;
  modal.ex.n=q;
  if(!q||q.length<1){dd.style.display='none';return;}
  const ql=q.toLowerCase();
  const matches=EXERCICIOS.filter(e=>e.n.toLowerCase().includes(ql)).slice(0,12);
  if(!matches.length){dd.style.display='none';return;}
  dd.style.display='block';
  dd.innerHTML=matches.map((e,i)=>`<div
    style="padding:9px 14px;cursor:pointer;border-bottom:1px solid #F5F0E8;font-size:12px"
    onmousedown="modalSelecionarEx('${e.n.replace(/'/g,"\\'")}','${(e.g||'').replace(/'/g,"\\'")}');document.getElementById('m-ex-dd').style.display='none'"
    onmouseover="this.style.background='#F5EFE4'"
    onmouseout="this.style.background='transparent'">
    <div style="font-weight:500;color:#1C1916">${e.n}</div>
    <div style="font-size:10px;color:#8A8278;margin-top:2px">${e.g||''}</div>
  </div>`).join('');
}
function modalSelecionarEx(nome,grupo){
  modal.ex.n=nome;
  modal.ex.g=grupo;
  const inp=document.getElementById('m-ex-busca');
  const grp=document.getElementById('m-ex-grupo');
  if(inp)inp.value=nome;
  if(grp)grp.value=grupo;
}
function fecharModal(){modal=null;document.getElementById('modal-root').innerHTML='';}
function salvarEx(){
  const ex=modal.ex;if(!ex.n)return;
  if(modal.type==='ex'){
    const f=modal.ficha;const idx=f.exs.findIndex(e=>e.id===ex.id);
    if(idx>=0)f.exs[idx]={...f.exs[idx],...ex};else f.exs.push({...ex,tp:'s'});
  } else if(modal.type==='ex-grupo'){
    const g=modal.grupo;const idx=g.exs.findIndex(e=>e.id===ex.id);
    if(idx>=0)g.exs[idx]={...g.exs[idx],...ex};
  }
  fecharModal();render();
}

    <div class="sol-hdr">
      <div class="sol-av" style="${avStyle(s.aluno)}">${ini(s.aluno)}</div>
      <div class="sol-meta"><div class="sol-nome">${s.aluno} <span style="font-size:11px;color:var(--ink3);font-weight:400">· mat. ${s.mat}</span></div><div class="sol-sub">por ${s.prof} · ${s.dt}</div></div>
      <span class="sol-badge ${s.status==='nova'?'sb-nova':s.status==='aprovada'?'sb-ok':'sb-rej'}">${s.status==='nova'?'Pendente':s.status==='aprovada'?'Aprovada':'Rejeitada'}</span>
    </div>
    <div class="sol-body">
      <div class="sol-row">
        <div class="sol-col"><div class="sol-lbl">Tipo</div><div class="sol-val">${s.tipo==='troca'?'↔ Troca':'✕ Remoção'}</div></div>
        <div class="sol-col"><div class="sol-lbl">Exercício atual</div><div class="sol-val">${exNomeExibir(s.exAtual)}</div></div>
        ${s.exSugere?`<div class="sol-col"><div class="sol-lbl">Sugestão</div><div class="sol-val" style="color:var(--green)">${exNomeExibir(s.exSugere)}</div></div>`:''}
      </div>
      <div><div class="sol-lbl">Motivo</div><div class="sol-motivo" style="margin-top:4px">"${s.motivo}"</div></div>
    </div>
    ${s.status==='nova'?`<div class="sol-actions">
      <button class="btn-apr" onclick="aprovarSol('${s.id}')">✓ Aprovar</button>
      <button class="btn-rej-s" onclick="rejeitarSol('${s.id}')">✕ Rejeitar</button>
    </div>`:`<div style="padding:10px 16px;font-size:12px;color:${s.status==='aprovada'?'var(--green)':'var(--red)'}">
      ${s.status==='aprovada'?'✓ Aprovada — alteração aplicada':'✕ Rejeitada'}
    </div>`}
  </div>`;
  return`<div class="fila-body">
    ${novas.length?`<div style="font-size:13px;font-weight:600;color:var(--ink);margin-bottom:4px">Aguardando revisão (${novas.length})</div>${novas.map(rSol).join('')}`:`<div style="font-size:13px;color:var(--ink3);padding:8px 0">Sem solicitações pendentes.</div>`}
    ${hist.length?`<div style="font-size:13px;font-weight:600;color:var(--ink3);margin:12px 0 4px">Histórico</div>${hist.map(rSol).join('')}`:''}
  </div>`;
}

alunoSel=D.alunos[0];
sketchOpen[D.alunos[0].programas[0]?.fichas[0]?.id]=true;
render();
</script>
</body>
</html>
