<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App do Professor — Estúdio Se7e</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#1C1916;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif}
.device{width:390px;height:844px;background:#FAF8F4;border-radius:40px;overflow:hidden;box-shadow:0 40px 100px rgba(0,0,0,.6);display:flex;flex-direction:column;position:relative}
.device-inner{flex:1;display:flex;flex-direction:column;overflow:hidden}
.credits{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(255,255,255,.3);letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap}
@media(max-height:900px){.device{height:100vh;border-radius:0;width:100%;max-width:430px}}
@media(max-width:430px){.device{width:100%;border-radius:0;height:100vh}}
</style>
</head>
<body>
<div class="device">
  <div class="device-inner" id="root"></div>
</div>
<div class="credits">Estúdio Se7e · App do Professor · Protótipo</div>

<style>
:root{--gold:#B8975A;--gold-l:#F5EFE4;--gold-d:#8B6B35;--ink:#1C1916;--ink2:#4A453F;--ink3:#8A8278;--bg:#FAF8F4;--bg2:#F0EDE8;--bg3:#E2DDD6;--wh:#FFFFFF;--r:10px;--rs:6px;--green:#059669;--red:#DC2626;--purple:#6D28D9;--pl:#F5F3FF;--pb:#C4B5FD}
#root{display:flex;flex-direction:column;height:100%;overflow:hidden;color:var(--ink);font-size:13px}
input,select,button,textarea{font-family:'DM Sans',sans-serif}
button{cursor:pointer}
.topbar{background:var(--wh);border-bottom:1px solid var(--bg3);padding:0 18px;display:flex;align-items:center;height:50px;gap:10px;flex-shrink:0}
.tlogo{font-family:'Playfair Display',serif;font-size:14px;font-weight:400;color:var(--ink);flex:1}
.tav{width:27px;height:27px;border-radius:50%;background:var(--gold-l);color:var(--gold-d);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500}
.btn-out{font-size:11px;padding:3px 9px;border:1px solid var(--bg3);border-radius:var(--rs);background:transparent;color:var(--ink3)}
.btn-out:hover{border-color:var(--red);color:var(--red)}
.content{flex:1;overflow-y:auto;min-height:0}
.bnav{background:var(--wh);border-top:1px solid var(--bg3);display:flex;flex-shrink:0}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 4px;gap:2px;border:none;background:transparent;position:relative}
.bni-ico{font-size:17px;transition:transform .15s}
.bni-lbl{font-size:10px;color:var(--ink3)}
.bni.on .bni-ico{transform:scale(1.1)}
.bni.on .bni-lbl{color:var(--gold-d);font-weight:500}
.bdot{position:absolute;top:7px;right:calc(50% - 14px);width:7px;height:7px;background:var(--red);border-radius:50%}
.bdot-w{position:absolute;top:7px;right:calc(50% - 14px);width:7px;height:7px;background:#D97706;border-radius:50%}
/* login */
.lshell{flex:1;display:flex;align-items:center;justify-content:center;background:var(--ink);padding:24px}
.lbox{background:var(--wh);border-radius:var(--r);width:100%;max-width:320px;padding:28px 24px;text-align:center}
.llogo{font-family:'Playfair Display',serif;font-size:20px;font-weight:400;color:var(--ink);margin-bottom:2px}
.lsub{font-size:10px;color:var(--ink3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:22px}
.lf{display:flex;flex-direction:column;gap:4px;margin-bottom:11px;text-align:left}
.ll{font-size:11px;color:var(--ink3);font-weight:500}
.li{padding:9px 11px;border:1px solid var(--bg3);border-radius:var(--rs);background:var(--bg);color:var(--ink);outline:none;font-size:13px;width:100%}
.li:focus{border-color:var(--gold);background:var(--wh)}
.btn-lg{width:100%;padding:11px;background:var(--ink);color:var(--wh);border:none;border-radius:var(--rs);font-size:13px;font-weight:500;margin-top:4px}
.btn-lg:hover{background:var(--gold-d)}
.lhint{font-size:11px;color:var(--ink3);margin-top:12px}.lhint b{color:var(--ink)}
.lerr{font-size:12px;color:var(--red);background:#FEF2F2;border:1px solid #FECACA;border-radius:var(--rs);padding:7px 11px;margin-bottom:10px}
/* common */
.ph{background:var(--wh);border-bottom:1px solid var(--bg3);padding:14px 16px;flex-shrink:0}
.peyebrow{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--ink3);margin-bottom:3px}
.ptitle{font-family:'Playfair Display',serif;font-size:17px;font-weight:400;color:var(--ink)}
.psub{font-size:11px;color:var(--ink3);margin-top:1px}
.scroll{padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.card{background:var(--wh);border:1px solid var(--bg3);border-radius:var(--r);overflow:hidden}
.chdr{padding:10px 14px;border-bottom:1px solid var(--bg3);display:flex;align-items:center;justify-content:space-between}
.ctitle{font-size:12px;font-weight:500;color:var(--ink)}
.csub{font-size:11px;color:var(--ink3);margin-top:1px}
.cbody{padding:12px 14px}
.chip{font-size:11px;padding:3px 11px;border-radius:20px;font-weight:500;display:inline-flex;align-items:center;gap:5px}
.chip-in{background:#ECFDF5;color:#065F46;border:1px solid #6EE7B7}
.chip-out{background:var(--bg);color:var(--ink3);border:1px solid var(--bg3)}
.chip-warn{background:#FFFBEB;color:#92400E;border:1px solid #FCD34D}
.sb{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500}
.sb-p{background:#FFFBEB;color:#92400E;border:1px solid #FCD34D}
.sb-d{background:#ECFDF5;color:#065F46;border:1px solid #6EE7B7}
.aviso{border-radius:var(--rs);padding:9px 11px;font-size:12px;display:flex;align-items:flex-start;gap:7px;line-height:1.5}
.av-b{background:#EFF6FF;border:1px solid #BFDBFE;color:#1E40AF}
.av-p{background:var(--pl);border:1px solid var(--pb);color:var(--purple)}
.sec{background:var(--wh);border:1px solid var(--bg3);border-radius:var(--r);overflow:hidden}
.sechdr{padding:10px 14px;border-bottom:1px solid var(--bg3);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.sechdr-t{font-size:12px;font-weight:500;color:var(--ink)}
.sectog{font-size:12px;color:var(--ink3);transition:transform .2s}
.sectog.open{transform:rotate(180deg)}
.secbody{padding:12px 14px}
.oa{width:100%;font-size:12px;border:1px solid var(--bg3);border-radius:var(--rs);padding:7px 10px;background:var(--wh);color:var(--ink);outline:none;resize:none;line-height:1.6}
.oa:focus{border-color:var(--gold)}.oa::placeholder{color:var(--bg3)}
.tsw{width:36px;height:20px;border-radius:11px;border:none;position:relative;flex-shrink:0;transition:background .2s}
.tsw.on{background:var(--green)}.tsw.off{background:var(--bg3)}
.tsw::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:var(--wh);top:2px;transition:left .15s}
.tsw.on::after{left:18px}.tsw.off::after{left:2px}
.ubtn{font-size:10px;padding:3px 9px;border-radius:20px;border:1px solid;transition:all .15s}
.ubtn.on.alta{background:#FEF2F2;color:#991B1B;border-color:#FECACA}
.ubtn.on.normal{background:#FFFBEB;color:#92400E;border-color:#FCD34D}
.ubtn:not(.on){background:transparent;color:var(--ink3);border-color:var(--bg3)}
/* ponto */
.preloj{font-size:30px;font-weight:500;color:var(--ink);margin:8px 0;letter-spacing:2px}
.locbox{background:var(--bg);border:1px solid var(--bg3);border-radius:var(--rs);padding:8px 11px;font-size:12px;color:var(--ink2);display:flex;align-items:center;gap:7px;margin-bottom:10px}
.lwarn{font-size:10px;color:#92400E;background:#FFFBEB;padding:1px 6px;border-radius:10px;border:1px solid #FCD34D;white-space:nowrap}
.btp{width:100%;padding:11px;border:none;border-radius:var(--rs);font-size:13px;font-weight:500;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:9px}
.btn-ent{background:var(--green);color:var(--wh)}.btn-sai{background:var(--red);color:var(--wh)}
.preg{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--bg3)}
.preg:last-child{border-bottom:none}
.prico{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.pri-e{background:#ECFDF5}.pri-s{background:#FEF2F2}.pri-w{background:#FFFBEB}
.prinfo{flex:1}.prtipo{font-size:12px;font-weight:500;color:var(--ink)}
.prhora{font-size:11px;color:var(--ink3);margin-top:1px}
.prloc{font-size:10px;color:var(--ink3);margin-top:2px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
/* faltas */
.fitem{border:1px solid var(--bg3);border-radius:var(--rs);overflow:hidden}
.fitem.ferias{border-color:var(--pb)}
.fimain{display:flex;align-items:center;gap:9px;padding:9px 11px}
.fimain.fbg{background:var(--bg2)}.fimain.febg{background:var(--pl)}
.fiico{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.fip{background:#FFFBEB}.fic{background:#FEF2F2}.fife{background:var(--pl)}
.fiinfo{flex:1;min-width:0}
.fidata{font-size:12px;font-weight:500;color:var(--ink)}
.fimot{font-size:11px;color:var(--ink3);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fdias{font-size:11px;color:var(--purple);font-weight:500;margin-top:1px}
.fibdgs{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px}
.fbdg{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;border:1px solid}
.fb-p{background:#FFFBEB;color:#92400E;border-color:#FCD34D}
.fb-c{background:#ECFDF5;color:#065F46;border-color:#6EE7B7}
.fb-r{background:#EFF6FF;color:#1E40AF;border-color:#BFDBFE}
.fb-fe{background:var(--pl);color:var(--purple);border-color:var(--pb)}
.btn-delf{width:20px;height:20px;border-radius:50%;border:none;background:transparent;color:var(--bg3);font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn-delf:hover{background:#FEF2F2;color:var(--red)}
.arow{padding:7px 11px;border-top:1px solid var(--bg3);display:flex;align-items:center;gap:8px;background:var(--wh)}
.arow.tem{background:var(--pl);border-color:var(--pb)}
.arinfo{flex:1;min-width:0}
.arnome{font-size:11px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.arnome.tem{color:var(--purple)}.arnome.sem{color:var(--ink3)}
.arsub{font-size:10px;color:var(--ink3);margin-top:1px}
.btn-up{font-size:11px;padding:3px 9px;border:1px solid var(--bg3);border-radius:var(--rs);background:transparent;color:var(--ink3);position:relative;overflow:hidden}
.btn-up:hover{border-color:var(--purple);color:var(--purple);background:var(--pl)}
.btn-up input{position:absolute;inset:0;opacity:0;width:100%;height:100%}
/* aulas */
.acard{background:var(--wh);border:1px solid var(--bg3);border-radius:var(--r);padding:12px 14px;display:flex;align-items:center;gap:11px;transition:all .18s}
.acard:hover{border-color:var(--gold);box-shadow:0 2px 8px rgba(184,151,90,.09)}
.acard.done{opacity:.6}
.acav{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0}
.av-t{background:#E1F5EE;color:#0F6E56}.av-b{background:#E6F1FB;color:#185FA5}
.av-a{background:#FAEEDA;color:#854F0B}.av-p{background:#EEEDFE;color:#534AB7}
.av-c{background:#FAECE7;color:#993C1D}.av-g{background:#EAF3DE;color:#3B6D11}
.acinfo{flex:1;min-width:0}
.acnome{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:1px}
.acmeta{font-size:11px;color:var(--ink3)}
.acrest{margin-top:4px;font-size:11px;background:#FEF2F2;border-left:2px solid #FCA5A5;padding:2px 7px;color:#991B1B;border-radius:0 3px 3px 0}
.acright{display:flex;align-items:center;gap:5px;flex-shrink:0}
.horapill{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--bg2);color:var(--ink3);border:1px solid var(--bg3)}
.achev{color:var(--bg3);font-size:14px}.acard:hover .achev{color:var(--gold)}
/* rel */
.rel-wrap{display:flex;flex-direction:column;height:100%}
.rtop{background:var(--wh);border-bottom:1px solid var(--bg3);padding:0 14px;display:flex;align-items:center;gap:9px;height:50px;flex-shrink:0}
.btn-bk{background:none;border:none;color:var(--ink3);width:26px;height:26px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:14px}
.btn-bk:hover{background:var(--bg)}
.rhdr{flex:1;min-width:0}
.rnome{font-family:'Playfair Display',serif;font-size:14px;font-weight:400;color:var(--ink)}
.rsub{font-size:11px;color:var(--ink3)}
.btn-sv{padding:5px 14px;background:var(--gold);color:var(--wh);border:none;border-radius:var(--rs);font-size:12px;font-weight:500}
.btn-sv.ok{background:var(--green)}
.rbody{overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:9px;flex:1}
.tcard{background:var(--wh);border:1px solid var(--bg3);border-radius:var(--r);overflow:hidden}
.tchdr{padding:9px 12px;border-bottom:1px solid var(--bg3);display:flex;align-items:center;justify-content:space-between}
.tctitle{font-size:12px;font-weight:500;color:var(--ink)}.tcsub{font-size:10px;color:var(--ink3);margin-top:1px}
.tcbadge{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--bg2);color:var(--ink3);border:1px solid var(--bg3)}
.tcbody{padding:7px 9px}
.tex{display:flex;align-items:center;gap:7px;padding:5px 7px;border-radius:var(--rs)}
.tnum{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;flex-shrink:0;background:var(--bg2);color:var(--ink3)}
.tnum.nd{background:#DBEAFE;color:#1E40AF}.tnum.nt{background:#EDE9FE;color:#6D28D9}
.texinfo{flex:1;min-width:0}
.texnm{font-size:11px;font-weight:500;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.texmeta{font-size:10px;color:var(--ink3)}
.tcarga{font-size:12px;font-weight:500;min-width:24px;text-align:right;flex-shrink:0}
.bee{width:22px;height:22px;border-radius:50%;border:1px solid var(--bg3);background:var(--wh);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--ink3);transition:all .15s;flex-shrink:0}
.bee:hover{border-color:var(--gold);background:var(--gold-l);color:var(--gold-d)}
.bee.hd{border-color:var(--gold);background:var(--gold-l);color:var(--gold-d)}
.bee.hs{border-color:#FCD34D;background:#FFFBEB;color:#92400E}
.tgrp{border:1px solid;border-radius:var(--rs);margin:4px 0;overflow:hidden}
.tghdr{padding:3px 9px;font-size:9px;font-weight:500;letter-spacing:.8px;text-transform:uppercase}
.tgrow{display:flex;align-items:center;gap:7px;padding:6px 9px;border-bottom:1px solid}
.tgrow:last-child{border-bottom:none}
/* hist */
.hday{background:var(--wh);border:1px solid var(--bg3);border-radius:var(--r);overflow:hidden}
.hdhdr{padding:10px 14px;border-bottom:1px solid var(--bg3);display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.hdhdr:hover{background:var(--bg)}
.hddata{font-size:12px;font-weight:500;color:var(--ink)}.hdsub{font-size:11px;color:var(--ink3);margin-top:1px}
.hdbody{padding:9px 12px;display:flex;flex-direction:column;gap:5px}
.haula{display:flex;align-items:center;gap:9px;padding:6px 9px;background:var(--bg);border-radius:var(--rs)}
.haav{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0}
.hainfo{flex:1;min-width:0}.hanome{font-size:12px;font-weight:500;color:var(--ink)}.hameta{font-size:10px;color:var(--ink3)}
.hast{font-size:10px;padding:2px 6px;border-radius:20px;font-weight:500;flex-shrink:0}
.hast-ok{background:#ECFDF5;color:#065F46;border:1px solid #6EE7B7}
.hast-p{background:#FEF2F2;color:#991B1B;border:1px solid #FECACA}
/* meus dados */
.mdhdr{background:var(--wh);border-bottom:1px solid var(--bg3);padding:0 14px;display:flex;align-items:center;gap:9px;height:50px;flex-shrink:0}
.mdtitle{font-family:'Playfair Display',serif;font-size:15px;font-weight:400;color:var(--ink);flex:1}
.btn-edit{font-size:11px;padding:4px 12px;border:1px solid var(--bg3);border-radius:var(--rs);background:transparent;color:var(--ink2)}
.btn-edit.on{background:var(--ink);color:var(--wh);border-color:var(--ink)}
.fldrow{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.fld{display:flex;flex-direction:column;gap:3px}
.flbl{font-size:10px;color:var(--ink3);font-weight:500;letter-spacing:.6px;text-transform:uppercase}
.fval{font-size:13px;color:var(--ink);padding:1px 0}
.finp{padding:7px 10px;border:1px solid var(--bg3);border-radius:var(--rs);background:var(--bg);color:var(--ink);outline:none;font-size:13px;width:100%}
.finp:focus{border-color:var(--gold);background:var(--wh)}
.htag{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg);border-radius:var(--rs);border:1px solid var(--bg3)}
.hdia{font-size:11px;font-weight:500;color:var(--ink);min-width:60px}.hhora{font-size:11px;color:var(--ink2)}
.hbdg{font-size:10px;padding:2px 7px;border-radius:20px;margin-left:auto}
.hb-ok{background:#ECFDF5;color:#065F46;border:1px solid #6EE7B7}
.hb-f{background:var(--bg2);color:var(--ink3);border:1px solid var(--bg3)}
.cv-box{display:flex;align-items:center;gap:9px;padding:9px 11px;background:var(--bg);border-radius:var(--rs);border:1px solid var(--bg3)}
.cv-info{flex:1;min-width:0}
.cv-nome{font-size:12px;font-weight:500;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cv-meta{font-size:10px;color:var(--ink3);margin-top:2px}
.venc-chip{border-radius:var(--rs);padding:8px 11px;font-size:12px;display:flex;align-items:center;gap:7px;line-height:1.5}
.vc-ok{background:#ECFDF5;border:1px solid #6EE7B7;color:#065F46}
.vc-w{background:#FFFBEB;border:1px solid #FCD34D;color:#92400E}
.vc-r{background:#FEF2F2;border:1px solid #FECACA;color:#991B1B}
.uzone-mini{border:1.5px dashed var(--bg3);border-radius:var(--rs);padding:14px;text-align:center;position:relative;display:block;transition:all .2s}
.uzone-mini:hover{border-color:var(--gold);background:var(--gold-l)}
.uzone-mini.tem{border-color:var(--gold);background:var(--gold-l);border-style:solid}
.uzone-mini input{position:absolute;inset:0;opacity:0;width:100%;height:100%}
.hvrow{display:flex;align-items:center;gap:8px;padding:7px 9px;background:var(--bg);border-radius:var(--rs);border:1px solid var(--bg3)}
.hvrow.final{background:#ECFDF5;border-color:#6EE7B7}
.hvinfo{flex:1;min-width:0}
.hvnome{font-size:11px;font-weight:500;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hvmeta{font-size:10px;color:var(--ink3);margin-top:1px}
.hvbdg{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;flex-shrink:0}
.hvb-ok{background:#ECFDF5;color:#065F46;border:1px solid #6EE7B7}
.hvb-v{background:var(--bg2);color:var(--ink3);border:1px solid var(--bg3)}
/* modais */
.overlay{position:fixed;inset:0;background:rgba(28,25,22,.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:14px}
.modal{background:var(--wh);border-radius:var(--r);width:100%;max-width:360px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.22);animation:pop .18s ease}
@keyframes pop{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}

function rModalFalta(){const isF=S.tipoFalta==='ferias';const dias=calcDias(S.nfData,S.nfData2);const ok=(S.tipoFalta==='falta'&&S.nfData)||(isF&&S.nfData&&S.nfData2&&S.nfData2>=S.nfData&&dias>0);return`<div class="overlay" onclick="if(event.target.className==='overlay'){S.modalFalta=false;R();}"><div class="modal" onclick="event.stopPropagation()"><div class="mhdr"><div class="mtitle">Registrar ausência</div><button class="mclose" onclick="S.modalFalta=false;R()">✕</button></div><div class="mbody"><div class="tipo-toggle"><button class="ttbtn ${!isF?'on-f':''}" onclick="S.tipoFalta='falta';R()">🗓 Falta</button><button class="ttbtn ${isF?'on-fe':''}" onclick="S.tipoFalta='ferias';R()">🏖 Férias</button></div><div class="aviso ${isF?'av-p':'av-b'}"><span style="font-size:14px">${isF?'🏖':'🔄'}</span><span>${isF?'Você será removido do rodízio durante todo o período.':'O rodízio será avisado automaticamente para este dia.'}</span></div>${isF?`<div class="drow"><div class="mfield"><label class="mlbl">Início</label><input class="minp" type="date" min="${hoje}" value="${S.nfData}" oninput="S.nfData=this.value;R()"></div><div class="mfield"><label class="mlbl">Fim</label><input class="minp" type="date" min="${hoje}" value="${S.nfData2}" oninput="S.nfData2=this.value;R()"></div></div>${S.nfData&&S.nfData2&&S.nfData2>=S.nfData&&dias>0?`<div class="periodo-box"><span style="font-size:18px">🏖</span><div><div class="pb-t">${new Date(S.nfData+'T12:00').toLocaleDateString('pt-BR',{day:'numeric',month:'short'})} → ${new Date(S.nfData2+'T12:00').toLocaleDateString('pt-BR',{day:'numeric',month:'short',year:'numeric'})}</div><div class="pb-d">${dias} dia${dias!==1?'s':''} corridos fora da escala</div></div></div>`:''}`:`<div class="mfield"><label class="mlbl">Data da falta</label><input class="minp" type="date" min="${hoje}" value="${S.nfData}" oninput="S.nfData=this.value;R()"></div>`}<div class="mfield"><label class="mlbl">Motivo (opcional)</label><textarea class="mta" rows="2" placeholder="${isF?'Ex: Férias anuais…':'Ex: Consulta médica…'}" oninput="S.nfMotivo=this.value">${S.nfMotivo}</textarea></div><div class="mfield"><label class="mlbl">${isF?'Comprovante (opcional)':'Atestado (opcional)'}</label><label class="uzone ${S.nfArq?'tem':''}">${S.nfArq?`<div class="uz-file"><span style="font-size:18px">📄</span><span class="uz-fn">${S.nfArq.nome}</span><button class="btn-uzdel" onclick="event.preventDefault();event.stopPropagation();S.nfArq=null;R()">×</button></div><div style="font-size:11px;color:var(--gold-d);margin-top:3px">Selecionado</div>`:`<div style="font-size:20px;margin-bottom:4px">📎</div><div style="font-size:12px;font-weight:500;color:var(--ink2)">Clique para anexar</div><div style="font-size:11px;color:var(--ink3);margin-top:2px">PDF, JPG ou PNG</div>`}<input type="file" accept=".pdf,.jpg,.jpeg,.png" onchange="const f=this.files[0];if(f){S.nfArq={nome:f.name,tp:f.type.includes('pdf')?'pdf':'img'};R();}"></label><div class="uopt">Você pode anexar depois, na lista</div></div></div><div class="mfooter"><button class="btn-canc" onclick="S.modalFalta=false;R()">Cancelar</button><button class="btn-conf ${isF?'ferias':''}" onclick="salvarFalta()" ${!ok?'disabled':''}>Confirmar ${isF?'férias':'falta'}</button></div></div></div>`;}

function salvarFalta(){const isF=S.tipoFalta==='ferias';if(isF){const dias=calcDias(S.nfData,S.nfData2);const dI=new Date(S.nfData+'T12:00').toLocaleDateString('pt-BR',{day:'numeric',month:'short'});const dF=new Date(S.nfData2+'T12:00').toLocaleDateString('pt-BR',{day:'numeric',month:'short',year:'numeric'});S.faltas.push({id:uid(),tipo:'ferias',dataIni:S.nfData,dataFim:S.nfData2,fmt:`${dI} → ${dF}`,dias,motivo:S.nfMotivo,status:'pend',arq:S.nfArq});}else{const d=new Date(S.nfData+'T12:00');const fmt=d.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'short'});S.faltas.push({id:uid(),tipo:'falta',data:S.nfData,fmt,motivo:S.nfMotivo,status:'pend',arq:S.nfArq});}S.modalFalta=false;R();}

{S.saveOk?'✓ Salvo':'Salvar'}</button></div><div class="rbody">${a.rest?`<div style="background:#FEF2F2;border:1px solid #FECACA;border-radius:var(--rs);padding:7px 11px;font-size:12px;color:#991B1B">⚠ ${a.rest}</div>`:''}<div class="tcard"><div class="tchdr"><div style="display:flex;align-items:center;gap:8px"><div style="width:24px;height:24px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:11px">🖨</div><div><div class="tctitle">Treino impresso · ${ti.nm}</div><div class="tcsub">${ti.st} · ${ti.at} · toque ✎ para editar</div></div></div><div style="display:flex;gap:3px">${com?`<span class="tcbadge" style="background:#ECFDF5;color:#065F46;border-color:#6EE7B7">${com} ✓</span>`:''}<span class="tcbadge">${tot} ex</span></div></div><div class="tcbody">${bHtml}</div></div><div class="sec"><div class="sechdr" onclick="S.so.obs=!S.so.obs;R()"><div class="sechdr-t">Obs. para o próximo professor</div><span class="sectog ${S.so.obs?'open':''}">▾</span></div>${S.so.obs?`<div class="secbody"><textarea class="oa" rows="3" placeholder="Ex: aluno relatou dor…" onchange="S.rel.obs_p=this.value">${a.obs_p}</textarea></div>`:''}</div><div class="sec"><div class="sechdr" onclick="S.so.cont=!S.so.cont;R()"><div class="sechdr-t">Contato com o aluno ${a.cont?`<span style="font-size:10px;padding:1px 7px;border-radius:20px;background:#FEF2F2;color:#991B1B;border:1px solid #FECACA">Solicitado</span>`:''}</div><span class="sectog ${S.so.cont?'open':''}">▾</span></div>${S.so.cont?`<div><div style="display:flex;align-items:center;gap:9px;padding:9px 13px;cursor:pointer" onclick="S.rel.cont=!S.rel.cont;if(!S.so.cont)S.so.cont=true;R()"><button class="tsw ${a.cont?'on':'off'}"></button><div><div style="font-size:12px;color:var(--ink2)">Solicitar contato da coordenação</div><div style="font-size:11px;color:var(--ink3)">Vanessa será notificada</div></div></div>${a.cont?`<div style="padding:0 13px 11px"><textarea class="oa" rows="3" placeho ="const e=fex(S.rel,S.mex);if(e){e.cn=stripKg(this.value);this.classList.toggle('ch',e.cn!==e.ca);}"></div>${ch?`<div style="font-size:11px;color:#059669;align-self:flex-end;padding-bottom:6px">✓</div>`:''}</div></div>`:`<div style="font-size:12px;color:var(--ink3);font-style:italic">Sem carga registrada.</div>`}<div class="mexsec"><div class="mexlbl">Observação</div><textarea class="mta2" rows="3" placeholder="Algo específico desta aula…" onchange="const e=fex(S.rel,S.mex);if(e)e.obs=this.value">${ex.obs}</textarea></div><div class="mexsec"><div class="mexlbl">Solicitações</div>${sh}</div></div><div class="mexfoot"><button class="btn-conc" onclick="S.mex=null;S.sf=null;R()">Concluído</button></div></div></div>`;}

function rHist(){return`<div><div class="ph"><div class="peyebrow">Professor · Rafael Caires</div><div class="ptitle">Histórico</div><div class="psub">Relatórios e pontos anteriores</div></div><div class="scroll">${S.hist.map((d,i)=>{const op=S.hexp[i]!==false;const p=d.al.filter(a=>!a.done).length;return`<div class="hday"><div class="hdhdr" onclick="S.hexp[${i}]=S.hexp[${i}]===false;R()"><div><div class="hddata">${d.data}</div><div class="hdsub">${d.al.length} aulas · ponto ${d.pt.e}–${d.pt.s} (${d.pt.t})</div></div><div style="display:flex;align-items:center;gap:5px">${p?`<span class="sb sb-p">${p} pend.</span>`:`<span class="sb sb-d">✓ Completo</span>`}<span style="font-size:13px;color:var(--bg3);${op?'display:inline-block;transform:rotate(90deg)':''}">›</span></div></div>${op?`<div class="hdbody">${d.al.map(a=>`<div class="haula"><div class="haav ${avc(a.nm)}">${ini(a.nm)}</div><div class="hainfo"><div class="hanome">${a.nm}</div><div class="hameta">${a.h} · ${a.tr}</div></div><span class="hast ${a.done?'hast-ok':'hast-p'}">${a.done?'✓ Feito':'Pendente'}</span></div>`).join('')}</div>`:''}</div>`;}).join('')}</div></div>`;}

function rMeusDados(){const d=S.dados;const dv=diasParaVencer(d.contrato.vigente.vencimento);const vCls=dv<=30?'vc-r':dv<=60?'vc-w':'vc-ok';const vTxt=dv<=30?`⚠ Vence em <b>${dv} dias</b> — renove urgente!`:dv<=60?`⚠ Vence em <b>${dv} dias</b> — fique atento.`:`✓ Vigente por mais <b>${dv} dias</b>`;function fld(lb,val,k){if(S.mdEdit)return`<div class="fld"><div class="flbl">${lb}</div><input class="finp" value="${val}" onchange="S.dados['${k}']=this.value"></div>`;return`<div class="fld"><div class="flbl">${lb}</div><div class="fval">${val}</div></div>`;}const vsHtml=d.contrato.versoes.map((v,i)=>`<div class="hvrow ${v.isFinal?'final':''}"><span style="font-size:15px">📄</span><div class="hvinfo"><div class="hvnome">${v.nome}</div><div class="hvmeta">Enviado em ${v.data}</div></div><span class="hvbdg ${v.isFinal?'hvb-ok':'hvb-v'}">${v.isFinal?'✓ Final':v.current?'Atual':'v'+(i+1)}</span><button style="font-size:10px;padding:2px 8px;border-radius:var(--rs);border:1px solid var(--bg3);background:transparent;color:var(--ink3)">Ver</button></div>`).join('');return`<div style="display:flex;flex-direction:column;height:100%"><div class="mdhdr"><button class="btn-bk">←</button><div class="mdtitle">Meus dados</div><button class="btn-edit ${S.mdEdit?'on':''}" onclick="S.mdEdit=!S.mdEdit;R()">${S.mdEdit?'Salvar':'Editar'}</button></div><div class="content"><div class="scroll"><div class="card"><div class="chdr"><div class="ctitle">👤 Dados pessoais</div></div><div class="cbody" style="display:flex;flex-direction:column;gap:10px">${fld('Nome completo',d.nome,'nome')}<div class="fldrow">${fld('RG',d.rg,'rg')}${fld('CPF',d.cpf,'cpf')}</div>${fld('Endereço',d.endereco,'endereco')}${fld('Chave PIX',d.pix,'pix')}${S.mdEdit?`<div style="font-size:11px;color:var(--ink3);background:var(--bg);border-radius:var(--rs);padding:7px 10px">💡 Alterações são revisadas pelo admin.</div>`:''}</div></div><div class="card"><div class="chdr"><div class="ctitle">🕐 Horário de trabalho</div><span style="font-size:11px;color:var(--ink3)">Definido pela gestão</span></div><div class="cbody" style="display:flex;flex-direction:column;gap:5px">${d.horarios.map(h=>`<div class="htag"><span class="hdia">${h.dia}</span><span class="hhora">${h.hora}</span><span class="hbdg ${h.ativo?'hb-ok':'hb-f'}">${h.ativo?'Trabalhando':'Folga'}</span></div>`).join('')}</div></div><div class="card"><div class="chdr"><div class="ctitle">📋 Contrato de estágio ${dv<=60?`<span style="font-size:10px;padding:1px 7px;border-radius:20px;font-weight:500;${dv<=30?'background:#FEF2F2;color:#991B1B;border:1px solid #FECACA':'background:#FFFBEB;color:#92400E;border:1px solid #FCD34D'}">${dv<=30?'Urgente':'Atenção'}</span>`:''}</div></div><div class="cbody" style="display:flex;flex-direction:column;gap:10px"><div class="venc-chip ${vCls}">${vTxt}</div><div><div class="flbl" style="margin-bottom:5px">Contrato vigente</div><div class="cv-box"><span style="font-size:20px">📄</span><div class="cv-info"><div class="cv-nome">${d.contrato.vigente.nome}</div><div class="cv-meta">Vigência: ${d.contrato.vigente.vigencia} · Vence: ${new Date(d.contrato.vigente.vencimento+'T12:00').toLocaleDateString('pt-BR',{day:'numeric',month:'short',year:'numeric'})}</div></div><button style="font-size:11px;padding:4px 11px;border:1px solid var(--bg3);border-radius:var(--rs);background:transparent;color:var(--ink2)">Ver</button></div></div><div><div class="flbl" style="margin-bottom:5px">Enviar nova versão</div><label class="uzone-mini ${S.mdContratoArq?'tem':''}">${S.mdContratoArq?`<div class="uz-file"><span style="font-size:17px">📄</span><span class="uz-fn">${S.mdContratoArq.nome}</span><button class="btn-uzdel" onclick="event.preventDefault();event.stopPropagation();S.mdContratoArq=null;R()">×</button></div><div style="font-size:11px;color:var(--gold-d);margin-top:3px">Pronto para enviar</div>`:`<div style="font-size:18px;margin-bottom:3px">📎</div><div style="font-size:12px;font-weight:500;color:var(--ink2)">Selecionar arquivo PDF</div><div style="font-size:11px;color:var(--ink3);margin-top:1px">Nova versão do contrato</div>`}<input type="file" accept=".pdf" onchange="const f=this.files[0];if(f){S.mdContratoArq={nome:f.name};R();}"></label>${S.mdContratoArq?`<button class="btn-env" onclick="(function(){const n=S.dados.contrato.versoes.length+1;const hj=new Date().toLocaleDateString('pt-BR',{day:'numeric',month:'short',year:'numeric'});S.dados.contrato.versoes.forEach(v=>v.current=false);S.dados.contrato.versoes.push({id:'v'+n,nome:S.mdContratoArq.nome,data:hj,isFinal:false,current:true});S.dados.contrato.vigente.nome=S.mdContratoArq.nome;S.mdContratoArq=null;R();})()">Enviar nova versão</button>`:''}</div><div><div style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:3px 0" onclick="S.mdHistAberto=!S.mdHistAberto;R()"><span style="font-size:12px;color:var(--ink3);${S.mdHistAberto?'display:inline-block;transform:rotate(90deg)':''}">›</span><span style="font-size:11px;color:var(--ink3)">Histórico de versões (${d.contrato.versoes.length})</span></div>${S.mdHistAberto?`<div style="display:flex;flex-direction:column;gap:5px;margin-top:6px">${vsHtml}</div>`:''}</div></div></div></div></div></div>`;}

S.hist.forEach((_,i)=>S.hexp[i]=false);
R();
</script>
