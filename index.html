<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estúdio Se7e — Sistema Operacional</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#B8975A;--gold-l:#F5EFE4;--gold-d:#8B6B35;--ink:#1C1916;--ink2:#4A453F;--ink3:#8A8278;--bg:#FAF8F4;--bg2:#F0EDE8;--bg3:#E2DDD6;--wh:#FFFFFF;--r:10px;--rs:6px}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);font-size:13px}
input,select,button,textarea{font-family:'DM Sans',sans-serif}

/* NAV LATERAL */
.app{display:flex;height:100vh;overflow:hidden}
.nav{width:220px;background:var(--ink);flex-shrink:0;display:flex;flex-direction:column;overflow-y:auto}
.nav-logo{padding:22px 20px 16px;border-bottom:1px solid rgba(255,255,255,.07)}
.nav-logo-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:400;color:var(--wh);letter-spacing:.3px}
.nav-logo-sub{font-size:10px;color:rgba(255,255,255,.35);margin-top:3px;letter-spacing:1px;text-transform:uppercase}
.nav-section{padding:14px 12px 6px}
.nav-sec-lbl{font-size:9px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1.5px;font-weight:500;padding:0 8px;margin-bottom:4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--rs);cursor:pointer;margin-bottom:2px;border:1px solid transparent;transition:all .15s;color:rgba(255,255,255,.55);font-size:12px}
.nav-item:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.8)}
.nav-item.on{background:rgba(184,151,90,.18);border-color:rgba(184,151,90,.3);color:var(--wh)}
.nav-ico{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;font-size:9px;font-weight:500;padding:1px 6px;border-radius:10px;background:rgba(255,140,0,.25);color:#FCD34D}

/* CONTENT */
.content{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}

/* ─── TELAS ─── */
.screen{display:none;flex-direction:column;flex:1}
.screen.active{display:flex}

/* HEADER PADRÃO */
.ph{background:var(--wh);border-bottom:1px solid var(--bg3);padding:20px 28px 16px;display:flex;align-items:flex-end;justify-content:space-between;flex-shrink:0}
.eyebrow{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--ink3);margin-bottom:4px}
.ptitle{font-family:'Playfair Display',serif;font-size:22px;font-weight:400;color:var(--ink)}
.psub{font-size:11px;color:var(--ink3);margin-top:2px}
.ph-right{display:flex;align-items:center;gap:8px}
.srch{padding:7px 12px;border:1px solid var(--bg3);border-radius:var(--rs);background:var(--bg);color:var(--ink);outline:none;font-size:12px;width:200px}
.srch:focus{border-color:var(--gold)}
.fltrs{display:flex;gap:3px}
.fb{padding:5px 11px;font-size:11px;border:1px solid var(--bg3);background:var(--wh);color:var(--ink3);border-radius:var(--rs);cursor:pointer;transition:all .15s}
.fb.on{background:var(--ink);color:var(--wh);border-color:var(--ink)}
.ph-pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.ph-pill{font-size:11px;font-weight:500;padding:4px 12px;border-radius:20px;border:1px solid}
.pp-a{background:#FFFBEB;color:#92400E;border-color:#FCD34D}
.pp-r{background:#FEF2F2;color:#991B1B;border-color:#FECACA}
.pp-g{background:var(--bg);color:var(--ink3);border-color:var(--bg3)}
.pp-b{background:#EFF6FF;color:#1E40AF;border-color:#BFDBFE}

/* CARDS ALUNO */
.lista{padding:16px 28px;display:flex;flex-direction:column;gap:5px}
.acard{background:var(--wh);border:1px solid var(--bg3);border-radius:var(--r);padding:14px 16px;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:14px}
.acard:hover{border-color:var(--gold);transform:translateY(-1px);box-shadow:0 2px 10px rgba(184,151,90,.09)}
.acard.done{opacity:.6}
.av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0}
.av-t{background:#E1F5EE;color:#0F6E56}.av-b{background:#E6F1FB;color:#185FA5}
.av-a{background:#FAEEDA;color:#854F0B}.av-p{background:#EEEDFE;color:#534AB7}
.av-c{background:#FAECE7;color:#993C1D}.av-g{background:#EAF3DE;color:#3B6D11}
.ainfo{flex:1;min-width:0}
.aname{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:2px}
.ameta{font-size:11px;color:var(--ink3)}
.apnom{font-size:11px;color:var(--ink3);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.arest{margin-top:7px;font-size:11px;background:#FEF2F2;border-left:2px solid #FCA5A5;padding:3px 8px;color:#991B1B;border-radius:0 4px 4px 0}
.aright{display:flex;align-items:center;gap:8px;flex-shrink:0}
.sp{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500}
.sp-ok{background:#ECFDF5;color:#065F46;border:1px solid #6EE7B7}
.sp-exp{background:#FFFBEB;color:#92400E;border:1px solid #FCD34D}
.sp-end{background:#FEF2F2;color:#991B1B;border:1px solid #FECACA}
.sp-no{background:var(--bg);color:var(--ink3);border:1px solid var(--bg3)}
.sp-p{background:#FFFBEB;color:#92400E;border:1px solid #FCD34D}
.sp-d{background:#ECFDF5;color:#065F46;border:1px solid #6EE7B7}
.ptrow{display:flex;align-items:center;gap:9px}
.ptbar{flex:1;height:3px;background:var(--bg2);border-radius:99px;overflow:hidden}
.ptfill{height:100%;border-radius:99px}
.pttxt{font-size:11px;color:var(--ink3);white-space:nowrap}
.hora-badge{font-size:10px;padding:2px 8px;border-radius:20px;background:var(--bg2);color:var(--ink3);border:1px solid var(--bg3)}
.achev{color:var(--bg3);font-size:16px;transition:color .15s}
.acard:hover .achev{color:var(--gold)}
.btn-criar{font-size:11px;padding:5px 12px;background:var(--ink);color:var(--wh);border:none;border-radius:var(--rs);cursor:pointer;font-weight:500}

/* EDITOR */
.editor-shell{display:flex;flex-direction:column;flex:1;overflow:hidden}
.etop{background:var(--wh);border-bottom:1px solid var(--bg3);padding:0 20px;display:flex;align-items:center;gap:12px;height:52px;flex-shrink:0}
.btnbk{background:none;border:none;cursor:pointer;color:var(--ink3);width:28px;height:28px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:15px}
.btnbk:hover{background:var(--bg);color:var(--ink)}
.ehdr{flex:1;min-width:0}
.enome{font-family:'Playfair Display',serif;font-size:15px;font-weight:400;color:var(--ink);background:transparent;border:none;outline:none;width:100%}
.esub{font-size:11px;color:var(--ink3)}
.vtabs{display:flex;border:1px solid var(--bg3);border-radius:var(--rs);overflow:hidden}
.vt{padding:5px 13px;font-size:11px;border:none;background:transparent;color:var(--ink3);cursor:pointer;border-right:1px solid var(--bg3);transition:all .15s}
.vt:last-child{border-right:none}
.vt.on{background:var(--ink);color:var(--wh)}
.vt:not(.on):hover{background:var(--bg)}
.btnsv{padding:6px 18px;background:var(--gold);color:var(--wh);border:none;border-radius:var(--rs);cursor:pointer;font-size:12px;font-weight:500}
.btnsv.ok{background:#059669}
.ebody{display:flex;flex:1;overflow:hidden;min-height:0}
.esidebar{width:195px;flex-shrink:0;background:var(--wh);border-right:1px solid var(--bg3);display:flex;flex-direction:column;overflow-y:auto}
.sbal{padding:16px 14px;border-bottom:1px solid var(--bg3)}
.sbnome{font-family:'Playfair Display',serif;font-size:13px;color:var(--ink);margin-bottom:6px}
.sbtags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px}
.sbtag{font-size:10px;background:var(--bg2);color:var(--ink2);padding:2px 6px;border-radius:3px}
.sbrest{font-size:10px;background:#FEF2F2;border-left:2px solid #FCA5A5;padding:3px 8px;color:#991B1B;border-radius:0 3px 3px 0}
.sbfichas{padding:12px 11px;flex:1}
.sbfhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.sbflbl{font-size:9px;color:var(--ink3);text-transform:uppercase;letter-spacing:1.4px;font-weight:500}
.btnnf{font-size:11px;color:var(--gold-d);background:none;border:none;cursor:pointer;font-weight:500}
.ftab{display:flex;align-items:center;gap:7px;padding:7px 8px;border-radius:var(--rs);cursor:pointer;margin-bottom:2px;border:1px solid transparent;transition:all .12s}
.ftab:hover:not(.on){background:var(--bg)}
.ftab.on{background:var(--gold-l);border-color:rgba(184,151,90,.3)}
.ftl{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0}
.ftl.on{background:var(--gold);color:var(--wh)}
.ftl.off{background:var(--bg2);color:var(--ink3)}
.ftn{font-size:11px;font-weight:500;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ftc{font-size:10px;color:var(--ink3)}
.emain{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.fichatop{background:var(--wh);border-bottom:1px solid var(--bg3);padding:8px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.fninp{flex:1;font-family:'Playfair Display',serif;font-size:14px;font-weight:400;color:var(--ink);background:transparent;border:none;outline:none}
.stimsel{font-size:11px;border:1px solid var(--bg3);border-radius:var(--rs);padding:4px 8px;background:var(--bg);color:var(--ink2);outline:none}
.excnt{font-size:11px;color:var(--ink3)}
.exscroll{flex:1;overflow-y:auto;padding:12px 16px}

/* EXERCÍCIO */
.bloco{background:var(--wh);border:1px solid var(--bg3);border-radius:var(--r);margin-bottom:6px;overflow:hidden}
.exrow{display:flex;align-items:center;gap:10px;padding:10px 14px}
.exnum{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;flex-shrink:0;background:var(--bg2);color:var(--ink3)}
.exnum.nd{background:#DBEAFE;color:#1E40AF}
.exnum.nt{background:#EDE9FE;color:#6D28D9}
.exnc{flex:1;min-width:0}
.exnm{font-size:12px;font-weight:500;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.exgr{font-size:10px;color:var(--ink3);margin-top:1px}
.exfields{display:flex;align-items:center;gap:6px;flex-shrink:0}
.ef{display:flex;flex-direction:column;align-items:center;width:54px}
.ef-lbl{font-size:9px;color:var(--ink3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:3px;font-weight:500}
.ef-inp{width:54px;text-align:center;font-size:18px;font-weight:500;color:var(--ink);border:1px solid var(--bg3);border-radius:var(--rs);padding:6px 4px;background:var(--wh);outline:none}
.ef-inp:focus{border-color:var(--gold);background:var(--gold-l)}
.ef-carga{font-size:14px;font-weight:500;color:var(--ink3);padding:6px 4px;width:54px;text-align:center}
.btnrm{width:20px;height:20px;border-radius:50%;border:none;background:transparent;cursor:pointer;color:var(--bg3);font-size:14px;display:flex;align-items:center;justify-content:center}
.btnrm:hover{background:#FEF2F2;color:#DC2626}
.obsrow{padding:0 14px 8px 44px}
.oi{width:100%;font-size:11px;border:1px solid var(--bg3);border-radius:var(--rs);padding:4px 10px;background:transparent;color:var(--ink);outline:none}
.oi:focus{border-color:var(--gold)}
.oi::placeholder{color:var(--bg3)}
.grprow{padding:0 14px 9px 44px}
.btngrp{font-size:10px;padding:3px 10px;background:var(--bg);color:var(--ink2);border:1px solid var(--bg3);border-radius:var(--rs);cursor:pointer}
.btngrp:hover{background:#EFF6FF;color:#1E40AF;border-color:#BFDBFE}
.gbloco{border-radius:var(--rs);margin-bottom:6px;overflow:hidden}
.ghdr{padding:7px 14px;display:flex;align-items:center;justify-content:space-between}
.glbl{font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase}
.gacts{display:flex;gap:5px}
.btngd{font-size:10px;padding:3px 9px;border:1px solid #FECACA;color:#DC2626;border-radius:var(--rs);cursor:pointer;background:transparent}
.gbody{background:var(--wh)}
.gexrow{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid}
.buscabar{background:var(--wh);border-top:1px solid var(--bg3);padding:9px 14px;flex-shrink:0;position:relative}
.binp{width:100%;padding:8px 12px;border:1px solid var(--bg3);border-radius:var(--r);background:var(--bg);color:var(--ink);outline:none;font-size:12px}
.binp:focus{border-color:var(--gold);background:var(--wh)}
.binp::placeholder{color:var(--bg3)}
.dd{position:absolute;bottom:calc(100%+2px);left:14px;right:14px;background:var(--wh);border:1px solid var(--bg3);border-radius:var(--r);overflow:hidden;z-index:50;max-height:200px;overflow-y:auto;box-shadow:0 -4px 20px rgba(0,0,0,.07)}
.ddi{padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--bg);transition:background .1s}
.ddi:last-child{border-bottom:none}
.ddi:hover{background:var(--gold-l)}
.ddn{font-size:12px;font-weight:500;color:var(--ink)}
.ddg{font-size:10px;color:var(--ink3);margin-top:1px}

/* COMPARAR */
.cshell{flex:1;overflow-x:auto;display:flex;flex-direction:column;background:var(--bg2);min-height:0}
.ccols{display:flex;flex:1;overflow-y:auto}
.ccol{min-width:260px;max-width:320px;flex:1;background:var(--wh);border-right:1px solid var(--bg3);display:flex;flex-direction:column}
.ccol:last-child{border-right:none}
.cchdr{padding:12px 14px;border-bottom:1px solid var(--bg3);display:flex;align-items:center;gap:9px;background:var(--wh);position:sticky;top:0;z-index:2}
.ccletra{width:26px;height:26px;border-radius:50%;background:var(--ink);color:var(--wh);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0}
.ccnome{font-family:'Playfair Display',serif;font-size:13px;color:var(--ink)}
.ccsub{font-size:10px;color:var(--ink3);margin-top:1px}
.ccbody{padding:9px 11px;overflow-y:auto;flex:1}
.cex{background:var(--bg);border:1px solid var(--bg3);border-radius:var(--rs);margin-bottom:4px;overflow:hidden}
.cexrow{display:flex;align-items:center;gap:7px;padding:7px 10px}
.cnum{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;flex-shrink:0;background:var(--bg3);color:var(--ink2)}
.cnum.cd{background:#DBEAFE;color:#1E40AF}
.cnum.ct{background:#EDE9FE;color:#6D28D9}
.cexinf{flex:1;min-width:0}
.cexnm{font-size:11px;font-weight:500;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cexgr{font-size:10px;color:var(--ink3)}
.cexfl{font-size:10px;color:var(--ink2);white-space:nowrap}
.cgrp{border-radius:var(--rs);margin-bottom:4px;overflow:hidden}
.cghdr{padding:5px 10px;font-size:10px;font-weight:500;letter-spacing:.7px;text-transform:uppercase}
.cgbody{background:var(--wh)}
.cgrow{display:flex;align-items:center;gap:7px;padding:6px 10px;border-bottom:1px solid}
.cmuscles{padding:9px 11px;border-top:1px solid var(--bg3);background:var(--bg2);flex-shrink:0}
.cmlbl{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);margin-bottom:5px;font-weight:500}
.cmtags{display:flex;flex-wrap:wrap;gap:3px}
.cmtag{font-size:10px;padding:2px 8px;border-radius:var(--rs)}

/* AULA DADA */
.tcard{background:var(--wh);border:1px solid var(--bg3);border-radius:var(--r);overflow:hidden}
.tchdr{padding:10px 16px;border-bottom:1px solid var(--bg3);display:flex;align-items:center;justify-content:space-between}
.tcico{width:28px;height:28px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:12px}
.tctitle{font-size:12px;font-weight:500;color:var(--ink)}
.tcsub{font-size:10px;color:var(--ink3);margin-top:1px}
.tcbadge{font-size:10px;padding:2px 9px;border-radius:20px;background:var(--bg2);color:var(--ink3);border:1px solid var(--bg3)}
.tcbody{padding:8px 12px}
.tex{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--rs)}
.tnum{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;flex-shrink:0;background:var(--bg2);color:var(--ink3)}
.tnum.nd{background:#DBEAFE;color:#1E40AF}.tnum.nt{background:#EDE9FE;color:#6D28D9}
.texinfo{flex:1;min-width:0}
.texnm{font-size:12px;font-weight:500;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.texmeta{font-size:10px;color:var(--ink3);margin-top:1px}
.tex-carga{font-size:13px;font-weight:500;min-width:28px;text-align:right;flex-shrink:0}
.btn-edit-ex{width:26px;height:26px;border-radius:50%;border:1px solid var(--bg3);background:var(--wh);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--ink3);transition:all .15s;flex-shrink:0}
.btn-edit-ex:hover{border-color:var(--gold);background:var(--gold-l);color:var(--gold-d)}
.btn-edit-ex.has-data{border-color:var(--gold);background:var(--gold-l);color:var(--gold-d)}
.btn-edit-ex.has-sol{border-color:#FCD34D;background:#FFFBEB;color:#92400E}
.tgrp{border:1px solid;border-radius:var(--rs);margin:5px 0;overflow:hidden}
.tghdr{padding:4px 10px;font-size:9px;font-weight:500;letter-spacing:.8px;text-transform:uppercase}
.tgrow{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid}
.tgrow:last-child{border-bottom:none}
.sec{background:var(--wh);border:1px solid var(--bg3);border-radius:var(--r);overflow:hidden}
.sec-hdr{padding:10px 16px;border-bottom:1px solid var(--bg3);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.sec-title{font-size:12px;font-weight:500;color:var(--ink);display:flex;align-items:center;gap:8px}
.sec-badge{font-size:10px;padding:1px 7px;border-radius:20px}
.sec-tog{font-size:12px;color:var(--ink3);transition:transform .2s}
.sec-tog.open{transform:rotate(180deg)}
.sec-body{padding:12px 16px}
.obs-area{width:100%;font-size:12px;border:1px solid var(--bg3);border-radius:var(--rs);padding:8px 12px;background:var(--wh);color:var(--ink);outline:none;resize:none;line-height:1.6;min-height:72px}
.obs-area:focus{border-color:var(--gold)}
.obs-area::placeholder{color:var(--bg3)}
.contato-toggle{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer}
.tsw{width:38px;height:22px;border-radius:11px;border:none;cursor:pointer;position:relative;flex-shrink:0;transition:background .2s}
.tsw.on{background:#059669}.tsw.off{background:var(--bg3)}
.tsw::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:var(--wh);top:2px;transition:left .15s}
.tsw.on::after{left:18px}.tsw.off::after{left:2px}
.cbody{padding:0 16px 14px}
.curg{display:flex;align-items:center;gap:8px;margin-top:8px}
.ulbl{font-size:11px;color:var(--ink3)}
.ubtn{font-size:10px;padding:3px 10px;border-radius:20px;cursor:pointer;border:1px solid;transition:all .15s}
.ubtn.on.alta{background:#FEF2F2;color:#991B1B;border-color:#FECACA}
.ubtn.on.normal{background:#FFFBEB;color:#92400E;border-color:#FCD34D}
.ubtn:not(.on){background:transparent;color:var(--ink3);border-color:var(--bg3)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(28,25,22,.5);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal-box{background:var(--wh);border-radius:var(--r);width:100%;max-width:480px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:pop .18s ease}
@keyframes pop{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}

function showScreen(id){
  currentScreen=id;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('on'));
  const navEl=document.getElementById('nav-'+id);
  if(navEl)navEl.classList.add('on');
  renderScreen();
}

function renderScreen(){
  const c=document.getElementById('content');
  if(currentScreen==='treino') renderTreinoScreen(c);
  else if(currentScreen==='aula') renderAulaScreen(c);
  else if(currentScreen==='fila') renderFilaScreen(c);
  else if(currentScreen==='agenda') renderAgendaScreen(c);
}

function ring(pct,st){
  const r=17,c=2*Math.PI*r,off=c-(c*pct/100);
  const col=st==='completed'?'#DC2626':st==='expiring'?'#D97706':'#B8975A';
  const trk=st==='completed'?'#FEE2E2':st==='expiring'?'#FEF3C7':'#F5EFE4';
  return `<svg width="46" height="46" style="flex-shrink:0"><circle cx="23" cy="23" r="${r}" fill="none" stroke="${trk}" stroke-width="3"/><circle cx="23" cy="23" r="${r}" fill="none" stroke="${col}" stroke-width="3" stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" stroke-linecap="round" transform="rotate(-90 23 23)"/><text x="23" y="27" text-anchor="middle" font-size="10" font-weight="500" fill="${col}" font-family="'DM Sans',sans-serif">${pct}%</text></svg>`;
}

function renderTreinoScreen(c){
  if(T.sel){
    renderTreinoEditor(c);
  } else {
    renderTreinoLista(c);

}

function treinoAbrirEditor(id){
  const a=ALUNOS_TREINO.find(x=>x.id===id);
  if(!a)return;
  a._fichas=a.prog?JSON.parse(JSON.stringify(a.prog.fichas)):[{id:uid(),letra:'A',nome:'Treino A',stim:'Rest Pause',blocos:[]}];
  a._nome=a.prog?a.prog.name:`Programa ${a.obj}`;
  T.sel=a;T.fidx=0;T.bex='';T.showDD=false;T.view='edit';
  renderScreen();
}

function treinoGetFicha(){return T.sel._fichas[Math.min(T.fidx,T.sel._fichas.length-1)];}
function treinoFindEx(id){for(const bl of treinoGetFicha().blocos){if(bl.type==='single'&&bl.ex.id===id)return bl.ex;if(bl.type==='group'){const e=bl.exs.find(x=>x.id===id);if(e)return e;}}return null;}
function treinoUpdEx(id,f,v){const e=treinoFindEx(id);if(e)e[f]=v;}
function treinoRmEx(id){treinoGetFicha().blocos=treinoGetFicha().blocos.filter(b=>!(b.type==='single'&&b.ex.id===id));renderScreen();}
function treinoAddEx(id){const e=CAT.find(x=>x.id===id);if(!e)return;treinoGetFicha().blocos.push({type:'single',ex:{id:uid(),n:e.n,g:e.g,s:'3',r:'12',d:'60',obs:'',carga:'—'}});T.bex='';T.showDD=false;renderScreen();}
function treinoAgrupar(bi){const bl=treinoGetFicha().blocos,nx=bl.findIndex((b,i)=>i>bi&&b.type==='single');if(nx===-1)return;const exA=bl[bi].ex,exB=bl[nx].ex,nv=bl.filter((_,i)=>i!==bi&&i!==nx);nv.splice(bi,0,{type:'group',label:'Dupla',exs:[exA,exB]});treinoGetFicha().blocos=nv;renderScreen();}
function treinoAddToGrp(bi){const bl=treinoGetFicha().blocos,nx=bl.findIndex((b,i)=>i>bi&&b.type==='single');if(nx===-1)return;const ex=bl[nx].ex;bl.splice(nx,1);bl[bi]={...bl[bi],label:'Trio',exs:[...bl[bi].exs,ex]};renderScreen();}
function treinoDesagrupar(bi){const g=treinoGetFicha().blocos[bi];treinoGetFicha().blocos=[...treinoGetFicha().blocos.slice(0,bi),...g.exs.map(ex=>({type:'single',ex})),...treinoGetFicha().blocos.slice(bi+1)];renderScreen();}
function treinoAddFicha(){const l='ABCDEFGHIJKLMNOPQRSTUVWXYZ'[T.sel._fichas.length]||String(T.sel._fichas.length+1);T.sel._fichas.push({id:uid(),letra:l,nome:'Treino '+l,stim:'Padrão',blocos:[]});T.fidx=T.sel._fichas.length-1;T.view='edit';renderScreen();}
function treinoSalvar(){const a=T.sel,goal=a.freq*8,prog={id:a.prog?a.prog.id:uid(),name:a._nome,completed:a.prog?a.prog.completed:0,goal,fichas:JSON.parse(JSON.stringify(a._fichas))};const idx=ALUNOS_TREINO.findIndex(x=>x.id===a.id);if(idx>-1)ALUNOS_TREINO[idx].prog=prog;T.saveOk=true;renderScreen();setTimeout(()=>{T.saveOk=false;T.sel=null;renderScreen();},900);}

      <input class="srch" placeholder="Buscar aluno…" value="${AD.busca}" oninput="AD.busca=this.value;renderScreen()">
    </div>
    <div class="lista">${ALUNOS_AULA.filter(a=>!AD.busca||a.name.toLowerCase().includes(AD.busca.toLowerCase())).map(a=>`
      <div class="acard ${a.done?'done':''}" onclick="aulaAbrirRel(${a.id})">
        <div class="av ${avc(a.name)}">${ini(a.name)}</div>
        <div class="ainfo">
          <div class="aname">${a.name}</div>
          <div class="ameta">mat. ${a.mat} · ${a.treino} · seq. ${a.seq}</div>
          ${a.restricoes?`<div class="arest">⚠ ${a.restricoes}</div>`:''}
        </div>
        <div class="aright">
          <span class="hora-badge">${a.hora}</span>
          <span class="sp ${a.done?'sp-d':'sp-p'}">${a.done?'✓ Feito':'Pendente'}</span>
          <span class="achev">›</span>
        </div>
      </div>`).join('')}
    </div>
  </div>`;
}

function aulaAbrirRel(id){AD.sel=ALUNOS_AULA.find(x=>x.id===id);AD.saveOk=false;AD.modalEx=null;AD.solForm=null;renderScreen();}
function aulaVoltar(){AD.sel=null;renderScreen();}

function renderAulaRel(c){
  const a=AD.sel;
  const ti=a.treino_impresso;
  let n=0;
  const totalEx=ti.blocos.reduce((acc,b)=>acc+(b.type==='single'?1:b.exs.length),0);
  const comDados=getAllExsAula(a).filter(e=>e.cn!==e.ca||e.obs.trim()).length;
  const solEnv=getAllExsAula(a).filter(e=>e.sol&&e.sol.sent).length;

  const bHtml=ti.blocos.map(bl=>{
    if(bl.type==='single'){n++;const ex=bl.ex;const isDash=ex.ca==='—';const changed=!isDash&&ex.cn!==ex.ca;
      return `<div class="tex"><div class="tnum">${n}</div>
        <div class="texinfo"><div class="texnm" title="${ex.n}">${ex.n}</div><div class="texmeta">${ex.s}×${ex.r}${ex.d!=='0'?' · '+ex.d+'s':''}</div></div>
        ${!isDash?`<div class="tex-carga" style="color:${changed?'#059669':'var(--ink2)'}">${changed?ex.cn:ex.ca}</div>`:''}
        <button class="btn-edit-ex ${ex.sol&&ex.sol.sent?'has-sol':ex.cn!==ex.ca||ex.obs.trim()?'has-data':''}" onclick="aulaAbrirModal('${ex.id}')">✎</button>
      </div>`;}
    const d=bl.label==='Dupla';
    const gc=d?{bg:'#EFF6FF',bd:'#BFDBFE',tc:'#1E40AF',rb:'#DBEAFE',cls:'nd'}:{bg:'#F5F3FF',bd:'#C4B5FD',tc:'#6D28D9',rb:'#EDE9FE',cls:'nt'};
    return `<div class="tgrp" style="border-color:${gc.bd}">
      <div class="tghdr" style="background:${gc.bg};color:${gc.tc}">${bl.label} — sem descanso</div>
      <div style="background:var(--wh)">${bl.exs.map((ex,ei)=>{n++;const il=ei===bl.exs.length-1;const isDash=ex.ca==='—';const changed=!isDash&&ex.cn!==ex.ca;return `
        <div class="tgrow" style="border-color:${il?'transparent':gc.rb}">
          <div class="tnum ${gc.cls}">${n}</div>
          <div class="texinfo" style="flex:1"><div class="texnm">${ex.n}</div><div class="texmeta">${ex.s}×${ex.r}${il?' · '+ex.d+'s':''}</div></div>
          ${!isDash?`<div class="tex-carga" style="color:${changed?'#059669':'var(--ink2)'}">${changed?ex.cn:ex.ca}</div>`:''}
          <button class="btn-edit-ex ${ex.sol&&ex.sol.sent?'has-sol':ex.cn!==ex.ca||ex.obs.trim()?'has-data':''}" onclick="aulaAbrirModal('${ex.id}')">✎</button>
        </div>`}).join('')}
      </div>
    </div>`;
  }).join('');

  const modalHtml=AD.modalEx?renderAulaModal(a):'';

  c.innerHTML=`<div style="display:flex;flex-direction:column;flex:1;overflow:hidden">
    <div class="etop">
      <button class="btnbk" onclick="aulaVoltar()">←</button>
      <div class="ehdr"><div class="enome" style="background:transparent;border:none;outline:none;font-family:'Playfair Display',serif;font-size:15px">${a.name}</div>
        <div class="esub">mat. ${a.mat} · ${a.treino} · seq. ${a.seq} · ${a.hora}</div>
      </div>
      <button class="btnsv ${AD.saveOk?'ok':''}" onclick="aulaSalvar()">${AD.saveOk?'✓ Salvo':'Salvar relatório'}</button>
    </div>
    <div style="overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:10px;flex:1">
      ${a.restricoes?`<div style="background:#FEF2F2;border:1px solid #FECACA;border-radius:var(--rs);padding:8px 14px;font-size:12px;color:#991B1B">⚠ ${a.restricoes}</div>`:''}
      <div class="tcard">
        <div class="tchdr">
          <div style="display:flex;align-items:center;gap:10px">
            <div class="tcico">🖨</div>
            <div><div class="tctitle">Treino impresso · ${ti.nome}</div><div class="tcsub">${ti.stim} · ${ti.impresso_at} · clique ✎ para editar</div></div>
          </div>
          <div style="display:flex;gap:5px">
            ${comDados?`<span class="tcbadge" style="background:#ECFDF5;color:#065F46;border-color:#6EE7B7">${comDados} atualizado${comDados>1?'s':''}</span>`:''}
            ${solEnv?`<span class="tcbadge" style="background:#FFFBEB;color:#92400E;border-color:#FCD34D">${solEnv} sol. enviada${solEnv>1?'s':''}</span>`:''}
            <span class="tcbadge">${totalEx} exercícios</span>
          </div>
        </div>
        <div class="tcbody">${bHtml}</div>
      </div>
      <div class="sec">
        <div class="sec-hdr" onclick="aulaToggleSec('obs_prof')">
          <div class="sec-title">Obs. para o próximo professor</div>
          <span class="sec-tog ${AD.secOpen.obs_prof?'open':''}">▾</span>
        </div>
        ${AD.secOpen.obs_prof?`<div class="sec-body">
          <div style="font-size:11px;color:var(--ink3);margin-bottom:6px">Visível apenas para o próximo professor.</div>
          <textarea class="obs-area" rows="3" placeholder="Ex: Aluno relatou dor no joelho…" onchange="AD.sel.obs_prox_prof=this.value">${a.obs_prox_prof}</textarea>
        </div>`:''}
      </div>
      <div class="sec">
        <div class="sec-hdr" onclick="aulaToggleSec('contato')">
          <div class="sec-title">Contato com o aluno ${a.contato?`<span class="sec-badge" style="background:#FEF2F2;color:#991B1B;border:1px solid #FECACA">Solicitado</span>`:''}</div>
          <span class="sec-tog ${AD.secOpen.contato?'open':''}">▾</span>
        </div>
        ${AD.secOpen.contato?`<div>
          <div class="contato-toggle" onclick="aulaToggleContato()">
            <button class="tsw ${a.contato?'on':'off'}"></button>
            <div><div style="font-size:12px;color:var(--ink2)">Solicitar contato da coordenação</div><div style="font-size:11px;color:var(--ink3)">Vanessa será notificada</div></div>
          </div>
          ${a.contato?`<div class="cbody">
            <textarea class="obs-area" rows="3" placeholder="Descreva o motivo…" onchange="AD.sel.contato_motivo=this.value">${a.contato_motivo}</textarea>
            <div class="curg"><span class="ulbl">Urgência:</span>
              <button class="ubtn ${a.contato_urgencia==='normal'?'on normal':''}" onclick="AD.sel.contato_urgencia='normal';renderScreen()">Normal</button>
              <button class="ubtn ${a.contato_urgencia==='alta'?'on alta':''}" onclick="AD.sel.contato_urgencia='alta';renderScreen()">Alta</button>
            </div>
          </div>`:''}
        </div>`:''}
      </div>
    </div>
    ${modalHtml}
  </div>`;
}

function renderAulaModal(a){
  const ex=findExAula(a,AD.modalEx);if(!ex)return'';
  const isDash=ex.ca==='—';const changed=!isDash&&ex.cn!==ex.ca;
  let solHtml='';
  if(ex.sol&&ex.sol.sent){solHtml=`<div class="sol-sent">✓ Solicitação enviada (${ex.sol.tipo}) — aguardando Vanessa</div>`;}
  else if(AD.solForm){
    const isTroca=AD.solForm.tipo==='troca';
    solHtml=`<div class="sol-form">
      <div class="sol-form-title">${isTroca?'Solicitar troca':'Solicitar remoção'}</div>
      ${isTroca?`<input class="sol-inp" placeholder="Exercício sugerido…" oninput="AD.solForm.sugestao=this.value" value="${AD.solForm.sugestao||''}">`:''}
      <textarea class="ms-textarea" rows="2" placeholder="Motivo…" onchange="AD.solForm.motivo=this.value">${AD.solForm.motivo||''}</textarea>
      <div class="sol-acts" style="display:flex;gap:8px;margin-top:8px">
        <button class="btn-env" onclick="aulaEnviarSol('${ex.id}')">Enviar para Vanessa</button>
        <button class="btn-can" onclick="AD.solForm=null;renderScreen()">Cancelar</button>
      </div>
    </div>`;
  } else {
    solHtml=`<div class="sol-btns">
      <button class="sol-btn sb-troca" onclick="AD.solForm={tipo:'troca',sugestao:'',motivo:''};renderScreen()">↔ Trocar exercício</button>
      <button class="sol-btn sb-remov" onclick="AD.solForm={tipo:'remover',sugestao:'',motivo:''};renderScreen()">✕ Solicitar remoção</button>
    </div>`;
  }
  return `<div class="modal-overlay" onclick="aulaFecharModal(event)">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="ms-hdr">
        <div><div class="ms-title">${ex.n}</div><div class="ms-sub">${ex.g} · ${ex.s}×${ex.r}${ex.d!=='0'?' · desc. '+ex.d+'s':''}</div></div>
        <button class="ms-close" onclick="aulaFecharModal()">✕</button>
      </div>
      <div class="ms-body">
        ${ex.pref?`<div class="pref-box"><span style="font-size:14px;color:var(--gold)">★</span><span>${ex.pref}</span></div>`:''}
        ${!isDash?`<div class="ms-section">
          <div class="ms-lbl">Carga</div>
          <div class="carga-row">
            <div class="cf"><div class="cf-lbl2">Anterior</div><div class="cf-static">${ex.ca}</div></div>
            <div class="cf-arrow">→</div>
            <div class="cf"><div class="cf-lbl2">Nova carga</div><input class="cf-inp ${changed?'changed':''}" value="${ex.cn}" onchange="aulaUpdCarga('${ex.id}',this.value)"></div>
            ${changed?`<div style="font-size:11px;color:#059669;align-self:flex-end;padding-bottom:8px">✓ alterada</div>`:''}
          </div>
        </div>`:`<div style="font-size:12px;color:var(--ink3);font-style:italic">Sem carga registrada.</div>`}
        <div class="ms-section">
          <div class="ms-lbl">Observação desta aula</div>
          <textarea class="ms-textarea" rows="3" placeholder="Algo específico que aconteceu hoje…" onchange="aulaUpdObs('${ex.id}',this.value)">${ex.obs}</textarea>
        </div>
        <div class="ms-section"><div class="ms-lbl">Solicitações</div>${solHtml}</div>
      </div>
      <div class="ms-footer"><button class="btn-concluir" onclick="aulaFecharModal()">Concluído</button></div>
    </div>
  </div>`;
}

function aulaAbrirModal(id){AD.modalEx=id;AD.solForm=null;renderScreen();}
function aulaFecharModal(e){if(e&&e.target.className!=='modal-overlay')return;AD.modalEx=null;AD.solForm=null;renderScreen();}
function aulaToggleSec(k){AD.secOpen[k]=!AD.secOpen[k];renderScreen();}
function aulaToggleContato(){AD.sel.contato=!AD.sel.contato;if(!AD.secOpen.contato)AD.secOpen.contato=true;renderScreen();}
function aulaUpdCarga(id,val){const ex=findExAula(AD.sel,id);if(ex){ex.cn=stripKg(val);const inp=document.querySelector('.cf-inp');if(inp)inp.classList.toggle('changed',ex.cn!==ex.ca);}}
function aulaUpdObs(id,val){const ex=findExAula(AD.sel,id);if(ex)ex.obs=val;}
function aulaEnviarSol(id){const ex=findExAula(AD.sel,id);if(!AD.solForm)return;ex.sol={...AD.solForm,sent:true};AD.solForm=null;renderScreen();}
function aulaSalvar(){AD.sel.done=true;AD.saveOk=true;renderScreen();setTimeout(()=>{AD.saveOk=false;AD.sel=null;renderScreen();},1000);}

// ════════════════════════════════════════
//  FILA DA VANESSA
// ════════════════════════════════════════
function renderFilaScreen(c){
  const totalPend=FILA_ALUNOS.reduce((acc,a)=>acc+a.solicitacoes.filter(s=>s.status==='pend').length,0);
  const totalCont=FILA_ALUNOS.reduce((acc,a)=>acc+a.solicitacoes.filter(s=>s.status==='pend'&&s.tipo==='contato').length,0);

  let alunos=FILA_ALUNOS.map(a=>{
    const sols=a.solicitacoes.filter(s=>{
      if(FV.filtro==='pend')return s.status==='pend';
      if(FV.filtro==='resolvidos')return s.status!=='pend';
      if(FV.filtro==='contato')return s.tipo==='contato';
      if(FV.filtro==='obs_prof')return s.tipo==='obs_prof';
      return true;
    });
    return{...a,solicitacoes:sols};
  }).filter(a=>a.solicitacoes.length>0);

  const cards=alunos.map(a=>{
    const isOpen=FV.expandido[a.id]!==false;
    const pend=a.solicitacoes.filter(s=>s.status==='pend');
    const tipos=[...new Set(a.solicitacoes.map(s=>s.tipo))];
    const badgesHtml=tipos.map(t=>{const cfg=TIPO_CFG[t];const n=a.solicitacoes.filter(s=>s.tipo===t&&s.status==='pend').length;return n>0?`<span class="badge ${cfg.badge}">${n} ${cfg.label}</span>`:''}).join('');
    const solsHtml=a.solicitacoes.map(sol=>{
      const cfg=TIPO_CFG[sol.tipo];const isDone=sol.status!=='pend';
      let actionHtml='';
      if(isDone){actionHtml=`<span class="sol-resolved ${sol.status==='apr'?'sr-apr':'sr-rej'}">${sol.status==='apr'?'✓ Aprovado':'✕ Rejeitado'}</span>`;}
      else if(sol.tipo==='obs_prof'||sol.tipo==='contato'){actionHtml=`<div class="sol-actions"><button class="btn-apr" onclick="filaResolver('${a.id}','${sol.id}','apr')">Ciente</button><span class="sol-date">${sol.data}</span></div>`;}
      else if(FV.rejForm[sol.id]!==undefined){actionHtml=`<div class="rej-form"><input class="rej-inp" placeholder="Motivo da rejeição (opcional)…" oninput="FV.rejForm['${sol.id}']=this.value" value="${FV.rejForm[sol.id]||''}"><div class="rej-acts"><button class="btn-rej-conf" onclick="filaResolver('${a.id}','${sol.id}','rej')">Confirmar rejeição</button><button class="btn-rej-can" onclick="delete FV.rejForm['${sol.id}'];renderScreen()">Cancelar</button></div></div>`;}
      else{actionHtml=`<div class="sol-actions"><button class="btn-apr" onclick="filaResolver('${a.id}','${sol.id}','apr')">✓ Aprovar</button><button class="btn-rej" onclick="FV.rejForm['${sol.id}']='';renderScreen()">✕ Rejeitar</button><span class="sol-date">${sol.data}</span></div>`;}
      return `<div class="sol-item ${isDone?'resolved':''}">
        <div class="sol-top">
          <div class="sol-ico ${cfg.icoCls}">${cfg.ico}</div>
          <div class="sol-info">
            <div class="sol-tipo ${cfg.tc}">${cfg.label}${sol.urgencia==='alta'?' <span style="color:#991B1B;font-size:9px">● URGENTE</span>':''}</div>
            ${sol.ex?`<div class="sol-ex">${sol.ex}</div>`:''}
            <div class="sol-prof">Prof: ${sol.prof}</div>
            ${sol.motivo?`<div class="sol-motivo">"${sol.motivo}"</div>`:''}
            ${sol.sugestao?`<div class="sol-sugestao">Sugestão: ${sol.sugestao}</div>`:''}
            ${actionHtml}
          </div>
          ${isDone?`<span class="sol-date" style="flex-shrink:0">${sol.data}</span>`:''}
        </div>
      </div>`;
    }).join('');
    return `<div class="fv-acard">
      <div class="fv-achdr" onclick="filaToggleAluno('${a.id}')">
        <div class="av ${avc(a.name)}">${ini(a.name)}</div>
        <div><div class="aname">${a.name}</div><div class="ameta">mat. ${a.mat} · ${a.treino}</div></div>
        <div class="fv-badges">${badgesHtml}</div>
        <span class="fv-chevron ${isOpen?'open':''}">›</span>
      </div>
      ${isOpen?`<div>${solsHtml}</div>`:''}
    </div>`;
  }).join('');

  c.innerHTML=`<div style="display:flex;flex-direction:column;flex:1">
    <div class="ph">
      <div>
        <div class="eyebrow">Coordenador · Vanessa Ramos</div>
        <div class="ptitle">Fila de solicitações</div>
        <div class="psub">Separadas por aluno</div>
        ${totalPend?`<div class="ph-pills">
          <span class="ph-pill pp-a">⚠ ${totalPend} pendente${totalPend>1?'s':''}</span>
          ${totalCont?`<span class="ph-pill pp-r">✉ ${totalCont} contato${totalCont>1?'s':''} urgente${totalCont>1?'s':''}</span>`:''}
        </div>`:''}
      </div>
      <div class="fltrs">${[['todos','Todos'],['pend','Pendentes'],['resolvidos','Resolvidos'],['contato','Contatos'],['obs_prof','Obs. prof']].map(([v,l])=>`<button class="fb ${FV.filtro===v?'on':''}" onclick="FV.filtro='${v}';renderScreen()">${l}</button>`).join('')}</div>
    </div>
    <div class="lista">${cards||`<div class="empty-state"><div class="empty-ico">✓</div><div>Nenhuma solicitação encontrada</div></div>`}</div>
  </div>`;
}

function filaToggleAluno(id){FV.expandido[id]=FV.expandido[id]===false;renderScreen();}
function filaResolver(alunoId,solId,decisao){
  const a=FILA_ALUNOS.find(x=>x.id==alunoId);
  const sol=a.solicitacoes.find(s=>s.id===solId);
  sol.status=decisao;delete FV.rejForm[solId];renderScreen();
}

// ════════════════════════════════════════
//  AGENDA (placeholder)
// ════════════════════════════════════════
function renderAgendaScreen(c){
  c.innerHTML=`<div style="display:flex;flex-direction:column;flex:1">
    <div class="ph">
      <div>
        <div class="eyebrow">Recepção</div>
        <div class="ptitle">Agenda</div>
        <div class="psub">Em desenvolvimento</div>
      </div>
    </div>
    <div class="empty-state" style="padding:60px 28px;text-align:center;color:var(--ink3)">
      <div class="empty-ico">📅</div>
      <div style="font-size:14px;margin-top:8px">Módulo de agenda em desenvolvimento</div>
      <div style="font-size:12px;margin-top:4px">Gestão de horários, presença e lista de espera</div>
    </div>
  </div>`;
}

// ════════════════════════════════════════
//  INIT
// ════════════════════════════════════════
FILA_ALUNOS.forEach(a=>FV.expandido[a.id]=true);
showScreen('treino');
</script>
</body>
</html>
