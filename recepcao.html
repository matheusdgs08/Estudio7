<script>
// ── Verificação de sessão ──
(function(){
  const sess = JSON.parse(localStorage.getItem('se7e_session')||'null');
  const rolesVanessa = ['admin','coordinator'];
  const rolesRecepcao = ['admin','receptionist'];
  const path = window.location.pathname;
  if(!sess || sess.expires < Date.now()){
    window.location.href='/login'; return;
  }
  if(path.includes('vanessa') && !rolesVanessa.includes(sess.role)){
    window.location.href='/login'; return;
  }
  if(path.includes('recepcao') && !rolesRecepcao.includes(sess.role)){
    window.location.href='/login'; return;
  }
})();
</script>

<script>
// ══════════════════════════════════════
// CONFIG
// ══════════════════════════════════════
const SUPA_URL = 'https://kfmkcbhalwupgknysukj.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmbWtjYmhhbHd1cGdrbnlzdWtqIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MzQzMjE2NCwiZXhwIjoyMDg5MDA4MTY0fQ.xvRFjKk7GnXqrykjEr9Cp1yGGV-wGmcsZ-9SHZ1u9UU';
const SB_HDR  = { 'apikey': SUPA_KEY, 'Authorization': 'Bearer '+SUPA_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

async function sbGet(table, params=''){
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}?${params}`, {headers:SB_HDR});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbPost(table, data){
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}`, {method:'POST',headers:SB_HDR,body:JSON.stringify(data)});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbPatch(table, params, data){
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}?${params}`, {method:'PATCH',headers:SB_HDR,body:JSON.stringify(data)});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let modulo     = 'alunos';
let alunos     = [];       // lista completa
let alunoSel   = null;     // aluno selecionado na lista
let busca      = '';
let _buscaTimer = null;
function debounceBusca(v){ busca=v; clearTimeout(_buscaTimer); _buscaTimer=setTimeout(()=>renderContent(),250); }
let loading    = false;

const MOD_TITLES = {
  alunos:       ['Alunos', 'Cadastro e ficha dos alunos'],
  contratos:    ['Contratos', 'Criar e gerenciar contratos'],
  agenda:       ['Agenda do dia', 'Horários, vagas e check-in'],
  experimentais:['Experimentais', 'Pipeline de leads e agendamentos de aulas experimentais'],
  pausas:       ['Pausas', 'Contratos em pausa'],
  relatorio:    ['Relatório de Presença', 'Frequência e faltas por aluno'],
  impressao:    ['Impressão de fichas', 'Configure e monitore a impressão automática'],
};

// ══════════════════════════════════════
// HELPERS
// ══════════════════════════════════════
function ini(nm){ return nm.split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase(); }
const PALETA = ['#1E40AF','#6D28D9','#065F46','#92400E','#991B1B','#1D4ED8','#7C3AED','#0F766E','#B45309'];
function avColor(nm){ let h=0;for(const c of nm)h=(h*31+c.charCodeAt(0))%PALETA.length;return PALETA[Math.abs(h)]; }

function fmtPhone(p){
  if(!p) return '';
  const n = p.replace(/\D/g,'');
  if(n.startsWith('55')) return `+55 (${n.slice(2,4)}) ${n.slice(4,9)}-${n.slice(9)}`;
  return p;
}

function fmtDate(d){
  if(!d) return '—';
  return new Date(d+'T12:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});
}

function waLink(phone, msg=''){
  const n = (phone||'').replace(/\D/g,'');
  const base = n.startsWith('55') ? n : '55'+n;
  return `https://wa.me/${base}${msg?'?text='+encodeURIComponent(msg):''}`;
}

// ══════════════════════════════════════
// RESTRICOES (igual ao vanessa.html)
// ══════════════════════════════════════
const RESTRICOES_MAP = {
  Cervical:['Hernia','Protusao','Artrose'],
  Ombro:['Bursite','Tendinite','Ruptura','Artrose','Ligamento'],
  Cotovelo:['Epicondilite','Tendinite'],
  Punho:['Cisto','Tendinite'],
  Torax:['Hernia','Escoliose','Artrose','Ruptura Ligamento'],
  Lombar:['Lombalgia','Hernia','Escoliose','Lordose','Protusao','Artrose'],
  Quadril:['Tendinite','Artrose','Desgaste','Protese'],
  Joelho:['Tendinite','Artrose','Desgaste','Cirurgia','Ligamento','Menisco','Protese'],
  Tornozelo:['Ruptura Ligamento','Artrose'],
};
const REGIOES = Object.keys(RESTRICOES_MAP);

function parseRestricoesStr(s){
  const r={};
  if(!s) return r;
  s.split(' · ').forEach(part=>{
    const idx=part.indexOf(':');
    if(idx<0) return;
    let k=part.slice(0,idx).trim();
    const canonical=REGIOES.find(reg=>reg.toLowerCase()===k.toLowerCase());
    if(canonical) k=canonical;
    r[k]=part.slice(idx+1).trim();
  });
  return r;
}

function restricoesObjToStr(obj){
  return Object.entries(obj).filter(([,v])=>v&&v!=='Sem Restricao').map(([k,v])=>`${k}: ${v}`).join(' · ');
}

function renderRestricoesBadges(restricoesStr){
  if(!restricoesStr) return '<span style="color:var(--ink3);font-size:12px">Nenhuma</span>';
  const rObj = parseRestricoesStr(restricoesStr);
  return Object.entries(rObj).map(([reg,cond])=>{
    const grave = ['Hernia','Ruptura','Ruptura Ligamento','Cirurgia','Protese'].includes(cond);
    const bg = grave?'#FEF2F2':'#FFFBEB';
    const tc = grave?'#991B1B':'#92400E';
    const bc = grave?'#FECACA':'#FCD34D';
    return `<span class="rest-badge" style="background:${bg};color:${tc};border-color:${bc}">${reg}: ${cond}</span>`;
  }).join('');
}

// ══════════════════════════════════════
// ROUTING
// ══════════════════════════════════════
function setMod(m, el){
  modulo = m;
  document.querySelectorAll('.sb-item').forEach(x=>x.classList.remove('on'));
  if(el) el.classList.add('on');
  const [title,sub] = MOD_TITLES[m]||[m,''];
  document.getElementById('mod-title').textContent = title;
  document.getElementById('mod-sub').textContent   = sub;
  renderContent();
}

function renderContent(){
  const c = document.getElementById('content');
  const ta = document.getElementById('topbar-actions');
  ta.innerHTML = '';
  if(modulo==='alunos')    renderAlunos(c, ta);
  else if(modulo==='contratos') renderContratos(c, ta);
  else if(modulo==='agenda')   { renderAgenda(c, ta); return; }
  else if(modulo==='impressao')    renderImpressao(c, ta);
  else if(modulo==='experimentais'){ renderExperimentais(c, ta); return; }
  else if(modulo==='pausas')        renderPausas(c, ta);
  else if(modulo==='relatorio')     renderRelatorio(c, ta);
  else c.innerHTML = `<div class="empty"><div class="empty-ico">🚧</div><div class="empty-title">Em breve</div><div class="empty-sub">Módulo ${modulo} em construção.</div></div>`;
}

// ══════════════════════════════════════
// MÓDULO ALUNOS
// ══════════════════════════════════════
async function loadAlunos(){
  loading = true;
  try {
    // Busca profiles (role=student) + students join
    const [profiles, students] = await Promise.all([
      sbGet('profiles', 'role=eq.student&active=eq.true&select=id,full_name,phone,photo_url&order=full_name'),
      sbGet('students', 'select=id,matricula,phone_secondary,birth_date,notes,next_training_session,blocked,blocked_reason,treinos_realizados,current_program_id'),
    ]);
    const stMap = {};
    students.forEach(s=>{ stMap[s.id]=s; });
    alunos = profiles.map(p=>({
      ...p,
      ...(stMap[p.id]||{}),
      // compatibilidade com data.js
      nm: p.full_name,
      mat: stMap[p.id]?.matricula||'',
    }));
  } catch(e){
    console.error('loadAlunos error', e);
    alunos = [];
  }
  loading = false;
}

function renderAlunos(container, ta){
  // Toolbar button
  ta.innerHTML = `
    <button class="btn btn-secondary" onclick="reloadAlunos()">🔄</button>
    <button class="btn btn-primary" onclick="abrirModalNovoAluno()">+ Novo aluno</button>`;

  if(loading){
    container.innerHTML = '<div class="empty"><div class="empty-ico">⏳</div><div class="empty-title">Carregando alunos…</div></div>';
    return;
  }

  const filtrados = busca
    ? alunos.filter(a=>(a.full_name||'').toLowerCase().includes(busca.toLowerCase()) || String(a.mat).includes(busca))
    : alunos;

  const listItems = filtrados.map(a=>{
    const isSel = alunoSel && alunoSel.id === a.id;
    const cor = avColor(a.full_name||'');
    const status = a.blocked ? 'blocked' : '';
    return `<div class="list-item ${isSel?'sel':''}" onclick="selecionarAluno('${a.id}')">
      ${a.photo_url
        ? '<img src="'+a.photo_url+'" style="width:34px;height:34px;border-radius:50%;object-fit:cover;flex-shrink:0" onerror="this.outerHTML=\'<div class=av style=background:'+cor+'>'+ini(a.full_name||'?')+'</div>\'">'
        : '<div class="av" style="background:'+cor+'">'+ini(a.full_name||'?')+'</div>'}
      <div style="flex:1;min-width:0">
        <div class="li-name">${a.full_name||'—'}</div>
        <div class="li-sub">mat. ${a.mat||'—'} ${a.phone?'· '+fmtPhone(a.phone):''}</div>
      </div>
      ${a.blocked?'<span style="font-size:16px">🔴</span>':''}
    </div>`;
  }).join('') || '<div style="padding:24px;text-align:center;color:var(--ink3);font-size:13px">Nenhum aluno encontrado</div>';

  container.innerHTML = `
    <div class="split">
      <div class="list-col">
        <div class="list-search">
          <input class="search-inp" placeholder="Buscar por nome ou matrícula…"
            value="${busca}" oninput="debounceBusca(this.value)">
        </div>

async function salvarNovoAluno(){
  const nome  = document.getElementById('na-nome').value.trim();
  const phone = document.getElementById('na-phone').value.trim().replace(/\D/g,'');
  const mat   = document.getElementById('na-mat').value.trim();
  const birth = document.getElementById('na-birth').value;
  const phone2= document.getElementById('na-phone2').value.trim().replace(/\D/g,'');
  const notes = document.getElementById('na-notes').value.trim();

  if(!nome){ alert('Nome é obrigatório.'); return; }

  const btn = document.querySelector('.modal-footer .btn-primary');
  btn.disabled = true;
  btn.textContent = '⏳ Salvando…';

  try {
    // 1. Criar profile
    const phoneFormatted = phone ? (phone.startsWith('55')?phone:'55'+phone) : null;
    const profile = await sbPost('profiles', {
      full_name: nome,
      phone: phoneFormatted,
      role: 'student',
      active: true,
    });
    const pid = Array.isArray(profile) ? profile[0].id : profile.id;

    // 2. Criar student record
    await sbPost('students', {
      id: pid,
      matricula: mat ? parseInt(mat) : null,
      phone_secondary: phone2 ? (phone2.startsWith('55')?phone2:'55'+phone2) : null,
      birth_date: birth || null,
      notes: notes || null,
      next_training_session: 1,
      treinos_realizados: 0,
      blocked: false,
    });

    // 3. Recarregar e selecionar novo aluno
    await loadAlunos();
    alunoSel = alunos.find(a=>a.id===pid);
    fecharModal();
    renderContent();

    // 4. Enviar questionário de entrada se tiver telefone
    if(phone){
      const token = 'q'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
      const link  = `${window.location.origin}/questionario?t=${token}&tipo=entrada`;
      const msg   = `Olá, ${nome.split(' ')[0]}! 😊\n\nBem-vindo ao Estúdio 7! Para montarmos o seu treino personalizado, precisamos de algumas informações. Leva menos de 2 minutinhos!\n\n👉 ${link}\n\n_Estúdio 7_`;
      // Salvar token no Supabase via API
      try {
        await fetch('/quest/tokens', {
          method:'POST',
          headers:{'Content-Type':'application/json','x-api-key':'se7e2025'},
          body:JSON.stringify({token, aluno_id:pid, aluno_nm:nome, aluno_phone:phoneFormatted||'', tipo:'entrada'})
        });
      } catch(e){ console.warn('quest token error', e); }
      // Abrir WhatsApp
      const phoneNum = phoneFormatted || '55'+phone;
      window.open(`https://wa.me/${phoneNum}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    showToast(`✅ ${nome} cadastrado!`);
  } catch(e){
    alert('Erro ao cadastrar: ' + e.message);
    btn.disabled = false;
    btn.textContent = '✓ Cadastrar aluno';
  }
}

async function salvarEdicaoAluno(id){
  const nome   = document.getElementById('ea-nome').value.trim();
  const phone  = document.getElementById('ea-phone').value.trim().replace(/\D/g,'');
  const mat    = document.getElementById('ea-mat').value.trim();
  const birth  = document.getElementById('ea-birth').value;
  const phone2 = document.getElementById('ea-phone2').value.trim().replace(/\D/g,'');
  const notes  = document.getElementById('ea-notes').value.trim();

  if(!nome){ alert('Nome é obrigatório.'); return; }
  const btn = document.querySelector('.modal-footer .btn-primary');
  btn.disabled=true; btn.textContent='⏳ Salvando…';

  try {
    const phoneFormatted = phone ? (phone.startsWith('55')?phone:'55'+phone) : null;
    const phone2Formatted = phone2 ? (phone2.startsWith('55')?phone2:'55'+phone2) : null;

    await Promise.all([
      sbPatch('profiles', `id=eq.${id}`, {full_name:nome, phone:phoneFormatted}),
      sbPatch('students', `id=eq.${id}`, {
        matricula: mat?parseInt(mat):null,
        phone_secondary: phone2Formatted,
        birth_date: birth||null,
        notes: notes||null,
      }),
    ]);

    await loadAlunos();
    alunoSel = alunos.find(a=>a.id===id);
    fecharModal();
    renderContent();
    showToast('✅ Dados atualizados!');
  } catch(e){
    alert('Erro: '+e.message);
    btn.disabled=false; btn.textContent='✓ Salvar';
  }
}

async function enviarQuestionario(id, nm, phone){
  const tipo = confirm(`Enviar questionário para ${nm}?\n\nOK = Mudança de Treino\nCancelar = Entrada`) ? 'mudanca' : 'entrada';
  if(!phone){ alert('Este aluno não tem telefone cadastrado.'); return; }
  const token = 'q'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  const link  = `${window.location.origin}/questionario?t=${token}&tipo=${tipo}`;
  const msg   = `Olá, ${nm.split(' ')[0]}! 😊\n\nA Vanessa vai ${tipo==='entrada'?'montar o seu treino':'atualizar o seu treino'} em breve. Responda rapidinho:\n\n👉 ${link}\n\n_Estúdio 7_`;
  try {
    await fetch('/quest/tokens', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':'se7e2025'},
      body:JSON.stringify({token, aluno_id:id, aluno_nm:nm, aluno_phone:phone, tipo})
    });
  } catch(e){ console.warn('quest token', e); }
  const phoneNum = phone.startsWith('55')?phone:'55'+phone.replace(/\D/g,'');
  window.open(`https://wa.me/${phoneNum}?text=${encodeURIComponent(msg)}`, '_blank');
  showToast('📲 WhatsApp aberto!');
}

function abrirModalEditarRestricoes(id){
  const a = alunos.find(x=>x.id===id);
  if(!a) return;
  const rObj = parseRestricoesStr(a.notes_restricoes||'');
  const selects = REGIOES.map(reg=>{

    const opts = ['<option value="">Sem Restrição</option>',
      ...RESTRICOES_MAP[reg].map(o=>`<option value="${o}"${current===o?' selected':''}>${o}</option>`)
    ].join('');
    const hasr = !!current;
    const bc = hasr?'#FCD34D':'var(--bg3)';
    return `<div style="display:flex;flex-direction:column;gap:3px">
      <span style="font-size:10px;font-weight:700;color:var(--ink3)">${reg}</span>
      <select id="rsel-${reg}" style="border:1.5px solid ${bc};border-radius:8px;padding:6px 8px;font-size:12px;background:#fff;color:var(--ink);outline:none;cursor:pointer"
        onchange="this.style.borderColor=this.value?'#FCD34D':'var(--bg3)'">
        ${opts}
      </select>
    </div>`;
  }).join('');

  const root = document.getElementById('modal-root');
  root.innerHTML = `<div class="modal-bg" onclick="if(event.target.classList.contains('modal-bg'))fecharModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-hdr">

      </div>
      <div class="modal-body">
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">${selects}</div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="salvarRestricoes('${id}')">✓ Salvar restrições</button>
      </div>
    </div>
  </div>`;
}

async function salvarRestricoes(id){
  const obj = {};
  REGIOES.forEach(reg=>{
    const v = document.getElementById('rsel-'+reg)?.value;
    if(v) obj[reg] = v;
  });
  const str = restricoesObjToStr(obj);
  // Save in notes_restricoes (we use students.notes for now, ideally a separate column)
  await sbPatch('students', `id=eq.${id}`, {notes: str || null});
  // Update local
  const a = alunos.find(x=>x.id===id);
  if(a){ a.notes_restricoes = str; a.notes = str; }
  fecharModal();
  if(alunoSel?.id===id){ alunoSel.notes_restricoes=str; }
  renderContent();
  showToast('✅ Restrições salvas!');
}

function showToast(msg){
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#1C1916;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:200;animation:fadeIn .2s';
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2800);
}

function renderListaAlunos(){
  const filtrados = busca ? alunos.filter(a=>(a.full_name||'').toLowerCase().includes(busca.toLowerCase())) : alunos;
  return filtrados.map(a=>{
    const cor = avColor(a.full_name||'');
    return `<div class="list-item" onclick="selecionarAlunoContrato('${a.id}')">
      <div class="av" style="background:${cor}">${ini(a.full_name||'?')}</div>
      <div style="flex:1;min-width:0">
        <div class="li-name">${a.full_name||'—'}</div>
        <div class="li-sub">mat. ${a.mat||'—'}</div>

async function selecionarAlunoContrato(id){
  alunoSel  = alunos.find(a=>a.id===id);
  contratoSel = null;
  await Promise.all([loadPlanos(), loadClassSlots(), loadContratos(id)]);
  renderContent();
}

        <div class="field-grid">
          <div class="field"><label>Início</label><div class="val">${fmtDate(c.start_date)}</div></div>
          <div class="field"><label>Término</label><div class="val">${fmtDate(c.end_date)}</div></div>

async function abrirModalNovoContrato(){
  await Promise.all([loadPlanos(), loadClassSlots()]);
  novoContrato = {
    plan_id: planos[2]?.id||'',  // default 3x
    payment_type: 'monthly',
    has_fixed_schedule: true,
    start_date: new Date().toISOString().slice(0,10),
    end_date: '',
    fixed_slots_sel: [],
    due_date: '',
  };
  renderModalNovoContrato();
}

function renderModalNovoContrato(){
  const c = novoContrato;
  const plan = planos.find(p=>p.id===c.plan_id);
  const freq = plan?.frequency_per_week||0;

  // Auto-calcular end_date baseado no tipo
  if(c.start_date && !c.end_date){
    const d = new Date(c.start_date+'T12:00');
    if(c.payment_type==='monthly')    d.setMonth(d.getMonth()+1);
    else if(c.payment_type==='annual') d.setFullYear(d.getFullYear()+1);
    else d.setMonth(d.getMonth()+6);
    c.end_date = d.toISOString().slice(0,10);
  }

  // Total de aulas
  const totalAulas = c.payment_type==='annual'
    ? (plan?.annual_classes||0)
    : c.payment_type==='monthly'
    ? freq*4
    : freq*24;

  // Horários disponíveis agrupados por dia
  const DIAS = ['Dom','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const slotsPorDia = {};
  classSlots.filter(s=>s.slot_type==='normal').forEach(s=>{
    if(!slotsPorDia[s.weekday]) slotsPorDia[s.weekday] = [];
    slotsPorDia[s.weekday].push(s);
  });

  const slotsHtml = c.has_fixed_schedule ? Object.entries(slotsPorDia).map(([wd,slots])=>`
    <div style="margin-bottom:8px">
      <div style="font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;margin-bottom:4px">${DIAS[wd]}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${slots.map(s=>{
          const sel = c.fixed_slots_sel.includes(s.id);
          const t = s.start_time.slice(0,5);
          return `<button onclick="toggleSlotSel('${s.id}',${freq})"
            style="padding:6px 12px;border:2px solid ${sel?'var(--purple)':'var(--bg3)'};border-radius:8px;font-size:12px;font-weight:600;background:${sel?'var(--purple-l)':'var(--wh)'};color:${sel?'var(--purple)':'var(--ink2)'};cursor:pointer">${t}</button>`;
        }).join('')}
      </div>
    </div>`).join('')
    : '<div style="font-size:12px;color:var(--ink3);padding:4px 0">Aluno flexível agenda conforme disponibilidade.</div>';

  const root = document.getElementById('modal-root');
  root.innerHTML = `<div class="modal-bg" onclick="if(event.target.classList.contains('modal-bg'))fecharModal()">
    <div class="modal" onclick="event.stopPropagation()" style="max-width:580px">
      <div class="modal-hdr">
        <div class="modal-title">📄 Novo contrato — ${alunoSel.full_name.split(' ')[0]}</div>
        <button class="modal-close" onclick="fecharModal()">✕</button>
      </div>
      <div class="modal-body">

        <!-- Plano -->
        <div class="field">
          <label>Plano *</label>
          <select class="mi" onchange="novoContrato.plan_id=this.value;novoContrato.end_date='';renderModalNovoContrato()">
            ${planos.map(p=>`<option value="${p.id}"${c.plan_id===p.id?' selected':''}>${p.name} (${p.frequency_per_week}x/sem)</option>`).join('')}
          </select>
        </div>

        <!-- Modalidade -->
        <div class="field">
          <label>Modalidade de pagamento *</label>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
            ${[['monthly','Mensal'],['recurring','Recorrente'],['annual','Anual']].map(([v,l])=>`
              <div onclick="novoContrato.payment_type='${v}';novoContrato.end_date='';renderModalNovoContrato()"
                style="padding:10px;border:2px solid ${c.payment_type===v?'var(--purple)':'var(--bg3)'};border-radius:10px;cursor:pointer;text-align:center;background:${c.payment_type===v?'var(--purple-l)':'var(--wh)'}">
                <div style="font-size:13px;font-weight:700;color:${c.payment_type===v?'var(--purple)':'var(--ink)'}">${l}</div>
                <div style="font-size:11px;color:var(--ink3)">${v==='monthly'?'1 mês':v==='annual'?'12 meses':'6 meses'}</div>
              </div>`).join('')}
          </div>
        </div>

        <!-- Datas -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div class="field"><label>Data de início *</label>
            <input class="mi" type="date" value="${c.start_date}"
              onchange="novoContrato.start_date=this.value;novoContrato.end_date='';renderModalNovoContrato()"></div>
          <div class="field"><label>Data de término *</label>
            <input class="mi" type="date" value="${c.end_date}"
              onchange="novoContrato.end_date=this.value"></div>
        </div>

        <!-- Vencimento pagamento -->
        <div class="field">
          <label>Vencimento do pagamento</label>
          <input class="mi" type="date" value="${c.due_date}"
            onchange="novoContrato.due_date=this.value">
        </div>

        <!-- Total de aulas calculado -->
        <div style="background:var(--purple-l);border:1px solid var(--purple-b);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px">
          <div style="font-size:28px;font-weight:900;color:var(--purple)">${totalAulas}</div>
          <div>
            <div style="font-size:13px;font-weight:600;color:var(--purple)">aulas no contrato</div>
            <div style="font-size:11px;color:var(--ink3)">${freq}x/sem · ${c.payment_type==='monthly'?'4 semanas':c.payment_type==='annual'?'54 semanas':'24 semanas'}</div>
          </div>
        </div>

        <!-- Tipo de horário -->
        <div class="field">
          <label>Tipo de horário</label>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <div onclick="novoContrato.has_fixed_schedule=true;novoContrato.fixed_slots_sel=[];renderModalNovoContrato()"
              style="padding:10px;border:2px solid ${c.has_fixed_schedule?'var(--purple)':'var(--bg3)'};border-radius:10px;cursor:pointer;background:${c.has_fixed_schedule?'var(--purple-l)':'var(--wh)'}">
              <div style="font-size:13px;font-weight:700;color:${c.has_fixed_schedule?'var(--purple)':'var(--ink)'}">📌 Horário fixo</div>
              <div style="font-size:11px;color:var(--ink3)">Vagas reservadas toda semana</div>
            </div>
            <div onclick="novoContrato.has_fixed_schedule=false;novoContrato.fixed_slots_sel=[];renderModalNovoContrato()"
              style="padding:10px;border:2px solid ${!c.has_fixed_schedule?'var(--purple)':'var(--bg3)'};border-radius:10px;cursor:pointer;background:${!c.has_fixed_schedule?'var(--purple-l)':'var(--wh)'}">
              <div style="font-size:13px;font-weight:700;color:${!c.has_fixed_schedule?'var(--purple)':'var(--ink)'}">🔄 Flexível</div>
              <div style="font-size:11px;color:var(--ink3)">Agenda conforme disponibilidade</div>
            </div>
          </div>
        </div>

        <!-- Seleção de horários fixos -->
        ${c.has_fixed_schedule?`
        <div>
          <label style="font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:8px">
            Selecionar horários (${c.fixed_slots_sel.length}/${freq} selecionados)
          </label>
          ${c.fixed_slots_sel.length===freq
            ?`<div style="padding:4px 0;font-size:12px;color:var(--green)">✅ ${freq} horário${freq!==1?'s':''} selecionado${freq!==1?'s':''}</div>`
            :c.fixed_slots_sel.length>0
            ?`<div style="padding:4px 0;font-size:12px;color:#D97706">⚠️ Selecione mais ${freq-c.fixed_slots_sel.length} horário${freq-c.fixed_slots_sel.length!==1?'s':''}</div>`
            :`<div style="padding:4px 0;font-size:12px;color:var(--ink3)">Selecione ${freq} horário${freq!==1?'s':''} fixo${freq!==1?'s':''}</div>`}
          ${slotsHtml}
        </div>`:''}

      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="salvarNovoContrato()">✓ Criar contrato</button>
      </div>
    </div>
  </div>`;
}

function toggleSlotSel(slotId, freq){
  const idx = novoContrato.fixed_slots_sel.indexOf(slotId);
  if(idx>=0){
    novoContrato.fixed_slots_sel.splice(idx,1);
  } else {
    if(novoContrato.fixed_slots_sel.length >= freq){
      showToast(`⚠️ Máximo ${freq} horário${freq!==1?'s':''} para este plano`);
      return;
    }
    novoContrato.fixed_slots_sel.push(slotId);
  }
  renderModalNovoContrato();
}

async function salvarNovoContrato(){
  const c = novoContrato;
  if(!c.plan_id||!c.start_date||!c.end_date){ alert('Preencha plano, data de início e término.'); return; }
  const plan = planos.find(p=>p.id===c.plan_id);
  const freq = plan?.frequency_per_week||2;
  if(c.has_fixed_schedule && c.fixed_slots_sel.length!==freq){
    alert(`Selecione exatamente ${freq} horário${freq!==1?'s':''} fixo${freq!==1?'s':''}.`); return;
  }

  const btn = document.querySelector('.modal-footer .btn-primary');
  btn.disabled=true; btn.textContent='⏳ Salvando…';

  try {
    const totalAulas = c.payment_type==='annual'
      ? (plan?.annual_classes||freq*54)
      : c.payment_type==='monthly' ? freq*4 : freq*24;

    const contrato = await sbPost('contracts',{
      student_id:       alunoSel.id,
      plan_id:          c.plan_id,
      payment_type:     c.payment_type,
      has_fixed_schedule: c.has_fixed_schedule,
      total_classes:    totalAulas,
      remaining_classes: totalAulas,
      start_date:       c.start_date,
      end_date:         c.end_date,
      status:           'active',
      due_date:         c.due_date||null,
      grace_period_end: c.due_date ? new Date(new Date(c.due_date).getTime()+7*864e5).toISOString().slice(0,10) : null,
      replacements_transferred: false,
    });
    const cid = Array.isArray(contrato)?contrato[0].id:contrato.id;

    // Criar fixed_slots se horário fixo
    if(c.has_fixed_schedule && c.fixed_slots_sel.length){
      await Promise.all(c.fixed_slots_sel.map(slotId=>
        sbPost('fixed_slots',{
          student_id:    alunoSel.id,
          contract_id:   cid,
          class_slot_id: slotId,
          start_date:    c.start_date,
          end_date:      c.end_date,
          active:        true,
        })
      ));
    }

    await loadContratos(alunoSel.id);
    contratoSel = contratos.find(ct=>ct.id===cid)||contratos[0];
    fecharModal();
    renderContent();
    showToast(`✅ Contrato criado! ${totalAulas} aulas`);
  } catch(e){
    alert('Erro: '+e.message);
    btn.disabled=false; btn.textContent='✓ Criar contrato';
  }
}

async function confirmarPausa(cid, endDateAtual){
  const ps = document.getElementById('p-start').value;
  const pe = document.getElementById('p-end').value;
  const pt = document.getElementById('p-type').value;
  if(!ps||!pe||pe<=ps){ alert('Datas inválidas.'); return; }

  // Calcular nova end_date: end_date += (pause_end - pause_start) dias
  const dias = Math.ceil((new Date(pe)-new Date(ps))/(864e5));
  const novaEnd = new Date(new Date(endDateAtual).getTime()+dias*864e5).toISOString().slice(0,10);

  const btn = document.querySelector('.modal-footer .btn-primary');
  btn.disabled=true; btn.textContent='⏳ Pausando…';

  try {
    await sbPatch('contracts',`id=eq.${cid}`,{
      status:      'paused',
      pause_start: ps,
      pause_end:   pe,
      pause_type:  pt,
      end_date:    novaEnd,
    });
    await loadContratos(alunoSel.id);
    contratoSel = contratos.find(c=>c.id===cid);
    fecharModal();
    renderContent();
    showToast(`✅ Pausado! Novo término: ${fmtDate(novaEnd)}`);
  } catch(e){
    alert('Erro: '+e.message);
    btn.disabled=false; btn.textContent='✓ Pausar';
  }
}

async function retomarContrato(cid){
  if(!confirm('Retomar o contrato agora?')) return;
  await sbPatch('contracts',`id=eq.${cid}`,{status:'active'});
  await loadContratos(alunoSel.id);
  contratoSel = contratos.find(c=>c.id===cid);
  renderContent();
  showToast('▶️ Contrato retomado!');
}

async function cancelarContrato(cid){
  if(!confirm('Cancelar este contrato? Esta ação libera os horários fixos.')) return;
  await sbPatch('contracts',`id=eq.${cid}`,{status:'cancelled'});
  // Desativar fixed_slots
  try { await sbPatch('fixed_slots',`contract_id=eq.${cid}`,{active:false}); } catch(e){}
  await loadContratos(alunoSel.id);
  contratoSel = contratos.find(c=>c.id===cid);
  renderContent();
  showToast('❌ Contrato cancelado');
}

// Upgrade/Downgrade - modal simples por agora
function abrirModalUpgrade(cid){
  const c = contratos.find(x=>x.id===cid);
  const plan = planos.find(p=>p.id===c.plan_id);
  const root = document.getElementById('modal-root');
  root.innerHTML = `<div class="modal-bg" onclick="if(event.target.classList.contains('modal-bg'))fecharModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-hdr">
        <div class="modal-title">⬆️ Upgrade / Downgrade</div>
        <button class="modal-close" onclick="fecharModal()">✕</button>
      </div>
      <div class="modal-body">
        <div style="font-size:13px;color:var(--ink2);margin-bottom:8px">
          Plano atual: <strong>${plan?.name||'—'}</strong><br>
          O novo contrato herda a data de término <strong>${fmtDate(c.end_date)}</strong>.
        </div>
        <div class="field"><label>Novo plano *</label>
          <select class="mi" id="upg-plan">
            ${planos.filter(p=>p.id!==c.plan_id).map(p=>`<option value="${p.id}">${p.name} (${p.frequency_per_week}x/sem)</option>`).join('')}
          </select>
        </div>

          💡 O contrato atual será encerrado e um novo será criado herdando a data de término.
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="confirmarUpgrade('${cid}','${c.end_date}')">✓ Confirmar</button>
      </div>
    </div>
  </div>`;
}

async function confirmarUpgrade(cid, endDate){
  const newPlanId = document.getElementById('upg-plan').value;
  const newPlan = planos.find(p=>p.id===newPlanId);
  const btn = document.querySelector('.modal-footer .btn-primary');
  btn.disabled=true; btn.textContent='⏳ Processando…';
  try {
    // Encerrar contrato atual
    await sbPatch('contracts',`id=eq.${cid}`,{status:'ended'});
    // Criar novo contrato com end_date herdado
    const freq = newPlan.frequency_per_week;
    const hoje = new Date().toISOString().slice(0,10);
    const diasRestantes = Math.ceil((new Date(endDate)-new Date())/(864e5));
    const totalAulas = Math.round(freq*(diasRestantes/7));
    await sbPost('contracts',{
      student_id: alunoSel.id,
      plan_id: newPlanId,
      payment_type: 'monthly',
      has_fixed_schedule: false,
      total_classes: totalAulas,
      remaining_classes: totalAulas,
      start_date: hoje,
      end_date: endDate,
      status: 'active',
      upgrade_downgrade_from: cid,
      replacements_transferred: false,
    });
    await loadContratos(alunoSel.id);
    contratoSel = contratos[0];
    fecharModal();
    renderContent();
    showToast('✅ Upgrade realizado!');
  } catch(e){
    alert('Erro: '+e.message);
    btn.disabled=false; btn.textContent='✓ Confirmar';
  }
}





async function loadPlanos(){
  if(planos.length) return;
  planos = await sbGet('plans','active=eq.true&order=frequency_per_week');
}

async function loadClassSlots(){
  if(classSlots.length) return;
  classSlots = await sbGet('class_slots','active=eq.true&order=weekday,start_time');
}

async function loadContratos(studentId){
  contratos = await sbGet('contracts',
    `student_id=eq.${studentId}&order=created_at.desc&select=*`);
}

function renderListaAlunos(){
  const filtrados = busca ? alunos.filter(a=>(a.full_name||'').toLowerCase().includes(busca.toLowerCase())) : alunos;
  return filtrados.map(a=>{
    const cor = avColor(a.full_name||'');
    return `<div class="list-item" onclick="selecionarAlunoContrato('${a.id}')">
      <div class="av" style="background:${cor}">${ini(a.full_name||'?')}</div>
      <div style="flex:1;min-width:0">
        <div class="li-name">${a.full_name||'—'}</div>
        <div class="li-sub">mat. ${a.mat||'—'}</div>
      </div>
    </div>`;
  }).join('') || '<div style="padding:16px;text-align:center;color:var(--ink3);font-size:13px">Nenhum aluno</div>';
}

async function selecionarAlunoContrato(id){
  alunoSel  = alunos.find(a=>a.id===id);
  contratoSel = null;
  await Promise.all([loadPlanos(), loadClassSlots(), loadContratos(id)]);
  renderContent();
}

async function abrirModalNovoContrato(){
  await Promise.all([loadPlanos(), loadClassSlots()]);
  novoContrato = {
    plan_id: planos[2]?.id||'',  // default 3x
    payment_type: 'monthly',
    has_fixed_schedule: true,
    start_date: new Date().toISOString().slice(0,10),
    end_date: '',
    fixed_slots_sel: [],
    due_date: '',
  };
  renderModalNovoContrato();
}

function renderModalNovoContrato(){
  const c = novoContrato;
  const plan = planos.find(p=>p.id===c.plan_id);
  const freq = plan?.frequency_per_week||0;

  // Auto-calcular end_date baseado no tipo
  if(c.start_date && !c.end_date){
    const d = new Date(c.start_date+'T12:00');
    if(c.payment_type==='monthly')    d.setMonth(d.getMonth()+1);
    else if(c.payment_type==='annual') d.setFullYear(d.getFullYear()+1);
    else d.setMonth(d.getMonth()+6);
    c.end_date = d.toISOString().slice(0,10);
  }

  // Total de aulas
  const totalAulas = c.payment_type==='annual'
    ? (plan?.annual_classes||0)
    : c.payment_type==='monthly'
    ? freq*4
    : freq*24;

  // Horários disponíveis agrupados por dia
  const DIAS = ['Dom','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const slotsPorDia = {};
  classSlots.filter(s=>s.slot_type==='normal').forEach(s=>{
    if(!slotsPorDia[s.weekday]) slotsPorDia[s.weekday] = [];
    slotsPorDia[s.weekday].push(s);
  });

  const slotsHtml = c.has_fixed_schedule ? Object.entries(slotsPorDia).map(([wd,slots])=>`
    <div style="margin-bottom:8px">
      <div style="font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;margin-bottom:4px">${DIAS[wd]}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${slots.map(s=>{
          const sel = c.fixed_slots_sel.includes(s.id);
          const t = s.start_time.slice(0,5);
          return `<button onclick="toggleSlotSel('${s.id}',${freq})"
            style="padding:6px 12px;border:2px solid ${sel?'var(--purple)':'var(--bg3)'};border-radius:8px;font-size:12px;font-weight:600;background:${sel?'var(--purple-l)':'var(--wh)'};color:${sel?'var(--purple)':'var(--ink2)'};cursor:pointer">${t}</button>`;
        }).join('')}
      </div>
    </div>`).join('')

  const root = document.getElementById('modal-root');
  root.innerHTML = `<div class="modal-bg" onclick="if(event.target.classList.contains('modal-bg'))fecharModal()">
    <div class="modal" onclick="event.stopPropagation()" style="max-width:580px">
      <div class="modal-hdr">
        <div class="modal-title">📄 Novo contrato — ${alunoSel.full_name.split(' ')[0]}</div>
        <button class="modal-close" onclick="fecharModal()">✕</button>
      </div>
      <div class="modal-body">

        <!-- Plano -->
        <div class="field">
          <label>Plano *</label>
          <select class="mi" onchange="novoContrato.plan_id=this.value;novoContrato.end_date='';renderModalNovoContrato()">
            ${planos.map(p=>`<option value="${p.id}"${c.plan_id===p.id?' selected':''}>${p.name} (${p.frequency_per_week}x/sem)</option>`).join('')}
          </select>
        </div>

        <!-- Modalidade -->
        <div class="field">
          <label>Modalidade de pagamento *</label>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
            ${[['monthly','Mensal'],['recurring','Recorrente'],['annual','Anual']].map(([v,l])=>`
              <div onclick="novoContrato.payment_type='${v}';novoContrato.end_date='';renderModalNovoContrato()"
                style="padding:10px;border:2px solid ${c.payment_type===v?'var(--purple)':'var(--bg3)'};border-radius:10px;cursor:pointer;text-align:center;background:${c.payment_type===v?'var(--purple-l)':'var(--wh)'}">
                <div style="font-size:13px;font-weight:700;color:${c.payment_type===v?'var(--purple)':'var(--ink)'}">${l}</div>
                <div style="font-size:11px;color:var(--ink3)">${v==='monthly'?'1 mês':v==='annual'?'12 meses':'6 meses'}</div>
              </div>`).join('')}

          <div class="field"><label>Data de início *</label>

            </div>
            <div onclick="novoContrato.has_fixed_schedule=false;novoContrato.fixed_slots_sel=[];renderModalNovoContrato()"
              style="padding:10px;border:2px solid ${!c.has_fixed_schedule?'var(--purple)':'var(--bg3)'};border-radius:10px;cursor:pointer;background:${!c.has_fixed_schedule?'var(--purple-l)':'var(--wh)'}">
              <div style="font-size:13px;font-weight:700;color:${!c.has_fixed_schedule?'var(--purple)':'var(--ink)'}">🔄 Flexível</div>
              <div style="font-size:11px;color:var(--ink3)">Agenda conforme disponibilidade</div>

        </div>

        <!-- Seleção de horários fixos -->
        ${c.has_fixed_schedule?`
        <div>
          <label style="font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:8px">
            Selecionar horários (${c.fixed_slots_sel.length}/${freq} selecionados)

            ?`<div style="padding:4px 0;font-size:12px;color:var(--green)">✅ ${freq} horário${freq!==1?'s':''} selecionado${freq!==1?'s':''}</div>`
            :c.fixed_slots_sel.length>0
            ?`<div style="padding:4px 0;font-size:12px;color:#D97706">⚠️ Selecione mais ${freq-c.fixed_slots_sel.length} horário${freq-c.fixed_slots_sel.length!==1?'s':''}</div>`
            :`<div style="padding:4px 0;font-size:12px;color:var(--ink3)">Selecione ${freq} horário${freq!==1?'s':''} fixo${freq!==1?'s':''}</div>`}
          ${slotsHtml}
        </div>`:''}

      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="salvarNovoContrato()">✓ Criar contrato</button>
      </div>
    </div>
  </div>`;
}

function toggleSlotSel(slotId, freq){
  const idx = novoContrato.fixed_slots_sel.indexOf(slotId);
  if(idx>=0){
    novoContrato.fixed_slots_sel.splice(idx,1);
  } else {
    if(novoContrato.fixed_slots_sel.length >= freq){
      showToast(`⚠️ Máximo ${freq} horário${freq!==1?'s':''} para este plano`);
      return;
    }
    novoContrato.fixed_slots_sel.push(slotId);
  }
  renderModalNovoContrato();
}

async function salvarNovoContrato(){
  const c = novoContrato;
  if(!c.plan_id||!c.start_date||!c.end_date){ alert('Preencha plano, data de início e término.'); return; }
  const plan = planos.find(p=>p.id===c.plan_id);
  const freq = plan?.frequency_per_week||2;
  if(c.has_fixed_schedule && c.fixed_slots_sel.length!==freq){
    alert(`Selecione exatamente ${freq} horário${freq!==1?'s':''} fixo${freq!==1?'s':''}.`); return;
  }

  const btn = document.querySelector('.modal-footer .btn-primary');
  btn.disabled=true; btn.textContent='⏳ Salvando…';

  try {
    const totalAulas = c.payment_type==='annual'
      ? (plan?.annual_classes||freq*54)
      : c.payment_type==='monthly' ? freq*4 : freq*24;

    const contrato = await sbPost('contracts',{
      student_id:       alunoSel.id,
      plan_id:          c.plan_id,
      payment_type:     c.payment_type,
      has_fixed_schedule: c.has_fixed_schedule,
      total_classes:    totalAulas,
      remaining_classes: totalAulas,
      start_date:       c.start_date,
      end_date:         c.end_date,
      status:           'active',
      due_date:         c.due_date||null,
      grace_period_end: c.due_date ? new Date(new Date(c.due_date).getTime()+7*864e5).toISOString().slice(0,10) : null,
      replacements_transferred: false,
    });
    const cid = Array.isArray(contrato)?contrato[0].id:contrato.id;

    // Criar fixed_slots se horário fixo
    if(c.has_fixed_schedule && c.fixed_slots_sel.length){
      await Promise.all(c.fixed_slots_sel.map(slotId=>
        sbPost('fixed_slots',{
          student_id:    alunoSel.id,
          contract_id:   cid,
          class_slot_id: slotId,
          start_date:    c.start_date,
          end_date:      c.end_date,
          active:        true,
        })
      ));
    }

    await loadContratos(alunoSel.id);
    contratoSel = contratos.find(ct=>ct.id===cid)||contratos[0];
    fecharModal();
    renderContent();
    showToast(`✅ Contrato criado! ${totalAulas} aulas`);
  } catch(e){
    alert('Erro: '+e.message);
    btn.disabled=false; btn.textContent='✓ Criar contrato';
  }
}

async function confirmarPausa(cid, endDateAtual){
  const ps = document.getElementById('p-start').value;
  const pe = document.getElementById('p-end').value;
  const pt = document.getElementById('p-type').value;
  if(!ps||!pe||pe<=ps){ alert('Datas inválidas.'); return; }

  // Calcular nova end_date: end_date += (pause_end - pause_start) dias
  const dias = Math.ceil((new Date(pe)-new Date(ps))/(864e5));
  const novaEnd = new Date(new Date(endDateAtual).getTime()+dias*864e5).toISOString().slice(0,10);

  const btn = document.querySelector('.modal-footer .btn-primary');
  btn.disabled=true; btn.textContent='⏳ Pausando…';

  try {
    await sbPatch('contracts',`id=eq.${cid}`,{
      status:      'paused',
      pause_start: ps,
      pause_end:   pe,
      pause_type:  pt,
      end_date:    novaEnd,
    });
    await loadContratos(alunoSel.id);
    contratoSel = contratos.find(c=>c.id===cid);
    fecharModal();
    renderContent();
    showToast(`✅ Pausado! Novo término: ${fmtDate(novaEnd)}`);
  } catch(e){
    alert('Erro: '+e.message);
    btn.disabled=false; btn.textContent='✓ Pausar';
  }
}

async function retomarContrato(cid){
  if(!confirm('Retomar o contrato agora?')) return;
  await sbPatch('contracts',`id=eq.${cid}`,{status:'active'});
  await loadContratos(alunoSel.id);
  contratoSel = contratos.find(c=>c.id===cid);
  renderContent();
  showToast('▶️ Contrato retomado!');
}

async function cancelarContrato(cid){
  if(!confirm('Cancelar este contrato? Esta ação libera os horários fixos.')) return;
  await sbPatch('contracts',`id=eq.${cid}`,{status:'cancelled'});
  // Desativar fixed_slots
  try { await sbPatch('fixed_slots',`contract_id=eq.${cid}`,{active:false}); } catch(e){}
  await loadContratos(alunoSel.id);
  contratoSel = contratos.find(c=>c.id===cid);
  renderContent();
  showToast('❌ Contrato cancelado');
}

async function confirmarUpgrade(cid, endDate){
  const newPlanId = document.getElementById('upg-plan').value;
  const newPlan = planos.find(p=>p.id===newPlanId);
  const btn = document.querySelector('.modal-footer .btn-primary');
  btn.disabled=true; btn.textContent='⏳ Processando…';
  try {
    // Encerrar contrato atual
    await sbPatch('contracts',`id=eq.${cid}`,{status:'ended'});
    // Criar novo contrato com end_date herdado
    const freq = newPlan.frequency_per_week;
    const hoje = new Date().toISOString().slice(0,10);
    const diasRestantes = Math.ceil((new Date(endDate)-new Date())/(864e5));
    const totalAulas = Math.round(freq*(diasRestantes/7));
    await sbPost('contracts',{
      student_id: alunoSel.id,
      plan_id: newPlanId,
      payment_type: 'monthly',
      has_fixed_schedule: false,
      total_classes: totalAulas,
      remaining_classes: totalAulas,
      start_date: hoje,
      end_date: endDate,
      status: 'active',
      upgrade_downgrade_from: cid,
      replacements_transferred: false,
    });
    await loadContratos(alunoSel.id);
    contratoSel = contratos[0];
    fecharModal();
    renderContent();
    showToast('✅ Upgrade realizado!');
  } catch(e){
    alert('Erro: '+e.message);
    btn.disabled=false; btn.textContent='✓ Confirmar';
  }
}

async function apiGet(path){
  const r = await fetch(`${API_URL}${path}`, {headers:{'x-api-key':API_KEY}});
  if(!r.ok) throw new Error('API error: '+r.status);
  return r.json();
}

async function loadAgendaDia(){
  const [tfData, teachers] = await Promise.all([
    apiGet(`/tecnofit/dia/${agendaDia}`),
    agendaTeachers.length ? Promise.resolve(agendaTeachers)
      : sbGet('profiles','role=eq.teacher&active=eq.true&select=id,full_name&order=full_name'),
  ]);

  agendaHorarios  = tfData.horarios || [];
  agendaTeachers  = teachers;
  agendaLoaded    = true;

        </div>
        <div style="margin-left:auto;display:flex;gap:12px;font-size:12px;color:var(--ink3)">
          <span>🕐 ${filteredHorarios.length}/${agendaHorarios.length} horários</span>
          <span>👥 ${totalAlunos} alunos</span>
          <span style="font-size:10px;color:var(--ink3);opacity:.6">via Tecnofit</span>
        </div>

      <!-- Grid de slots -->
      <div style="padding:16px 24px;overflow:auto;flex:1">
        ${filteredHorarios.length

          : agendaHorarios.length
          ? `<div class="empty"><div class="empty-ico">🔍</div><div class="empty-title">Nenhum horário com esse filtro</div><div class="empty-sub">Tente outro filtro ou veja todos os horários.</div></div>`
          : `<div class="empty"><div class="empty-ico">📅</div><div class="empty-title">Sem horários neste dia</div><div class="empty-sub">O Tecnofit não retornou eventos para este dia.</div></div>`}

function renderRodizioPanel(slotId){
  const slot = agendaSlots.find(s=>s.id===slotId);
  if(!slot) return '';

  const enrollsSlot = agendaEnrollments.filter(e=>
    e.class_slot_id===slotId && ['confirmed','attended'].includes(e.status)
  );

  if(!enrollsSlot.length)
    return `<div class="card" style="padding:16px;text-align:center;color:var(--ink3)">Nenhum aluno neste horário para atribuir professores.</div>`;

  // Contar aulas dadas hoje por cada professor
  const aulasHoje = {};
  agendaTeachers.forEach(t=>{ aulasHoje[t.id]=0; });
  agendaEnrollments.forEach(e=>{
    if(e.instructor_id && e.instructor_id!==slotId) aulasHoje[e.instructor_id]=(aulasHoje[e.instructor_id]||0)+1;
  });

  // Professores ordenados por aulas no dia (critério do rodízio)
  const teachersSorted = [...agendaTeachers].sort((a,b)=>(aulasHoje[a.id]||0)-(aulasHoje[b.id]||0));

  const rows = enrollsSlot.map((e,i)=>{
    const profAtual = agendaTeachers.find(t=>t.id===e.instructor_id);
    const sugerido  = teachersSorted[i % teachersSorted.length];
    return `<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--bg3)">
      <div style="width:28px;height:28px;border-radius:50%;background:${avColor(e._nm||'?')};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0">${ini(e._nm||'?')}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e._nm}</div>
        ${profAtual?`<div style="font-size:11px;color:var(--purple)">👤 ${profAtual.full_name.split(' ')[0]}</div>`:''}
      </div>
      <select onchange="atribuirProfessor('${e.id}',this.value)" style="border:1.5px solid var(--bg3);border-radius:8px;padding:5px 10px;font-size:12px;background:#fff;color:var(--ink);outline:none;cursor:pointer;min-width:140px">
        <option value="">— Selecionar —</option>
        ${teachersSorted.map(t=>`<option value="${t.id}" ${e.instructor_id===t.id?'selected':''}>
          ${t.full_name.split(' ')[0]} (${aulasHoje[t.id]||0} aulas)
        </option>`).join('')}
      </select>
    </div>`;
  }).join('');

  const semAtribuicao = enrollsSlot.filter(e=>!e.instructor_id).length;

  return `<div class="card">
    <div class="card-hdr" style="background:var(--purple-l)">
      <span style="font-size:16px">🎯</span>
      <span class="card-hdr-title" style="color:var(--purple)">Rodízio — ${slot.start_time.slice(0,5)}</span>
      <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
        ${semAtribuicao?`<span style="font-size:11px;color:#D97706">${semAtribuicao} sem professor</span>`:'<span style="font-size:11px;color:var(--green)">✅ Todos atribuídos</span>'}
        <button class="btn btn-primary" style="font-size:11px;padding:5px 12px" onclick="autoAtribuir('${slotId}')">⚡ Auto-atribuir</button>
        <button class="btn btn-secondary" style="font-size:11px;padding:5px 10px" onclick="rodizioSlotId=null;renderContent()">✕</button>
      </div>
    </div>
    <div style="font-size:11px;color:var(--ink3);padding:8px 12px;background:var(--bg);border-bottom:1px solid var(--bg3)">
      Critério: quem deu menos aulas no dia atende o próximo aluno
    </div>
    <div>${rows}</div>
  </div>`;
}

async function atribuirProfessor(enrollmentId, instructorId){
  try {
    await sbPatch('class_enrollments',`id=eq.${enrollmentId}`,
      {instructor_id: instructorId||null});
    const e = agendaEnrollments.find(x=>x.id===enrollmentId);
    if(e) e.instructor_id = instructorId||null;
    renderContent();
  } catch(err){
    alert('Erro: '+err.message);
  }
}

async function autoAtribuir(slotId){
  const enrollsSlot = agendaEnrollments.filter(e=>
    e.class_slot_id===slotId && ['confirmed','attended'].includes(e.status)
  );
  // Count today's load per teacher
  const aulasHoje = {};
  agendaTeachers.forEach(t=>{ aulasHoje[t.id]=0; });
  agendaEnrollments.forEach(e=>{
    if(e.instructor_id) aulasHoje[e.instructor_id]=(aulasHoje[e.instructor_id]||0)+1;
  });

  // Assign greedily: always pick teacher with fewest aulas
  for(const e of enrollsSlot){
    if(e.instructor_id) continue; // skip if already assigned
    const best = agendaTeachers
      .sort((a,b)=>(aulasHoje[a.id]||0)-(aulasHoje[b.id]||0))[0];
    if(!best) continue;
    await atribuirProfessor(e.id, best.id);
    aulasHoje[best.id]=(aulasHoje[best.id]||0)+1;
  }
  showToast('⚡ Professores atribuídos!');
}

// ── Enriquecer leads com seu experimental ──
function enrichLead(lead){
  const exp = expExps.filter(e=>e.lead_id===lead.id)
    .sort((a,b)=>b.scheduled_date?.localeCompare(a.scheduled_date||'')||0)[0];
  return { ...lead, _exp: exp||null };
}

  const agendHoje= expExps.filter(e=>e.scheduled_date===hoje).length;

async function salvarNovoLead(){
  const nome  = document.getElementById('nl-nome').value.trim();
  const phone = document.getElementById('nl-phone').value.trim().replace(/\D/g,'');
  const orig  = document.getElementById('nl-origem').value;
  const notes = document.getElementById('nl-notes').value.trim();
  const expData= document.getElementById('nl-exp-data')?.value;
  const expHora= document.getElementById('nl-exp-hora')?.value;

  if(!nome){ alert('Nome é obrigatório.'); return; }
  const btn = document.querySelector('.detail .btn-primary');
  btn.disabled=true; btn.textContent='⏳ Salvando…';

  try {
    const phoneF = phone?(phone.startsWith('55')?phone:'55'+phone):null;
    const lead = await sbPost('leads',{
      name: nome,
      phone: phoneF,
      origin: orig,
      notes: notes||null,
      status: expData&&expHora ? 'scheduled' : 'new',
    });
    const lid = Array.isArray(lead)?lead[0].id:lead.id;

    // Agendar experimental se informado
    if(expData && expHora){
      await sbPost('experimentals',{
        lead_id: lid,
        scheduled_date: expData,
        scheduled_time: expHora+':00',
        status: 'scheduled',
      });
      // Abrir WhatsApp com confirmação
      if(phoneF){
        const msg = `Olá ${nome.split(' ')[0]}! 😊 Sua aula experimental no Estúdio 7 está confirmada para ${fmtDate(expData)} às ${expHora}. Te esperamos! _Estúdio 7_`;
        window.open(`https://wa.me/${phoneF}?text=${encodeURIComponent(msg)}`,'_blank');
      }
    }

    await loadExperimentais();
    expView = 'pipeline';
    renderContent();
    showToast(`✅ Lead ${nome} cadastrado!`);
  } catch(e){
    alert('Erro: '+e.message);
    btn.disabled=false; btn.textContent='✓ Salvar lead';
  }
}

async function confirmarAgendarExp(leadId){
  const data  = document.getElementById('ae-data').value;
  const hora  = document.getElementById('ae-hora').value;
  const notes = document.getElementById('ae-notes').value;
  if(!data||!hora){ alert('Data e horário são obrigatórios.'); return; }

  // Verificar se já tem experimental nesse dia
  const jaExiste = expExps.find(e=>e.scheduled_date===data&&e.status==='scheduled');
  if(jaExiste){ alert('Já existe um experimental agendado neste dia. Escolha outra data.'); return; }

  const btn = document.querySelector('.modal-footer .btn-primary');
  btn.disabled=true; btn.textContent='⏳…';
  try {
    await sbPost('experimentals',{
      lead_id: leadId,
      scheduled_date: data,
      scheduled_time: hora+':00',
      status: 'scheduled',
      notes: notes||null,
    });
    await sbPatch('leads',`id=eq.${leadId}`,{status:'scheduled'});

    // WhatsApp
    const lead = expLeads.find(l=>l.id===leadId);
    if(lead?.phone){
      const msg = `Olá ${lead.name.split(' ')[0]}! 😊 Sua aula experimental no Estúdio 7 está confirmada para ${fmtDate(data)} às ${hora}. Qualquer dúvida estou aqui! _Estúdio 7_`;
      window.open(`https://wa.me/${lead.phone}?text=${encodeURIComponent(msg)}`,'_blank');
    }

    await loadExperimentais();
    expLeadSel = expLeads.find(l=>l.id===leadId);
    fecharModal();
    renderContent();
    showToast('📅 Experimental agendado!');
  } catch(e){
    alert('Erro: '+e.message);
    btn.disabled=false; btn.textContent='✓ Confirmar';
  }
}

// ── MUDAR STATUS ──
async function mudarStatusLead(leadId, novoStatus){
  await sbPatch('leads',`id=eq.${leadId}`,{status:novoStatus});
  // Se compareceu, atualizar experimental
  if(novoStatus==='attended'){
    const e = expExps.find(x=>x.lead_id===leadId&&x.status==='scheduled');
    if(e) await sbPatch('experimentals',`id=eq.${e.id}`,{status:'attended',attended_at:new Date().toISOString()});
  }
  await loadExperimentais();
  expLeadSel = expLeads.find(l=>l.id===leadId);
  renderContent();
  showToast(`✅ Status atualizado: ${EXP_STATUS[novoStatus]?.lbl}`);
}

// ── CONVERTER EM ALUNO ──
async function converterEmAluno(leadId){
  const l = expLeads.find(x=>x.id===leadId);
  if(!confirm(`Converter ${l.name} em aluno? Isso criará o perfil e você poderá criar o contrato.`)) return;

  try {
    const phoneF = l.phone;
    const profile = await sbPost('profiles',{
      full_name: l.name,
      phone: phoneF,
      role: 'student',
      active: true,
    });
    const pid = Array.isArray(profile)?profile[0].id:profile.id;

    await sbPost('students',{
      id: pid,
      next_training_session: 1,
      treinos_realizados: 0,
      blocked: false,
    });

    // Atualizar lead
    await Promise.all([
      sbPatch('leads',`id=eq.${leadId}`,{status:'converted',converted_student_id:pid}),
      sbPatch('experimentals',`lead_id=eq.${leadId}&status=eq.attended`,{status:'converted',converted_at:new Date().toISOString()}),
    ]);

    // Recarregar alunos
    await Promise.all([loadAlunos(), loadExperimentais()]);

    // Ir para ficha do aluno recém-criado
    alunoSel = alunos.find(a=>a.id===pid);
    expView = 'pipeline';
    setMod('alunos', document.querySelector('.sb-item'));
    showToast(`🎉 ${l.name} convertido com sucesso!`);

    // WhatsApp boas-vindas
    if(phoneF){

async function salvarEditarLead(leadId){
  const nome  = document.getElementById('el-nome').value.trim();
  const phone = document.getElementById('el-phone').value.trim().replace(/\D/g,'');
  const orig  = document.getElementById('el-orig').value;
  const notes = document.getElementById('el-notes').value.trim();
  if(!nome){ alert('Nome obrigatório.'); return; }
  const phoneF = phone?(phone.startsWith('55')?phone:'55'+phone):null;
  await sbPatch('leads',`id=eq.${leadId}`,{name:nome,phone:phoneF,origin:orig,notes:notes||null});
  await loadExperimentais();
  expLeadSel = expLeads.find(l=>l.id===leadId);
  fecharModal();
  renderContent();
  showToast('✅ Lead atualizado!');
}

async function liberarAvaliacao(studentId, studentNm, studentPhone){
  // Carregar última avaliação do aluno
  const avaliacoes = await sbGet('physical_assessments',`student_id=eq.${studentId}&order=assessed_at.desc&limit=1&select=assessed_at`);
  const ultimaAval = avaliacoes[0]?.assessed_at;
  
  const hoje    = new Date();
  const diasDesde = ultimaAval ? Math.floor((hoje - new Date(ultimaAval)) / 864e5) : 999;
  const mesesDesde = Math.floor(diasDesde / 30);
  const nome1 = studentNm.split(' ')[0];

  // Verificar se já tem token ativo/agendado
  const tokens = await sbGet('aval_tokens',`student_id=eq.${studentId}&order=liberated_at.desc&limit=1`);
  const tkAtual = tokens[0];

  let msg = `Liberar avaliação para ${studentNm}?`;
  if(tkAtual?.status === 'agendado'){
    msg = `${studentNm} já tem avaliação agendada em ${fmtDate(tkAtual.scheduled_date)}. Gerar mesmo assim?`;
  }
  if(tkAtual?.status === 'ativo' && tkAtual.liberated_at){
    const diasLib = Math.floor((hoje - new Date(tkAtual.liberated_at)) / 864e5);
    msg = `${studentNm} já tem um link ativo (liberado há ${diasLib} dias). Gerar novo?`;
  }

  if(!confirm(msg)) return;

  if(!studentPhone){ alert('Este aluno não tem telefone cadastrado.'); return; }

  const token = 'av'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
  const link  = `${window.location.origin}/agendar?t=${token}`;

  // Salvar no Supabase
  try {
    await sbPost('aval_tokens',{
      token,
      student_id:    studentId,
      student_nm:    studentNm,
      student_phone: studentPhone,
      status:        'ativo',
    });
  } catch(e) { alert('Erro ao gerar token: '+e.message); return; }

  // Montar mensagem WhatsApp
  const msgWpp = ultimaAval
    ? `Olá, ${nome1}! 😊 Já fazem ${mesesDesde} ${mesesDesde===1?'mês':'meses'} desde sua última avaliação com a Vanessa. Que tal agendar a próxima?\n\n👉 ${link}\n\n_Estúdio 7_`
    : `Olá, ${nome1}! 😊 Está na hora de fazer sua avaliação física com a Vanessa! Escolha o melhor horário pelo link abaixo:\n\n👉 ${link}\n\n_Estúdio 7_`;

  const phone = studentPhone.replace(/\D/g,'');
  const phoneNum = phone.startsWith('55') ? phone : '55'+phone;
  window.open(`https://wa.me/${phoneNum}?text=${encodeURIComponent(msgWpp)}`,'_blank');
  showToast(`✅ Link enviado para ${nome1}!`);
}

let pausasLoaded = false;
let pausasContratos = [];

async function loadPausas(){
  const [pausados, historico] = await Promise.all([
    sbGet('contracts','status=eq.paused&select=*&order=pause_start.desc'),
    sbGet('contracts','status=eq.active&pause_start=not.is.null&select=*&order=pause_end.desc&limit=20'),
  ]);
  const all = [...pausados, ...historico];
  if(all.length){
    const sids = [...new Set(all.map(c=>c.student_id))];
    const profs = await sbGet('profiles',`id=in.(${sids.join(',')})&select=id,full_name`);
    const pmap = {}; profs.forEach(p=>pmap[p.id]=p);
    all.forEach(c=>{ c._aluno = pmap[c.student_id]||{}; });
  }
  pausasContratos = all;
  pausasLoaded = true;
}

  ta.innerHTML = `<button class="btn btn-secondary" onclick="pausasLoaded=false;renderContent()">🔄</button>`;
  if(!pausasLoaded){
    container.innerHTML = '<div class="empty"><div class="empty-ico">⏳</div><div class="empty-title">Carregando…</div></div>';
    loadPausas().then(()=>renderContent());
    return;

    const dias = c.pause_end ? Math.ceil((new Date(c.pause_end+'T12:00')-new Date())/(864e5)) : '?';

          <div class="av" style="background:${avColor(c._aluno.full_name||'?')};width:42px;height:42px;border-radius:50%;font-size:14px;font-weight:700;flex-shrink:0">${ini(c._aluno.full_name||'?')}</div>
          <div style="flex:1">
            <div style="font-size:15px;font-weight:700">${c._aluno.full_name||'—'}</div>
            <div style="font-size:12px;color:var(--ink3);margin-top:2px">
              ${tipoMap[c.pause_type]||'Pausa'} · ${fmtDate(c.pause_start)} → ${fmtDate(c.pause_end)}

          <div style="text-align:right;flex-shrink:0">
            <div style="font-size:26px;font-weight:800;color:${dias>0?'#D97706':'var(--red)'}">${dias>0?dias:'Venceu'}</div>
            <div style="font-size:10px;color:var(--ink3)">${dias>0?'dias restantes':'retorno pendente'}</div>

          <button onclick="retomarPausaRec('${c.id}')" class="btn btn-green" style="padding:6px 14px;font-size:12px;white-space:nowrap">▶️ Retomar</button>
        </div>
      </div>

  };

  container.innerHTML = `
    <div style="display:flex;flex-direction:column;flex:1;overflow:hidden">
      <div style="padding:10px 24px;background:var(--bg);border-bottom:1px solid var(--bg3);flex-shrink:0;display:flex;gap:12px">
        <div style="background:var(--wh);border:1px solid var(--bg3);border-radius:10px;padding:10px 18px;text-align:center">

        </div>
        <div style="background:var(--wh);border:1px solid var(--bg3);border-radius:10px;padding:10px 18px;text-align:center">
          <div style="font-size:28px;font-weight:800">${historico.length}</div>
          <div style="font-size:11px;color:var(--ink3)">Retomados recente</div>

      <div style="padding:16px 24px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:10px">
        ${pausados.length
          ? pausados.map(cardPausado).join('')
          : '<div class="empty"><div class="empty-ico">✅</div><div class="empty-title">Nenhum contrato pausado</div><div class="empty-sub">Todos os contratos estão ativos.</div></div>'}
        ${historico.length ? `
          <div style="font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-top:8px">Histórico de pausas</div>

              <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bg3)">
                <div class="av" style="background:${avColor(c._aluno.full_name||'?')};width:30px;height:30px;border-radius:50%;font-size:11px;font-weight:700;flex-shrink:0">${ini(c._aluno.full_name||'?')}</div>

}

let relState = { alunoId:null, alunoNm:'', periodo:'30d', dataIni:'', dataFim:'', dados:null };

function renderRelatorio(container, ta){
  ta.innerHTML = `<button class="btn btn-secondary" onclick="relState.dados=null;renderContent()">🔄</button>`;

  if(!relState.alunoId){
    const filtrados = busca
      ? alunos.filter(a=>(a.full_name||'').toLowerCase().includes(busca.toLowerCase()))
      : alunos;
    container.innerHTML = `
      <div class="split">
        <div class="list-col">
          <div class="list-search">
            <input class="search-inp" placeholder="Buscar aluno…" value="${busca}" oninput="debounceBusca(this.value)">
          </div>
          <div class="list-items">
            ${filtrados.map(a=>`
              <div class="list-item" onclick="abrirRelatorio('${a.id}','${(a.full_name||'').replace(/'/g,"\\'")}')">
                <div class="av" style="background:${avColor(a.full_name||'')}">${ini(a.full_name||'?')}</div>
                <div style="flex:1;min-width:0">
                  <div class="li-name">${a.full_name||'—'}</div>
                  <div class="li-sub">mat. ${a.mat||'—'}</div>
                </div>
              </div>`).join('')}
          </div>
        </div>
        <div class="empty"><div class="empty-ico">📊</div><div class="empty-title">Selecione um aluno</div><div class="empty-sub">Para ver o relatório de presença.</div></div>
      </div>`;
    return;
  }

  if(!relState.dados){
    container.innerHTML = '<div class="empty"><div class="empty-ico">⏳</div><div class="empty-title">Carregando…</div></div>';
    carregarRelatorio().then(()=>renderContent());
    return;
  }

  const {alunoNm, dataIni, dataFim, dados, periodo} = relState;
  const cor = avColor(alunoNm);
  const presentes  = dados.filter(e=>e.status==='attended').length;
  const ausentes   = dados.filter(e=>e.status==='missed').length;
  const cancelados = dados.filter(e=>e.status==='cancelled').length;
  const total      = presentes + ausentes;
  const pct        = total>0?Math.round((presentes/total)*100):0;
  const pcor       = pct>=80?'var(--green)':pct>=60?'#D97706':'var(--red)';

  // Agrupar por semana
  const byWeek = {};
  dados.filter(e=>['attended','missed','confirmed'].includes(e.status)).forEach(e=>{
    const d = new Date(e.class_date+'T12:00');
    const mon = new Date(d); mon.setDate(d.getDate()-((d.getDay()||7)-1));
    const key = mon.toISOString().slice(0,10);
    if(!byWeek[key]) byWeek[key]={pres:0,aus:0,conf:0};
    if(e.status==='attended')  byWeek[key].pres++;
    else if(e.status==='missed')    byWeek[key].aus++;
    else byWeek[key].conf++;
  });

  const semRows = Object.entries(byWeek).sort().map(([seg,w])=>{
    const tot  = w.pres+w.aus;
    const pctW = tot>0?Math.round((w.pres/tot)*100):0;
    const wc   = pctW===100?'var(--green)':pctW>=50?'#D97706':'var(--red)';
    const semLbl = new Date(seg+'T12:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
    return `<tr style="border-bottom:1px solid var(--bg3)">
      <td style="padding:7px 12px;font-size:12px">Sem. ${semLbl}</td>
      <td style="padding:7px 12px;text-align:center;font-weight:600;color:var(--green)">${w.pres}</td>
      <td style="padding:7px 12px;text-align:center;color:var(--red)">${w.aus}</td>
      <td style="padding:7px 12px">
        <div style="display:flex;align-items:center;gap:6px">
          <div style="flex:1;background:var(--bg3);border-radius:20px;height:5px">
            <div style="width:${pctW}%;height:5px;border-radius:20px;background:${wc}"></div>
          </div>
          <span style="font-size:11px;font-weight:600;color:${wc};min-width:30px">${pctW}%</span>
        </div>
      </td>
    </tr>`;
  }).join('');

  // Timeline mini-cards
  const timeline = dados.filter(e=>e.status!=='cancelled').map(e=>{
    const lbl = new Date(e.class_date+'T12:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
    const hora = (e._slot?.start_time||'').slice(0,5);
    const bg  = e.status==='attended'?'#16A34A':e.status==='missed'?'#DC2626':'#D97706';
    return `<div style="background:${bg};border-radius:6px;padding:4px 7px;text-align:center;min-width:42px">
      <div style="font-size:11px;font-weight:700;color:#fff">${lbl}</div>
      ${hora?`<div style="font-size:10px;color:rgba(255,255,255,.8)">${hora}</div>`:''}
    </div>`;
  }).join('');

  const perBtns = [['7d','7d'],['30d','30d'],['90d','3m'],['180d','6m']].map(([k,l])=>
    `<button onclick="filtrarPeriodo('${k}')"
      style="padding:5px 11px;font-size:11px;font-weight:600;border-radius:6px;cursor:pointer;border:1px solid var(--bg3);
      background:${periodo===k?'var(--purple)':'var(--wh)'};color:${periodo===k?'#fff':'var(--ink2)'}">${l}</button>`
  ).join('');

  container.innerHTML = `
    <div style="display:flex;flex-direction:column;flex:1;overflow:hidden">
      <div style="background:var(--wh);border-bottom:1px solid var(--bg3);padding:12px 24px;display:flex;align-items:center;gap:12px;flex-shrink:0;flex-wrap:wrap">
        <button onclick="relState.alunoId=null;relState.dados=null;busca='';renderContent()" style="border:none;background:none;font-size:18px;cursor:pointer;color:var(--ink3)">←</button>
        <div class="av" style="background:${cor};width:34px;height:34px;border-radius:50%;font-size:12px;font-weight:700;flex-shrink:0">${ini(alunoNm)}</div>
        <div style="flex:1;min-width:120px">
          <div style="font-size:14px;font-weight:700">${alunoNm}</div>
          <div style="font-size:11px;color:var(--ink3)">${fmtDate(dataIni)} → ${fmtDate(dataFim)}</div>
        </div>
        <div style="display:flex;gap:4px">${perBtns}</div>
      </div>

      <div style="padding:16px 24px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:12px">

        <!-- Stats -->
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
          ${[[presentes,'Presenças','var(--green)'],
             [ausentes,'Faltas','var(--red)'],
             [cancelados,'Cancelamentos','#D97706'],
             [pct+'%','Frequência',pcor]
            ].map(([v,l,c])=>`
            <div style="background:var(--wh);border:1px solid var(--bg3);border-radius:var(--r);padding:12px 14px">
              <div style="font-size:24px;font-weight:800;color:${c}">${v}</div>
              <div style="font-size:11px;color:var(--ink3);margin-top:2px">${l}</div>
            </div>`).join('')}
        </div>

        <!-- Barra frequência -->
        <div class="card">
          <div class="card-body">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
              <span style="font-size:13px;font-weight:600">Taxa de presença no período</span>
              <span style="font-size:20px;font-weight:800;color:${pcor}">${pct}%</span>
            </div>
            <div style="background:var(--bg3);border-radius:20px;height:10px">
              <div style="width:${pct}%;height:10px;border-radius:20px;background:${pcor};transition:width .5s"></div>
            </div>
            <div style="display:flex;justify-content:space-between;margin-top:5px;font-size:11px;color:var(--ink3)">
              <span>0%</span><span style="color:var(--green)">↑ 80% meta</span><span>100%</span>
            </div>
          </div>
        </div>

        <!-- Por semana -->
        ${semRows?`<div class="card">
          <div class="card-hdr"><span class="sb-ico">📅</span><span class="card-hdr-title">Por semana</span></div>
          <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse">
            <thead><tr style="background:var(--bg)">
              <th style="padding:6px 12px;font-size:11px;text-align:left;font-weight:700;color:var(--ink3)">Semana</th>
              <th style="padding:6px 12px;font-size:11px;text-align:center;color:var(--green)">✅</th>
              <th style="padding:6px 12px;font-size:11px;text-align:center;color:var(--red)">❌</th>

            </tr></thead>
            <tbody>${semRows}</tbody>
          </table></div>
        </div>`:''}

        <!-- Timeline -->
        ${timeline?`<div class="card">
          <div class="card-hdr"><span class="sb-ico">🗓️</span><span class="card-hdr-title">Aulas no período</span>
            <div style="margin-left:auto;display:flex;gap:8px;font-size:10px;color:var(--ink3)">
              <span>🟩 Presente</span><span>🟥 Faltou</span><span>🟧 Confirmado</span>
            </div>
          </div>
          <div class="card-body"><div style="display:flex;flex-wrap:wrap;gap:5px">${timeline}</div></div>
        </div>`:''}

        <div style="padding-bottom:20px"></div>
      </div>
    </div>`;
}

async function abrirRelatorio(id, nm){
  relState.alunoId = id; relState.alunoNm = nm; relState.dados = null;
  filtrarPeriodo('30d', false);
}

async function carregarRelatorio(){
  const {alunoId, dataIni, dataFim} = relState;
  const enrolls = await sbGet('class_enrollments',
    `student_id=eq.${alunoId}&class_date=gte.${dataIni}&class_date=lte.${dataFim}&select=id,class_date,status,class_slot_id&order=class_date.asc`);
  if(!classSlots.length) await loadClassSlots();
  const slotMap = {}; classSlots.forEach(s=>slotMap[s.id]=s);
  enrolls.forEach(e=>{ e._slot = slotMap[e.class_slot_id]||{}; });
  relState.dados = enrolls;
}

function filtrarPeriodo(k, render=true){
  relState.periodo = k;
  const hoje = new Date();
  relState.dataFim = hoje.toISOString().slice(0,10);
  const ini = new Date(hoje);
  if(k==='7d')   ini.setDate(hoje.getDate()-7);
  if(k==='30d')  ini.setDate(hoje.getDate()-30);
  if(k==='90d')  ini.setDate(hoje.getDate()-90);
  if(k==='180d') ini.setDate(hoje.getDate()-180);
  relState.dataIni = ini.toISOString().slice(0,10);
  relState.dados = null;
  if(render) renderContent();
}

// ── ABA TURMA ──
async function renderAbasTurma(a){
  if(!turmaEnrolls){
    setTimeout(async()=>{
      // últimos 60 dias + próximos 30
      const hoje = new Date().toISOString().slice(0,10);
      const ini  = new Date(); ini.setDate(ini.getDate()-60);
      const fim  = new Date(); fim.setDate(fim.getDate()+30);
      turmaEnrolls = await sbGet('class_enrollments',
        `student_id=eq.${a.id}&class_date=gte.${ini.toISOString().slice(0,10)}&class_date=lte.${fim.toISOString().slice(0,10)}&order=class_date.desc&select=*`);
      // Load fixed slots
      const fixos = await sbGet('fixed_slots',`student_id=eq.${a.id}&active=eq.true&select=*`);
      a._fixed_slots = fixos;
      renderContent();
    },0);
    return '<div style="padding:40px;text-align:center;color:var(--ink3)">⏳ Carregando…</div>';
  }

  const hoje = new Date().toISOString().slice(0,10);
  const DIAS_SEMANA = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

  // Agenda fixa
  const fixos = a._fixed_slots||[];

    const slot = classSlots.find(s=>s.id===fs.class_slot_id)||{};
    return `<div style="display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid var(--bg3)">
      <div style="min-width:36px;font-size:11px;font-weight:700;color:var(--purple)">${DIAS_SEMANA[slot.weekday]||'?'}</div>
      <div style="font-size:13px;font-weight:600">${(slot.start_time||'').slice(0,5)} – ${(slot.end_time||'').slice(0,5)}</div>
      <div style="margin-left:auto;font-size:11px;color:var(--ink3)">até ${fmtDate(fs.end_date)}</div>
    </div>`;
  }).join('')
  : '<div style="padding:12px 14px;font-size:12px;color:var(--ink3)">Sem horários fixos cadastrados.</div>';

  // Histórico de aulas
  const STATUS_STYLE = {
    attended:  {bg:'#ECFDF5',tc:'#065F46',lbl:'Presente'},
    missed:    {bg:'#FEF2F2',tc:'#991B1B',lbl:'Faltou'},
    cancelled: {bg:'#F3F4F6',tc:'#6B7280',lbl:'Cancelado'},
    confirmed: {bg:'#EFF6FF',tc:'#1E40AF',lbl:'Matriculado'},
  };

  const histHtml = turmaEnrolls.length ? turmaEnrolls.map(e=>{
    const st  = STATUS_STYLE[e.status]||{bg:'var(--bg)',tc:'var(--ink3)',lbl:e.status};
    const slot = classSlots.find(s=>s.id===e.class_slot_id)||{};

      <td style="padding:7px 12px;font-size:12px">${fmtDate(e.class_date)}</td>
      <td style="padding:7px 12px;font-size:12px;color:var(--ink3)">${hora}</td>
      <td style="padding:7px 12px">
        <span style="font-size:11px;padding:2px 9px;border-radius:20px;background:${st.bg};color:${st.tc};font-weight:600">${isFut?'🔲 Agendado':st.lbl}</span>
      </td>
      <td style="padding:7px 12px;font-size:11px;color:var(--ink3)">${e.enrollment_type==='fixed'?'📌 Fixo':e.enrollment_type==='replacement'?'🔄 Reposição':'Flexível'}</td>
    </tr>`;
  }).join('')
  : '<tr><td colspan="4" style="padding:20px;text-align:center;color:var(--ink3)">Sem aulas no período</td></tr>';
