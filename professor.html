<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Professor — Estúdio Se7e</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{
    --purple:#6D28D9;--purple-l:#EDE9FE;--purple-b:#C4B5FD;
    --green:#16A34A;--green-l:#DCFCE7;
    --gold:#F59E0B;--gold-l:#FEF3C7;
    --red:#DC2626;--red-l:#FEF2F2;
    --blue:#1E40AF;--blue-l:#EFF6FF;
    --ink:#1C1916;--ink2:#4A453F;--ink3:#8A8278;
    --bg:#F5F0E8;--bg3:#E0DAD0;--wh:#FFFEF9;
    --r:12px;--safe:env(safe-area-inset-bottom,0px);
  }
  body{background:var(--bg);color:var(--ink);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;max-width:480px;margin:0 auto}

  /* Header */
  .header{background:var(--ink);padding:16px 20px 14px;position:sticky;top:0;z-index:50}
  .header-top{display:flex;align-items:center;justify-content:space-between}
  .header-title{font-size:18px;font-weight:800;color:#fff}
  .header-title span{color:var(--gold)}
  .header-sub{font-size:12px;color:rgba(255,255,255,.5);margin-top:2px}
  .prof-badge{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:4px 12px;font-size:12px;color:rgba(255,255,255,.8);cursor:pointer}

  /* Nav tabs */
  .tabs{display:flex;background:var(--wh);border-bottom:2px solid var(--bg3);position:sticky;top:72px;z-index:40}
  .tab{flex:1;padding:11px 6px;text-align:center;font-size:12px;font-weight:600;color:var(--ink3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
  .tab.on{color:var(--purple);border-bottom-color:var(--purple)}

  /* Content */
  .content{padding:14px 16px 80px}

  /* Cards */
  .card{background:var(--wh);border:1px solid var(--bg3);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
  .card-hdr{padding:12px 14px;border-bottom:1px solid var(--bg3);display:flex;align-items:center;gap:8px;background:var(--bg)}
  .card-title{font-size:13px;font-weight:700;color:var(--ink)}
  .card-body{padding:12px 14px}

  /* Aula card */
  .aula-card{background:var(--wh);border:1.5px solid var(--bg3);border-radius:var(--r);padding:14px;margin-bottom:10px;cursor:pointer;transition:all .15s;position:relative}
  .aula-card:active{transform:scale(.98)}
  .aula-card.sel{border-color:var(--purple);background:var(--purple-l)}
  .aula-hora{font-size:22px;font-weight:900;color:var(--ink)}
  .aula-aluno{font-size:15px;font-weight:700;margin:6px 0 2px}
  .aula-sub{font-size:12px;color:var(--ink3)}
  .status-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid}

  /* Exercício row */
  .ex-row{padding:10px 0;border-bottom:1px solid var(--bg3);display:flex;align-items:center;gap:10px}
  .ex-row:last-child{border-bottom:none}
  .ex-nm{font-size:13px;font-weight:600;flex:1}
  .ex-grupo{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.4px}
  .ex-series{font-size:12px;color:var(--purple);font-weight:700;white-space:nowrap}
  .ex-carga{font-size:15px;font-weight:800;color:var(--ink);min-width:60px;text-align:right}
  .carga-input{width:70px;padding:6px 8px;border:2px solid var(--bg3);border-radius:8px;font-size:15px;font-weight:700;text-align:center;color:var(--ink);background:var(--bg);outline:none}
  .carga-input:focus{border-color:var(--purple);background:#fff}

  /* Botões grandes */
  .btn-xl{width:100%;padding:16px;border:none;border-radius:var(--r);font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s}
  .btn-xl:active{opacity:.85}
  .btn-green{background:var(--green);color:#fff}
  .btn-purple{background:var(--purple);color:#fff}
  .btn-red{background:var(--red);color:#fff}
  .btn-secondary{background:var(--bg);color:var(--ink2);border:1.5px solid var(--bg3)}

  /* Presença toggle */
  .presenca-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--bg3)}
  .presenca-row:last-child{border-bottom:none}
  .presenca-toggle{width:44px;height:26px;border-radius:20px;border:none;cursor:pointer;position:relative;flex-shrink:0;transition:background .2s}
  .presenca-toggle::after{content:'';position:absolute;top:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
  .presenca-toggle.presente{background:var(--green)}
  .presenca-toggle.presente::after{left:21px}
  .presenca-toggle.ausente{background:#D1D5DB}
  .presenca-toggle.ausente::after{left:3px}

  /* QR Ponto */
  .qr-container{text-align:center;padding:32px 20px}
  .qr-box{display:inline-block;background:#fff;padding:20px;border-radius:16px;border:3px solid var(--ink);margin:16px 0}
  .qr-id{font-size:11px;color:var(--ink3);margin-top:8px;font-family:monospace}
  .clock-display{font-size:48px;font-weight:900;color:var(--ink);letter-spacing:-2px;margin:8px 0}
  .clock-status{font-size:14px;font-weight:600}

  /* Login */
  .login-box{padding:40px 20px;text-align:center}
  .login-title{font-size:24px;font-weight:800;margin-bottom:8px}
  .login-sub{font-size:14px;color:var(--ink3);margin-bottom:28px;line-height:1.5}
  .mi{width:100%;padding:12px 14px;border:1.5px solid var(--bg3);border-radius:var(--r);font-size:15px;color:var(--ink);background:var(--bg);outline:none;font-family:inherit;margin-bottom:10px}
  .mi:focus{border-color:var(--purple);background:#fff}

  /* Empty */
  .empty{text-align:center;padding:48px 20px;color:var(--ink3)}
  .empty-ico{font-size:48px;margin-bottom:12px}
  .empty-title{font-size:16px;font-weight:600;color:var(--ink2);margin-bottom:6px}
  .empty-sub{font-size:13px;line-height:1.5}

  /* Spinner */
  .spinner{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--ink3)}

  /* Toast */
  .toast{position:fixed;bottom:calc(20px + var(--safe));left:50%;transform:translateX(-50%);background:#1C1916;color:#fff;padding:10px 20px;border-radius:30px;font-size:13px;font-weight:600;z-index:200;white-space:nowrap;pointer-events:none}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">ESTÚDIO <span>Se7e</span></div>
      <div class="header-sub" id="hdr-sub">Professor</div>
    </div>
    <div class="prof-badge" id="prof-badge" onclick="logout()">Sair</div>
  </div>
</div>

<div class="tabs" id="tabs" style="display:none">
  <div class="tab on" onclick="setTab('aulas',this)">🏋️ Aulas</div>
  <div class="tab" onclick="setTab('treino',this)">📋 Treino</div>
  <div class="tab" onclick="setTab('ponto',this)">🕐 Ponto</div>
</div>

<div class="content" id="content">
  <!-- Login screen -->
  <div class="login-box">
    <div style="font-size:52px;margin-bottom:12px">🏋️</div>
    <div class="login-title">App do Professor</div>
    <div class="login-sub">Selecione seu nome para acessar</div>
    <div id="prof-list" class="spinner">⏳ Carregando professores…</div>
  </div>
</div>

<script>
// ══════════════════════════════════════
// CONFIG
// ══════════════════════════════════════
const SUPA_URL = 'https://kfmkcbhalwupgknysukj.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmbWtjYmhhbHd1cGdrbnlzdWtqIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MzQzMjE2NCwiZXhwIjoyMDg5MDA4MTY0fQ.xvRFjKk7GnXqrykjEr9Cp1yGGV-wGmcsZ-9SHZ1u9UU';
const SB_HDR  = {'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=representation'};

async function sbGet(t,p=''){const r=await fetch(`${SUPA_URL}/rest/v1/${t}?${p}`,{headers:SB_HDR});return r.json();}
async function sbPost(t,d){const r=await fetch(`${SUPA_URL}/rest/v1/${t}`,{method:'POST',headers:SB_HDR,body:JSON.stringify(d)});return r.json();}
async function sbPatch(t,p,d){const r=await fetch(`${SUPA_URL}/rest/v1/${t}?${p}`,{method:'PATCH',headers:SB_HDR,body:JSON.stringify(d)});return r.json();}

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let prof      = JSON.parse(localStorage.getItem('se7e_prof')||'null');
let tab       = 'aulas';
let hoje      = new Date().toISOString().slice(0,10);
let aulas     = [];   // enrollments do professor hoje
let aulasSel  = null; // enrollment selecionado
let exercicios= [];   // exercícios da ficha do aluno selecionado
let cargas    = {};   // {exercise_id: weight_kg} alterações nesta sessão
let presencas = {};   // {student_id: true/false}
let clockState= null; // registro de ponto atual
let clockTimer= null;

function ini(nm){return nm.split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase();}
const PALETA=['#1E40AF','#6D28D9','#065F46','#92400E','#991B1B','#1D4ED8','#7C3AED'];
function avColor(nm){let h=0;for(const c of nm)h=(h*31+c.charCodeAt(0))%PALETA.length;return PALETA[Math.abs(h)];}
function fmtHora(iso){if(!iso)return'—';return new Date(iso).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}
function showToast(msg,dur=2500){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),dur);
}

// ══════════════════════════════════════
// LOGIN
// ══════════════════════════════════════
async function loadProfessores(){
  const profs = await sbGet('profiles','role=eq.teacher&active=eq.true&select=id,full_name&order=full_name');
  const el = document.getElementById('prof-list');
  el.innerHTML = '';
  el.style.cssText = 'display:flex;flex-direction:column;gap:8px;margin-top:4px';
  profs.forEach(p=>{
    const btn = document.createElement('button');
    btn.style.cssText = `padding:14px;background:var(--wh);border:1.5px solid var(--bg3);border-radius:var(--r);font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:12px;width:100%`;
    btn.innerHTML = `<div style="width:36px;height:36px;border-radius:50%;background:${avColor(p.full_name)};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff">${ini(p.full_name)}</div>${p.full_name}`;
    btn.onclick = ()=>loginProfessor(p);
    el.appendChild(btn);
  });
}

function loginProfessor(p){
  prof = p;
  localStorage.setItem('se7e_prof', JSON.stringify(p));
  initApp();
}

function logout(){
  if(!confirm('Sair?')) return;
  prof = null;
  localStorage.removeItem('se7e_prof');
  location.reload();
}

// ══════════════════════════════════════
// INIT APP
// ══════════════════════════════════════
async function initApp(){
  document.getElementById('hdr-sub').textContent = prof.full_name.split(' ')[0];
  document.getElementById('prof-badge').textContent = 'Sair';
  document.getElementById('tabs').style.display = 'flex';
  await loadAulas();
  renderTab();
}

async function loadAulas(){
  // Buscar enrollments onde instructor_id = prof.id e class_date = hoje
  const enrolls = await sbGet('class_enrollments',
    `instructor_id=eq.${prof.id}&class_date=eq.${hoje}&status=neq.cancelled`+
    `&select=id,student_id,class_slot_id,status,training_session_id,checked_in_at`);

  // Carregar nomes dos alunos
  if(enrolls.length){
    const sids = [...new Set(enrolls.map(e=>e.student_id))];
    const [profs2, students] = await Promise.all([
      sbGet('profiles',`id=in.(${sids.join(',')})&select=id,full_name`),
      sbGet('students',`id=in.(${sids.join(',')})&select=id,next_training_session,current_program_id,treinos_realizados`),
    ]);
    const pmap = {}; profs2.forEach(p=>pmap[p.id]=p);
    const smap = {}; students.forEach(s=>smap[s.id]=s);
    enrolls.forEach(e=>{
      e._nm  = pmap[e.student_id]?.full_name||'—';
      e._st  = smap[e.student_id]||{};
    });
  }

  // Carregar horários
  const slotIds = [...new Set(enrolls.map(e=>e.class_slot_id))];
  let slots = [];
  if(slotIds.length){
    slots = await sbGet('class_slots',`id=in.(${slotIds.join(',')})&select=id,start_time,end_time`);
  }
  const slotMap = {}; slots.forEach(s=>slotMap[s.id]=s);
  enrolls.forEach(e=>{ e._slot = slotMap[e.class_slot_id]||{}; });

  aulas = enrolls.sort((a,b)=>(a._slot.start_time||'').localeCompare(b._slot.start_time||''));

  // Inicializar presencas
  presencas = {};
  aulas.forEach(e=>{ presencas[e.student_id] = e.status==='attended'||!!e.checked_in_at; });
}

// ══════════════════════════════════════
// TABS
// ══════════════════════════════════════
function setTab(t, el){
  tab = t;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  el.classList.add('on');
  renderTab();
}

function renderTab(){
  const c = document.getElementById('content');
  if(tab==='aulas')  renderAulas(c);
  else if(tab==='treino') renderTreino(c);
  else if(tab==='ponto')  renderPonto(c);
}

// ══════════════════════════════════════
// ABA AULAS
// ══════════════════════════════════════
function renderAulas(c){
  if(!aulas.length){
    c.innerHTML=`<div class="empty"><div class="empty-ico">✅</div><div class="empty-title">Sem aulas hoje</div><div class="empty-sub">Você não tem alunos escalados para hoje.</div>
    <button onclick="loadAulas().then(()=>renderTab())" class="btn-xl btn-secondary" style="margin-top:16px">🔄 Atualizar</button></div>`;
    return;
  }

  // Agrupar por horário
  const grupos = {};
  aulas.forEach(e=>{
    const h = e._slot.start_time?.slice(0,5)||'—';
    if(!grupos[h]) grupos[h]=[];
    grupos[h].push(e);
  });

  const html = Object.entries(grupos).map(([hora,enrolls])=>`
    <div style="margin-bottom:16px">
      <div style="font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">${hora}</div>
      ${enrolls.map(e=>{
        const presente = presencas[e.student_id];
        const isSel    = aulasSel?.id===e.id;
        return `<div class="aula-card${isSel?' sel':''}" onclick="selecionarAula('${e.id}')">
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:42px;height:42px;border-radius:50%;background:${avColor(e._nm)};display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0">${ini(e._nm)}</div>
            <div style="flex:1;min-width:0">
              <div class="aula-aluno">${e._nm}</div>
              <div class="aula-sub">Ficha ${e._st.next_training_session||1} · ${e._st.treinos_realizados||0} treinos feitos</div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
              <span class="status-badge" style="background:${presente?'#ECFDF5':'#F9F7F4'};color:${presente?'#065F46':'#6B7280'};border-color:${presente?'#A7F3D0':'#E5E7EB'}">
                ${presente?'✓ Presente':'○ Pendente'}
              </span>
              ${e.checked_in_at?`<span style="font-size:10px;color:var(--ink3)">Check-in ${fmtHora(e.checked_in_at)}</span>`:''}
            </div>
          </div>
          ${isSel?`<div style="margin-top:10px;display:flex;gap:6px">
            <button onclick="event.stopPropagation();togglePresenca('${e.student_id}')" class="btn-xl" style="flex:1;background:${presente?'#FEF2F2':'#ECFDF5'};color:${presente?'var(--red)':'var(--green)'};padding:10px;font-size:13px;border:1px solid ${presente?'#FECACA':'#A7F3D0'}">
              ${presente?'✕ Marcar ausente':'✓ Marcar presente'}
            </button>
            <button onclick="event.stopPropagation();irParaTreino('${e.id}')" class="btn-xl btn-purple" style="flex:1;padding:10px;font-size:13px">
              📋 Ver treino
            </button>
          </div>`:''}
        </div>`;
      }).join('')}
    </div>`).join('');

  const nPresentes = Object.values(presencas).filter(Boolean).length;
  const nTotal     = aulas.length;

  c.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div>
        <div style="font-size:13px;font-weight:700">${hoje.split('-').reverse().join('/')}</div>
        <div style="font-size:11px;color:var(--ink3)">${nPresentes}/${nTotal} presentes</div>
      </div>
      <button onclick="loadAulas().then(()=>renderTab())" style="border:1px solid var(--bg3);background:var(--wh);border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer">🔄</button>
    </div>
    ${html}
    ${nTotal>0?`<button class="btn-xl btn-green" onclick="confirmarTodasAulas()" style="margin-top:8px">✓ Confirmar relatório de aula</button>`:''}`;
}

function selecionarAula(id){
  aulasSel = aulasSel?.id===id ? null : aulas.find(e=>e.id===id);
  renderTab();
}

function togglePresenca(studentId){
  presencas[studentId] = !presencas[studentId];
  renderTab();
}

function irParaTreino(enrollId){
  aulasSel = aulas.find(e=>e.id===enrollId);
  setTab('treino', document.querySelectorAll('.tab')[1]);
}

async function confirmarTodasAulas(){
  if(!confirm(`Confirmar relatório?\n✅ Presentes: ${Object.values(presencas).filter(Boolean).length}\n❌ Ausentes: ${Object.values(presencas).filter(v=>!v).length}`)) return;

  const presentes = aulas.filter(e=>presencas[e.student_id]).map(e=>e.student_id);
  const ausentes  = aulas.filter(e=>!presencas[e.student_id]).map(e=>e.student_id);

  // Usar o enrollment do primeiro aluno presente como referência
  const enrollRef = aulas.find(e=>presencas[e.student_id]);
  if(!enrollRef){ showToast('Nenhum aluno presente marcado.'); return; }

  try {
    const r = await fetch('/aulas/confirmar',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':'se7e2025'},
      body: JSON.stringify({
        enrollment_id:       enrollRef.id,
        student_id:          enrollRef.student_id,
        training_session_id: enrollRef.training_session_id||'',
        instructor_id:       prof.id,
        class_date:          hoje,
        presentes,
        ausentes,
        cargas: Object.entries(cargas).map(([eid,wkg])=>({
          exercise_id: eid, weight_kg: parseFloat(wkg),
          sets_done:1, reps_done:'', changed_from_previous:true
        })),
      })
    });
    const data = await r.json();
    if(data.ok){
      showToast(`✅ Relatório confirmado! ${presentes.length} presentes`,3000);
      cargas = {};
      await loadAulas();
      renderTab();
    } else {
      showToast('Erro ao confirmar: '+JSON.stringify(data));
    }
  } catch(e){
    showToast('Erro: '+e.message);
  }
}

// ══════════════════════════════════════
// ABA TREINO
// ══════════════════════════════════════
async function renderTreino(c){
  if(!aulasSel){
    c.innerHTML = `<div class="empty"><div class="empty-ico">📋</div><div class="empty-title">Selecione um aluno</div><div class="empty-sub">Vá em Aulas e toque em "Ver treino" para abrir a ficha.</div></div>`;
    return;
  }

  c.innerHTML = `<div class="spinner">⏳ Carregando treino…</div>`;

  const st = aulasSel._st;
  if(!st.current_program_id){ c.innerHTML=`<div class="empty"><div class="empty-ico">📋</div><div class="empty-title">Sem programa</div><div class="empty-sub">Este aluno ainda não tem programa de treino.</div></div>`; return; }

  // Buscar sessões
  const sessions = await sbGet('training_sessions',`program_id=eq.${st.current_program_id}&order=order`);
  if(!sessions.length){ c.innerHTML=`<div class="empty"><div class="empty-ico">📋</div><div class="empty-title">Sem fichas</div></div>`; return; }

  const n = (st.next_training_session||1)-1;
  const session = sessions[n % sessions.length];

  // Buscar exercícios
  const exRows = await sbGet('training_exercises',`session_id=eq.${session.id}&order=order`);
  let exMap = {};
  if(exRows.length){
    const eids = [...new Set(exRows.map(e=>e.exercise_id))];
    const exData = await sbGet('exercises',`id=in.(${eids.join(',')})&select=id,name,muscle_group`);
    exData.forEach(e=>exMap[e.id]=e);
  }

  // Buscar última carga
  let cargaMap = {};
  if(exRows.length){
    const sid = aulasSel.student_id;
    const eids = [...new Set(exRows.map(e=>e.exercise_id))];
    const hist = await sbGet('exercise_history',`student_id=eq.${sid}&exercise_id=in.(${eids.join(',')})&select=exercise_id,last_weight_kg`);
    hist.forEach(h=>{ cargaMap[h.exercise_id]=h.last_weight_kg; });
  }

  exercicios = exRows.map(e=>({
    ...e,
    _nm:    exMap[e.exercise_id]?.name||'—',
    _grupo: exMap[e.exercise_id]?.muscle_group||'',
    _carga: cargaMap[e.exercise_id]||null,
  }));

  const exHtml = exercicios.map((ex,i)=>{
    const cargaAtual = cargas[ex.exercise_id]!=null ? cargas[ex.exercise_id] : ex._carga;
    return `<div class="ex-row">
      <div style="flex:1;min-width:0">
        <div class="ex-grupo">${ex._grupo}</div>
        <div class="ex-nm">${ex._nm}</div>
        <div class="ex-series">${ex.sets}×${ex.reps}${ex.rest_seconds?' · '+ex.rest_seconds+'s descanso':''}</div>
        ${ex.observation?`<div style="font-size:11px;color:var(--ink3);margin-top:2px">📝 ${ex.observation}</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <input class="carga-input" type="number" step="0.5" min="0"
          value="${cargaAtual||''}"
          placeholder="—"
          oninput="cargas['${ex.exercise_id}']=this.value"
          onclick="this.select()">
        <div style="font-size:9px;color:var(--ink3)">kg</div>
      </div>
    </div>`;
  }).join('');

  c.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <div style="width:40px;height:40px;border-radius:50%;background:${avColor(aulasSel._nm)};display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff">${ini(aulasSel._nm)}</div>
      <div>
        <div style="font-size:15px;font-weight:700">${aulasSel._nm}</div>
        <div style="font-size:12px;color:var(--purple);font-weight:600">${session.name} · ${sessions.length} fichas no programa</div>
      </div>
    </div>
    <div class="card">
      <div class="card-hdr">
        <span style="font-size:16px">📋</span>
        <span class="card-title">${session.name}</span>
        <span style="margin-left:auto;font-size:11px;color:var(--ink3)">${exercicios.length} exercícios</span>
      </div>
      <div class="card-body" style="padding:0 14px">
        ${exHtml||'<div style="padding:16px;text-align:center;color:var(--ink3)">Sem exercícios nesta ficha</div>'}
      </div>
    </div>
    <div style="font-size:11px;color:var(--ink3);text-align:center;margin:8px 0">
      Altere a carga apenas quando houver mudança. Campos vazios = mantém a última carga registrada.
    </div>`;
}

// ══════════════════════════════════════
// ABA PONTO (QR Code)
// ══════════════════════════════════════
async function renderPonto(c){
  // Verificar se há ponto aberto hoje
  const pontos = await sbGet('instructor_timeclock',
    `instructor_id=eq.${prof.id}&date=eq.${hoje}&order=clock_in.desc&limit=1`);
  clockState = pontos[0]||null;

  const temPontoAberto = clockState && !clockState.clock_out;
  const clockInHora   = clockState ? fmtHora(clockState.clock_in) : null;
  const clockOutHora  = clockState?.clock_out ? fmtHora(clockState.clock_out) : null;

  // QR Code data: professor_id|data|acao
  const acao  = temPontoAberto ? 'saida' : 'entrada';
  const qrData= `${prof.id}|${hoje}|${acao}`;

  // Gerar QR com qrcode.js (via CDN)
  c.innerHTML = `
    <div class="qr-container">
      <div style="font-size:20px;font-weight:700;margin-bottom:4px">Ponto — ${hoje.split('-').reverse().join('/')}</div>
      <div class="clock-display" id="clock-now">--:--</div>

      ${clockState?`
      <div style="margin-bottom:16px">
        <div class="status-badge" style="background:${temPontoAberto?'#FEF3C7':'#ECFDF5'};color:${temPontoAberto?'#92400E':'#065F46'};border-color:${temPontoAberto?'#FCD34D':'#A7F3D0'};font-size:13px;padding:6px 16px">
          ${temPontoAberto?`🟡 Entrada: ${clockInHora} — em serviço`:`✅ ${clockInHora} → ${clockOutHora}`}
        </div>
      </div>`:''}

      <div class="qr-box" id="qr-box"></div>
      <div class="qr-id">Escaneie para registrar <strong>${acao==='entrada'?'ENTRADA':'SAÍDA'}</strong></div>
      <div style="font-size:12px;color:var(--ink3);margin-top:4px">${prof.full_name}</div>

      <div style="display:flex;gap:10px;margin-top:20px">
        <button class="btn-xl ${temPontoAberto?'btn-red':'btn-green'}" onclick="registrarPontoManual('${acao}')">
          ${temPontoAberto?'🔴 Registrar saída':'🟢 Registrar entrada'}
        </button>
      </div>
      <div style="font-size:11px;color:var(--ink3);margin-top:10px">
        Escaneie o QR fixo na entrada OU use o botão acima como alternativa.
      </div>
    </div>`;

  // Relógio ao vivo
  function atualizarClock(){
    const el = document.getElementById('clock-now');
    if(el) el.textContent = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  }
  atualizarClock();
  if(clockTimer) clearInterval(clockTimer);
  clockTimer = setInterval(atualizarClock, 1000);

  // Gerar QR Code
  const script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
  script.onload = ()=>{
    const el = document.getElementById('qr-box');
    if(el) new QRCode(el,{text:qrData,width:160,height:160,colorDark:'#1C1916',colorLight:'#fff'});
  };
  document.head.appendChild(script);
}

async function registrarPontoManual(acao){
  const agora = new Date().toISOString();
  try {
    if(acao==='entrada'){
      await sbPost('instructor_timeclock',{
        instructor_id: prof.id,
        clock_in:  agora,
        date:      hoje,
      });
      showToast('🟢 Entrada registrada: '+fmtHora(agora));
    } else {
      if(clockState){
        await sbPatch('instructor_timeclock',`id=eq.${clockState.id}`,{clock_out:agora});
        showToast('🔴 Saída registrada: '+fmtHora(agora));
      }
    }
    await renderPonto(document.getElementById('content'));
  } catch(e){
    showToast('Erro: '+e.message);
  }
}

(async()=>{
  if(prof){
    await initApp();
  } else {
    await loadProfessores();
  }
})();
