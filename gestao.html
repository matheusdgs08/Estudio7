<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0F0F0F;--bg2:#1A1A1A;--bg3:#252525;--bg4:#333;
  --wh:#FFFFFF;--ink:#F5F5F5;--ink2:#AAAAAA;--ink3:#666;
  --green:#2ECC71;--green-bg:rgba(46,204,113,.12);
  --red:#E74C3C;--red-bg:rgba(231,76,60,.12);
  --gold:#C9A84C;--gold-bg:rgba(201,168,76,.12);
  --blue:#3B82F6;--blue-bg:rgba(59,130,246,.12);
  --purple:#8B5CF6;--purple-bg:rgba(139,92,246,.12);
  --r:12px;
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'DM Sans',system-ui,-apple-system,sans-serif;color:var(--ink);font-size:15px;display:flex;flex-direction:column}
.safe-top{height:var(--safe-t);background:var(--bg);flex-shrink:0}
.pg-hdr{padding:16px 20px 12px;background:var(--bg);flex-shrink:0}
.pg-title{font-size:28px;font-weight:800;letter-spacing:-0.5px}
.pg-sub{font-size:12px;color:var(--ink3);margin-top:2px}
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(64px + var(--safe-b));scrollbar-width:none}
.content::-webkit-scrollbar{display:none}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--bg3);display:flex;padding:4px 0 calc(4px + var(--safe-b));z-index:100}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:8px 0;cursor:pointer;position:relative}
.bnav-ico{font-size:22px;line-height:1;opacity:.4;transition:opacity .15s}
.bnav-lbl{font-size:10px;font-weight:600;color:var(--ink3);transition:color .15s}
.bnav-item.on .bnav-ico{opacity:1}
.bnav-item.on .bnav-lbl{color:var(--wh)}
.bnav-item.on::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:32px;height:2px;background:var(--green);border-radius:0 0 2px 2px}
.card{background:var(--bg2);border-radius:var(--r);margin:0 16px 12px;overflow:hidden}
.card-h{padding:14px 16px;font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.card-b{padding:0 16px 14px}
.week-strip{display:flex;padding:12px 16px;gap:4px;background:var(--bg)}
.week-day{flex:1;text-align:center;padding:8px 0;border-radius:10px;cursor:pointer}
.week-day .wd{font-size:11px;color:var(--ink3);font-weight:500}
.week-day .wn{font-size:16px;font-weight:700;color:var(--ink2);margin-top:2px}
.week-day.on{background:var(--wh)}
.week-day.on .wd,.week-day.on .wn{color:var(--bg)}
.week-day.today:not(.on) .wn{color:var(--green)}
.month-nav{display:flex;align-items:center;padding:8px 16px;gap:10px}
.month-nav .mn-title{font-size:16px;font-weight:700;flex:1}
.mn-btn{background:none;border:none;color:var(--ink2);font-size:18px;cursor:pointer;padding:8px;border-radius:8px}
.slot-row{display:flex;align-items:stretch;padding:0 16px;margin-bottom:2px}
.slot-bar{width:4px;border-radius:2px;margin-right:12px;flex-shrink:0}
.slot-card{flex:1;background:var(--bg2);border-radius:var(--r);padding:14px 16px;cursor:pointer}
.slot-card:active{background:var(--bg3)}
.slot-top{display:flex;align-items:center;justify-content:space-between}
.slot-name{font-size:16px;font-weight:700}
.slot-cap{font-size:13px;font-weight:600;padding:3px 10px;border-radius:20px;background:var(--bg3)}
.slot-cap.full{background:var(--red-bg);color:var(--red)}
.slot-cap.warn{background:var(--gold-bg);color:var(--gold)}
.slot-bottom{display:flex;align-items:center;gap:12px;margin-top:6px}
.slot-prof{font-size:12px;color:var(--ink2)}
.slot-time{font-size:12px;color:var(--ink3)}
.aula-hdr{padding:16px 20px;background:var(--bg);position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:12px}
.aula-back{background:none;border:none;color:var(--ink);font-size:22px;cursor:pointer;padding:4px}
.aula-info{flex:1}
.aula-title{font-size:18px;font-weight:800}
.aula-sub{font-size:12px;color:var(--ink2)}
.student-card{display:flex;align-items:center;padding:14px 20px;gap:12px;border-bottom:1px solid var(--bg3)}
.student-card:last-child{border:none}
.st-av{width:48px;height:48px;border-radius:50%;object-fit:cover;flex-shrink:0}
.st-av-txt{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--wh);flex-shrink:0}
.st-info{flex:1;min-width:0}
.st-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.st-tipo{font-size:12px;color:var(--ink2);margin-top:1px}
.toggle-area{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0}
.toggle-lbl{font-size:9px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px}
.toggle{width:44px;height:24px;border-radius:12px;background:var(--bg4);cursor:pointer;position:relative;transition:background .2s}
.toggle.on{background:var(--green)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:var(--wh);transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.toggle.on::after{transform:translateX(20px)}
.st-dots{background:none;border:none;color:var(--ink3);font-size:18px;cursor:pointer;padding:6px}
.popup{position:fixed;z-index:200;background:var(--bg2);border-radius:var(--r);box-shadow:0 8px 30px rgba(0,0,0,.5);min-width:200px;animation:popIn .15s ease}
@keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.popup-item{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;font-size:14px;font-weight:500}
.popup-item:active{background:var(--bg3)}
.popup-item .pi-ico{font-size:18px;width:24px;text-align:center}
.popup-item.danger{color:var(--red)}
.popup-overlay{position:fixed;inset:0;z-index:199}
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;animation:fadeIn .2s}
.sheet{background:var(--bg2);width:100%;max-height:90vh;border-radius:16px 16px 0 0;overflow-y:auto;animation:slideUp .25s;padding-bottom:var(--safe-b)}
.sheet-handle{width:36px;height:4px;background:var(--bg4);border-radius:2px;margin:10px auto}
.sheet-h{padding:12px 20px 14px;font-size:17px;font-weight:700;display:flex;align-items:center;gap:10px}
.sheet-b{padding:0 20px 20px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.add-bar{padding:12px 16px;background:var(--bg);border-top:1px solid var(--bg3);position:sticky;bottom:0}
.add-btn{width:100%;padding:14px;background:transparent;border:1.5px solid var(--bg4);border-radius:var(--r);color:var(--ink2);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit}
.add-btn:active{background:var(--bg3)}
.filter-strip{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;scrollbar-width:none}
.filter-strip::-webkit-scrollbar{display:none}
.filter-chip{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;border:1px solid var(--bg4);color:var(--ink2);flex-shrink:0}
.filter-chip.on{background:var(--wh);color:var(--bg);border-color:var(--wh)}
.filter-chip .fc-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px}
.client-row{display:flex;align-items:center;padding:14px 20px;gap:12px;cursor:pointer}
.client-row:active{background:var(--bg3)}
.cl-av{width:44px;height:44px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--ink2);flex-shrink:0}
.cl-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cl-status{font-size:12px;display:flex;align-items:center;gap:4px;margin-top:2px}
.cl-status .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.search-wrap{padding:12px 16px;position:relative}
.search{width:100%;padding:12px 16px 12px 42px;background:var(--bg3);border:none;border-radius:var(--r);color:var(--ink);font-size:14px;font-family:inherit;outline:none}
.search::placeholder{color:var(--ink3)}
.search-ico{position:absolute;left:30px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--ink3);pointer-events:none}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;margin-bottom:16px}
.stat{background:var(--bg2);border-radius:var(--r);padding:16px}
.stat-val{font-size:24px;font-weight:800}
.stat-lbl{font-size:11px;color:var(--ink3);margin-top:2px;font-weight:500}
.menu-item{display:flex;align-items:center;padding:16px 20px;gap:14px;cursor:pointer}
.menu-item:active{background:var(--bg3)}
.menu-ico{width:40px;height:40px;border-radius:10px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.menu-info{flex:1}
.menu-title{font-size:15px;font-weight:600}
.menu-sub{font-size:12px;color:var(--ink3);margin-top:1px}
.menu-arrow{color:var(--ink3);font-size:16px}
.menu-sep{height:1px;background:var(--bg3);margin:0 20px}
.count-badge{font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;background:var(--bg3)}
.empty{text-align:center;padding:48px 24px;color:var(--ink3)}
.empty-ico{font-size:48px;margin-bottom:10px;opacity:.5}
.empty-t{font-size:16px;font-weight:600;color:var(--ink2)}
.loading{text-align:center;padding:48px;color:var(--ink3);font-size:14px}
.spin{display:inline-block;width:24px;height:24px;border:2.5px solid var(--bg4);border-top-color:var(--green);border-radius:50%;animation:sp .7s linear infinite;margin-bottom:10px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="safe-top"></div>
<div id="app"></div>
<script>
const SB='https://kfmkcbhalwupgknysukj.supabase.co',SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmbWtjYmhhbHd1cGdrbnlzdWtqIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MzQzMjE2NCwiZXhwIjoyMDg5MDA4MTY0fQ.xvRFjKk7GnXqrykjEr9Cp1yGGV-wGmcsZ-9SHZ1u9UU',API='https://dynamic-smile-production-9fc8.up.railway.app',AK='se7e2025';
const sess=JSON.parse(localStorage.getItem('se7e_session')||'{}');
let tab='agenda',agDate=new Date().toISOString().slice(0,10),agData=null,aulaView=null,clients=null,cFilter='TODOS',cSearch='',popup=null;
const WD=['dom.','seg.','ter.','qua.','qui.','sex.','sáb.'],WDF=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
function ini(n){return(n||'?').split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase()}
function avC(n){const h=[...(n||'')].reduce((a,c)=>c.charCodeAt(0)+((a<<5)-a),0);return`hsl(${Math.abs(h)%360},35%,35%)`}
function fmtD(d){return d?new Date(d+'T12:00').toLocaleDateString('pt-BR',{day:'numeric',month:'short',year:'numeric'}):'—'}
function fmtV(v){return v?'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2}):'R$ 0,00'}
async function sbG(t,q=''){return(await fetch(`${SB}/rest/v1/${t}?${q}`,{headers:{apikey:SK,Authorization:'Bearer '+SK}})).json()}
async function apiG(p){return(await fetch(`${API}/${p}`,{headers:{'x-api-key':AK}})).json()}
function todayStr(){return new Date().toISOString().slice(0,10)}
function nxtHr(h){const[a,b]=h.split(':').map(Number);const m=b+59;return`${String(a+Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`}

function render(){
  const app=document.getElementById('app');
  if(aulaView){renderAula(app);return}
  let h='';
  if(tab==='inicio')h=pgInicio();else if(tab==='agenda')h=pgAgenda();else if(tab==='clientes')h=pgClientes();else if(tab==='financeiro')h=pgFinanceiro();else h=pgMenu();
  h+=`<nav class="bnav">${[['inicio','📊','Início'],['agenda','📅','Agenda'],['clientes','👥','Clientes'],['financeiro','💰','Financeiro'],['menu','☰','Menu']].map(([k,i,l])=>`<div class="bnav-item ${tab===k?'on':''}" onclick="go('${k}')"><div class="bnav-ico">${i}</div><div class="bnav-lbl">${l}</div></div>`).join('')}</nav>`;
  app.innerHTML=h;
}
function go(t){tab=t;popup=null;render()}

// ── INÍCIO ──
function pgInicio(){
  const hr=new Date().getHours();const g=hr<12?'Bom dia':hr<18?'Boa tarde':'Boa noite';
  return`<div class="pg-hdr"><div class="pg-sub">${g}</div><div class="pg-title">${sess.name||''}</div></div><div class="content" id="ct">
  <div class="stats"><div class="stat" onclick="go('agenda')"><div class="stat-val" style="color:var(--green)">${agData?agData.total_alunos||0:'—'}</div><div class="stat-lbl">Alunos hoje</div></div><div class="stat" onclick="go('clientes')"><div class="stat-val">${clients?clients.length:'—'}</div><div class="stat-lbl">Total clientes</div></div></div>
  <div class="card"><div class="card-h">⚡ Ações rápidas</div><div class="card-b">
  <div class="menu-item" onclick="go('agenda')" style="padding:10px 0"><div class="menu-ico">📅</div><div class="menu-info"><div class="menu-title">Agenda do dia</div></div><div class="menu-arrow">›</div></div>
  <div class="menu-item" onclick="go('clientes')" style="padding:10px 0"><div class="menu-ico">👥</div><div class="menu-info"><div class="menu-title">Buscar aluno</div></div><div class="menu-arrow">›</div></div>
  </div></div></div>`;
}

// ── AGENDA ──
function pgAgenda(){
  const dt=new Date(agDate+'T12:00'),dow=dt.getDay();
  const mon=new Date(dt);mon.setDate(dt.getDate()-((dow+6)%7));
  const wd=[];for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);wd.push(d)}
  let h=`<div class="pg-hdr" style="display:flex;align-items:center"><div class="pg-title" style="flex:1">Agenda</div><div style="font-size:20px;cursor:pointer;padding:6px" onclick="agDate=todayStr();agData=null;render()">📅</div></div><div class="content" id="ct">
  <div class="month-nav"><div class="mn-title">${dt.toLocaleDateString('pt-BR',{month:'long',year:'numeric'})}</div><button class="mn-btn" onclick="wkNav(-7)">‹</button><button class="mn-btn" onclick="wkNav(7)">›</button></div>
  <div class="week-strip">${wd.map(d=>{const ds=d.toISOString().slice(0,10);return`<div class="week-day ${ds===agDate?'on':''} ${ds===todayStr()&&ds!==agDate?'today':''}" onclick="selD('${ds}')"><div class="wd">${WD[d.getDay()]}</div><div class="wn">${d.getDate()}</div></div>`}).join('')}</div>`;
  if(!agData){h+=`<div class="loading"><div class="spin"></div><br>Carregando...</div>`;loadAg();return h+'</div>'}
  const hrs=agData.horarios||[];
  if(!hrs.length){h+=`<div class="empty"><div class="empty-ico">📅</div><div class="empty-t">Sem aulas</div></div>`;return h+'</div>'}
  h+=`<div style="padding:12px 0">`;
  for(const s of hrs){const t=s.alunos?.length||0,c=s.capacidade||9,p=Math.round(t/c*100),cl=t>=c?'full':p>=70?'warn':'',bc=t>=c?'var(--red)':p>=70?'var(--gold)':'var(--green)';
    h+=`<div class="slot-row" onclick="openAula('${s.horario}')"><div class="slot-bar" style="background:${bc}"></div><div class="slot-card"><div class="slot-top"><div class="slot-name">${s.horario} - PERSONAL</div><div class="slot-cap ${cl}">👥 ${t}/${c}</div></div><div class="slot-bottom"><div class="slot-prof">👤 PROFESSOR ${s.horario.replace(':','H')}</div><div class="slot-time">🕐 ${s.horario} - ${nxtHr(s.horario)}</div></div></div></div>`}
  h+=`</div>`;return h+'</div>';
}
function selD(d){agDate=d;agData=null;render()}
function wkNav(n){const d=new Date(agDate+'T12:00');d.setDate(d.getDate()+n);agDate=d.toISOString().slice(0,10);agData=null;render()}
async function loadAg(){try{agData=await apiG(`tecnofit/dia/${agDate}`)}catch(e){agData={horarios:[]}}render()}
function openAula(hr){aulaView={hr,dt:agDate};render()}

// ── AULA DETAIL ──
function renderAula(app){
  const s=(agData?.horarios||[]).find(x=>x.horario===aulaView.hr);if(!s){app.innerHTML='';aulaView=null;render();return}
  const al=s.alunos||[],cap=s.capacidade||9;
  const tm={agenda_fixa:'Agenda Fixa',reposicao:'Reposição',reagendamento:'Reagendamento',avulsa:'Avulsa'};
  let h=`<div class="aula-hdr"><button class="aula-back" onclick="aulaView=null;render()">←</button><div class="aula-info"><div class="aula-title">${aulaView.hr} - PERSONAL</div><div class="aula-sub">PROFESSOR ${aulaView.hr.replace(':','H')} · ${aulaView.hr} - ${nxtHr(aulaView.hr)}</div></div><div class="slot-cap ${al.length>=cap?'full':''}" style="font-size:14px">👥 ${al.length}/${cap}</div></div>
  <div class="content" id="ct" style="padding-bottom:calc(80px + var(--safe-b))"><div style="padding:8px 20px;font-size:12px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:1px">Lista de Presença</div>`;
  for(const a of al){const c=avC(a.name||'');
    h+=`<div class="student-card">${a.photo?`<img class="st-av" src="${a.photo}" onerror="this.outerHTML='<div class=st-av-txt style=background:${c}>${ini(a.name)}</div>'">`:`<div class="st-av-txt" style="background:${c}">${ini(a.name)}</div>`}<div class="st-info"><div class="st-name">${a.name}</div><div class="st-tipo">${tm[a.tipo]||a.tipo||''}</div></div><div class="toggle-area"><div class="toggle-lbl">Presença</div><div class="toggle ${a.checkin?'on':''}"></div></div><button class="st-dots" onclick="event.stopPropagation();stMenu(this,${a.code},'${(a.name||'').replace(/'/g,"\\'")}')">⋮</button></div>`}
  h+=`</div><div class="add-bar"><button class="add-btn" onclick="addSt()">👥 Adicionar Aluno</button></div>`;
  app.innerHTML=h;
}
function stMenu(el,code,name){closePop();const r=el.getBoundingClientRect();
  popup=document.createElement('div');
  popup.innerHTML=`<div class="popup-overlay" onclick="closePop()"></div><div class="popup" style="top:${Math.min(r.bottom,innerHeight-160)}px;right:16px"><div class="popup-item" onclick="closePop();openClByCode(${code})"><span class="pi-ico">👤</span>Perfil do Aluno</div><div class="popup-item" onclick="closePop();openWa(${code})"><span class="pi-ico">💬</span>WhatsApp</div><div class="popup-item danger" onclick="closePop()"><span class="pi-ico">🗑</span>Remover Check-In</div></div>`;
  document.body.appendChild(popup);
}
function closePop(){if(popup){popup.remove();popup=null}}
function addSt(){
  const s=document.createElement('div');
  s.innerHTML=`<div class="sheet-bg" onclick="if(event.target===this)this.remove()"><div class="sheet"><div class="sheet-handle"></div><div class="sheet-h">👥 Adicionar Aluno</div><div class="sheet-b"><input class="search" style="padding-left:16px;margin-bottom:12px" placeholder="Buscar aluno..." oninput="srcAdd(this.value,this.parentElement)" autofocus><div id="add-r" style="max-height:50vh;overflow-y:auto"></div></div></div></div>`;
  document.body.appendChild(s);s.querySelector('input').focus();
}
async function srcAdd(q,c){const el=c.querySelector('#add-r');if(q.length<2){el.innerHTML='<div style="padding:16px;text-align:center;color:var(--ink3);font-size:13px">Digite ao menos 2 letras</div>';return}
  el.innerHTML='<div class="loading"><div class="spin"></div></div>';
  const r=await sbG('profiles',`full_name=ilike.*${encodeURIComponent(q)}*&role=eq.student&active=eq.true&limit=10&select=id,full_name,photo_url`);
  el.innerHTML=r.length?r.map(a=>`<div class="client-row" onclick="this.closest('.sheet-bg').remove()">${a.photo_url?`<img src="${a.photo_url}" style="width:40px;height:40px;border-radius:50%;object-fit:cover">`:`<div class="cl-av" style="background:${avC(a.full_name)}">${ini(a.full_name)}</div>`}<div style="flex:1;min-width:0"><div class="cl-name">${a.full_name}</div></div></div>`).join(''):'<div style="padding:16px;text-align:center;color:var(--ink3)">Nenhum encontrado.</div>';
}

// ── CLIENTES ──
function pgClientes(){
  const fs=[{k:'TODOS',d:null},{k:'ATIVOS',d:'var(--green)'},{k:'BLOQUEADOS',d:'var(--gold)'},{k:'CANCELADOS',d:'var(--red)'}];
  let h=`<div class="pg-hdr" style="display:flex;align-items:center"><div class="pg-title" style="flex:1">Clientes</div><div style="font-size:22px;cursor:pointer;padding:6px">👤</div></div><div class="content" id="ct">
  <div class="search-wrap"><span class="search-ico">🔍</span><input class="search" placeholder="Pesquisar clientes" value="${cSearch}" oninput="cSearch=this.value;updCl()"></div>
  <div class="filter-strip">${fs.map(f=>`<div class="filter-chip ${cFilter===f.k?'on':''}" onclick="cFilter='${f.k}';updCl()">${f.d?`<span class="fc-dot" style="background:${f.d}"></span>`:''}${f.k}</div>`).join('')}</div>`;
  if(!clients){h+=`<div class="loading"><div class="spin"></div><br>Carregando...</div>`;loadCl();return h+'</div>'}
  h+=`<div style="padding:8px 20px"><span class="count-badge">Total: ${clients.length} alunos</span></div><div id="cl-list">${bldCl()}</div></div>`;return h;
}
function bldCl(){if(!clients)return'';let l=clients;
  if(cSearch){const q=cSearch.toLowerCase();l=l.filter(c=>(c.full_name||'').toLowerCase().includes(q)||String(c.matricula).includes(cSearch))}
  if(cFilter==='ATIVOS')l=l.filter(c=>!c.blocked&&c.hasCt);else if(cFilter==='BLOQUEADOS')l=l.filter(c=>c.blocked);else if(cFilter==='CANCELADOS')l=l.filter(c=>!c.hasCt&&!c.blocked);
  return l.slice(0,80).map(c=>{const st=c.blocked?{l:'Bloqueado',c:'var(--red)'}:c.hasCt?{l:'Ativo',c:'var(--green)'}:{l:'Sem Contrato',c:'var(--ink3)'};
    return`<div class="client-row" onclick="openCl('${c.id}')">${c.photo_url?`<img src="${c.photo_url}" style="width:44px;height:44px;border-radius:50%;object-fit:cover">`:`<div class="cl-av" style="background:${avC(c.full_name)}">${ini(c.full_name)}</div>`}<div style="flex:1;min-width:0"><div class="cl-name">${c.full_name}</div><div class="cl-status"><span class="dot" style="background:${st.c}"></span>${st.l}</div></div></div>`}).join('')+(l.length>80?'<div style="padding:16px;text-align:center;color:var(--ink3);font-size:12px">Mostrando 80 de '+l.length+'</div>':'');
}
function updCl(){const el=document.getElementById('cl-list');if(el)el.innerHTML=bldCl()}
async function loadCl(){try{const[p,s,ct]=await Promise.all([sbG('profiles','role=eq.student&active=eq.true&select=id,full_name,phone,photo_url&order=full_name'),sbG('students','select=id,matricula,blocked,treinos_realizados,next_training_session'),sbG('contracts','status=eq.active&select=student_id')]);const sm=Object.fromEntries(s.map(x=>[x.id,x])),cs=new Set(ct.map(x=>x.student_id));clients=p.map(x=>({...x,...(sm[x.id]||{}),hasCt:cs.has(x.id)}))}catch(e){clients=[]}render()}

async function openCl(id){const c=clients?.find(x=>x.id===id);if(!c)return;
  let ct={},pl={},fs=[],rc=[];
  try{const[cts,reps]=await Promise.all([sbG('contracts',`student_id=eq.${id}&status=eq.active&order=created_at.desc&limit=1&select=*`),sbG('replacement_credits',`student_id=eq.${id}&active=eq.true&select=quantity_remaining`)]);
    if(cts.length){ct=cts[0];const pls=await sbG('plans',`id=eq.${ct.plan_id}&select=*`);pl=pls[0]||{};const fsl=await sbG('fixed_slots',`student_id=eq.${id}&active=eq.true&select=class_slot_id`);if(fsl.length){const ids=fsl.map(f=>f.class_slot_id);const sd=await sbG('class_slots',`id=in.(${ids.join(',')})&select=weekday,start_time&order=weekday,start_time`);fs=sd.map(s=>({d:WD[s.weekday],h:s.start_time.slice(0,5)}))}}rc=reps}catch(e){}
  const rd=rc.reduce((s,r)=>s+(r.quantity_remaining||0),0),cor=avC(c.full_name),tm={monthly:'Mensal',recurring:'Recorrente',annual:'Anual'};
  const sh=document.createElement('div');
  sh.innerHTML=`<div class="sheet-bg" onclick="if(event.target===this)this.remove()"><div class="sheet"><div class="sheet-handle"></div>
  <div class="sheet-h">${c.photo_url?`<img src="${c.photo_url}" style="width:36px;height:36px;border-radius:50%;object-fit:cover">`:`<div class="cl-av" style="background:${cor};width:36px;height:36px;font-size:13px">${ini(c.full_name)}</div>`}<div style="flex:1;min-width:0"><div style="font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.full_name}</div><div style="font-size:12px;color:var(--ink3)">mat. ${c.matricula||'—'}</div></div></div>
  <div class="sheet-b">
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px">
    <div style="text-align:center;padding:12px;background:var(--bg3);border-radius:var(--r)"><div style="font-size:22px;font-weight:800;color:var(--green)">${c.treinos_realizados||0}</div><div style="font-size:9px;color:var(--ink3);font-weight:600">TREINOS</div></div>
    <div style="text-align:center;padding:12px;background:var(--bg3);border-radius:var(--r)"><div style="font-size:18px;font-weight:800">Ficha ${c.next_training_session||1}</div><div style="font-size:9px;color:var(--ink3);font-weight:600">PRÓXIMO</div></div>
    <div style="text-align:center;padding:12px;background:var(--bg3);border-radius:var(--r)"><div style="font-size:22px;font-weight:800;color:${rd>0?'var(--gold)':'var(--ink3)'}">${rd}</div><div style="font-size:9px;color:var(--ink3);font-weight:600">REPOSIÇÕES</div></div>
  </div>
  ${ct.id?`<div style="background:var(--bg3);border-radius:var(--r);padding:14px;margin-bottom:12px"><div style="font-size:13px;font-weight:700">${pl.name||'Plano'} · ${tm[ct.payment_type]||''}</div><div style="font-size:12px;color:var(--ink2);margin-top:4px">${fmtD(ct.start_date)} → ${fmtD(ct.end_date)}</div><div style="font-size:12px;color:var(--ink2);margin-top:2px">${ct.remaining_classes||0}/${ct.total_classes||0} aulas · ${pl.frequency_per_week||0}x/sem</div></div>
  ${fs.length?`<div style="margin-bottom:12px"><div style="font-size:11px;font-weight:600;color:var(--ink3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Horários fixos</div><div style="display:flex;flex-wrap:wrap;gap:6px">${fs.map(s=>`<div style="display:flex;flex-direction:column;align-items:center;padding:8px 14px;background:var(--purple-bg);border-radius:10px;border:1px solid rgba(139,92,246,.3)"><span style="font-size:10px;font-weight:700;color:var(--purple)">${s.d}</span><span style="font-size:15px;font-weight:800;color:var(--purple)">${s.h}</span></div>`).join('')}</div></div>`:''}
  `:'<div style="font-size:13px;color:var(--ink3);margin-bottom:12px">Sem contrato ativo.</div>'}
  <div style="display:flex;gap:8px">${c.phone?`<a href="https://wa.me/${(c.phone||'').replace(/\\D/g,'')}" style="text-decoration:none;flex:1;padding:12px;background:var(--green-bg);border-radius:var(--r);text-align:center;font-size:13px;font-weight:600;color:var(--green)">💬 WhatsApp</a>`:''}</div>
  </div></div></div>`;document.body.appendChild(sh);
}
async function openClByCode(code){if(!clients)await loadCl();const c=clients?.find(x=>x.matricula===code);if(c)openCl(c.id)}
async function openWa(code){if(!clients)await loadCl();const c=clients?.find(x=>x.matricula===code);if(c?.phone)window.open(`https://wa.me/${c.phone.replace(/\D/g,'')}`)}

// ── FINANCEIRO ──
function pgFinanceiro(){const m=new Date().toLocaleDateString('pt-BR',{month:'long',year:'numeric'}).toUpperCase();
  return`<div class="pg-hdr"><div class="pg-title">Financeiro</div></div><div class="content" id="ct">
  <div style="padding:24px 20px;background:var(--bg)"><div style="font-size:11px;color:var(--ink3);text-transform:uppercase;letter-spacing:1px;font-weight:600">SALDO DE ${m}</div><div style="font-size:36px;font-weight:800;margin-top:4px;color:var(--green)">—</div><div style="font-size:13px;color:var(--ink2);margin-top:4px">Dados via Tecnofit/Mundipag</div>
  <div style="display:flex;gap:10px;margin-top:16px"><div style="flex:1;background:var(--bg2);border-radius:var(--r);padding:14px"><div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><span style="font-size:14px">↗️</span><span style="font-size:11px;color:var(--ink3);font-weight:600">ENTRADA</span></div><div style="font-size:18px;font-weight:700;color:var(--green)">—</div><div style="font-size:10px;margin-top:4px;color:var(--green)">R$ 0,00 em aberto</div></div>
  <div style="flex:1;background:var(--bg2);border-radius:var(--r);padding:14px"><div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><span style="font-size:14px">↙️</span><span style="font-size:11px;color:var(--ink3);font-weight:600">SAÍDA</span></div><div style="font-size:18px;font-weight:700;color:var(--red)">—</div><div style="font-size:10px;margin-top:4px;color:var(--red)">R$ 0,00 em aberto</div></div></div></div>
  <div class="card" style="margin-top:12px"><div class="card-h">💳 Formas de Recebimento</div><div class="card-b"><div style="display:flex;flex-wrap:wrap;gap:8px">${['Boleto','Cartão de Crédito','Cartão de Crédito Online','Cartão de Débito','Dinheiro','Pix'].map(m=>`<span style="padding:6px 12px;border-radius:20px;background:var(--bg3);font-size:12px;font-weight:500;display:flex;align-items:center;gap:4px"><span style="color:var(--green)">✓</span>${m}</span>`).join('')}</div></div></div>
  <div style="padding:20px;text-align:center;font-size:12px;color:var(--ink3)">Financeiro detalhado no painel desktop.</div></div>`;
}

// ── MENU ──
function pgMenu(){
  return`<div class="pg-hdr"><div class="pg-title">Menu</div></div><div class="content" id="ct">
  <div style="padding:12px 20px"><div style="display:flex;align-items:center;gap:12px;padding:16px;background:var(--bg2);border-radius:var(--r)"><div class="cl-av" style="background:var(--purple);color:var(--wh);width:48px;height:48px;font-size:18px">${ini(sess.name||'')}</div><div><div style="font-size:17px;font-weight:700">${(sess.name||'').toUpperCase()}</div><div style="font-size:12px;color:var(--ink3)">${sess.role==='admin'?'Administrador':sess.role==='coordinator'?'Coordenador':'Recepcionista'}</div></div></div></div>
  <div style="padding:0 20px 12px"><div style="display:flex;align-items:center;gap:12px;padding:16px;background:var(--bg2);border-radius:var(--r)"><div class="cl-av" style="background:var(--gold-bg);color:var(--gold);width:40px;height:40px;font-size:16px;font-weight:800">E</div><div style="flex:1"><div style="font-size:15px;font-weight:700">ESTUDIO7</div><div style="font-size:12px;color:var(--ink3)">Clique para ver detalhes</div></div><div style="font-size:16px;color:var(--ink3)">🔄</div></div></div>
  <div style="background:var(--bg2);margin:0 16px;border-radius:var(--r);overflow:hidden">
    <div class="menu-item" onclick="doSync('fixed')"><div class="menu-ico">📌</div><div class="menu-info"><div class="menu-title">Sincronizar horários</div><div class="menu-sub">Detecta horários do Tecnofit</div></div><div class="menu-arrow">›</div></div><div class="menu-sep"></div>
    <div class="menu-item" onclick="doSync('freq')"><div class="menu-ico">📊</div><div class="menu-info"><div class="menu-title">Sincronizar frequência</div><div class="menu-sub">Recalcula treinos e reposições</div></div><div class="menu-arrow">›</div></div><div class="menu-sep"></div>
    <div class="menu-item" onclick="window.open('/recepcao','_blank')"><div class="menu-ico">🖥</div><div class="menu-info"><div class="menu-title">Painel da Recepção</div><div class="menu-sub">Abrir versão desktop</div></div><div class="menu-arrow">›</div></div>
  </div><div style="height:16px"></div>
  <div style="background:var(--bg2);margin:0 16px;border-radius:var(--r);overflow:hidden">
    <div class="menu-item" onclick="doLogout()"><div class="menu-ico" style="background:var(--red-bg)">🚪</div><div class="menu-info"><div class="menu-title">Logout</div></div><div class="menu-arrow">›</div></div>
  </div><div style="text-align:center;padding:24px;font-size:12px;color:var(--ink3)">1.0.0 (1)</div></div>`;
}
async function doSync(type){
  const msg=type==='fixed'?'Sincronizar horários fixos?':'Recalcular frequência?\nPode levar alguns minutos.';
  if(!confirm(msg))return;
  const ct=document.getElementById('ct');ct.innerHTML='<div class="loading"><div class="spin"></div><br>Sincronizando...</div>';
  try{const r=await fetch(`${API}/tecnofit/sync-${type==='fixed'?'fixed-slots':'frequencia'}`,{method:'POST',headers:{'x-api-key':AK}});const d=await r.json();alert('✅ Concluído!\n'+JSON.stringify(d,null,2).slice(0,200));if(type==='freq')clients=null}catch(e){alert('Erro: '+e.message)}render()
}
function doLogout(){if(!confirm('Sair?'))return;localStorage.removeItem('se7e_session');location.href='/login'}

render();
</script>
</body>
</html>
